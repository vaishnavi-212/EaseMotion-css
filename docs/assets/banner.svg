<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e17"/>
      <stop offset="100%" style="stop-color:#1a1830"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="120" fill="#6c63ff" opacity="0.06"/>
  <circle cx="1140" cy="180" r="100" fill="#a78bfa" opacity="0.07"/>
  <circle cx="600" cy="240" r="150" fill="#6c63ff" opacity="0.04"/>

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="240" fill="url(#dots)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" rx="0" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Lightning bolt -->
  <text x="88" y="148" font-size="72" font-family="Arial, sans-serif" text-anchor="middle" filter="url(#glow)" fill="#6c63ff" opacity="0.9">⚡</text>

  <!-- Main title -->
  <text x="600" y="118" font-size="60" font-weight="900" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle" fill="url(#titleGrad)" letter-spacing="-2">EaseMotion CSS</text>

  <!-- Tagline -->
  <text x="600" y="158" font-size="20" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle" fill="#a78bfa" opacity="0.85" letter-spacing="0.5">Human-readable · Animation-first · Zero dependencies</text>

  <!-- CDN pill badge -->
  <rect x="380" y="178" width="440" height="36" rx="18" fill="#6c63ff" opacity="0.15" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="201" font-size="13" font-family="'Courier New', monospace" text-anchor="middle" fill="#a78bfa" opacity="0.9">cdn.jsdelivr.net/npm/easemotion-css/easemotion.css</text>

  <!-- Bottom border -->
  <rect x="0" y="237" width="1200" height="3" rx="0" fill="url(#accentGrad)" opacity="0.4"/>
</svg>
