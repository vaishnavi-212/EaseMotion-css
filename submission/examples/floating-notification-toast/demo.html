<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Floating Notification Toast (Self-contained)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="eyebrow">Floating Toast • Demo</div>
      <h1>Floating Notification Toast</h1>
      <p>Success, Error, Warning, Info variants with stacking, slide-in + fade-out dismissal, and hover-pause progress.</p>
    </header>

    <section class="panel">
      <h2 class="panel-title">Fire a toast</h2>
      <div class="grid">
        <button class="btn" data-variant="success" type="button">✓ Success</button>
        <button class="btn" data-variant="error" type="button">✕ Error</button>
        <button class="btn" data-variant="warning" type="button">⚠ Warning</button>
        <button class="btn" data-variant="info" type="button">ℹ Info</button>
      </div>

      <div class="divider"></div>

      <h2 class="panel-title">Stacking demo</h2>
      <div class="grid">
        <button class="btn btn-wide" id="btn-stack" type="button">Add 4 toasts</button>
        <button class="btn btn-wide" id="btn-burst" type="button">Rapid burst</button>
      </div>

      <p class="hint">
        Tip: Hover a toast to pause its auto-dismiss progress.
      </p>
    </section>

    <section class="panel panel--small">
      <h2 class="panel-title">Markup you get</h2>
      <pre class="code" aria-label="Example HTML snippet"><code><div class="fn-toast fn-toast--success fn-toast--enter">
  <span class="fn-icon">✓</span>
  <div class="fn-content">
    <div class="fn-title">Success</div>
    <div class="fn-message">Saved!</div>
  </div>
  <button class="fn-close" aria-label="Dismiss">✕</button>
  <div class="fn-progress"></div>
</div></code></pre>
    </section>
  </main>

  <!-- Toast container -->
  <div class="fn-stack" id="fn-stack" aria-live="polite" aria-relevant="additions"></div>

  <script>
    const stack = document.getElementById('fn-stack');

    const VARIANTS = {
      success: { icon: '✓', title: 'Success', message: 'Changes saved successfully.' },
      error:   { icon: '✕', title: 'Error',   message: 'Something went wrong. Please try again.' },
      warning: { icon: '⚠', title: 'Warning', message: 'Your session expires soon.' },
      info:     { icon: 'ℹ', title: 'Info',   message: 'A new update is available.' },
    };

    const DEFAULT_DURATION = 4200; // ms
    let counter = 0;

    function dismissToast(toast) {
      if (!toast || toast.dataset.dismissing === 'true') return;
      toast.dataset.dismissing = 'true';

      toast.classList.remove('fn-toast--enter');
      toast.classList.add('fn-toast--dismissing');

      const removeDelay = 520; // should exceed fade-out keyframe duration
      setTimeout(() => {
        toast.remove();
      }, removeDelay);
    }

    function createProgress(toast, duration) {
      const progress = document.createElement('div');
      progress.className = 'fn-progress';
      progress.style.setProperty('--fn-duration', duration + 'ms');

      // Animate by scaling X. Pausing is handled via animation-play-state.
      progress.addEventListener('mouseenter', () => {
        progress.style.animationPlayState = 'paused';
      });
      progress.addEventListener('mouseleave', () => {
        progress.style.animationPlayState = 'running';
      });

      toast.appendChild(progress);
      return progress;
    }

    function showToast(variant, duration = DEFAULT_DURATION) {
      const cfg = VARIANTS[variant];
      if (!cfg) return;

      counter += 1;

      const toast = document.createElement('div');
      toast.className = `fn-toast fn-toast--${variant} fn-toast--enter`;
      toast.dataset.id = String(counter);
      toast.setAttribute('role', 'status');
      toast.setAttribute('tabindex', '-1');

      toast.innerHTML = `
        <span class="fn-icon" aria-hidden="true">${cfg.icon}</span>
        <div class="fn-content">
          <div class="fn-title">${cfg.title}</div>
          <div class="fn-message">${cfg.message}</div>
        </div>
        <button class="fn-close" type="button" aria-label="Dismiss">✕</button>
      `;

      // Hovering toast pauses the progress animation
      toast.addEventListener('mouseenter', () => {
        const p = toast.querySelector('.fn-progress');
        if (p) p.style.animationPlayState = 'paused';
      });
      toast.addEventListener('mouseleave', () => {
        const p = toast.querySelector('.fn-progress');
        if (p) p.style.animationPlayState = 'running';
      });

      const progress = createProgress(toast, duration);

      const closeBtn = toast.querySelector('.fn-close');
      closeBtn.addEventListener('click', () => dismissToast(toast));

      stack.appendChild(toast);

      const timer = setTimeout(() => dismissToast(toast), duration);
      toast.dataset.timer = String(timer);

      return toast;
    }

    // Button wiring
    document.querySelectorAll('[data-variant]').forEach(btn => {
      btn.addEventListener('click', () => showToast(btn.dataset.variant));
    });

    document.getElementById('btn-stack').addEventListener('click', () => {
      showToast('success', 5200);
      setTimeout(() => showToast('info', 5200), 120);
      setTimeout(() => showToast('warning', 5200), 240);
      setTimeout(() => showToast('error', 5200), 360);
    });

    document.getElementById('btn-burst').addEventListener('click', () => {
      const order = ['info', 'success', 'warning', 'error'];
      order.forEach((v, i) => setTimeout(() => showToast(v, 3200), i * 120));
    });

    // Optional: keyboard shortcut to add an info toast
    window.addEventListener('keydown', (e) => {
      if (e.key === 'i' || e.key === 'I') showToast('info', 3800);
    });
  </script>
</body>
</html>
