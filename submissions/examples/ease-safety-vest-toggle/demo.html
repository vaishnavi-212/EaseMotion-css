<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Vest Toggle</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h2>Safety Vest</h2>
    <p>Toggle worker safety equipment.</p>

    <div
        class="toggle"
        id="toggle"
        tabindex="0"
        role="switch"
        aria-checked="false">

        <div class="vest"></div>
        <div class="stripe"></div>

        <div class="status" id="status">
            OFF
        </div>

        <div class="indicator"></div>

    </div>

    <button id="btn">
        Toggle Vest
    </button>

</div>

<script>
const toggle = document.getElementById("toggle");
const statusText = document.getElementById("status");
const button = document.getElementById("btn");

function updateVest() {

    const enabled = toggle.classList.toggle("active");

    toggle.setAttribute("aria-checked", enabled);

    statusText.textContent = enabled ? "ON" : "OFF";

}

button.addEventListener("click", updateVest);

toggle.addEventListener("click", updateVest);

toggle.addEventListener("keydown", (e) => {

    if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        updateVest();
    }

});
</script>

</body>
</html>
