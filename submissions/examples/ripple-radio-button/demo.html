<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ripple Radio Button</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<main class="page">

    <h1>Ripple Radio Button</h1>

    <p class="subtitle">
        A modern ripple radio button component inspired by blog reading preferences.
    </p>

    <fieldset class="radio-group">

        <legend>Choose your reading theme</legend>

        <label class="radio">

            <input
                type="radio"
                name="theme"
                checked>

            <span class="indicator"></span>

            Light

        </label>

        <label class="radio">

            <input
                type="radio"
                name="theme">

            <span class="indicator"></span>

            Dark

        </label>

        <label class="radio">

            <input
                type="radio"
                name="theme">

            <span class="indicator"></span>

            Sepia

        </label>

        <label class="radio">

            <input
                type="radio"
                name="theme">

            <span class="indicator"></span>

            System

        </label>

    </fieldset>

</main>

</body>

</html>
