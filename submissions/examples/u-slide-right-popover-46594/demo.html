<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Creative Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            View Portfolio
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    🎨
                </div>

                <div>
                    <h2>Creative Studio</h2>
                    <p>Featured Designer Profile</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Projects</h3>
                    <span>48</span>
                </div>

                <div class="card">
                    <h3>Awards</h3>
                    <span>12</span>
                </div>

                <div class="card">
                    <h3>Clients</h3>
                    <span>90+</span>
                </div>

            </div>

            <button class="action">
                Explore Portfolio
            </button>

        </div>

    </div>

</div>

</body>
</html>
