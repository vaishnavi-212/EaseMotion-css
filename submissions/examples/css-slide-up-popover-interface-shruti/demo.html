<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide-Up Popover - Interactive Interface</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <button class="popover-trigger">
    Open Controls

    <span class="popover" role="tooltip">
      Interactive controls are available. Continue to customize your workspace.
    </span>
  </button>

</div>

</body>
</html>
