<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watercolor Spread – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🎨 Watercolor Spread</h1>
    <p class="subtitle">Watercolor bleeding on paper</p>

    <div class="ws-container">
      <div class="ws-scene">
        <!-- Paper -->
        <div class="paper">
          <!-- Paper texture -->
          <div class="paper-texture"></div>

          <!-- Watercolor washes -->
          <div class="wash wash-1">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <div class="wash wash-2">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <div class="wash wash-3">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <div class="wash wash-4">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <div class="wash wash-5">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <div class="wash wash-6">
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
            <div class="wash-blob"></div>
          </div>

          <!-- Water droplets -->
          <div class="droplet d1"></div>
          <div class="droplet d2"></div>
          <div class="droplet d3"></div>
          <div class="droplet d4"></div>
          <div class="droplet d5"></div>
          <div class="droplet d6"></div>
          <div class="droplet d7"></div>
          <div class="droplet d8"></div>

          <!-- Watercolor glow -->
          <div class="watercolor-glow"></div>
        </div>

        <!-- Brush -->
        <div class="brush">
          <div class="brush-handle"></div>
          <div class="brush-ferrule"></div>
          <div class="brush-bristles"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="spreadBtn">💧 Spread Watercolor</button>
      <button id="addBtn">🎨 Add Color</button>
      <label>
        Spread Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Color
        <select id="colorSelect">
          <option value="#ff6b6b">Red</option>
          <option value="#ffd93d">Yellow</option>
          <option value="#6bcbff" selected>Blue</option>
          <option value="#6bff6b">Green</option>
          <option value="#b88aff">Purple</option>
          <option value="#ff8a6a">Orange</option>
          <option value="#ff6bff">Pink</option>
          <option value="#6bffff">Cyan</option>
        </select>
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const washes = document.querySelectorAll('.wash');
      const washBlobs = document.querySelectorAll('.wash-blob');
      const droplets = document.querySelectorAll('.droplet');
      const watercolorGlow = document.querySelector('.watercolor-glow');
      const brush = document.querySelector('.brush');

      const spreadBtn = document.getElementById('spreadBtn');
      const addBtn = document.getElementById('addBtn');
      const speedInput = document.getElementById('speedControl');
      const colorSelect = document.getElementById('colorSelect');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isSpreading = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let currentColor = '#6bcbff';

      // ----- Apply speed -----
      function applySpeed() {
        // Washes
        washes.forEach((wash, i) => {
          const duration = (3 + i * 0.3) / speedMultiplier;
          wash.style.setProperty('--wash-duration', duration + 's');
          wash.style.setProperty('--wash-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Blobs
        washBlobs.forEach((blob, i) => {
          const duration = (2 + (i % 5) * 0.2) / speedMultiplier;
          blob.style.setProperty('--blob-duration', duration + 's');
          blob.style.setProperty('--blob-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Droplets
        droplets.forEach((d, i) => {
          const duration = (1.5 + i * 0.1) / speedMultiplier;
          d.style.setProperty('--droplet-duration', duration + 's');
          d.style.setProperty('--droplet-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Glow
        watercolorGlow.style.setProperty('--glow-duration', (2.5 / speedMultiplier) + 's');

        // Brush
        brush.style.setProperty('--brush-duration', (1.5 / speedMultiplier) + 's');
      }

      // ----- Spread watercolor -----
      function spreadWatercolor() {
        if (isSpreading) return;
        isSpreading = true;

        // Reset washes
        washes.forEach(wash => {
          wash.style.opacity = '0';
          wash.style.transform = 'scale(0.8)';
          wash.style.animation = 'none';
          void wash.offsetWidth;
          wash.style.animation = '';
        });

        // Reset blobs
        washBlobs.forEach(blob => {
          blob.style.opacity = '0';
          blob.style.transform = 'scale(0.5)';
          blob.style.animation = 'none';
          void blob.offsetWidth;
          blob.style.animation = '';
        });

        // Set color
        const color = colorSelect.value;
        currentColor = color;

        // Apply color to washes and blobs
        washes.forEach(wash => {
          wash.style.setProperty('--wash-color', color);
          const blobs = wash.querySelectorAll('.wash-blob');
          blobs.forEach((blob, i) => {
            const opacity = 0.1 + Math.random() * 0.3;
            const scale = 0.5 + Math.random() * 0.8;
            blob.style.setProperty('--blob-color', color);
            blob.style.setProperty('--blob-opacity', opacity);
            blob.style.setProperty('--blob-scale', scale);
          });
        });

        // Animate washes
        setTimeout(() => {
          washes.forEach((wash, i) => {
            setTimeout(() => {
              wash.classList.add('spreading');
              wash.style.opacity = '0.6';
            }, i * 200 / speedMultiplier);
          });
        }, 100 / speedMultiplier);

        // Animate blobs
        setTimeout(() => {
          washBlobs.forEach((blob, i) => {
            setTimeout(() => {
              blob.classList.add('spreading');
              blob.style.opacity = '0.8';
            }, i * 30 / speedMultiplier);
          });
        }, 300 / speedMultiplier);

        // Glow
        setTimeout(() => {
          watercolorGlow.classList.add('glowing');
          watercolorGlow.style.opacity = '0.6';
        }, 500 / speedMultiplier);

        // Droplets
        setTimeout(() => {
          droplets.forEach((d, i) => {
            setTimeout(() => {
              d.classList.add('falling');
            }, i * 50 / speedMultiplier);
          });
        }, 600 / speedMultiplier);

        spreadBtn.textContent = '💧 Spreading...';
        setTimeout(() => {
          spreadBtn.textContent = '💧 Spread Watercolor';
          isSpreading = false;
        }, 2500 / speedMultiplier);
      }

      // ----- Add color -----
      function addColor() {
        if (isSpreading) return;

        const color = colorSelect.value;
        currentColor = color;

        // Find a wash that's already spread and add a new blob
        const activeWash = document.querySelector('.wash.spreading');
        if (activeWash) {
          const newBlob = document.createElement('div');
          newBlob.className = 'wash-blob';
          newBlob.style.setProperty('--blob-color', color);
          newBlob.style.setProperty('--blob-opacity', 0.3);
          newBlob.style.setProperty('--blob-scale', 0.6 + Math.random() * 0.6);
          newBlob.style.top = (20 + Math.random() * 60) + '%';
          newBlob.style.left = (20 + Math.random() * 60) + '%';
          activeWash.appendChild(newBlob);

          setTimeout(() => {
            newBlob.classList.add('spreading');
            newBlob.style.opacity = '0.8';
          }, 50);

          addBtn.textContent = '🎨 Adding...';
          setTimeout(() => {
            addBtn.textContent = '🎨 Add Color';
          }, 500 / speedMultiplier);
        } else {
          // If no wash is active, trigger spread first
          spreadWatercolor();
        }
      }

      // ----- Reset -----
      function resetWatercolor() {
        isSpreading = false;

        washes.forEach(wash => {
          wash.classList.remove('spreading');
          wash.style.opacity = '0';
          wash.style.transform = 'scale(0.8)';
          // Remove extra blobs
          const extraBlobs = wash.querySelectorAll('.wash-blob');
          extraBlobs.forEach((blob, i) => {
            if (i >= 10) blob.remove();
          });
        });

        washBlobs.forEach(blob => {
          blob.classList.remove('spreading');
          blob.style.opacity = '0';
          blob.style.transform = 'scale(0.5)';
        });

        droplets.forEach(d => {
          d.classList.remove('falling');
          d.style.opacity = '0';
        });

        watercolorGlow.classList.remove('glowing');
        watercolorGlow.style.opacity = '0';

        brush.classList.remove('painting');

        spreadBtn.textContent = '💧 Spread Watercolor';
        addBtn.textContent = '🎨 Add Color';

        if (isSpreading) {
          isSpreading = false;
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state
        washes.forEach(wash => {
          wash.style.opacity = '0';
          wash.style.transform = 'scale(0.8)';
          const blobs = wash.querySelectorAll('.wash-blob');
          blobs.forEach(blob => {
            blob.style.opacity = '0';
            blob.style.transform = 'scale(0.5)';
          });
        });

        droplets.forEach(d => {
          d.style.opacity = '0';
        });

        watercolorGlow.style.opacity = '0';

        // Set initial colors
        const colors = ['#ff6b6b', '#ffd93d', '#6bcbff', '#6bff6b', '#b88aff', '#ff8a6a'];
        washes.forEach((wash, i) => {
          const color = colors[i % colors.length];
          wash.style.setProperty('--wash-color', color);
          const blobs = wash.querySelectorAll('.wash-blob');
          blobs.forEach(blob => {
            const opacity = 0.1 + Math.random() * 0.3;
            blob.style.setProperty('--blob-color', color);
            blob.style.setProperty('--blob-opacity', opacity);
          });
        });

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-spread after 1 second
        setTimeout(() => {
          spreadWatercolor();
        }, 1000);
      }

      // ----- Event listeners -----
      spreadBtn.addEventListener('click', spreadWatercolor);
      addBtn.addEventListener('click', addColor);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      resetBtn.addEventListener('click', resetWatercolor);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
