<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade In Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container">

  <div class="popover">
    <button class="popover-btn">
      Product Features
    </button>

    <div class="popover-content">
      <h3>Marketing Solutions</h3>
      <p>
        Create beautiful landing pages with smooth CSS animations.
      </p>
    </div>
  </div>

</section>

</body>
</html>
