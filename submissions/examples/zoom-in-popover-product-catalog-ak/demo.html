<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom-In Product Catalog Popover Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="product-card">
    <img class="product-thumb" src="https://picsum.photos/seed/product1/400/300" alt="Product photo">
    <div class="product-info">
      <h4>Ceramic Pour-Over Set</h4>
      <span class="product-price">$42.00</span>
    </div>
    <button class="product-popover-trigger" id="productBtn" aria-expanded="false" aria-describedby="productBox">
      Quick View
    </button>

    <div class="product-popover-box" id="productBox" role="tooltip">
      <h3>Ceramic Pour-Over Set</h3>
      <p>Hand-glazed ceramic dripper with matching mug. Includes reusable filter.</p>
      <ul class="product-meta">
        <li>In stock</li>
        <li>Ships in 2–3 days</li>
      </ul>
    </div>
  </div>

  <script>
    const btn = document.getElementById('productBtn');
    const box = document.getElementById('productBox');

    btn.addEventListener('click', () => {
      const isOpen = box.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        box.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });

    document.addEventListener('click', (e) => {
      if (!box.contains(e.target) && !btn.contains(e.target)) {
        box.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  </script>

</body>
</html>
