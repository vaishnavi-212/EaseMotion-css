<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command Palette Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="open-btn" id="openBtn">Open Command Palette (Ctrl + K)</button>

  <div class="cp-overlay" id="cpOverlay">
    <div class="command-palette" role="dialog" aria-label="Command Palette">
      <input
        type="text"
        class="cp-input"
        placeholder="Search commands..."
        id="cpSearch"
        autocomplete="off"
      />

      <ul class="command-list" id="commandList">
        <li class="cp-item active" tabindex="0">
          <span>📂 Open Project</span>
          <kbd>Ctrl + O</kbd>
        </li>
        <li class="cp-item" tabindex="0">
          <span>⚙ Settings</span>
          <kbd>Ctrl + ,</kbd>
        </li>
        <li class="cp-item" tabindex="0">
          <span>🌙 Toggle Theme</span>
          <kbd>Ctrl + J</kbd>
        </li>
        <li class="cp-item" tabindex="0">
          <span>🔍 Search Files</span>
          <kbd>Ctrl + P</kbd>
        </li>
        <li class="cp-item" tabindex="0">
          <span>🚪 Log Out</span>
          <kbd>Ctrl + L</kbd>
        </li>
      </ul>
    </div>
  </div>

<script>
  const openBtn = document.getElementById('openBtn');
  const overlay = document.getElementById('cpOverlay');
  const searchInput = document.getElementById('cpSearch');
  const list = document.getElementById('commandList');
  let items = Array.from(list.querySelectorAll('.cp-item'));
  let activeIndex = 0;

  function openPalette() {
    overlay.classList.add('cp-open');
    document.body.classList.add('cp-noscroll');
    searchInput.value = '';
    filterItems('');
    setTimeout(() => searchInput.focus(), 10);
  }

  function closePalette() {
    overlay.classList.remove('cp-open');
    document.body.classList.remove('cp-noscroll');
  }

  function setActive(index) {
    items.forEach(i => i.classList.remove('active'));
    const visible = items.filter(i => i.style.display !== 'none');
    if (visible[index]) {
      visible[index].classList.add('active');
      visible[index].scrollIntoView({ block: 'nearest' });
    }
  }

  function filterItems(query) {
    const q = query.toLowerCase();
    items.forEach(item => {
      const text = item.querySelector('span').textContent.toLowerCase();
      item.style.display = text.includes(q) ? 'flex' : 'none';
    });
    activeIndex = 0;
    setActive(activeIndex);
  }

  openBtn.addEventListener('click', openPalette);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePalette();
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      overlay.classList.contains('cp-open') ? closePalette() : openPalette();
    }
    if (!overlay.classList.contains('cp-open')) return;

    const visible = items.filter(i => i.style.display !== 'none');

    if (e.key === 'Escape') {
      closePalette();
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, visible.length - 1);
      setActive(activeIndex);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      setActive(activeIndex);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const chosen = visible[activeIndex];
      if (chosen) {
        alert('Selected: ' + chosen.querySelector('span').textContent);
        closePalette();
      }
    }
  });

  searchInput.addEventListener('input', (e) => filterItems(e.target.value));

  items.forEach((item, idx) => {
    item.addEventListener('click', () => {
      alert('Selected: ' + item.querySelector('span').textContent);
      closePalette();
    });
  });
</script>

</body>
</html>
