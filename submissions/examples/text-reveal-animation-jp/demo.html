<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reveal Animation Demo</title>
  
  <!-- Link to the core framework -->
  <link rel="stylesheet" href="../../easemotion.css">
  
  <!-- Our specific feature CSS -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      padding: 4rem 2rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #111827;
      text-align: center;
      margin: 0;
    }
    
    h1, h2 {
      margin: 0;
      line-height: 1.2;
    }
    
    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    
    h2 {
      font-size: 2rem;
      font-weight: 600;
      color: #4b5563;
    }
    
    .demo-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* Simple staggering classes if ease-delay-* isn't present in core */
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    
    button {
      margin-top: 3rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <h1 class="ease-text-reveal-wrapper">
      <span class="ease-text-reveal">Welcome to EaseMotion</span>
    </h1>
    <br>
    
    <h2 class="ease-text-reveal-wrapper">
      <span class="ease-text-reveal delay-100">Build faster.</span>
    </h2>
    <br>
    
    <h2 class="ease-text-reveal-wrapper">
      <span class="ease-text-reveal delay-200">Animate smoother.</span>
    </h2>
    <br>
    
    <h2 class="ease-text-reveal-wrapper">
      <span class="ease-text-reveal delay-300">Look premium.</span>
    </h2>
    
    <div>
      <button onclick="location.reload()">Replay Animation</button>
    </div>
  </div>
  
</body>
</html>
