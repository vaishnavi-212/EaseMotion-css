<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta 
        name="description"
        content="Holographic Map Embed component created with EaseMotion CSS"
    >

    <title>
        Holographic Map Embed | EaseMotion
    </title>


    <link rel="stylesheet" href="style.css">

</head>


<body>


<main class="container">


<section 
    class="map-card"
    aria-label="Holographic map component"
>


    <header class="map-header">


        <span 
            class="status-dot"
            aria-hidden="true">
        </span>


        <h1>
            Holographic Map Embed
        </h1>


    </header>




    <div class="map-wrapper">



        <iframe

            title="Interactive map preview"

            aria-label="OpenStreetMap interactive location preview"

            src="https://www.openstreetmap.org/export/embed.html?bbox=77.58%2C12.95%2C77.62%2C12.98&amp;layer=mapnik"

            loading="lazy">

        </iframe>





        <div 
            class="holo-overlay"
            aria-hidden="true">
        </div>





        <article class="map-info">


            <h2>
                EaseMotion Location
            </h2>


            <p>
                A minimalist holographic map interface 
                built with pure CSS animations.
            </p>


        </article>



    </div>



</section>



</main>



</body>

</html>
