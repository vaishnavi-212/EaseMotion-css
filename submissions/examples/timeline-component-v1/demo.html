<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Component</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Jan 2024</span>
          <h3>Project Kickoff</h3>
          <p>Initial planning and requirements gathering.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Mar 2024</span>
          <h3>Design Phase</h3>
          <p>Wireframes, mockups, and user testing.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Jun 2024</span>
          <h3>Development</h3>
          <p>Frontend and backend implementation.</p>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Sep 2024</span>
          <h3>Launch</h3>
          <p>Production deployment and monitoring.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
