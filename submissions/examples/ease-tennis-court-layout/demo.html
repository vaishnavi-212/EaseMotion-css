<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Court Layout Component</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="dashboard-wrapper">
    <header class="dashboard-header">
      <h1>Match Analytics</h1>
      <p>Shot Placement & Court Coverage</p>
    </header>

    <main class="dashboard-grid">
      <!-- Player 1 Stats -->
      <aside class="stats-panel">
        <div class="player-card">
          <div class="avatar"></div>
          <div>
            <h2>Player 1</h2>
            <span class="rank">Seed #1</span>
          </div>
        </div>
        <div class="stat-row">
          <span>Aces</span>
          <strong>12</strong>
        </div>
        <div class="stat-row">
          <span>Win % on 1st Serve</span>
          <strong>78%</strong>
        </div>
        <div class="stat-row">
          <span>Winners</span>
          <strong>34</strong>
        </div>
      </aside>

      <!-- EaseMotion Tennis Court Layout -->
      <div class="ease-tennis-court-layout">
        <!-- Interactive Tooltip (CSS Only) -->
        <div class="court-tooltip">Hover over a zone</div>

        <div class="court-outer">
          <div class="court-lines">
            <!-- Center Marks -->
            <div class="center-mark top"></div>
            <div class="center-mark bottom"></div>

            <!-- The Tennis Ball (Animated) -->
            <div class="tennis-ball"></div>

            <!-- Top Half of Court -->
            <div class="court-half top-half">
              <div class="alley left-alley zone" data-name="Top Left Alley"></div>
              <div class="singles-court">
                <div class="backcourt zone" data-name="Top Backcourt"></div>
                <div class="service-boxes">
                  <div class="service-box left-box zone" data-name="Ad Court (Top)"></div>
                  <div class="service-box right-box zone" data-name="Deuce Court (Top)"></div>
                </div>
              </div>
              <div class="alley right-alley zone" data-name="Top Right Alley"></div>
            </div>

            <!-- The Net -->
            <div class="net-container">
              <div class="net-post left"></div>
              <div class="net"></div>
              <div class="net-post right"></div>
            </div>

            <!-- Bottom Half of Court -->
            <div class="court-half bottom-half">
              <div class="alley left-alley zone" data-name="Bottom Left Alley"></div>
              <div class="singles-court">
                <div class="service-boxes">
                  <div class="service-box left-box zone" data-name="Deuce Court (Bottom)"></div>
                  <div class="service-box right-box zone" data-name="Ad Court (Bottom)"></div>
                </div>
                <div class="backcourt zone" data-name="Bottom Backcourt"></div>
              </div>
              <div class="alley right-alley zone" data-name="Bottom Right Alley"></div>
            </div>

          </div>
        </div>
      </div>

      <!-- Player 2 Stats -->
      <aside class="stats-panel">
        <div class="player-card">
          <div class="avatar p2"></div>
          <div>
            <h2>Player 2</h2>
            <span class="rank">Seed #4</span>
          </div>
        </div>
        <div class="stat-row">
          <span>Aces</span>
          <strong>8</strong>
        </div>
        <div class="stat-row">
          <span>Win % on 1st Serve</span>
          <strong>65%</strong>
        </div>
        <div class="stat-row">
          <span>Winners</span>
          <strong>28</strong>
        </div>
      </aside>
    </main>
  </div>

</body>
</html>
