<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brush Stroke – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🖌️ Brush Stroke</h1>
    <p class="subtitle">Animated brush painting strokes</p>

    <div class="bs-container">
      <div class="bs-scene">
        <!-- Canvas -->
        <div class="canvas">
          <!-- Paper texture -->
          <div class="paper-texture"></div>

          <!-- Brush strokes -->
          <svg class="stroke-svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
            <!-- Stroke 1 - Sweeping curve -->
            <path class="brush-stroke stroke-1" d="M 50 150 C 150 50, 250 200, 350 100 C 450 0, 500 150, 550 120" />
            
            <!-- Stroke 2 - Bold slash -->
            <path class="brush-stroke stroke-2" d="M 30 250 L 200 50 L 300 180 L 450 30 L 570 220" />
            
            <!-- Stroke 3 - Gentle arc -->
            <path class="brush-stroke stroke-3" d="M 80 200 Q 200 50, 350 180 T 550 160" />
            
            <!-- Stroke 4 - Calligraphic flourish -->
            <path class="brush-stroke stroke-4" d="M 60 100 C 120 180, 180 60, 240 150 C 300 240, 360 80, 420 160 C 480 240, 520 100, 560 140" />
            
            <!-- Stroke 5 - Quick dash -->
            <path class="brush-stroke stroke-5" d="M 100 280 L 150 220 L 220 270 L 300 200 L 380 260 L 460 190 L 530 250" />
            
            <!-- Stroke 6 - Elegant wave -->
            <path class="brush-stroke stroke-6" d="M 40 90 Q 100 180, 180 100 Q 260 20, 340 120 Q 420 220, 500 100 Q 540 60, 580 90" />

            <!-- Stroke 7 - Short accent -->
            <path class="brush-stroke stroke-7" d="M 120 130 L 180 190 L 250 140 L 320 200 L 390 150 L 460 210 L 530 160" />

            <!-- Stroke 8 - Flowing ribbon -->
            <path class="brush-stroke stroke-8" d="M 30 180 C 130 280, 230 60, 330 180 C 430 300, 530 100, 570 170" />
          </svg>

          <!-- Splatter particles -->
          <div class="splatter s1"></div>
          <div class="splatter s2"></div>
          <div class="splatter s3"></div>
          <div class="splatter s4"></div>
          <div class="splatter s5"></div>
          <div class="splatter s6"></div>
          <div class="splatter s7"></div>
          <div class="splatter s8"></div>
          <div class="splatter s9"></div>
          <div class="splatter s10"></div>
          <div class="splatter s11"></div>
          <div class="splatter s12"></div>

          <!-- Brush glow -->
          <div class="brush-glow"></div>
        </div>

        <!-- Brush icon -->
        <div class="brush-icon">
          <div class="brush-icon-handle"></div>
          <div class="brush-icon-ferrule"></div>
          <div class="brush-icon-bristles"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="paintBtn">🎨 Paint Stroke</button>
      <label>
        Stroke Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Stroke Width
        <input type="range" id="widthControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const strokes = document.querySelectorAll('.brush-stroke');
      const splatters = document.querySelectorAll('.splatter');
      const brushGlow = document.querySelector('.brush-glow');
      const brushIcon = document.querySelector('.brush-icon');

      const paintBtn = document.getElementById('paintBtn');
      const speedInput = document.getElementById('speedControl');
      const widthInput = document.getElementById('widthControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let widthMultiplier = 1;
      let isPainting = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        strokes.forEach((stroke, i) => {
          const baseDuration = 1.5 + i * 0.1;
          const duration = baseDuration / speedMultiplier;
          stroke.style.setProperty('--stroke-duration', duration + 's');
          stroke.style.setProperty('--stroke-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        splatters.forEach((s, i) => {
          const duration = (0.6 + (i % 4) * 0.05) / speedMultiplier;
          s.style.setProperty('--splatter-duration', duration + 's');
          s.style.setProperty('--splatter-delay', ((i * 0.02 + 0.3) / speedMultiplier) + 's');
        });

        brushGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');
        brushIcon.style.setProperty('--brush-duration', (1.2 / speedMultiplier) + 's');
      }

      // ----- Apply width -----
      function applyWidth() {
        strokes.forEach((stroke) => {
          const width = 3 * widthMultiplier;
          stroke.style.setProperty('--stroke-width', width + 'px');
        });

        splatters.forEach((s) => {
          const size = 4 * widthMultiplier;
          s.style.setProperty('--splatter-size', size + 'px');
        });
      }

      // ----- Paint strokes -----
      function paintStrokes() {
        if (isPainting) return;
        isPainting = true;

        // Reset all strokes
        strokes.forEach(stroke => {
          stroke.style.animation = 'none';
          stroke.style.strokeDashoffset = '1000';
          stroke.style.opacity = '0';
          void stroke.offsetWidth;
          stroke.style.animation = '';
          stroke.classList.remove('painted');
        });

        splatters.forEach(s => {
          s.style.opacity = '0';
          s.style.transform = 'scale(0)';
          s.style.animation = 'none';
          void s.offsetWidth;
          s.style.animation = '';
          s.classList.remove('splatter');
        });

        brushGlow.style.opacity = '0';
        brushIcon.classList.remove('painting');

        // Start painting
        setTimeout(() => {
          strokes.forEach((stroke, i) => {
            setTimeout(() => {
              stroke.classList.add('painted');
              stroke.style.opacity = '1';
            }, i * 50 / speedMultiplier);
          });
        }, 100 / speedMultiplier);

        // Splatters
        setTimeout(() => {
          splatters.forEach((s, i) => {
            setTimeout(() => {
              s.classList.add('splatter');
              s.style.opacity = '0.8';
            }, i * 20 / speedMultiplier + 300 / speedMultiplier);
          });
        }, 400 / speedMultiplier);

        // Glow
        setTimeout(() => {
          brushGlow.classList.add('glowing');
          brushGlow.style.opacity = '0.6';
        }, 500 / speedMultiplier);

        // Brush icon
        setTimeout(() => {
          brushIcon.classList.add('painting');
        }, 200 / speedMultiplier);

        paintBtn.textContent = '🎨 Painting...';
        setTimeout(() => {
          paintBtn.textContent = '🎨 Paint Stroke';
          isPainting = false;
        }, (2000 / speedMultiplier) + 500);
      }

      // ----- Reset -----
      function resetCanvas() {
        isPainting = false;

        strokes.forEach(stroke => {
          stroke.classList.remove('painted');
          stroke.style.opacity = '0';
          stroke.style.strokeDashoffset = '1000';
        });

        splatters.forEach(s => {
          s.classList.remove('splatter');
          s.style.opacity = '0';
          s.style.transform = 'scale(0)';
        });

        brushGlow.classList.remove('glowing');
        brushGlow.style.opacity = '0';

        brushIcon.classList.remove('painting');

        paintBtn.textContent = '🎨 Paint Stroke';
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update width -----
      function updateWidth(value) {
        widthMultiplier = parseFloat(value);
        applyWidth();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state
        strokes.forEach(stroke => {
          stroke.style.opacity = '0';
          stroke.style.strokeDashoffset = '1000';
        });

        splatters.forEach(s => {
          s.style.opacity = '0';
          s.style.transform = 'scale(0)';
        });

        brushGlow.style.opacity = '0';
        brushGlow.classList.remove('glowing');

        applySpeed();
        applyWidth();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-paint after 1 second
        setTimeout(() => {
          paintStrokes();
        }, 1000);
      }

      // ----- Event listeners -----
      paintBtn.addEventListener('click', paintStrokes);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      widthInput.addEventListener('input', function() {
        updateWidth(this.value);
      });
      resetBtn.addEventListener('click', resetCanvas);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
