<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-Out Popover - Dashboard Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Analytics Report
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    📈
                </div>

                <div>
                    <h2>Analytics Overview</h2>
                    <p>Last synced 2 minutes ago</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Revenue</h3>
                    <span>$98.6K</span>
                </div>

                <div class="card">
                    <h3>Sessions</h3>
                    <span>52K</span>
                </div>

                <div class="card">
                    <h3>CTR</h3>
                    <span>6.8%</span>
                </div>

            </div>

            <button class="action">
                View Analytics
            </button>

        </div>

    </div>

</div>

</body>
</html>
