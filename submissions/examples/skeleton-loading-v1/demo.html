<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skeleton Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  <link rel="stylesheet" href="../../../components/cards.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
      color: var(--ease-color-text);
    }
    .demo-container {
      width: 100%;
      max-width: 800px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    
    /* Layout Helpers for the Card */
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .card-header-text {
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="ease-center">
      <h1 class="ease-margin-b-4">Skeleton Loading States</h1>
      <p class="ease-text-muted">
        Mock up UI layouts instantly using pure CSS animation classes.
      </p>
    </div>

    <div class="grid">
      
      <!-- Card 1: Default Pulse Variant -->
      <div>
        <h3 class="ease-text-md ease-font-bold ease-margin-b-2">Default (Pulse Animation)</h3>
        <div class="ease-card ease-card-shadow ease-padding-6">
          
          <div class="card-header">
            <!-- Circle Skeleton -->
            <div class="ease-skeleton ease-skeleton-circle" style="width: 50px; height: 50px;"></div>
            
            <div class="card-header-text">
              <!-- Text Skeletons -->
              <div class="ease-skeleton ease-skeleton-text ease-margin-b-2" style="width: 60%;"></div>
              <div class="ease-skeleton ease-skeleton-text" style="width: 40%; height: 0.75rem;"></div>
            </div>
          </div>
          
          <!-- Body Skeletons -->
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-2"></div>
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-2"></div>
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-4" style="width: 80%;"></div>
          
          <!-- Button Skeleton -->
          <div class="ease-skeleton ease-skeleton-btn"></div>
          
        </div>
      </div>

      <!-- Card 2: Shimmer Variant -->
      <div>
        <h3 class="ease-text-md ease-font-bold ease-margin-b-2">Shimmer (Gradient Sweep)</h3>
        <!-- Adding ease-skeleton-shimmer to the parent automatically targets all .ease-skeleton children -->
        <div class="ease-card ease-card-shadow ease-padding-6 ease-skeleton-shimmer">
          
          <div class="card-header">
            <div class="ease-skeleton ease-skeleton-circle" style="width: 50px; height: 50px;"></div>
            
            <div class="card-header-text">
              <div class="ease-skeleton ease-skeleton-text ease-margin-b-2" style="width: 60%;"></div>
              <div class="ease-skeleton ease-skeleton-text" style="width: 40%; height: 0.75rem;"></div>
            </div>
          </div>
          
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-2"></div>
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-2"></div>
          <div class="ease-skeleton ease-skeleton-text ease-margin-b-4" style="width: 80%;"></div>
          
          <div class="ease-skeleton ease-skeleton-btn"></div>
          
        </div>
      </div>

    </div>
  </div>

</body>
</html>
