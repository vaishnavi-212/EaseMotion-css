<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom-In Popover Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="popover-demo-wrap">
    <button class="popover-trigger" id="popoverBtn" aria-expanded="false" aria-describedby="popoverBox">
      Click me
    </button>

    <div class="popover-box" id="popoverBox" role="tooltip">
      <h3>Zoom-In Popover</h3>
      <p>This popover scales in smoothly using pure CSS transitions. No JavaScript needed for the animation itself.</p>
    </div>
  </div>

  <script>
    const btn = document.getElementById('popoverBtn');
    const box = document.getElementById('popoverBox');

    btn.addEventListener('click', () => {
      const isOpen = box.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        box.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });

    document.addEventListener('click', (e) => {
      if (!box.contains(e.target) && !btn.contains(e.target)) {
        box.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  </script>

</body>
</html>
