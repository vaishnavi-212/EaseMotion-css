<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="buttons-demo" aria-label="Buttons">
      <h1 class="demo-title">Button Component</h1>
      
      <div class="button-group">
        <h3>Primary Buttons</h3>
        <div class="button-row">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-primary btn-lg">Large</button>
          <button class="btn btn-primary btn-sm">Small</button>
        </div>
      </div>

      <div class="button-group">
        <h3>Secondary Buttons</h3>
        <div class="button-row">
          <button class="btn btn-secondary">Secondary</button>
          <button class="btn btn-outline">Outline</button>
          <button class="btn btn-ghost">Ghost</button>
        </div>
      </div>

      <div class="button-group">
        <h3>Icon Buttons</h3>
        <div class="button-row">
          <button class="btn btn-primary btn-icon">✓ Save</button>
          <button class="btn btn-secondary btn-icon">← Back</button>
          <button class="btn btn-outline btn-icon">+ Add</button>
        </div>
      </div>

      <div class="button-group">
        <h3>States</h3>
        <div class="button-row">
          <button class="btn btn-primary" disabled>Disabled</button>
          <button class="btn btn-primary btn-loading">Loading...</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
