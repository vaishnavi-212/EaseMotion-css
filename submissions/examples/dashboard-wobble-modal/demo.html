<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Dashboard Wobble-Focus Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="side-item active"></div>
      <div class="side-item"></div>
      <div class="side-item"></div>
    </aside>
    
    <main class="main-content">
      <header class="dash-header">
        <h2>Analytics Overview</h2>
        <a href="#dash-modal" class="btn btn-trigger" role="button">+ Create Report</a>
      </header>
      
      <div class="dash-grid">
        <div class="card"><h3>Active Users</h3><p class="stat">1,248</p></div>
        <div class="card"><h3>Conversion</h3><p class="stat">4.2%</p></div>
      </div>
    </main>
  </div>

  <div id="dash-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <a href="#" class="modal-close-backdrop" aria-label="Close modal layout" tabindex="-1"></a>
    
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modal-title">Generate Custom Report</h2>
        <a href="#" class="btn-close" aria-label="Close modal configuration">&times;</a>
      </div>
      <div class="modal-body">
        <p>Configure data ranges, filter variables, and aggregation metrics before queuing your report generation pipeline.</p>
        <div class="form-group">
          <label>Data Filter Range</label>
          <div class="custom-select-mock">Last 30 Working Days</div>
        </div>
      </div>
      <div class="modal-footer">
        <a href="#" class="btn btn-secondary">Cancel</a>
        <a href="#" class="btn btn-primary">Compile Data</a>
      </div>
    </div>
  </div>

</body>
</html>
