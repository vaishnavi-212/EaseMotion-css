<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Jello-Hover Popover for Creative Portfolios</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="portfolio-container">
    <div class="popover-wrapper" tabindex="0">
      <button class="trigger-btn" aria-describedby="jello-portfolio-popover">
        Let's Connect 🪩
      </button>
      
      <div id="jello-portfolio-popover" class="ease-jello-popover" role="tooltip">
        <div class="popover-content">
          <h2>Available for work</h2>
          <p>I'm currently taking on new projects in web design, branding, and creative coding.</p>
          <div class="social-links">
            <a href="#" class="social-btn">Twitter</a>
            <a href="#" class="social-btn">Dribbble</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
