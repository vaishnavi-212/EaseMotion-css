<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Button Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized button demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Buttons</h1>
        <p>Demonstrates button components with print media query optimization.
           Buttons render cleanly on print without excessive ink usage.</p>
        
        <div class="button-group">
          <button class="ease-btn ease-btn-primary">Primary Button</button>
          <button class="ease-btn ease-btn-secondary">Secondary Button</button>
          <button class="ease-btn ease-btn-outline">Outline Button</button>
        </div>
        
        <div class="button-group">
          <button class="ease-btn ease-btn-ghost">Ghost Button</button>
          <button class="ease-btn ease-btn-danger">Danger Button</button>
          <button class="ease-btn ease-btn-success">Success Button</button>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see buttons in print mode with simplified styling.</p>
      </section>
    </main>
  </body>
</html>
