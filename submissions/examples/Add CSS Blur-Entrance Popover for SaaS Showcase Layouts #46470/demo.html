<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Blur-Entrance Popover - SaaS Showcase</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="saas-layout">
    <div class="dashboard-card">
      <div class="card-header">
        <div>
          <h2>Revenue Analytics</h2>
          <p class="subtitle">Monthly performance metrics</p>
        </div>
        
        <!-- Pure CSS Popover Wrapper -->
        <div class="popover-wrapper">
          <!-- Accessible Checkbox for Pure CSS Toggle -->
          <input type="checkbox" id="popover-toggle" class="popover-input" aria-label="Toggle options menu">
          
          <!-- Trigger Visuals -->
          <label for="popover-toggle" class="trigger-btn" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="12" cy="5" r="1"></circle>
              <circle cx="12" cy="19" r="1"></circle>
            </svg>
          </label>
          
          <!-- Popover Content -->
          <div class="em-popover blur-entrance">
            <div class="popover-header">
              <span class="popover-title">Options</span>
              <!-- Optional secondary close method within popover -->
              <label for="popover-toggle" class="close-btn" aria-label="Close popover">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </label>
            </div>
            <div class="popover-body">
              <button class="menu-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export CSV
              </button>
              <button class="menu-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                View Report
              </button>
              <div class="divider"></div>
              <button class="menu-item danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Delete Data
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <div class="chart-area">
        <div class="bar-chart">
          <div class="bar" style="height: 60%"></div>
          <div class="bar" style="height: 85%"></div>
          <div class="bar" style="height: 40%"></div>
          <div class="bar" style="height: 95%"></div>
          <div class="bar" style="height: 55%"></div>
          <div class="bar" style="height: 70%"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
