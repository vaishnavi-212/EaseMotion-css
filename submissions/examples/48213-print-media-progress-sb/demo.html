<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Progress Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized progress demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Progress</h1>
        <p>Demonstrates progress bar components with print media query optimization.</p>
        
        <div class="ease-progress">
          <div class="ease-progress-label">
            <span>Project Progress</span>
            <span>75%</span>
          </div>
          <div class="ease-progress-bar">
            <div class="ease-progress-fill" style="width: 75%"></div>
          </div>
        </div>
        
        <div class="ease-progress">
          <div class="ease-progress-label">
            <span>Storage Used</span>
            <span>45%</span>
          </div>
          <div class="ease-progress-bar">
            <div class="ease-progress-fill ease-progress-success" style="width: 45%"></div>
          </div>
        </div>
        
        <div class="ease-progress">
          <div class="ease-progress-label">
            <span>Upload</span>
            <span>90%</span>
          </div>
          <div class="ease-progress-bar">
            <div class="ease-progress-fill ease-progress-warning" style="width: 90%"></div>
          </div>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see progress bars in print mode.</p>
      </section>
    </main>
  </body>
</html>
