<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Clip Path Error Page</title>

  <!-- EaseMotion -->
  <link rel="stylesheet" href="../../../easemotion.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="error-layout">

    <div class="background-circle circle-one"></div>
    <div class="background-circle circle-two"></div>

    <section class="error-card ease-fade-in">

      <span class="error-badge">
        Error 404
      </span>

      <h1 class="error-code ease-slide-up">
        404
      </h1>

      <h2 class="error-title ease-slide-up">
        Page Not Found
      </h2>

      <p class="error-description">
        The page you're looking for may have been moved, deleted,
        or never existed. Please check the URL or return to the homepage.
      </p>

      <div class="button-group">

        <a href="#" class="primary-btn">
          Go Home
        </a>

        <a href="#" class="secondary-btn">
          Contact Support
        </a>

      </div>

    </section>

  </main>

</body>
</html>
