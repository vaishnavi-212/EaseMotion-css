<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pegasus Wings – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🦄 Pegasus Wings</h1>
    <p class="subtitle">Wings flapping with star trails</p>

    <div class="pw-container">
      <div class="pw-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>
        <div class="star s16"></div>
        <div class="star s17"></div>
        <div class="star s18"></div>
        <div class="star s19"></div>
        <div class="star s20"></div>

        <!-- Pegasus Wings -->
        <div class="pegasus-wings">
          <!-- Left Wing -->
          <div class="wing wing-left">
            <!-- Wing structure -->
            <div class="wing-bone wb1"></div>
            <div class="wing-bone wb2"></div>
            <div class="wing-bone wb3"></div>
            <div class="wing-bone wb4"></div>
            <div class="wing-bone wb5"></div>

            <!-- Wing membrane -->
            <div class="wing-membrane"></div>

            <!-- Feather layers -->
            <div class="feather-layer fl1"></div>
            <div class="feather-layer fl2"></div>
            <div class="feather-layer fl3"></div>
            <div class="feather-layer fl4"></div>
            <div class="feather-layer fl5"></div>

            <!-- Star trails -->
            <div class="star-trail st1"></div>
            <div class="star-trail st2"></div>
            <div class="star-trail st3"></div>
            <div class="star-trail st4"></div>
            <div class="star-trail st5"></div>
            <div class="star-trail st6"></div>
            <div class="star-trail st7"></div>
            <div class="star-trail st8"></div>
            <div class="star-trail st9"></div>
            <div class="star-trail st10"></div>
            <div class="star-trail st11"></div>
            <div class="star-trail st12"></div>
          </div>

          <!-- Right Wing -->
          <div class="wing wing-right">
            <div class="wing-bone wb1"></div>
            <div class="wing-bone wb2"></div>
            <div class="wing-bone wb3"></div>
            <div class="wing-bone wb4"></div>
            <div class="wing-bone wb5"></div>

            <div class="wing-membrane"></div>

            <div class="feather-layer fl1"></div>
            <div class="feather-layer fl2"></div>
            <div class="feather-layer fl3"></div>
            <div class="feather-layer fl4"></div>
            <div class="feather-layer fl5"></div>

            <div class="star-trail st1"></div>
            <div class="star-trail st2"></div>
            <div class="star-trail st3"></div>
            <div class="star-trail st4"></div>
            <div class="star-trail st5"></div>
            <div class="star-trail st6"></div>
            <div class="star-trail st7"></div>
            <div class="star-trail st8"></div>
            <div class="star-trail st9"></div>
            <div class="star-trail st10"></div>
            <div class="star-trail st11"></div>
            <div class="star-trail st12"></div>
          </div>

          <!-- Central glow -->
          <div class="central-glow"></div>

          <!-- Wing glow -->
          <div class="wing-glow"></div>

          <!-- Sparkle particles -->
          <div class="sparkle sp1"></div>
          <div class="sparkle sp2"></div>
          <div class="sparkle sp3"></div>
          <div class="sparkle sp4"></div>
          <div class="sparkle sp5"></div>
          <div class="sparkle sp6"></div>
          <div class="sparkle sp7"></div>
          <div class="sparkle sp8"></div>
          <div class="sparkle sp9"></div>
          <div class="sparkle sp10"></div>
          <div class="sparkle sp11"></div>
          <div class="sparkle sp12"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Flap Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Star Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const wings = document.querySelectorAll('.wing');
      const wingBones = document.querySelectorAll('.wing-bone');
      const featherLayers = document.querySelectorAll('.feather-layer');
      const starTrails = document.querySelectorAll('.star-trail');
      const sparkles = document.querySelectorAll('.sparkle');
      const centralGlow = document.querySelector('.central-glow');
      const wingGlow = document.querySelector('.wing-glow');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Wing flap
        wings.forEach((wing, i) => {
          const duration = (1.2 + i * 0.05) / speedMultiplier;
          wing.style.setProperty('--wing-duration', duration + 's');
          wing.style.setProperty('--wing-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Wing bones
        wingBones.forEach((bone, i) => {
          const duration = (1.0 + i * 0.05) / speedMultiplier;
          bone.style.setProperty('--bone-duration', duration + 's');
          bone.style.setProperty('--bone-delay', ((i * 0.01) / speedMultiplier) + 's');
        });

        // Feather layers
        featherLayers.forEach((layer, i) => {
          const duration = (0.8 + i * 0.04) / speedMultiplier;
          layer.style.setProperty('--feather-duration', duration + 's');
          layer.style.setProperty('--feather-delay', ((i * 0.01) / speedMultiplier) + 's');
        });

        // Star trails
        starTrails.forEach((trail, i) => {
          const duration = (0.6 + (i % 4) * 0.05) / speedMultiplier;
          trail.style.setProperty('--trail-duration', duration + 's');
          trail.style.setProperty('--trail-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Sparkles
        sparkles.forEach((sp, i) => {
          const duration = (1.5 + (i % 3) * 0.2) / speedMultiplier;
          sp.style.setProperty('--sparkle-duration', duration + 's');
          sp.style.setProperty('--sparkle-delay', ((i * 0.04) / speedMultiplier) + 's');
        });

        // Central glow
        centralGlow.style.setProperty('--central-duration', (2.5 / speedMultiplier) + 's');

        // Wing glow
        wingGlow.style.setProperty('--wing-glow-duration', (2 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Central glow
        const centralOpacity = Math.min(0.1 * intensityMultiplier, 0.2);
        centralGlow.style.setProperty('--central-intensity', centralOpacity);
        const centralSize = 300 * intensityMultiplier;
        centralGlow.style.setProperty('--central-size', centralSize + 'px');

        // Wing glow
        const wingOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        wingGlow.style.setProperty('--wing-intensity', wingOpacity);
        const wingSize = 400 * intensityMultiplier;
        wingGlow.style.setProperty('--wing-glow-size', wingSize + 'px');

        // Star trails
        starTrails.forEach((trail) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          trail.style.setProperty('--trail-intensity', opacity);
          const size = 2 * intensityMultiplier;
          trail.style.setProperty('--trail-size', size + 'px');
        });

        // Sparkles
        sparkles.forEach((sp) => {
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          sp.style.setProperty('--sparkle-intensity', opacity);
          const size = 3 * intensityMultiplier;
          sp.style.setProperty('--sparkle-size', size + 'px');
        });

        // Wing membrane
        document.querySelectorAll('.wing-membrane').forEach((membrane) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          membrane.style.setProperty('--membrane-intensity', opacity);
        });

        // Feather layers
        featherLayers.forEach((layer) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          layer.style.setProperty('--feather-intensity', opacity);
        });
      }

      // ----- Update wings -----
      function updateWings(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle wing shimmer
        const shimmer = Math.sin(timestamp / 2000) * 0.02 + 0.98;
        wings.forEach((wing) => {
          wing.style.setProperty('--wing-shimmer', shimmer);
        });

        // Star trail positions - dynamic movement
        starTrails.forEach((trail, i) => {
          const angle = timestamp / (3000 + i * 200) + i * 0.5;
          const radius = 30 + i * 3;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle * 0.6 + i) * radius * 0.4;
          trail.style.setProperty('--trail-x', x + 'px');
          trail.style.setProperty('--trail-y', y + 'px');
        });

        // Sparkle positions
        sparkles.forEach((sp, i) => {
          const angle = timestamp / (2500 + i * 150) + i * 0.7;
          const radius = 50 + i * 5;
          const x = Math.cos(angle + i) * radius;
          const y = Math.sin(angle * 0.5 + i * 0.3) * radius * 0.5;
          sp.style.setProperty('--sparkle-x', x + 'px');
          sp.style.setProperty('--sparkle-y', y + 'px');
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateWings(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Reset -----
      function resetWings() {
        lastTimestamp = 0;

        // Reset star trail positions
        starTrails.forEach((trail) => {
          trail.style.setProperty('--trail-x', '0px');
          trail.style.setProperty('--trail-y', '0px');
        });

        // Reset sparkles
        sparkles.forEach((sp) => {
          sp.style.setProperty('--sparkle-x', '0px');
          sp.style.setProperty('--sparkle-y', '0px');
        });
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetWings);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
