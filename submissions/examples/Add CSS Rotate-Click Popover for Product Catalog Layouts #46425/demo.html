<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Rotate-Click Popover - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="catalog-layout">
    <header class="catalog-header">
      <h2>New Arrivals</h2>
      <div class="catalog-actions">
        <span>Showing 1-24 of 142 products</span>
        <!-- Trigger Button -->
        <button class="trigger-btn" popovertarget="filter-popover">
          Sort & Filter
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        </button>
      </div>
    </header>

    <div class="product-grid">
      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-info">
          <h3>Minimalist Ceramic Vase</h3>
          <p>$45.00</p>
        </div>
      </div>
      <div class="product-card">
        <div class="product-image alt-1"></div>
        <div class="product-info">
          <h3>Organic Cotton Throw</h3>
          <p>$89.00</p>
        </div>
      </div>
      <div class="product-card">
        <div class="product-image alt-2"></div>
        <div class="product-info">
          <h3>Bamboo Serving Tray</h3>
          <p>$32.00</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Rotate-Click Popover -->
  <div id="filter-popover" class="popover" popover>
    <div class="popover-header">
      <h3>Sort & Filter</h3>
      <button class="close-btn" popovertarget="filter-popover" popovertargetaction="hide" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    
    <div class="popover-body">
      <div class="filter-section">
        <h4>Sort By</h4>
        <label class="radio-label">
          <input type="radio" name="sort" checked>
          <span>Recommended</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="sort">
          <span>Price: Low to High</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="sort">
          <span>Price: High to Low</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="sort">
          <span>Newest Arrivals</span>
        </label>
      </div>
      
      <div class="filter-section">
        <h4>Price Range</h4>
        <div class="price-inputs">
          <input type="number" placeholder="Min $">
          <span>-</span>
          <input type="number" placeholder="Max $">
        </div>
      </div>
    </div>
    
    <div class="popover-footer">
      <button class="clear-btn" popovertarget="filter-popover" popovertargetaction="hide">Clear All</button>
      <button class="apply-btn" popovertarget="filter-popover" popovertargetaction="hide">Apply 2 Filters</button>
    </div>
  </div>
</body>
</html>
