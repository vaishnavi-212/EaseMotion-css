<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Swing-Hover Popover - Glassmorphism UI</title>
    <!-- Import EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="demo-layout">
    <!-- Abstract background shapes for Glassmorphism effect -->
    <div class="glass-bg-shape shape-1"></div>
    <div class="glass-bg-shape shape-2"></div>
    
    <div class="demo-container">
        <h1 class="demo-title">Glassmorphism Popover</h1>
        
        <!-- Swing-Hover Popover Component -->
        <div class="ease-popover-wrapper">
            <button class="ease-popover-trigger" aria-haspopup="dialog">
                Hover or Focus
            </button>
            <div class="ease-popover-content" role="dialog" aria-label="Glassmorphism Details">
                <div class="ease-popover-header">
                    <h3>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        Glass UI Info
                    </h3>
                </div>
                <div class="ease-popover-body">
                    <p>This popover blends in beautifully with vibrant backgrounds through CSS backdrop filters and semi-transparent layering.</p>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
