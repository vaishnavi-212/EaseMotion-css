<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Color Picker</title>
    <link rel="stylesheet" href="../../dist/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="picker-container ease-fade-in">
        <h1>Ripple Color Picker</h1>
        <p>Select your favorite accent color.</p>
        <div class="color-picker">
            <input checked id="red" name="theme" type="radio">
            <label class="color red ease-scale-in" for="red"></label>
            <input id="orange" name="theme" type="radio">
            <label class="color orange ease-scale-in" for="orange"></label>
            <input id="yellow" name="theme" type="radio">
            <label class="color yellow ease-scale-in" for="yellow"></label>
            <input id="green" name="theme" type="radio">
            <label class="color green ease-scale-in" for="green"></label>
            <input id="cyan" name="theme" type="radio">
            <label class="color cyan ease-scale-in" for="cyan"></label>
            <input id="blue" name="theme" type="radio">
            <label class="color blue ease-scale-in" for="blue"></label>
            <input id="purple" name="theme" type="radio">
            <label class="color purple ease-scale-in" for="purple"></label>
            <input id="pink" name="theme" type="radio">
            <label class="color pink ease-scale-in" for="pink"></label>
        </div>
    </div>
</body>

</html>
