<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Popover for Creative Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="portfolio-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="creative-popover-content">
        Say Hello 👋
      </button>
      
      <div id="creative-popover-content" class="ease-tada-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <h2 id="popover-title">Let's collaborate!</h2>
          <p>I'm currently available for freelance design & engineering projects.</p>
          <a href="#" class="action-link">hello@creative.co</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
