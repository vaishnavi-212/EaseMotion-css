<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Line Tabs</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #0b0f19;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-container {
      width: 100%;
      max-width: 500px;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      padding: 24px;
      border-radius: 4px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }
    .panel-content {
      padding: 16px;
      border: 1px dashed #334155;
      font-family: monospace;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="draw-border-line-tabs">
      <input type="radio" id="tab-1" name="tech-tabs" class="tab-input" checked>
      <input type="radio" id="tab-2" name="tech-tabs" class="tab-input">
      <input type="radio" id="tab-3" name="tech-tabs" class="tab-input">

      <div class="tabs-header">
        <label for="tab-1" class="tab-label">01//System</label>
        <label for="tab-2" class="tab-label">02//Network</label>
        <label for="tab-3" class="tab-label">03//Security</label>
      </div>

      <div class="tab-panels">
        <div class="tab-panel" id="panel-1">
          <div class="panel-content">SYS.STATUS: ONLINE</div>
        </div>
        <div class="tab-panel" id="panel-2">
          <div class="panel-content">NET.STATUS: SECURE</div>
        </div>
        <div class="tab-panel" id="panel-3">
          <div class="panel-content">SEC.STATUS: LEVEL_0</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
