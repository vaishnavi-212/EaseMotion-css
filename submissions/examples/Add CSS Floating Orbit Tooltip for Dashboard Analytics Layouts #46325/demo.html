<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Floating Orbit Tooltip - Dashboard Analytics</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-title">
          User Retention
          
          <!-- Tooltip Container -->
          <div class="tooltip-container">
            <button class="info-btn" aria-label="More information about User Retention" aria-describedby="tooltip-orbit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </button>
            
            <!-- Tooltip Wrapper handles entrance animation -->
            <div id="tooltip-orbit" class="tooltip-wrapper" role="tooltip">
              <!-- Tooltip handles the continuous floating orbit -->
              <div class="tooltip">
                <div class="tooltip-header">
                  <div class="icon-box">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 12h4l2-9 5 18 2-9h5"/></svg>
                  </div>
                  <h3>Retention Metrics</h3>
                </div>
                
                <p>Percentage of users who return to the application within 30 days of their initial visit.</p>
                
                <div class="tooltip-data">
                  <div class="data-row">
                    <span>Current:</span>
                    <span class="data-value highlight">68.4%</span>
                  </div>
                  <div class="data-row">
                    <span>Industry Avg:</span>
                    <span class="data-value">42.1%</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
        </div>
        <div class="stat-trend positive">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          +12.5%
        </div>
      </div>
      
      <div class="stat-value">68.4%</div>
      
      <div class="stat-chart">
        <!-- Mock chart bars -->
        <div class="bar" style="height: 40%"></div>
        <div class="bar" style="height: 55%"></div>
        <div class="bar" style="height: 45%"></div>
        <div class="bar" style="height: 70%"></div>
        <div class="bar" style="height: 60%"></div>
        <div class="bar" style="height: 85%"></div>
        <div class="bar active" style="height: 100%"></div>
      </div>
    </div>
  </div>
</body>
</html>
