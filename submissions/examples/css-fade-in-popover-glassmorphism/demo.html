<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Fade-In Popover - Glassmorphism UI</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-viewport">
        <div class="glass-container-card">
            <div class="glass-header">
                <span class="glass-title">SECURE CLOUD PLATFORM</span>
                <span class="glass-status-tag">OPERATIONAL</span>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-text">System Metrics</span>
                        <svg class="stats-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                    </button>
                    
                    <div class="fade-in-popover-card" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-glass">LOAD ESTIMATION</span>
                                <p class="metric-title">Edge Compute Allocation</p>
                            </div>
                            <div class="popover-body">
                                <p class="metric-desc">Computing thresholds are operating efficiently with cluster nodes balancing standard deployment streams seamlessly.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button class="glass-action-btn">Deploy Configuration</button>
        </div>
    </div>

</body>
</html>
