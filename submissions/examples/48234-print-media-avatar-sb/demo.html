<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Avatar Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized avatar demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Avatars</h1>
        <p>Demonstrates avatar components with print media query optimization.</p>
        
        <div class="avatar-row">
          <div class="ease-avatar ease-avatar-sm">
            <img src="https://i.pravatar.cc/100?img=1" alt="User avatar" />
          </div>
          <div class="ease-avatar">
            <img src="https://i.pravatar.cc/100?img=2" alt="User avatar" />
          </div>
          <div class="ease-avatar ease-avatar-lg">
            <img src="https://i.pravatar.cc/100?img=3" alt="User avatar" />
          </div>
          <div class="ease-avatar ease-avatar-xl">
            <img src="https://i.pravatar.cc/100?img=4" alt="User avatar" />
          </div>
        </div>
        
        <div class="avatar-row">
          <div class="ease-avatar ease-avatar-circle">
            <img src="https://i.pravatar.cc/100?img=5" alt="User avatar" />
          </div>
          <div class="ease-avatar ease-avatar-square">
            <img src="https://i.pravatar.cc/100?img=6" alt="User avatar" />
          </div>
          <div class="ease-avatar ease-avatar-soft">
            <img src="https://i.pravatar.cc/100?img=7" alt="User avatar" />
          </div>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see avatars hidden in print mode for ink savings.</p>
      </section>
    </main>
  </body>
</html>
