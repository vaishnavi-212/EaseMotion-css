<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skew Active Product Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="catalog">

<div class="product-card">

<img src="https://via.placeholder.com/240x160" alt="Product">

<h2>Wireless Headphones</h2>

<p>$89.99</p>

<div class="popover-wrapper">

<button>Quick View</button>

<div class="popover">

<h3>Product Details</h3>

<p>Noise Cancellation</p>

<p>40 Hours Battery</p>

<p>Bluetooth 5.3</p>

</div>

</div>

</div>

</div>

</body>
</html>
