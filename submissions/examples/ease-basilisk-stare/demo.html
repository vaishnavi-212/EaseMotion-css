<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basilisk Stare – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🐍 Basilisk Stare</h1>
    <p class="subtitle">Snake eyes with hypnotic pattern</p>

    <div class="bs-container">
      <div class="bs-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Scales texture -->
        <div class="scales-texture"></div>

        <!-- Basilisk Eyes -->
        <div class="basilisk-eyes">
          <!-- Left Eye -->
          <div class="eye eye-left">
            <div class="eye-socket">
              <!-- Scale details -->
              <div class="scale s1"></div>
              <div class="scale s2"></div>
              <div class="scale s3"></div>
              <div class="scale s4"></div>
              <div class="scale s5"></div>
              <div class="scale s6"></div>

              <!-- Eyelid -->
              <div class="eyelid"></div>

              <!-- Sclera -->
              <div class="sclera"></div>

              <!-- Iris -->
              <div class="iris">
                <!-- Hypnotic spiral patterns -->
                <div class="spiral-ring sr1"></div>
                <div class="spiral-ring sr2"></div>
                <div class="spiral-ring sr3"></div>
                <div class="spiral-ring sr4"></div>
                <div class="spiral-ring sr5"></div>
                <div class="spiral-ring sr6"></div>
                <div class="spiral-ring sr7"></div>
                <div class="spiral-ring sr8"></div>

                <!-- Snake pupil (vertical slit) -->
                <div class="pupil">
                  <div class="pupil-slit"></div>
                  <div class="pupil-glow"></div>
                </div>

                <!-- Iris glow -->
                <div class="iris-glow"></div>
              </div>

              <!-- Eye glow -->
              <div class="eye-glow"></div>

              <!-- Hypnotic particles -->
              <div class="hypno-particle hp1"></div>
              <div class="hypno-particle hp2"></div>
              <div class="hypno-particle hp3"></div>
              <div class="hypno-particle hp4"></div>
              <div class="hypno-particle hp5"></div>
              <div class="hypno-particle hp6"></div>
            </div>
          </div>

          <!-- Right Eye -->
          <div class="eye eye-right">
            <div class="eye-socket">
              <div class="scale s1"></div>
              <div class="scale s2"></div>
              <div class="scale s3"></div>
              <div class="scale s4"></div>
              <div class="scale s5"></div>
              <div class="scale s6"></div>

              <div class="eyelid"></div>
              <div class="sclera"></div>

              <div class="iris">
                <div class="spiral-ring sr1"></div>
                <div class="spiral-ring sr2"></div>
                <div class="spiral-ring sr3"></div>
                <div class="spiral-ring sr4"></div>
                <div class="spiral-ring sr5"></div>
                <div class="spiral-ring sr6"></div>
                <div class="spiral-ring sr7"></div>
                <div class="spiral-ring sr8"></div>

                <div class="pupil">
                  <div class="pupil-slit"></div>
                  <div class="pupil-glow"></div>
                </div>

                <div class="iris-glow"></div>
              </div>

              <div class="eye-glow"></div>

              <div class="hypno-particle hp1"></div>
              <div class="hypno-particle hp2"></div>
              <div class="hypno-particle hp3"></div>
              <div class="hypno-particle hp4"></div>
              <div class="hypno-particle hp5"></div>
              <div class="hypno-particle hp6"></div>
            </div>
          </div>

          <!-- Central glow -->
          <div class="central-glow"></div>

          <!-- Hypnotic ring -->
          <div class="hypno-ring hr1"></div>
          <div class="hypno-ring hr2"></div>
          <div class="hypno-ring hr3"></div>
          <div class="hypno-ring hr4"></div>
          <div class="hypno-ring hr5"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Hypnotic Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const leftEye = document.querySelector('.eye-left');
      const rightEye = document.querySelector('.eye-right');
      const spiralRings = document.querySelectorAll('.spiral-ring');
      const hypnoRings = document.querySelectorAll('.hypno-ring');
      const hypnoParticles = document.querySelectorAll('.hypno-particle');
      const irisGlows = document.querySelectorAll('.iris-glow');
      const eyeGlows = document.querySelectorAll('.eye-glow');
      const centralGlow = document.querySelector('.central-glow');
      const pupilGlows = document.querySelectorAll('.pupil-glow');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Spiral rings
        spiralRings.forEach((ring, i) => {
          const duration = (3 + i * 0.15) / speedMultiplier;
          ring.style.setProperty('--spiral-duration', duration + 's');
          ring.style.setProperty('--spiral-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Hypno rings
        hypnoRings.forEach((ring, i) => {
          const duration = (4 + i * 0.2) / speedMultiplier;
          ring.style.setProperty('--hypno-duration', duration + 's');
          ring.style.setProperty('--hypno-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Hypno particles
        hypnoParticles.forEach((p, i) => {
          const duration = (2 + (i % 4) * 0.2) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Iris glows
        irisGlows.forEach((glow) => {
          glow.style.setProperty('--iris-glow-duration', (1.5 / speedMultiplier) + 's');
        });

        // Eye glows
        eyeGlows.forEach((glow) => {
          glow.style.setProperty('--eye-glow-duration', (2.5 / speedMultiplier) + 's');
        });

        // Central glow
        centralGlow.style.setProperty('--central-duration', (3 / speedMultiplier) + 's');

        // Pupil glows
        pupilGlows.forEach((glow) => {
          glow.style.setProperty('--pupil-duration', (0.8 / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Iris glows
        irisGlows.forEach((glow) => {
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          glow.style.setProperty('--iris-intensity', opacity);
          const size = 100 * intensityMultiplier;
          glow.style.setProperty('--iris-glow-size', size + 'px');
        });

        // Eye glows
        eyeGlows.forEach((glow) => {
          const opacity = Math.min(0.2 * intensityMultiplier, 0.4);
          glow.style.setProperty('--eye-intensity', opacity);
          const size = 180 * intensityMultiplier;
          glow.style.setProperty('--eye-glow-size', size + 'px');
        });

        // Central glow
        const centralOpacity = Math.min(0.1 * intensityMultiplier, 0.2);
        centralGlow.style.setProperty('--central-intensity', centralOpacity);
        const centralSize = 350 * intensityMultiplier;
        centralGlow.style.setProperty('--central-size', centralSize + 'px');

        // Pupil glows
        pupilGlows.forEach((glow) => {
          const opacity = Math.min(0.5 * intensityMultiplier, 1);
          glow.style.setProperty('--pupil-intensity', opacity);
          const size = 50 * intensityMultiplier;
          glow.style.setProperty('--pupil-size', size + 'px');
        });

        // Hypno rings
        hypnoRings.forEach((ring) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          ring.style.setProperty('--hypno-intensity', opacity);
        });

        // Spiral rings
        spiralRings.forEach((ring) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          ring.style.setProperty('--spiral-intensity', opacity);
        });

        // Hypno particles
        hypnoParticles.forEach((p) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          p.style.setProperty('--particle-intensity', opacity);
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
        });
      }

      // ----- Update basilisk -----
      function updateBasilisk(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle eye movement (left and right sway)
        const sway = Math.sin(timestamp / 4000) * 3;
        leftEye.style.transform = `translateX(-50%) translateY(-50%) rotate(${sway * 0.5}deg)`;
        rightEye.style.transform = `translateX(-50%) translateY(-50%) rotate(${-sway * 0.5}deg)`;

        // Pupil dilation
        const dilation = Math.sin(timestamp / 3000) * 0.1 + 0.9;
        document.querySelectorAll('.pupil-slit').forEach((slit) => {
          slit.style.transform = `translate(-50%, -50%) scaleY(${dilation})`;
        });

        // Hypno particle positions
        hypnoParticles.forEach((p, i) => {
          const angle = timestamp / (2500 + i * 200) + i * 0.8;
          const radius = 40 + i * 5;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle * 0.6 + i) * radius * 0.5;
          p.style.setProperty('--p-x', x + 'px');
          p.style.setProperty('--p-y', y + 'px');
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateBasilisk(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Reset -----
      function resetBasilisk() {
        lastTimestamp = 0;

        // Reset eye positions
        leftEye.style.transform = 'translateX(-50%) translateY(-50%) rotate(0deg)';
        rightEye.style.transform = 'translateX(-50%) translateY(-50%) rotate(0deg)';

        // Reset pupils
        document.querySelectorAll('.pupil-slit').forEach((slit) => {
          slit.style.transform = 'translate(-50%, -50%) scaleY(1)';
        });

        // Reset particles
        hypnoParticles.forEach((p) => {
          p.style.setProperty('--p-x', '0px');
          p.style.setProperty('--p-y', '0px');
        });
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetBasilisk);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
