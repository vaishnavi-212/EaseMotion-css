<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="game-container" aria-label="Rock Paper Scissors Game">
      <header class="game-header">
        <h1 class="game-title">Rock Paper Scissors</h1>
        <p class="game-subtitle">Challenge the computer!</p>
      </header>

      <div class="scoreboard">
        <div class="score player-score">
          <span class="score-label">You</span>
          <span class="score-value" id="playerScore">0</span>
        </div>
        <div class="score-divider">VS</div>
        <div class="score computer-score">
          <span class="score-label">Computer</span>
          <span class="score-value" id="computerScore">0</span>
        </div>
      </div>

      <div class="battle-arena">
        <div class="choice player-choice">
          <div class="choice-hand" id="playerHand">❔</div>
          <span class="choice-label">Your choice</span>
        </div>
        <div class="battle-result" id="battleResult">
          <span class="result-text">Make your move!</span>
        </div>
        <div class="choice computer-choice">
          <div class="choice-hand" id="computerHand">❔</div>
          <span class="choice-label">Computer</span>
        </div>
      </div>

      <div class="controls">
        <button class="game-btn rock-btn" data-choice="rock" type="button">
          <span class="hand-icon">✊</span>
          <span class="btn-label">Rock</span>
        </button>
        <button class="game-btn paper-btn" data-choice="paper" type="button">
          <span class="hand-icon">✋</span>
          <span class="btn-label">Paper</span>
        </button>
        <button class="game-btn scissors-btn" data-choice="scissors" type="button">
          <span class="hand-icon">✌️</span>
          <span class="btn-label">Scissors</span>
        </button>
      </div>

      <div class="match-history">
        <h3 class="history-title">Match History</h3>
        <ul class="history-list" id="historyList">
          <li class="history-item win">You won with Rock vs Scissors!</li>
          <li class="history-item lose">You lost with Scissors vs Paper!</li>
          <li class="history-item draw">It's a draw!</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
