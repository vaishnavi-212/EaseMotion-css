<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graffiti Spray – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🎨 Graffiti Spray</h1>
    <p class="subtitle">Graffiti being sprayed on wall</p>

    <div class="gs-container">
      <div class="gs-scene">
        <!-- Wall -->
        <div class="wall">
          <!-- Brick pattern -->
          <div class="brick-pattern"></div>
          
          <!-- Graffiti canvas -->
          <div class="graffiti-canvas">
            <!-- Spray particles -->
            <div class="spray-particle sp1"></div>
            <div class="spray-particle sp2"></div>
            <div class="spray-particle sp3"></div>
            <div class="spray-particle sp4"></div>
            <div class="spray-particle sp5"></div>
            <div class="spray-particle sp6"></div>
            <div class="spray-particle sp7"></div>
            <div class="spray-particle sp8"></div>
            <div class="spray-particle sp9"></div>
            <div class="spray-particle sp10"></div>
            <div class="spray-particle sp11"></div>
            <div class="spray-particle sp12"></div>
            <div class="spray-particle sp13"></div>
            <div class="spray-particle sp14"></div>
            <div class="spray-particle sp15"></div>
            <div class="spray-particle sp16"></div>
            <div class="spray-particle sp17"></div>
            <div class="spray-particle sp18"></div>
            <div class="spray-particle sp19"></div>
            <div class="spray-particle sp20"></div>
            <div class="spray-particle sp21"></div>
            <div class="spray-particle sp22"></div>
            <div class="spray-particle sp23"></div>
            <div class="spray-particle sp24"></div>
            <div class="spray-particle sp25"></div>
            <div class="spray-particle sp26"></div>
            <div class="spray-particle sp27"></div>
            <div class="spray-particle sp28"></div>
            <div class="spray-particle sp29"></div>
            <div class="spray-particle sp30"></div>
            <div class="spray-particle sp31"></div>
            <div class="spray-particle sp32"></div>
            <div class="spray-particle sp33"></div>
            <div class="spray-particle sp34"></div>
            <div class="spray-particle sp35"></div>
            <div class="spray-particle sp36"></div>
            <div class="spray-particle sp37"></div>
            <div class="spray-particle sp38"></div>
            <div class="spray-particle sp39"></div>
            <div class="spray-particle sp40"></div>
            <div class="spray-particle sp41"></div>
            <div class="spray-particle sp42"></div>
            <div class="spray-particle sp43"></div>
            <div class="spray-particle sp44"></div>
            <div class="spray-particle sp45"></div>
            <div class="spray-particle sp46"></div>
            <div class="spray-particle sp47"></div>
            <div class="spray-particle sp48"></div>
            <div class="spray-particle sp49"></div>
            <div class="spray-particle sp50"></div>
            
            <!-- Graffiti letters -->
            <div class="graffiti-letter letter-a">A</div>
            <div class="graffiti-letter letter-r">R</div>
            <div class="graffiti-letter letter-t">T</div>
            
            <!-- Graffiti glow -->
            <div class="graffiti-glow"></div>
          </div>
          
          <!-- Spray can -->
          <div class="spray-can">
            <div class="can-body"></div>
            <div class="can-cap"></div>
            <div class="can-nozzle"></div>
            <div class="can-label"></div>
          </div>
        </div>
        
        <!-- Ambient particles -->
        <div class="ambient-particle ap1"></div>
        <div class="ambient-particle ap2"></div>
        <div class="ambient-particle ap3"></div>
        <div class="ambient-particle ap4"></div>
        <div class="ambient-particle ap5"></div>
        <div class="ambient-particle ap6"></div>
      </div>
    </div>

    <div class="controls">
      <button id="sprayBtn">🎨 Spray!</button>
      <button id="clearBtn">🧹 Clear</button>
      <label>
        Spray Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Color
        <select id="colorSelect">
          <option value="#ff4444">Red</option>
          <option value="#44ff44">Green</option>
          <option value="#4444ff" selected>Blue</option>
          <option value="#ffff44">Yellow</option>
          <option value="#ff44ff">Pink</option>
          <option value="#44ffff">Cyan</option>
          <option value="#ff8844">Orange</option>
          <option value="#ffffff">White</option>
        </select>
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const sprayParticles = document.querySelectorAll('.spray-particle');
      const graffitiLetters = document.querySelectorAll('.graffiti-letter');
      const graffitiGlow = document.querySelector('.graffiti-glow');
      const sprayCan = document.querySelector('.spray-can');
      const wall = document.querySelector('.wall');

      const sprayBtn = document.getElementById('sprayBtn');
      const clearBtn = document.getElementById('clearBtn');
      const speedInput = document.getElementById('speedControl');
      const colorSelect = document.getElementById('colorSelect');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isSpraying = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let sprayProgress = 0;
      let currentColor = '#4444ff';

      // ----- Apply speed -----
      function applySpeed() {
        // Spray particles
        sprayParticles.forEach((p, i) => {
          const duration = (0.5 + (i % 5) * 0.05) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.01) / speedMultiplier) + 's');
        });

        // Graffiti letters
        graffitiLetters.forEach((letter, i) => {
          const duration = (0.8 + i * 0.1) / speedMultiplier;
          letter.style.setProperty('--letter-duration', duration + 's');
          letter.style.setProperty('--letter-delay', ((i * 0.15) / speedMultiplier) + 's');
        });

        // Graffiti glow
        graffitiGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');

        // Spray can shake
        sprayCan.style.setProperty('--shake-duration', (0.1 / speedMultiplier) + 's');
      }

      // ----- Spray graffiti -----
      function spray() {
        if (isSpraying) return;
        isSpraying = true;
        sprayProgress = 0;

        // Reset particles
        sprayParticles.forEach(p => {
          p.style.opacity = '0';
          p.style.transform = 'scale(0)';
          p.style.animation = 'none';
          void p.offsetWidth;
          p.style.animation = '';
          p.classList.remove('spraying');
        });

        // Reset letters
        graffitiLetters.forEach(letter => {
          letter.style.opacity = '0';
          letter.style.transform = 'scale(0.5) rotate(-10deg)';
          letter.style.animation = 'none';
          void letter.offsetWidth;
          letter.style.animation = '';
        });

        graffitiGlow.style.opacity = '0';
        graffitiGlow.style.animation = 'none';
        void graffitiGlow.offsetWidth;
        graffitiGlow.style.animation = '';

        // Set color
        const color = colorSelect.value;
        currentColor = color;
        sprayParticles.forEach(p => {
          p.style.background = `radial-gradient(circle at 40% 35%, 
            ${color} 0%, 
            ${color}66 40%, 
            ${color}33 70%, 
            transparent 100%
          )`;
        });

        graffitiLetters.forEach(letter => {
          letter.style.color = color;
          letter.style.textShadow = `0 0 30px ${color}44, 0 0 60px ${color}22`;
        });

        graffitiGlow.style.background = `radial-gradient(circle at center,
          ${color}22 0%,
          ${color}11 30%,
          transparent 70%
        )`;

        // Trigger spray animation
        setTimeout(() => {
          sprayParticles.forEach((p, i) => {
            setTimeout(() => {
              p.classList.add('spraying');
              p.style.opacity = '0.6';
            }, i * 10 / speedMultiplier);
          });
        }, 100 / speedMultiplier);

        // Letters appear after particles
        setTimeout(() => {
          graffitiLetters.forEach((letter, i) => {
            setTimeout(() => {
              letter.classList.add('reveal');
              letter.style.opacity = '1';
              letter.style.transform = 'scale(1) rotate(0deg)';
            }, i * 150 / speedMultiplier);
          });
        }, 500 / speedMultiplier);

        // Glow appears
        setTimeout(() => {
          graffitiGlow.classList.add('glow');
          graffitiGlow.style.opacity = '1';
        }, 800 / speedMultiplier);

        sprayBtn.textContent = '🎨 Spraying...';
        setTimeout(() => {
          sprayBtn.textContent = '🎨 Spray!';
        }, 1200 / speedMultiplier);

        setTimeout(() => {
          isSpraying = false;
        }, 1500 / speedMultiplier);
      }

      // ----- Clear graffiti -----
      function clearGraffiti() {
        isSpraying = false;
        sprayProgress = 0;

        sprayParticles.forEach(p => {
          p.classList.remove('spraying');
          p.style.opacity = '0';
          p.style.transform = 'scale(0)';
        });

        graffitiLetters.forEach(letter => {
          letter.classList.remove('reveal');
          letter.style.opacity = '0';
          letter.style.transform = 'scale(0.5) rotate(-10deg)';
        });

        graffitiGlow.classList.remove('glow');
        graffitiGlow.style.opacity = '0';

        clearBtn.textContent = '🧹 Clearing...';
        setTimeout(() => {
          clearBtn.textContent = '🧹 Clear';
        }, 500 / speedMultiplier);
      }

      // ----- Reset -----
      function resetGraffiti() {
        clearGraffiti();
        if (isSpraying) {
          isSpraying = false;
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state - clear
        sprayParticles.forEach(p => {
          p.style.opacity = '0';
          p.style.transform = 'scale(0)';
        });
        graffitiLetters.forEach(letter => {
          letter.style.opacity = '0';
          letter.style.transform = 'scale(0.5) rotate(-10deg)';
        });
        graffitiGlow.style.opacity = '0';

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-spray after 1 second
        setTimeout(() => {
          spray();
        }, 1000);
      }

      // ----- Event listeners -----
      sprayBtn.addEventListener('click', spray);
      clearBtn.addEventListener('click', clearGraffiti);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      resetBtn.addEventListener('click', resetGraffiti);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
