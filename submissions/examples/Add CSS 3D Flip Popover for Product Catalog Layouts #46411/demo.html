<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Popover - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="catalog-grid">
    <div class="product-card">
      <div class="product-image">
        <!-- SVG Placeholder for Product Image -->
        <svg width="100%" height="100%" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="300" fill="#f1f5f9"/>
          <path d="M140 180C140 168.954 148.954 160 160 160H240C251.046 160 260 168.954 260 180V190C260 201.046 251.046 210 240 210H160C148.954 210 140 201.046 140 190V180Z" fill="#cbd5e1"/>
          <circle cx="200" cy="120" r="40" fill="#cbd5e1"/>
        </svg>
      </div>
      <div class="product-info">
        <div class="product-brand">Comfort Series</div>
        <h3 class="product-name">Everyday Minimalist Sneaker</h3>
        <div class="product-price">$89.00</div>
        
        <button class="trigger-btn" popovertarget="quick-add-popover">
          Quick Add
        </button>
      </div>

      <!-- Popover is anchored to the trigger button -->
      <div id="quick-add-popover" class="popover" popover>
        <div class="popover-header">
          <h4>Select Size</h4>
          <button class="close-btn" popovertarget="quick-add-popover" popovertargetaction="hide" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="popover-body">
          <div class="size-grid">
            <label class="size-option"><input type="radio" name="size" value="7"><span>7</span></label>
            <label class="size-option"><input type="radio" name="size" value="8"><span>8</span></label>
            <label class="size-option"><input type="radio" name="size" value="9" checked><span>9</span></label>
            <label class="size-option"><input type="radio" name="size" value="10"><span>10</span></label>
            <label class="size-option"><input type="radio" name="size" value="11"><span>11</span></label>
            <label class="size-option"><input type="radio" name="size" value="12"><span>12</span></label>
          </div>
        </div>
        <div class="popover-footer">
          <button class="add-to-cart-btn" popovertarget="quick-add-popover" popovertargetaction="hide">
            Add to Cart - $89.00
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
