<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilt Glare Demo — Tay</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f2f2f5;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>

  <div class="tilt-card-tay" tabindex="0">
    <div class="tilt-glare-tay"></div>
    <div class="tilt-content-tay">
      <h2>EaseMotion CSS</h2>
      <p>Interactive 3D Tilt Hover Effect with Dynamic Glare</p>
    </div>
  </div>

  <script>
    // Minimal cursor tracking — skipped entirely on touch/coarse pointers
    // or when the user prefers reduced motion
    const prefersReducedMotion = window.matchMedia(
      "(prefers-reduced-motion: reduce)"
    ).matches;
    const supportsFinePointer = window.matchMedia(
      "(hover: hover) and (pointer: fine)"
    ).matches;

    if (supportsFinePointer && !prefersReducedMotion) {
      document.querySelectorAll(".tilt-card-tay").forEach((card) => {
        // Cache the max-tilt value once instead of reading it on every move
        const maxTilt =
          parseFloat(getComputedStyle(card).getPropertyValue("--tilt-max-tay")) ||
          12;

        const resetCard = () => {
          card.style.setProperty("--rx-tay", "0deg");
          card.style.setProperty("--ry-tay", "0deg");
          card.style.setProperty("--gx-tay", "50%");
          card.style.setProperty("--gy-tay", "50%");
        };

        card.addEventListener("pointermove", (e) => {
          const rect = card.getBoundingClientRect();
          const px = (e.clientX - rect.left) / rect.width;
          const py = (e.clientY - rect.top) / rect.height;

          const ry = (px - 0.5) * maxTilt * 2; // rotateY
          const rx = (0.5 - py) * maxTilt * 2; // rotateX

          card.style.setProperty("--rx-tay", `${rx}deg`);
          card.style.setProperty("--ry-tay", `${ry}deg`);
          card.style.setProperty("--gx-tay", `${px * 100}%`);
          card.style.setProperty("--gy-tay", `${py * 100}%`);
        });

        card.addEventListener("pointerleave", resetCard);
        card.addEventListener("blur", resetCard); // reset on keyboard focus-out too
      });
    }
  </script>

</body>
</html>
