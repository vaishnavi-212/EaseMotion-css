<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supernova Explosion – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>💥 Supernova Explosion</h1>
    <p class="subtitle">Star explosion with expanding debris</p>

    <div class="supernova-container">
      <div class="supernova-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>

        <!-- Supernova core -->
        <div class="core"></div>

        <!-- Explosion flash -->
        <div class="flash"></div>

        <!-- Shockwave -->
        <div class="shockwave"></div>

        <!-- Expanding debris particles -->
        <div class="debris d1"></div>
        <div class="debris d2"></div>
        <div class="debris d3"></div>
        <div class="debris d4"></div>
        <div class="debris d5"></div>
        <div class="debris d6"></div>
        <div class="debris d7"></div>
        <div class="debris d8"></div>
        <div class="debris d9"></div>
        <div class="debris d10"></div>
        <div class="debris d11"></div>
        <div class="debris d12"></div>
        <div class="debris d13"></div>
        <div class="debris d14"></div>
        <div class="debris d15"></div>
        <div class="debris d16"></div>
        <div class="debris d17"></div>
        <div class="debris d18"></div>
        <div class="debris d19"></div>
        <div class="debris d20"></div>
        <div class="debris d21"></div>
        <div class="debris d22"></div>
        <div class="debris d23"></div>
        <div class="debris d24"></div>
        <div class="debris d25"></div>
        <div class="debris d26"></div>
        <div class="debris d27"></div>
        <div class="debris d28"></div>
        <div class="debris d29"></div>
        <div class="debris d30"></div>

        <!-- Nebula glow -->
        <div class="nebula"></div>

        <!-- Afterglow -->
        <div class="afterglow"></div>
      </div>
    </div>

    <div class="controls">
      <button id="explodeBtn">💥 Explode!</button>
      <label>
        Expansion Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Debris Count
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const core = document.querySelector('.core');
      const flash = document.querySelector('.flash');
      const shockwave = document.querySelector('.shockwave');
      const debris = document.querySelectorAll('.debris');
      const nebula = document.querySelector('.nebula');
      const afterglow = document.querySelector('.afterglow');
      const stars = document.querySelectorAll('.star');
      const container = document.querySelector('.supernova-container');

      const explodeBtn = document.getElementById('explodeBtn');
      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isExploded = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed -----
      function applySpeed() {
        const baseDuration = 0.8 / speedMultiplier;

        // Core implosion
        core.style.setProperty('--core-duration', (0.3 / speedMultiplier) + 's');

        // Flash
        flash.style.setProperty('--flash-duration', (0.15 / speedMultiplier) + 's');

        // Shockwave
        shockwave.style.setProperty('--shockwave-duration', (2 / speedMultiplier) + 's');

        // Debris
        debris.forEach((d, i) => {
          const baseDelay = 0.1 + (i % 5) * 0.05;
          const duration = 0.8 + (i % 3) * 0.3;
          d.style.setProperty('--debris-duration', (duration / speedMultiplier) + 's');
          d.style.setProperty('--debris-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Nebula
        nebula.style.setProperty('--nebula-duration', (4 / speedMultiplier) + 's');

        // Afterglow
        afterglow.style.setProperty('--afterglow-duration', (3 / speedMultiplier) + 's');

        // Stars twinkle
        stars.forEach((s, i) => {
          const duration = (1.5 + i * 0.2) / speedMultiplier;
          s.style.setProperty('--star-duration', duration + 's');
        });
      }

      // ----- Apply density -----
      function applyDensity() {
        debris.forEach((d) => {
          const baseSize = parseFloat(d.dataset.baseSize) || 4;
          const size = baseSize * densityMultiplier * 0.8;
          d.style.setProperty('--debris-size', size + 'px');
          d.style.setProperty('--debris-opacity', Math.min(0.6 * densityMultiplier, 1));
        });

        // Adjust core size with density
        const coreSize = 30 * densityMultiplier;
        core.style.setProperty('--core-size', coreSize + 'px');
      }

      // ----- Trigger explosion -----
      function explode() {
        if (isExploded) return;
        isExploded = true;
        progress = 0;

        // Reset elements
        resetElements();

        // Trigger animations
        core.classList.add('explode');
        flash.classList.add('flash-burst');
        shockwave.classList.add('expand');

        debris.forEach((d) => {
          d.classList.add('explode');
        });

        nebula.classList.add('expand');
        afterglow.classList.add('glow');

        // Hide core after implosion
        setTimeout(() => {
          core.style.opacity = '0';
        }, 300 / speedMultiplier);

        explodeBtn.textContent = '💥 BOOM!';
        setTimeout(() => {
          explodeBtn.textContent = '💥 Explode!';
        }, 500 / speedMultiplier);
      }

      // ----- Reset elements -----
      function resetElements() {
        core.classList.remove('explode');
        core.style.opacity = '1';
        flash.classList.remove('flash-burst');
        shockwave.classList.remove('expand');
        nebula.classList.remove('expand');
        afterglow.classList.remove('glow');

        debris.forEach((d) => {
          d.classList.remove('explode');
          d.style.transform = '';
          d.style.opacity = '';
        });

        // Reset debris positions
        resetDebrisPositions();
      }

      // ----- Reset debris positions -----
      function resetDebrisPositions() {
        // Store initial positions in data attributes
        debris.forEach((d) => {
          const angle = parseFloat(d.dataset.angle) || Math.random() * 360;
          const distance = parseFloat(d.dataset.distance) || 20 + Math.random() * 40;
          const x = Math.cos(angle * Math.PI / 180) * distance;
          const y = Math.sin(angle * Math.PI / 180) * distance;
          d.style.transform = `translate(${x}px, ${y}px) scale(0)`;
          d.style.opacity = '0';
        });
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Reset -----
      function resetAll() {
        isExploded = false;
        progress = 0;
        resetElements();
        explodeBtn.textContent = '💥 Explode!';
        core.style.opacity = '1';
      }

      // ----- Animation loop for debris drift -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        if (isExploded) {
          progress += deltaTime * 0.01 * speedMultiplier;
          if (progress > 1) progress = 1;

          // Additional debris drift after explosion
          debris.forEach((d, i) => {
            if (d.classList.contains('explode')) {
              const drift = 1 + progress * 2;
              const angle = parseFloat(d.dataset.angle) || 0;
              const distance = (parseFloat(d.dataset.distance) || 30) * drift;
              const x = Math.cos(angle * Math.PI / 180) * distance;
              const y = Math.sin(angle * Math.PI / 180) * distance;
              // Add some randomness to the drift
              const randomX = Math.sin(timestamp / 3000 + i) * 5;
              const randomY = Math.cos(timestamp / 4000 + i * 0.7) * 5;
              d.style.transform = `translate(${x + randomX}px, ${y + randomY}px) scale(${1 + progress * 0.5}) rotate(${progress * 360 + i * 30}deg)`;
            }
          });
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial debris data
        debris.forEach((d, i) => {
          const angle = (i / debris.length) * 360 + Math.random() * 10 - 5;
          const distance = 20 + Math.random() * 50;
          d.dataset.angle = angle;
          d.dataset.distance = distance;
          const size = 3 + Math.random() * 5;
          d.dataset.baseSize = size;
          d.style.setProperty('--debris-size', size + 'px');
        });

        applySpeed();
        applyDensity();
        resetDebrisPositions();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-explode after 1.5 seconds
        setTimeout(() => {
          explode();
        }, 1500);

        // Auto-explode again after 5 seconds
        setTimeout(() => {
          resetAll();
          setTimeout(() => {
            explode();
          }, 800);
        }, 6500);
      }

      // ----- Event listeners -----
      explodeBtn.addEventListener('click', () => {
        if (isExploded) {
          resetAll();
          setTimeout(() => {
            explode();
          }, 300 / speedMultiplier);
        } else {
          explode();
        }
      });

      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      resetBtn.addEventListener('click', resetAll);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
