<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Text Compare Tool</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="compare-card">

    <div class="header">
        <h2>Text Compare Tool</h2>
    </div>

    <div class="editor-area">

        <div class="editor">
            <label>Original Text</label>
            <textarea id="original" placeholder="Enter original text..."></textarea>
        </div>

        <div class="editor">
            <label>Modified Text</label>
            <textarea id="modified" placeholder="Enter modified text..."></textarea>
        </div>

    </div>

    <div class="actions">
        <button id="compareBtn">Compare Text</button>
    </div>

    <div class="result">

        <h3>Result</h3>

        <div class="message" id="resultMessage">
            Compare two texts to see whether they match.
        </div>

        <div class="stats">

            <div class="stat">
                Characters
                <span id="charCount">0</span>
            </div>

            <div class="stat">
                Words
                <span id="wordCount">0</span>
            </div>

            <div class="stat">
                Status
                <span id="status">-</span>
            </div>

        </div>

    </div>

</div>

<script>
const original = document.getElementById("original");
const modified = document.getElementById("modified");

const resultMessage = document.getElementById("resultMessage");
const charCount = document.getElementById("charCount");
const wordCount = document.getElementById("wordCount");
const status = document.getElementById("status");

document.getElementById("compareBtn").addEventListener("click", () => {

    const text1 = original.value.trim();
    const text2 = modified.value.trim();

    const normalize = text => text.replace(/\s+/g, " ").trim();

    const match = normalize(text1) === normalize(text2);

    if(match){

        resultMessage.innerHTML = "✔ Texts Match";
        resultMessage.className = "message success";
        status.textContent = "Match";

    }else{

        resultMessage.innerHTML = "✖ Differences Found";
        resultMessage.className = "message error";
        status.textContent = "Different";

    }

    const longer = text1.length > text2.length ? text1 : text2;

    charCount.textContent = longer.length;

    const words = longer.trim()
        ? longer.trim().split(/\s+/).length
        : 0;

    wordCount.textContent = words;

});
</script>

</body>
</html>
