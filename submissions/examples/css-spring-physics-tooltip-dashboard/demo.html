<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Spring Physics Tooltip - Responsive Dashboard</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-viewport">
        <div class="monitor-card">
            <div class="card-identity">
                <span class="card-indicator-active"></span>
                <span class="identity-title">DATABASE_NODE_B</span>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">Check Node Health</span>
                        <svg class="activity-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                    </button>
                    
                    <div class="spring-physics-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-spring">HEALTHY_NODE</span>
                                <p class="node-health-title">Active Sync Stable</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="node-health-desc">Data synchronization cycle operating at sub-millisecond rates. No deadlocks observed across the active transaction thread pool.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
