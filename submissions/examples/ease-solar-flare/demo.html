<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar Flare – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>☀️ Solar Flare</h1>
    <p class="subtitle">Sun erupting with plasma jets</p>

    <div class="sf-container">
      <div class="sf-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>

        <!-- Sun -->
        <div class="sun">
          <!-- Sun core -->
          <div class="sun-core"></div>

          <!-- Sun surface texture -->
          <div class="sun-surface"></div>

          <!-- Solar corona -->
          <div class="corona"></div>

          <!-- Coronal loops -->
          <div class="coronal-loop loop-1"></div>
          <div class="coronal-loop loop-2"></div>
          <div class="coronal-loop loop-3"></div>
          <div class="coronal-loop loop-4"></div>
          <div class="coronal-loop loop-5"></div>

          <!-- Solar flares / plasma jets -->
          <div class="flare flare-1"></div>
          <div class="flare flare-2"></div>
          <div class="flare flare-3"></div>
          <div class="flare flare-4"></div>
          <div class="flare flare-5"></div>
          <div class="flare flare-6"></div>
          <div class="flare flare-7"></div>
          <div class="flare flare-8"></div>

          <!-- Flare glow -->
          <div class="flare-glow"></div>

          <!-- Sun glow -->
          <div class="sun-glow"></div>

          <!-- Energetic particles -->
          <div class="particle ep1"></div>
          <div class="particle ep2"></div>
          <div class="particle ep3"></div>
          <div class="particle ep4"></div>
          <div class="particle ep5"></div>
          <div class="particle ep6"></div>
          <div class="particle ep7"></div>
          <div class="particle ep8"></div>
          <div class="particle ep9"></div>
          <div class="particle ep10"></div>
          <div class="particle ep11"></div>
          <div class="particle ep12"></div>
          <div class="particle ep13"></div>
          <div class="particle ep14"></div>
          <div class="particle ep15"></div>
          <div class="particle ep16"></div>
          <div class="particle ep17"></div>
          <div class="particle ep18"></div>
          <div class="particle ep19"></div>
          <div class="particle ep20"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Eruption Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Flare Intensity
        <input type="range" id="intensityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const sun = document.querySelector('.sun');
      const flares = document.querySelectorAll('.flare');
      const coronalLoops = document.querySelectorAll('.coronal-loop');
      const particles = document.querySelectorAll('.particle');
      const corona = document.querySelector('.corona');
      const flareGlow = document.querySelector('.flare-glow');
      const sunGlow = document.querySelector('.sun-glow');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let flareCycle = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Sun rotation
        sun.style.setProperty('--sun-rotation', (60 / speedMultiplier) + 's');

        // Flare eruptions
        flares.forEach((flare, i) => {
          const baseDuration = 1.5 + (i % 4) * 0.3;
          const duration = baseDuration / speedMultiplier;
          flare.style.setProperty('--flare-duration', duration + 's');
          flare.style.setProperty('--flare-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Coronal loops
        coronalLoops.forEach((loop, i) => {
          const duration = (3 + i * 0.5) / speedMultiplier;
          loop.style.setProperty('--loop-duration', duration + 's');
          loop.style.setProperty('--loop-delay', ((i * 0.3) / speedMultiplier) + 's');
        });

        // Particles
        particles.forEach((p, i) => {
          const duration = (2 + (i % 5) * 0.4) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Corona
        corona.style.setProperty('--corona-duration', (4 / speedMultiplier) + 's');

        // Flare glow
        flareGlow.style.setProperty('--glow-duration', (1.2 / speedMultiplier) + 's');

        // Sun glow
        sunGlow.style.setProperty('--sun-glow-duration', (3 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        flares.forEach((flare) => {
          const width = 3 * intensityMultiplier;
          const height = 60 * intensityMultiplier;
          flare.style.setProperty('--flare-width', width + 'px');
          flare.style.setProperty('--flare-height', height + 'px');
          flare.style.setProperty('--flare-opacity', Math.min(0.6 * intensityMultiplier, 1));
        });

        // Flare glow
        const glowSize = 200 * intensityMultiplier;
        flareGlow.style.setProperty('--glow-size', glowSize + 'px');
        flareGlow.style.setProperty('--glow-intensity', Math.min(0.4 * intensityMultiplier, 0.8));

        // Corona intensity
        corona.style.setProperty('--corona-intensity', Math.min(0.3 * intensityMultiplier, 0.6));

        // Particle brightness
        particles.forEach((p) => {
          const bright = Math.min(0.6 * intensityMultiplier, 1);
          p.style.setProperty('--particle-brightness', bright);
        });
      }

      // ----- Update flare cycle -----
      function updateFlares(timestamp) {
        if (isPaused) return;

        const speed = 0.005 * speedMultiplier;
        flareCycle += speed;

        // Randomize flare timing
        flares.forEach((flare, i) => {
          const offset = i * 0.3;
          const cycle = (flareCycle + offset) % 1;
          const intensity = Math.sin(cycle * Math.PI * 3) * 0.5 + 0.5;
          const scale = 0.5 + intensity * 0.8;

          flare.style.setProperty('--flare-scale', scale);
          flare.style.opacity = 0.1 + intensity * 0.7;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateFlares(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetSun() {
        flares.forEach(flare => {
          flare.style.opacity = '0.3';
          flare.style.setProperty('--flare-scale', '0.5');
        });
        particles.forEach(p => {
          p.style.opacity = '0';
        });
        flareGlow.style.opacity = '0.1';
        corona.style.opacity = '0.2';

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
        flareCycle = 0;

        setTimeout(() => {
          flareCycle = 0.01;
          particles.forEach(p => {
            p.style.opacity = '0.3';
          });
        }, 300);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Set initial state
        flares.forEach(flare => {
          flare.style.opacity = '0.3';
          flare.style.setProperty('--flare-scale', '0.5');
        });
        particles.forEach(p => p.style.opacity = '0');
        flareGlow.style.opacity = '0.1';
        corona.style.opacity = '0.2';

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start after delay
        setTimeout(() => {
          flareCycle = 0.01;
          particles.forEach(p => {
            p.style.opacity = '0.3';
          });
        }, 500);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetSun);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
