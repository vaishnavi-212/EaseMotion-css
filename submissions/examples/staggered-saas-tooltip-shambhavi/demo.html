<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Staggered Entrance Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="saas-page">

        <section class="dashboard-card">

            <div class="card-header">
                <div>
                    <p class="eyebrow">WORKSPACE</p>
                    <h1>Project Overview</h1>
                </div>

                <div class="tooltip-wrapper">

                    <button
                        class="info-button"
                        aria-label="Show project information"
                    >
                        ?
                    </button>

                    <div class="tooltip" role="tooltip">
                        <span class="tooltip-badge">INFO</span>

                        <h2>Workspace Overview</h2>

                        <p>
                            Track your team's progress and monitor project
                            activity from one place.
                        </p>

                        <div class="tooltip-features">
                            <span>Team Analytics</span>
                            <span>Live Updates</span>
                            <span>Task Tracking</span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="metrics">

                <article class="metric">
                    <span>Active Projects</span>
                    <strong>24</strong>
                </article>

                <article class="metric">
                    <span>Team Members</span>
                    <strong>86</strong>
                </article>

                <article class="metric">
                    <span>Completion Rate</span>
                    <strong>92%</strong>
                </article>

            </div>

        </section>

    </main>

</body>
</html>
