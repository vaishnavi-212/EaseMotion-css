<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Slide-in Side Drawer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <!-- Open Drawer Trigger using anchor hash targeting -->
        <a href="#main-drawer" class="menu-toggle" aria-label="Open navigation menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </a>
        <div class="logo">BrandLogo</div>
    </header>

    <main class="content">
        <h1>Welcome</h1>
        <p>Click the hamburger icon in the top left to open the side drawer menu. The menu is implemented entirely in CSS using the <code>:target</code> pseudo-class.</p>
    </main>

    <!-- Slide-in Drawer Component -->
    <aside id="main-drawer" class="ease-drawer">
        
        <!-- Background Overlay that closes the drawer when clicked -->
        <a href="#" class="ease-drawer-overlay" aria-label="Close navigation menu" tabindex="-1"></a>
        
        <!-- Actual Navigation Panel -->
        <nav class="ease-drawer-panel" aria-label="Main Navigation">
            <div class="ease-drawer-header">
                <h2>Menu</h2>
                <a href="#" class="close-toggle" aria-label="Close navigation menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </a>
            </div>
            <ul class="ease-drawer-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </aside>

</body>
</html>
