<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Wave Visualization – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🧠 Brain Wave Visualization</h1>
    <p class="subtitle">EEG-style brain wave patterns</p>

    <div class="bw-container">
      <div class="bw-scene">
        <!-- Brain outline (silhouette) -->
        <div class="brain-silhouette">
          <svg viewBox="0 0 400 400" class="brain-svg">
            <!-- Brain shape -->
            <path class="brain-path" d="
              M 200 60
              C 140 60, 80 100, 60 160
              C 40 220, 50 280, 80 320
              C 110 360, 150 380, 200 380
              C 250 380, 290 360, 320 320
              C 350 280, 360 220, 340 160
              C 320 100, 260 60, 200 60
              Z
            " />
            <!-- Left hemisphere detail -->
            <path class="brain-path" d="
              M 200 60
              C 160 60, 120 90, 100 140
              C 80 190, 85 240, 100 280
              C 120 330, 150 360, 200 370
            " />
            <!-- Right hemisphere detail -->
            <path class="brain-path" d="
              M 200 60
              C 240 60, 280 90, 300 140
              C 320 190, 315 240, 300 280
              C 280 330, 250 360, 200 370
            " />
            <!-- Central fissure -->
            <path class="brain-path fissure" d="
              M 200 60
              L 200 370
            " />
          </svg>
        </div>

        <!-- EEG Wave lines -->
        <div class="wave-container">
          <!-- Alpha waves (8-12 Hz) -->
          <div class="wave-line alpha-wave">
            <div class="wave-path"></div>
          </div>

          <!-- Beta waves (13-30 Hz) -->
          <div class="wave-line beta-wave">
            <div class="wave-path"></div>
          </div>

          <!-- Theta waves (4-8 Hz) -->
          <div class="wave-line theta-wave">
            <div class="wave-path"></div>
          </div>

          <!-- Delta waves (0.5-4 Hz) -->
          <div class="wave-line delta-wave">
            <div class="wave-path"></div>
          </div>

          <!-- Gamma waves (30-100 Hz) -->
          <div class="wave-line gamma-wave">
            <div class="wave-path"></div>
          </div>
        </div>

        <!-- Wave labels -->
        <div class="wave-label alpha-label">α Alpha</div>
        <div class="wave-label beta-label">β Beta</div>
        <div class="wave-label theta-label">θ Theta</div>
        <div class="wave-label delta-label">δ Delta</div>
        <div class="wave-label gamma-label">γ Gamma</div>

        <!-- Frequency indicators -->
        <div class="freq-indicator fi-1"></div>
        <div class="freq-indicator fi-2"></div>
        <div class="freq-indicator fi-3"></div>
        <div class="freq-indicator fi-4"></div>
        <div class="freq-indicator fi-5"></div>
        <div class="freq-indicator fi-6"></div>
        <div class="freq-indicator fi-7"></div>
        <div class="freq-indicator fi-8"></div>

        <!-- Activity dots -->
        <div class="activity-dot ad1"></div>
        <div class="activity-dot ad2"></div>
        <div class="activity-dot ad3"></div>
        <div class="activity-dot ad4"></div>
        <div class="activity-dot ad5"></div>
        <div class="activity-dot ad6"></div>
        <div class="activity-dot ad7"></div>
        <div class="activity-dot ad8"></div>
        <div class="activity-dot ad9"></div>
        <div class="activity-dot ad10"></div>
        <div class="activity-dot ad11"></div>
        <div class="activity-dot ad12"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Wave Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Wave Amplitude
        <input type="range" id="amplitudeControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const brainSilhouette = document.querySelector('.brain-silhouette');
      const wavePaths = document.querySelectorAll('.wave-path');
      const waveLines = document.querySelectorAll('.wave-line');
      const waveLabels = document.querySelectorAll('.wave-label');
      const activityDots = document.querySelectorAll('.activity-dot');
      const freqIndicators = document.querySelectorAll('.freq-indicator');

      const speedInput = document.getElementById('speedControl');
      const amplitudeInput = document.getElementById('amplitudeControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let amplitudeMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Wave animations
        waveLines.forEach((line, i) => {
          const baseDuration = 2 + i * 0.3;
          const duration = baseDuration / speedMultiplier;
          line.style.setProperty('--wave-duration', duration + 's');
          line.style.setProperty('--wave-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Activity dots
        activityDots.forEach((dot, i) => {
          const duration = (1.2 + (i % 4) * 0.2) / speedMultiplier;
          dot.style.setProperty('--dot-duration', duration + 's');
          dot.style.setProperty('--dot-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Frequency indicators
        freqIndicators.forEach((ind, i) => {
          const duration = (0.5 + i * 0.08) / speedMultiplier;
          ind.style.setProperty('--freq-duration', duration + 's');
          ind.style.setProperty('--freq-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Brain pulse
        brainSilhouette.style.setProperty('--brain-duration', (3 / speedMultiplier) + 's');
      }

      // ----- Apply amplitude -----
      function applyAmplitude() {
        waveLines.forEach((line, i) => {
          const amplitude = 0.5 + amplitudeMultiplier * 0.5;
          line.style.setProperty('--wave-amplitude', amplitude);
          line.style.setProperty('--wave-opacity', Math.min(0.6 * amplitudeMultiplier, 1));
        });

        activityDots.forEach((dot) => {
          const scale = 0.5 + amplitudeMultiplier * 0.5;
          dot.style.setProperty('--dot-scale', scale);
          dot.style.setProperty('--dot-opacity', Math.min(0.5 * amplitudeMultiplier, 1));
        });

        freqIndicators.forEach((ind) => {
          const height = 10 * amplitudeMultiplier;
          ind.style.setProperty('--freq-height', height + 'px');
          ind.style.setProperty('--freq-opacity', Math.min(0.3 * amplitudeMultiplier, 0.6));
        });
      }

      // ----- Update wave activity -----
      function updateActivity(timestamp) {
        if (isPaused) return;

        // Brain pulse
        const pulse = Math.sin(timestamp / 3000) * 0.02 + 0.98;
        brainSilhouette.style.transform = `translate(-50%, -50%) scale(${pulse})`;

        // Activity dots random glow
        activityDots.forEach((dot, i) => {
          const phase = Math.sin(timestamp / 2000 + i * 0.5) * 0.5 + 0.5;
          const glow = 0.2 + phase * 0.6;
          dot.style.setProperty('--dot-glow', glow);
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateActivity(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetWaves() {
        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update amplitude -----
      function updateAmplitude(value) {
        amplitudeMultiplier = parseFloat(value);
        applyAmplitude();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyAmplitude();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      amplitudeInput.addEventListener('input', function() {
        updateAmplitude(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetWaves);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
