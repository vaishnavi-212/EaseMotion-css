<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Color Shift Calendar</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="calendar-demo">

    <section class="calendar-card ease-fade-in">

        <header class="calendar-header">

            <div>
                <span class="calendar-badge">
                    Banking
                </span>

                <h1 class="ease-slide-up">
                    November 2026
                </h1>

            </div>

        </header>

        <div class="calendar-grid calendar-days">

            <span>Mo</span>
            <span>Tu</span>
            <span>We</span>
            <span>Th</span>
            <span>Fr</span>
            <span>Sa</span>
            <span>Su</span>

        </div>

        <div class="calendar-grid calendar-dates">

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>

            <button>8</button>
            <button>9</button>
            <button>10</button>
            <button>11</button>

            <button class="today">
                12
            </button>

            <button>13</button>
            <button>14</button>

            <button>15</button>

            <button class="selected">
                16
            </button>

            <button>17</button>
            <button>18</button>
            <button>19</button>
            <button>20</button>
            <button>21</button>

            <button>22</button>
            <button>23</button>
            <button>24</button>
            <button>25</button>
            <button>26</button>
            <button>27</button>
            <button>28</button>

            <button>29</button>
            <button>30</button>

        </div>

        <footer class="calendar-footer">

            <div class="legend">

                <span class="dot today-dot"></span>

                Today

            </div>

            <div class="legend">

                <span class="dot selected-dot"></span>

                Scheduled Payment

            </div>

        </footer>

    </section>

</main>

</body>
</html>
