<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Result Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card-container">
    <article class="ease-result-card">
        <header class="card-header">
            <span class="badge">New Result</span>
            <h3>Data Analytics</h3>
        </header>
        <div class="card-body">
            <p>High-precision processing completed for your recent query parameters.</p>
        </div>
        <footer class="card-footer">
            <button class="btn-action">View Report</button>
        </footer>
    </article>
</div>

</body>
</html>
