<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Floating Orbit Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="product-layout">
    <div class="product-card">
      <div class="product-image-area">
        <!-- Mock Product Image -->
        <div class="product-mock-img">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h4l2-9 5 18 2-9h5"/>
          </svg>
        </div>
        
        <!-- Hotspot Tooltip Container -->
        <div class="tooltip-container hotspot">
          <button class="info-btn" aria-label="More information about material" aria-describedby="tooltip-orbit">
            <span class="sr-only">Info</span>
          </button>
          
          <!-- Tooltip Wrapper handles entrance animation -->
          <div id="tooltip-orbit" class="tooltip-wrapper" role="tooltip">
            <!-- Inner Tooltip handles continuous floating orbit -->
            <div class="tooltip">
              <div class="tooltip-header">
                <h3>Aerospace Grade</h3>
                <span class="badge">Premium</span>
              </div>
              <p>Crafted from ultra-lightweight titanium alloy for maximum durability and comfort during extensive wear.</p>
            </div>
          </div>
        </div>
      </div>
      
      <div class="product-details">
        <div class="product-category">Running Shoes</div>
        <h2 class="product-title">AeroGlide Pro X</h2>
        <div class="product-price">$189.00</div>
        
        <button class="add-to-cart">Add to Cart</button>
      </div>
    </div>
  </div>
</body>
</html>
