<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Pull Marketing Popover</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

    <div class="popover-wrapper">

        <button class="trigger">
            Get Offer
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="badge">
                    🚀
                </div>

                <div>
                    <h2>Limited Time Offer</h2>
                    <p>Marketing Landing Page</p>
                </div>

            </div>

            <div class="offers">

                <div class="offer">
                    <strong>50%</strong>
                    <span>Discount</span>
                </div>

                <div class="offer">
                    <strong>Free</strong>
                    <span>Shipping</span>
                </div>

                <div class="offer">
                    <strong>24/7</strong>
                    <span>Support</span>
                </div>

            </div>

            <button class="cta">
                Claim Now
            </button>

        </div>

    </div>

</section>

</body>
</html>
