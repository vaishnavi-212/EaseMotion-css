<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Skeleton Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized skeleton demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Skeleton</h1>
        <p>Demonstrates skeleton/loading placeholder components with print media query optimization.</p>
        
        <div class="ease-skeleton-wrapper">
          <div class="ease-skeleton ease-skeleton-avatar"></div>
          <div class="ease-skeleton-content">
            <div class="ease-skeleton ease-skeleton-text ease-skeleton-title"></div>
            <div class="ease-skeleton ease-skeleton-text"></div>
            <div class="ease-skeleton ease-skeleton-text ease-skeleton-short"></div>
          </div>
        </div>
        
        <div class="ease-skeleton-wrapper">
          <div class="ease-skeleton ease-skeleton-card"></div>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see skeleton screens hidden in print mode.</p>
      </section>
    </main>
  </body>
</html>
