<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Catcher – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🪶 Dream Catcher</h1>
    <p class="subtitle">Dream catcher with flowing webs and feathers</p>

    <div class="dc-container">
      <div class="dc-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Dream Catcher -->
        <div class="dream-catcher">
          <!-- Outer hoop -->
          <div class="hoop"></div>

          <!-- Inner hoop (leather wrap) -->
          <div class="inner-hoop"></div>

          <!-- Web strands (radial) -->
          <div class="web-strand w1"></div>
          <div class="web-strand w2"></div>
          <div class="web-strand w3"></div>
          <div class="web-strand w4"></div>
          <div class="web-strand w5"></div>
          <div class="web-strand w6"></div>
          <div class="web-strand w7"></div>
          <div class="web-strand w8"></div>
          <div class="web-strand w9"></div>
          <div class="web-strand w10"></div>
          <div class="web-strand w11"></div>
          <div class="web-strand w12"></div>

          <!-- Web rings (concentric) -->
          <div class="web-ring r1"></div>
          <div class="web-ring r2"></div>
          <div class="web-ring r3"></div>
          <div class="web-ring r4"></div>
          <div class="web-ring r5"></div>
          <div class="web-ring r6"></div>

          <!-- Web center -->
          <div class="web-center"></div>

          <!-- Beads -->
          <div class="bead b1"></div>
          <div class="bead b2"></div>
          <div class="bead b3"></div>
          <div class="bead b4"></div>
          <div class="bead b5"></div>
          <div class="bead b6"></div>
          <div class="bead b7"></div>
          <div class="bead b8"></div>

          <!-- Feathers -->
          <div class="feather feather-1">
            <div class="feather-shaft"></div>
            <div class="feather-barbs"></div>
            <div class="feather-glow"></div>
          </div>
          <div class="feather feather-2">
            <div class="feather-shaft"></div>
            <div class="feather-barbs"></div>
            <div class="feather-glow"></div>
          </div>
          <div class="feather feather-3">
            <div class="feather-shaft"></div>
            <div class="feather-barbs"></div>
            <div class="feather-glow"></div>
          </div>
          <div class="feather feather-4">
            <div class="feather-shaft"></div>
            <div class="feather-barbs"></div>
            <div class="feather-glow"></div>
          </div>

          <!-- Hanging loop -->
          <div class="hanging-loop"></div>

          <!-- Dream catcher glow -->
          <div class="dc-glow"></div>

          <!-- Floating particles -->
          <div class="d-particle dp1"></div>
          <div class="d-particle dp2"></div>
          <div class="d-particle dp3"></div>
          <div class="d-particle dp4"></div>
          <div class="d-particle dp5"></div>
          <div class="d-particle dp6"></div>
          <div class="d-particle dp7"></div>
          <div class="d-particle dp8"></div>
          <div class="d-particle dp9"></div>
          <div class="d-particle dp10"></div>
          <div class="d-particle dp11"></div>
          <div class="d-particle dp12"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Sway Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const dreamCatcher = document.querySelector('.dream-catcher');
      const feathers = document.querySelectorAll('.feather');
      const webRings = document.querySelectorAll('.web-ring');
      const webStrands = document.querySelectorAll('.web-strand');
      const beads = document.querySelectorAll('.bead');
      const dcGlow = document.querySelector('.dc-glow');
      const particles = document.querySelectorAll('.d-particle');
      const hoop = document.querySelector('.hoop');
      const innerHoop = document.querySelector('.inner-hoop');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Dream catcher sway
        dreamCatcher.style.setProperty('--sway-duration', (4 / speedMultiplier) + 's');

        // Feathers sway
        feathers.forEach((feather, i) => {
          const duration = (3 + i * 0.5) / speedMultiplier;
          feather.style.setProperty('--feather-duration', duration + 's');
          feather.style.setProperty('--feather-delay', ((i * 0.3) / speedMultiplier) + 's');
        });

        // Web rings
        webRings.forEach((ring, i) => {
          const duration = (2 + i * 0.3) / speedMultiplier;
          ring.style.setProperty('--web-duration', duration + 's');
          ring.style.setProperty('--web-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Web strands
        webStrands.forEach((strand, i) => {
          const duration = (1.5 + (i % 3) * 0.2) / speedMultiplier;
          strand.style.setProperty('--strand-duration', duration + 's');
          strand.style.setProperty('--strand-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Beads
        beads.forEach((bead, i) => {
          const duration = (2 + i * 0.2) / speedMultiplier;
          bead.style.setProperty('--bead-duration', duration + 's');
          bead.style.setProperty('--bead-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Glow
        dcGlow.style.setProperty('--glow-duration', (3 / speedMultiplier) + 's');

        // Particles
        particles.forEach((p, i) => {
          const duration = (6 + (i % 4) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Hoop pulse
        hoop.style.setProperty('--hoop-duration', (2 / speedMultiplier) + 's');
        innerHoop.style.setProperty('--inner-hoop-duration', (2.3 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Glow
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        dcGlow.style.setProperty('--glow-opacity', glowOpacity);
        const glowSize = 300 * intensityMultiplier;
        dcGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Feather glow
        feathers.forEach((feather) => {
          const glow = feather.querySelector('.feather-glow');
          if (glow) {
            const opacity = Math.min(0.2 * intensityMultiplier, 0.5);
            glow.style.opacity = opacity;
            const size = 40 * intensityMultiplier;
            glow.style.setProperty('--feather-glow-size', size + 'px');
          }
        });

        // Beads
        beads.forEach((bead) => {
          const size = 4 * intensityMultiplier;
          bead.style.setProperty('--bead-size', size + 'px');
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          bead.style.setProperty('--bead-opacity', opacity);
        });

        // Web strands
        webStrands.forEach((strand) => {
          const opacity = Math.min(0.2 * intensityMultiplier, 0.4);
          strand.style.setProperty('--strand-opacity', opacity);
        });

        // Web rings
        webRings.forEach((ring) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          ring.style.setProperty('--ring-opacity', opacity);
        });

        // Particles
        particles.forEach((p) => {
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
          const opacity = Math.min(0.2 * intensityMultiplier, 0.4);
          p.style.setProperty('--particle-opacity', opacity);
        });
      }

      // ----- Update glow pulse -----
      function updateGlow(timestamp) {
        if (isPaused) return;

        // Subtle glow pulse
        const pulse = Math.sin(timestamp / 2000) * 0.04 + 0.96;
        const baseOpacity = parseFloat(dcGlow.style.opacity) || 0.15;
        const targetOpacity = Math.min(0.12 * intensityMultiplier * pulse * 1.1, 0.3);
        dcGlow.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGlow(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetDreamCatcher() {
        const elements = [
          dreamCatcher,
          ...feathers,
          ...webRings,
          ...webStrands,
          ...beads,
          dcGlow,
          ...particles,
          hoop,
          innerHoop
        ];

        elements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        dreamCatcher.classList.add('animate');
        feathers.forEach(f => f.classList.add('animate'));
        webRings.forEach(r => r.classList.add('animate'));
        webStrands.forEach(s => s.classList.add('animate'));
        beads.forEach(b => b.classList.add('animate'));
        dcGlow.classList.add('animate');
        particles.forEach(p => p.classList.add('animate'));
        hoop.classList.add('animate');
        innerHoop.classList.add('animate');

        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetDreamCatcher);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
