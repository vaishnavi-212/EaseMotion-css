<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Animation - EaseMotion CSS Example</title>
  <meta name="description" content="A demonstration of the Pulse animation applied to various UI components including buttons, cards, icons, notifications, and badges.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Pulse Animation</h1>
      <p class="subtitle">A smooth, scalable pulse effect for UI components</p>
    </header>

    <section class="showcase">

      <!-- Pulse Button -->
      <div class="component-card">
        <h2>Button</h2>
        <button class="pulse-btn">Pulse Button</button>
      </div>

      <!-- Pulse Card -->
      <div class="component-card">
        <h2>Card</h2>
        <div class="pulse-card">
          <div class="card-content">
            <h3>Card Title</h3>
            <p>This card pulses to draw attention.</p>
          </div>
        </div>
      </div>

      <!-- Pulse Icon -->
      <div class="component-card">
        <h2>Icon</h2>
        <div class="pulse-icon-wrapper">
          <div class="pulse-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <div class="pulse-ring"></div>
        </div>
      </div>

      <!-- Pulse Notification -->
      <div class="component-card">
        <h2>Notification</h2>
        <div class="pulse-notification">
          <span class="notif-dot"></span>
          <span class="notif-text">New message</span>
        </div>
      </div>

      <!-- Pulse Badge -->
      <div class="component-card">
        <h2>Badge</h2>
        <div class="pulse-badge-wrapper">
          <span class="pulse-badge">3</span>
          <span class="badge-label">Alerts</span>
        </div>
      </div>

    </section>

    <button class="restart-btn" onclick="restartAll()">Restart All Animations</button>
  </main>

  <script>
    function restartAll() {
      const pulsed = document.querySelectorAll('.pulse-btn, .pulse-card, .pulse-icon, .pulse-ring, .pulse-notification, .pulse-badge');
      pulsed.forEach(el => {
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });
    }
  </script>

</body>
</html>
