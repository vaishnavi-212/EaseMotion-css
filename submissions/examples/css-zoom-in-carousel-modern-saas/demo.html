<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Zoom-In Carousel - Modern SaaS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Modern SaaS Carousel</h1>

  <div class="carousel">

    <div class="card active" tabindex="0">
      <h2>Dashboard</h2>
      <p>Overview & Insights</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Analytics</h2>
      <p>Real-time Reports</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Team</h2>
      <p>Collaboration Tools</p>
    </div>

  </div>

</div>

</body>
</html>
