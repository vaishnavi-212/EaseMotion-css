<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Tooltip Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="tooltip-demo" aria-label="Tooltip Examples">
      <h1 class="demo-title">CSS Tooltip Component</h1>
      
      <div class="demo-grid">
        <div class="demo-item">
          <button class="demo-btn" data-tooltip="This is a top tooltip">Hover Top</button>
        </div>
        <div class="demo-item">
          <button class="demo-btn bottom" data-tooltip="This is a bottom tooltip">Hover Bottom</button>
        </div>
        <div class="demo-item">
          <button class="demo-btn left" data-tooltip="This is a left tooltip">Hover Left</button>
        </div>
        <div class="demo-item">
          <button class="demo-btn right" data-tooltip="This is a right tooltip">Hover Right</button>
        </div>
      </div>

      <div class="info-section">
        <h2>Features</h2>
        <ul>
          <li>Pure CSS - No JavaScript required</li>
          <li>Four positioning options</li>
          <li>Smooth fade animations</li>
          <li>Accessible with aria-labels</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
