<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizontal Roll Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<h2>Product Catalog</h2>

<p>Hover over the product to view details.</p>

<div class="tooltip-wrapper">

<button class="product-btn">
Wireless Headphones
</button>

<div class="tooltip">

<h3>Featured Product</h3>

<ul>
<li>🎧 Noise Cancellation</li>
<li>🔋 40 Hours Battery</li>
<li>📶 Bluetooth 5.3</li>
<li>⭐ 4.9 Rating</li>
</ul>

</div>

</div>

</div>

</div>

</body>
</html>
