<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimmer Sweep Tooltip - Product Catalog</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Product catalog tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Shimmer Sweep Tooltip</h1>
        <p>Product Catalog Layout variant with elegant product card tooltips.</p>
        
        <div class="product-grid">
          <div class="product-card">
            <div class="product-image">
              <span class="placeholder-icon"></span>
            </div>
            <div class="product-info">
              <h4>Wireless Headphones</h4>
              <p class="product-price">$199.00</p>
              <div class="product-actions">
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to wishlist">
                  <span class="heart-icon"></span>
                </button>
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Quick view">
                  <span class="eye-icon"></span>
                </button>
                <button class="ease-add-cart-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to cart">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
          
          <div class="product-card">
            <div class="product-badge">New</div>
            <div class="product-image">
              <span class="placeholder-icon"></span>
            </div>
            <div class="product-info">
              <h4>Smart Watch Pro</h4>
              <p class="product-price">$349.00</p>
              <div class="product-actions">
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to wishlist">
                  <span class="heart-icon"></span>
                </button>
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Quick view">
                  <span class="eye-icon"></span>
                </button>
                <button class="ease-add-cart-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to cart">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
          
          <div class="product-card">
            <div class="product-image">
              <span class="placeholder-icon"></span>
            </div>
            <div class="product-info">
              <h4>Bluetooth Speaker</h4>
              <p class="product-price">$89.00</p>
              <div class="product-actions">
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to wishlist">
                  <span class="heart-icon"></span>
                </button>
                <button class="ease-action-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Quick view">
                  <span class="eye-icon"></span>
                </button>
                <button class="ease-add-cart-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Add to cart">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <div class="filter-bar">
          <button class="ease-filter-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Filter by price">
            <span class="filter-icon"></span>
            Price
          </button>
          <button class="ease-filter-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="Sort products">
            <span class="sort-icon"></span>
            Sort
          </button>
          <button class="ease-filter-btn-sb ease-shimmer-tooltip-cat-sb" data-tooltip="View comparison">
            <span class="compare-icon"></span>
            Compare
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
