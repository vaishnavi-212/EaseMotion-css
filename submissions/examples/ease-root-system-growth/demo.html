<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Root System Growth – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌱 Root System Growth</h1>
    <p class="subtitle">Roots spreading underground</p>

    <div class="root-container">
      <div class="root-scene">
        <!-- Surface/ground line -->
        <div class="surface"></div>

        <!-- Soil layers -->
        <div class="soil-layer soil-1"></div>
        <div class="soil-layer soil-2"></div>
        <div class="soil-layer soil-3"></div>

        <!-- Plant above ground -->
        <div class="plant">
          <div class="plant-stem"></div>
          <div class="plant-leaf l1"></div>
          <div class="plant-leaf l2"></div>
          <div class="plant-leaf l3"></div>
        </div>

        <!-- Root system -->
        <svg class="root-svg" viewBox="0 0 400 350" preserveAspectRatio="xMidYMid meet">
          <!-- Main taproot -->
          <path class="root-path taproot" d="M200,30 L200,120 L195,180 L190,250 L185,310" />

          <!-- Secondary roots (left side) -->
          <path class="root-path secondary s1" d="M198,80 L160,120 L130,160 L100,200" />
          <path class="root-path secondary s2" d="M196,120 L150,150 L120,190 L90,230" />
          <path class="root-path secondary s3" d="M194,170 L140,190 L100,220 L60,260" />
          <path class="root-path secondary s4" d="M192,220 L150,240 L120,270 L95,300" />

          <!-- Secondary roots (right side) -->
          <path class="root-path secondary s5" d="M202,80 L240,120 L270,160 L300,200" />
          <path class="root-path secondary s6" d="M204,120 L250,150 L280,190 L310,230" />
          <path class="root-path secondary s7" d="M206,170 L260,190 L300,220 L340,260" />
          <path class="root-path secondary s8" d="M208,220 L250,240 L280,270 L305,300" />

          <!-- Tertiary roots (fine roots) -->
          <path class="root-path tertiary t1" d="M160,120 L140,140 L125,155" />
          <path class="root-path tertiary t2" d="M150,150 L135,170 L115,185" />
          <path class="root-path tertiary t3" d="M240,120 L260,140 L275,155" />
          <path class="root-path tertiary t4" d="M250,150 L265,170 L285,185" />
          <path class="root-path tertiary t5" d="M140,190 L125,210 L110,225" />
          <path class="root-path tertiary t6" d="M260,190 L275,210 L290,225" />
          <path class="root-path tertiary t7" d="M190,250 L175,270 L160,285" />
          <path class="root-path tertiary t8" d="M210,250 L225,270 L240,285" />

          <!-- Root hairs (very fine) -->
          <path class="root-path hair h1" d="M130,160 L120,170 L112,178" />
          <path class="root-path hair h2" d="M270,160 L280,170 L288,178" />
          <path class="root-path hair h3" d="M100,200 L88,210 L78,218" />
          <path class="root-path hair h4" d="M300,200 L312,210 L322,218" />
          <path class="root-path hair h5" d="M120,190 L108,200 L98,208" />
          <path class="root-path hair h6" d="M280,190 L292,200 L302,208" />

          <!-- Root tips (growing points) -->
          <circle class="root-tip tip1" cx="185" cy="310" r="3" />
          <circle class="root-tip tip2" cx="100" cy="200" r="2.5" />
          <circle class="root-tip tip3" cx="300" cy="200" r="2.5" />
          <circle class="root-tip tip4" cx="60" cy="260" r="2.5" />
          <circle class="root-tip tip5" cx="340" cy="260" r="2.5" />
          <circle class="root-tip tip6" cx="95" cy="300" r="2" />
          <circle class="root-tip tip7" cx="305" cy="300" r="2" />
          <circle class="root-tip tip8" cx="125" cy="155" r="2" />
          <circle class="root-tip tip9" cx="275" cy="155" r="2" />
          <circle class="root-tip tip10" cx="110" cy="225" r="2" />
          <circle class="root-tip tip11" cx="290" cy="225" r="2" />
          <circle class="root-tip tip12" cx="160" cy="285" r="2" />
          <circle class="root-tip tip13" cx="240" cy="285" r="2" />
          <circle class="root-tip tip14" cx="78" cy="218" r="1.5" />
          <circle class="root-tip tip15" cx="322" cy="218" r="1.5" />

          <!-- Nutrient particles -->
          <circle class="nutrient n1" cx="130" cy="180" r="2" />
          <circle class="nutrient n2" cx="270" cy="180" r="2" />
          <circle class="nutrient n3" cx="80" cy="240" r="2.5" />
          <circle class="nutrient n4" cx="320" cy="240" r="2.5" />
          <circle class="nutrient n5" cx="170" cy="270" r="2" />
          <circle class="nutrient n6" cx="230" cy="270" r="2" />
          <circle class="nutrient n7" cx="110" cy="280" r="1.5" />
          <circle class="nutrient n8" cx="290" cy="280" r="1.5" />
        </svg>

        <!-- Root glow -->
        <div class="root-glow"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Growth Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Root Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset Growth</button>
    </div>
  </div>

  <script>
    (function() {
      const rootPaths = document.querySelectorAll('.root-path');
      const rootTips = document.querySelectorAll('.root-tip');
      const nutrients = document.querySelectorAll('.nutrient');
      const rootGlow = document.querySelector('.root-glow');

      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        const baseDuration = 3 / speedMultiplier;

        // Update all root path animations
        rootPaths.forEach((path, i) => {
          const delay = (i * 0.15) % 1.5;
          const duration = baseDuration + (i % 3) * 0.2;
          path.style.setProperty('--root-duration', duration + 's');
          path.style.setProperty('--root-delay', (delay / speedMultiplier) + 's');
        });

        // Update root tips
        rootTips.forEach((tip, i) => {
          const delay = (i * 0.12) % 1.8;
          const duration = 0.5 / speedMultiplier;
          tip.style.setProperty('--tip-duration', duration + 's');
          tip.style.setProperty('--tip-delay', (delay / speedMultiplier) + 's');
        });

        // Update nutrients
        nutrients.forEach((n, i) => {
          const duration = (4 + i * 0.5) / speedMultiplier;
          n.style.setProperty('--nutrient-duration', duration + 's');
        });

        // Root glow
        rootGlow.style.setProperty('--glow-duration', (2.5 / speedMultiplier) + 's');
      }

      // ----- Apply density -----
      function applyDensity() {
        // Scale root thickness
        rootPaths.forEach((path) => {
          const baseWidth = 1.5;
          const width = baseWidth * densityMultiplier;
          path.style.setProperty('--root-width', width + 'px');

          // Adjust opacity for density effect
          const opacity = Math.min(0.6 * densityMultiplier, 1);
          path.style.setProperty('--root-opacity', opacity);
        });

        // Scale root tips
        rootTips.forEach((tip) => {
          const baseRadius = parseFloat(tip.getAttribute('r')) || 2.5;
          const radius = baseRadius * densityMultiplier * 0.8;
          tip.setAttribute('r', Math.min(radius, 4));
        });

        // Nutrient density
        nutrients.forEach((n) => {
          const baseOpacity = 0.4;
          const opacity = Math.min(baseOpacity * densityMultiplier, 0.9);
          n.style.setProperty('--nutrient-opacity', opacity);
          const baseSize = parseFloat(n.getAttribute('r')) || 2;
          const size = baseSize * densityMultiplier * 0.7;
          n.setAttribute('r', Math.min(size, 4));
        });
      }

      // ----- Update growth progress -----
      function updateGrowth(deltaTime) {
        if (isPaused) return;

        const speed = 0.015 * speedMultiplier;
        progress += deltaTime * speed * 0.5;

        if (progress > 1) {
          progress = 1;
        }

        // Update dashoffset for each root path
        rootPaths.forEach((path) => {
          const length = path.getTotalLength ? path.getTotalLength() : 300;
          const offset = length * (1 - progress);
          path.style.strokeDashoffset = offset;
        });

        // Root glow intensity follows growth
        const glowIntensity = 0.2 + progress * 0.5;
        rootGlow.style.opacity = glowIntensity;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGrowth(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetGrowth() {
        progress = 0;
        rootPaths.forEach((path) => {
          path.style.strokeDashoffset = '100%';
        });
        rootGlow.style.opacity = '0.2';

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Set initial dashoffset to 100% (hidden)
        rootPaths.forEach((path) => {
          path.style.strokeDashoffset = '100%';
        });

        applySpeed();
        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-start growth after a short delay
        setTimeout(() => {
          progress = 0.01;
        }, 500);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetGrowth);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
