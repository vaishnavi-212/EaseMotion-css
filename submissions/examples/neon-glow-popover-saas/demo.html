<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Neon Glow Popover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="saas-container">
    <!-- Component Stage Block -->
    <div class="popover-anchor-zone em-fade-in">
      
      <!-- Invisible State Controller Machine -->
      <input type="checkbox" id="popover-toggle" class="popover-state-checkbox">
      
      <!-- Interactive Action Button Trigger -->
      <label for="popover-toggle" class="trigger-btn" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" id="trigger-label">
        <svg class="icon-spark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M6.34 17.66l2.83-2.83M14.83 9.17l2.83-2.83"/>
        </svg>
        <span>Deploy Analytics Engine</span>
      </label>

      <!-- Animated Neon Glow Popover Window Node -->
      <div class="neon-popover-card" role="tooltip" aria-describedby="trigger-label">
        <div class="popover-inner">
          
          <div class="popover-header">
            <div class="status-indicator-neon"></div>
            <h3>Engine Live Optimization</h3>
          </div>
          
          <p class="popover-body">
            Quantum compilers successfully initialized across cloud regions. Memory leaks decreased by <b>34.2%</b> natively.
          </p>
          
          <div class="popover-footer">
            <a href="#" class="popover-cta">View Live Node Graph</a>
          </div>

        </div>
        <!-- Ornamental Arrow Element -->
        <div class="popover-arrow"></div>
      </div>

    </div>
  </div>

  <script>
    // Essential Accessibility Helper: Allows Keyboard users to engage via Space / Enter keys natively
    document.getElementById('trigger-label').addEventListener('keydown', function(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('popover-toggle').click();
        const expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !expanded);
      }
    });
  </script>
</body>
</html>
