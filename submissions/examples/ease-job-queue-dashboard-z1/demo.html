<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Queue Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="queue-card">
<h2>Job Queue</h2>

<div class="queue">
<div class="top">
<span>Email Queue</span>
<strong>82%</strong>
</div>
<div class="bar">
<div class="fill email"></div>
</div>
</div>

<div class="queue">
<div class="top">
<span>Payment Queue</span>
<strong>61%</strong>
</div>
<div class="bar">
<div class="fill payment"></div>
</div>
</div>

<div class="queue">
<div class="top">
<span>Notification Queue</span>
<strong>95%</strong>
</div>
<div class="bar">
<div class="fill notify"></div>
</div>
</div>

</section>

</body>
</html>
