<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Slide-Right Tabs - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="ecommerce-wrapper">
    <div class="checkout-container">
      <header class="checkout-title">
        <h1>Secure Checkout</h1>
      </header>
      
      <!-- Accessible visually hidden radio buttons to manage tab state -->
      <input type="radio" id="step1" name="checkout" class="tab-input" checked>
      <input type="radio" id="step2" name="checkout" class="tab-input">
      <input type="radio" id="step3" name="checkout" class="tab-input">

      <!-- Tabs / Steps Navigation -->
      <nav class="checkout-header" aria-label="Checkout Progress">
        <div class="progress-track" aria-hidden="true">
          <!-- The Slide-Right progress indicator -->
          <div class="progress-fill"></div>
        </div>
        <div class="step-labels">
          <label for="step1" class="step-label" id="label-step1">
            <span class="step-icon">1</span>
            <span class="step-text">Shipping</span>
          </label>
          <label for="step2" class="step-label" id="label-step2">
            <span class="step-icon">2</span>
            <span class="step-text">Payment</span>
          </label>
          <label for="step3" class="step-label" id="label-step3">
            <span class="step-icon">3</span>
            <span class="step-text">Review</span>
          </label>
        </div>
      </nav>

      <!-- Tab Content Panels -->
      <div class="checkout-panels">
        
        <!-- Panel 1: Shipping -->
        <article class="panel" id="panel1">
          <h2>Shipping Address</h2>
          <div class="form-grid">
            <div class="form-group full-width">
              <label>Full Name</label>
              <input type="text" placeholder="Jane Doe" readonly>
            </div>
            <div class="form-group full-width">
              <label>Street Address</label>
              <input type="text" placeholder="123 Commerce St" readonly>
            </div>
            <div class="form-group half-width">
              <label>City</label>
              <input type="text" placeholder="New York" readonly>
            </div>
            <div class="form-group half-width">
              <label>Zip Code</label>
              <input type="text" placeholder="10001" readonly>
            </div>
          </div>
          <footer class="panel-footer" style="justify-content: flex-end;">
             <!-- Uses 'for' attribute to switch radio button without JS -->
             <label for="step2" class="btn-primary" role="button" tabindex="0">Continue to Payment</label>
          </footer>
        </article>

        <!-- Panel 2: Payment -->
        <article class="panel" id="panel2">
          <h2>Payment Method</h2>
          <div class="form-grid">
            <div class="form-group full-width">
              <label>Card Number</label>
              <input type="text" placeholder="•••• •••• •••• 4242" readonly>
            </div>
            <div class="form-group half-width">
              <label>Expiry Date</label>
              <input type="text" placeholder="MM/YY" readonly>
            </div>
            <div class="form-group half-width">
              <label>CVC</label>
              <input type="password" placeholder="•••" readonly>
            </div>
          </div>
          <footer class="panel-footer actions-between">
             <label for="step1" class="btn-secondary" role="button" tabindex="0">Back</label>
             <label for="step3" class="btn-primary" role="button" tabindex="0">Review Order</label>
          </footer>
        </article>

        <!-- Panel 3: Review -->
        <article class="panel" id="panel3">
          <h2>Order Summary</h2>
          <div class="order-summary">
            <div class="summary-item">
              <span>Premium Sneakers (Size 10)</span>
              <span>$120.00</span>
            </div>
            <div class="summary-item">
              <span>Express Shipping</span>
              <span>$15.00</span>
            </div>
            <div class="summary-total">
              <span>Total</span>
              <span>$135.00</span>
            </div>
          </div>
          <footer class="panel-footer actions-between">
             <label for="step2" class="btn-secondary" role="button" tabindex="0">Back</label>
             <button type="button" class="btn-primary complete-btn">Place Order</button>
          </footer>
        </article>
        
      </div>
    </div>
  </main>
</body>
</html>
