<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Horizontal Roll Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">
        <section class="glass-card">

            <p class="eyebrow">GLASSMOTION / 01</p>

            <h1>Glassmorphism UI</h1>

            <p class="description">
                Hover or focus the button to reveal additional interface details.
            </p>

            <div class="tooltip-wrapper">

                <button class="glass-button">
                    View Details
                </button>

                <div class="tooltip" role="tooltip">

                    <p class="tooltip-label">QUICK INSIGHT</p>

                    <h2>Interface Details</h2>

                    <ul>
                        <li>
                            <span>Design</span>
                            <strong>Glass UI</strong>
                        </li>

                        <li>
                            <span>Animation</span>
                            <strong>Horizontal Roll</strong>
                        </li>

                        <li>
                            <span>Technology</span>
                            <strong>CSS Only</strong>
                        </li>
                    </ul>

                </div>

            </div>

        </section>
    </main>

</body>
</html>
