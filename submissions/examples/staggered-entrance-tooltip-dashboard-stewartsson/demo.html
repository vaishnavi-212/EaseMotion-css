<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard - Staggered Entrance Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-viewport">
        <!-- Main Premium Dashboard Card Elevation Container Hub Shell -->
        <div class="dashboard-container-card">
            <header class="dashboard-header">
                <div class="neon-matrix-badge">STAGGER_SYS // v7</div>
                <h2 class="dashboard-title">System Ingress Terminal</h2>
                <p class="dashboard-subtitle">Hover over or interact with the sleek action link below to witness the pure-CSS cascading sequential row visibility delay filters.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">📊</span>
                        <span class="btn-text">Inspect Network Clusters</span>
                    </button>

                    <!-- Floating Tooltip Translucent Staggered Overlay Menu Shell Box -->
                    <div class="staggered-entrance-tooltip ease-stagger-fly">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-heading">Network Metrics</span>
                            <div class="staggered-data-rows">
                                <span class="data-row row-stagger-1">Pod Ingress // 1.2 GB/s</span>
                                <span class="data-row row-stagger-2">Ledger Sync // Aligned</span>
                                <span class="data-row row-stagger-3 data-status-pass">Status // Operational</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="dashboard-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Custom CSS Parameters Verified Pass</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
