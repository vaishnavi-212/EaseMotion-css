<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Pulse Animation for a Sale Badge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="content">
        <h1>Pulse Animation for a Sale Badge</h1>
        <p>A smooth, continuous scaling animation to attract attention.</p>

        <div class="product-grid">
            <!-- Product Card -->
            <article class="product-card">
                <!-- Image Placeholder -->
                <div class="product-image">
                    <!-- The Sale Badge -->
                    <span class="sale-badge ease-pulse-badge">SALE</span>
                    <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon">
                        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                </div>
                
                <div class="product-details">
                    <h2>Premium Wireless Headphones</h2>
                    <p class="description">Active noise cancellation, 40-hour battery life, and superior comfort.</p>
                    <div class="price-container">
                        <span class="original-price">$299.99</span>
                        <span class="sale-price">$179.99</span>
                    </div>
                    <button class="buy-button">Add to Cart</button>
                </div>
            </article>
        </div>
    </main>

</body>
</html>
