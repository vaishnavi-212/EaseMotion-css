<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Breadcrumb Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized breadcrumb demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Breadcrumb</h1>
        <p>Demonstrates breadcrumb component with print media query optimization.</p>
        
        <nav class="ease-breadcrumb" aria-label="Breadcrumb">
          <a href="#" class="ease-breadcrumb-item">Home</a>
          <span class="ease-breadcrumb-separator">/</span>
          <a href="#" class="ease-breadcrumb-item">Products</a>
          <span class="ease-breadcrumb-separator">/</span>
          <a href="#" class="ease-breadcrumb-item">Electronics</a>
          <span class="ease-breadcrumb-separator">/</span>
          <span class="ease-breadcrumb-current">Smartphones</span>
        </nav>
        
        <div class="ease-breadcrumb ease-breadcrumb-arrow">
          <a href="#" class="ease-breadcrumb-item">Home</a>
          <span class="ease-breadcrumb-separator">&rsaquo;</span>
          <a href="#" class="ease-breadcrumb-item">Blog</a>
          <span class="ease-breadcrumb-separator">&rsaquo;</span>
          <span class="ease-breadcrumb-current">Current Article</span>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see simplified breadcrumb in print mode.</p>
      </section>
    </main>
  </body>
</html>
