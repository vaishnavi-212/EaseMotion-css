<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Weather Status Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-card">

    <div class="weather-icon">☀️</div>

    <h2>28°C</h2>

    <p class="condition">Sunny</p>

    <div class="details">
        <div>
            <h3>68%</h3>
            <span>Humidity</span>
        </div>

        <div>
            <h3>12 km/h</h3>
            <span>Wind</span>
        </div>
    </div>

</div>

</body>
</html>
