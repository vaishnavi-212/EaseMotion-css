<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Navbar Example</title>
  <link rel="stylesheet" href="../../../dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar Entrance Animation: Slide down from top -->
  <nav class="navbar ease-slide-in-from-top duration-500ms" aria-label="Main Navigation">
    <div class="navbar-container">
      
      <!-- Logo Animation: Fade in with delay -->
      <a href="#" class="navbar-logo ease-fade-in duration-500ms delay-200ms" aria-label="Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 22 22 22"></polygon>
        </svg>
        <span>Brand</span>
      </a>

      <!-- Desktop Navigation Links -->
      <ul class="navbar-menu" role="menubar">
        <!-- Links animate in sequentially using delays -->
        <li class="ease-fade-in duration-300ms delay-300ms" role="none">
          <a href="#" class="nav-link" role="menuitem">Home</a>
        </li>
        <li class="ease-fade-in duration-300ms delay-400ms" role="none">
          <a href="#" class="nav-link" role="menuitem">Features</a>
        </li>
        <li class="ease-fade-in duration-300ms delay-500ms" role="none">
          <a href="#" class="nav-link" role="menuitem">Pricing</a>
        </li>
        <li class="ease-fade-in duration-300ms delay-600ms" role="none">
          <a href="#" class="nav-link" role="menuitem">About</a>
        </li>
      </ul>

      <!-- CTA Button: Fade in and Pulse on hover -->
      <div class="navbar-cta ease-fade-in duration-300ms delay-700ms">
        <button class="btn hover-ease-pulse" aria-label="Sign Up">Sign Up</button>
      </div>

      <!-- Mobile Hamburger Menu Button -->
      <button class="navbar-toggle ease-fade-in duration-300ms delay-400ms" id="mobile-menu-btn" aria-expanded="false" aria-label="Toggle navigation menu">
        <span class="hamburger-box">
          <span class="hamburger-inner"></span>
        </span>
      </button>

    </div>

    <!-- Mobile Navigation Menu -->
    <div class="mobile-menu" id="mobile-menu">
      <ul role="menu">
        <li role="none"><a href="#" role="menuitem">Home</a></li>
        <li role="none"><a href="#" role="menuitem">Features</a></li>
        <li role="none"><a href="#" role="menuitem">Pricing</a></li>
        <li role="none"><a href="#" role="menuitem">About</a></li>
        <li role="none"><button class="btn mobile-btn">Sign Up</button></li>
      </ul>
    </div>
  </nav>

  <main class="content">
    <h1>Welcome to EaseMotion CSS</h1>
    <p>Scroll down to see the sticky navigation bar in action.</p>
    <div style="height: 200vh;"></div>
  </main>

  <script>
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    mobileBtn.addEventListener('click', () => {
      const isExpanded = mobileBtn.getAttribute('aria-expanded') === 'true';
      mobileBtn.setAttribute('aria-expanded', !isExpanded);
      mobileBtn.classList.toggle('is-active');
      
      if (!isExpanded) {
        mobileMenu.classList.add('is-open');
        // Optional: trigger child animations when menu opens
      } else {
        mobileMenu.classList.remove('is-open');
      }
    });
  </script>
</body>
</html>
