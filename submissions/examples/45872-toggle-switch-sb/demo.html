<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Toggle Switch</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Toggle switch demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Animated Toggle Switch</h1>
        <p>Smooth animated toggle switches for settings and preferences.</p>
        
        <div class="demo-section">
          <h3>Basic Toggle</h3>
          <div class="toggle-demo">
            <label class="ease-toggle-sb">
              <input type="checkbox" />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>With Labels</h3>
          <div class="toggle-demo">
            <div class="toggle-item">
              <span>Enable notifications</span>
              <label class="ease-toggle-sb">
                <input type="checkbox" checked />
                <span class="ease-toggle-slider-sb"></span>
              </label>
            </div>
            <div class="toggle-item">
              <span>Dark mode</span>
              <label class="ease-toggle-sb">
                <input type="checkbox" />
                <span class="ease-toggle-slider-sb"></span>
              </label>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Size Variants</h3>
          <div class="toggle-demo">
            <label class="ease-toggle-sb ease-toggle-small-sb">
              <input type="checkbox" />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb ease-toggle-large-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Color Variants</h3>
          <div class="toggle-demo">
            <label class="ease-toggle-sb ease-toggle-primary-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb ease-toggle-success-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb ease-toggle-warning-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb ease-toggle-danger-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb"></span>
            </label>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Icon Toggles</h3>
          <div class="toggle-demo">
            <label class="ease-toggle-sb ease-toggle-icon-sb">
              <input type="checkbox" />
              <span class="ease-toggle-slider-sb">
                <span class="icon sun"></span>
                <span class="icon moon"></span>
              </span>
            </label>
            <label class="ease-toggle-sb ease-toggle-icon-sb">
              <input type="checkbox" checked />
              <span class="ease-toggle-slider-sb">
                <span class="icon sun"></span>
                <span class="icon moon"></span>
              </span>
            </label>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Disabled State</h3>
          <div class="toggle-demo">
            <label class="ease-toggle-sb">
              <input type="checkbox" disabled />
              <span class="ease-toggle-slider-sb"></span>
            </label>
            <label class="ease-toggle-sb">
              <input type="checkbox" checked disabled />
              <span class="ease-toggle-slider-sb"></span>
            </label>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
