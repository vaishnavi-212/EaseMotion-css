<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Media Player Controls</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <section class="player-card" aria-labelledby="player-title">
      <div class="album-wrap" aria-hidden="true">
        <div class="album-art">
          <span class="play-glow"></span>
          <span class="equalizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
      </div>

      <div class="track-copy">
        <p class="eyebrow">EaseMotion Audio UI</p>
        <h1 id="player-title">Ease Media Player Controls</h1>
        <p>Animated, responsive player controls for music, podcast, video-preview, and learning cards.</p>
      </div>

      <div class="progress-row" aria-label="Playback progress">
        <span>1:24</span>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="58">
          <span class="progress-fill"></span>
        </div>
        <span>3:48</span>
      </div>

      <div class="control-row" aria-label="Media controls">
        <button class="control-btn" type="button" aria-label="Previous track">⏮</button>
        <button class="control-btn play-btn" type="button" aria-label="Play track">▶</button>
        <button class="control-btn" type="button" aria-label="Next track">⏭</button>
      </div>

      <label class="volume-control">
        <span>Volume</span>
        <input type="range" min="0" max="100" value="72" aria-label="Volume level" />
      </label>

      <div class="meta-row" aria-label="Track details">
        <span>Lo-fi Focus</span>
        <span>128 BPM</span>
        <span>HD</span>
      </div>
    </section>
  </main>
</body>
</html>
