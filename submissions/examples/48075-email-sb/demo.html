<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Newsletter Subscription</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="email-container" aria-label="Email Subscription">
      <div class="email-card">
        <div class="email-icon">✉️</div>
        <h1 class="email-title">Stay Updated</h1>
        <p class="email-description">Subscribe to our newsletter and get the latest updates delivered to your inbox.</p>
        <form class="email-form">
          <div class="input-wrapper">
            <input type="email" placeholder="Enter your email" class="email-input" />
            <button type="submit" class="subscribe-btn">Subscribe</button>
          </div>
        </form>
        <p class="email-note">No spam, unsubscribe anytime.</p>
      </div>
    </section>
  </main>
</body>
</html>
