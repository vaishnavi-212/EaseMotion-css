<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinner Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <h1 class="demo-title">Spinner Component</h1>
    <div class="spinner-grid">
      <div class="spinner-item"><div class="spinner"></div><span>Default</span></div>
      <div class="spinner-item"><div class="spinner spinner-sm"></div><span>Small</span></div>
      <div class="spinner-item"><div class="spinner spinner-lg"></div><span>Large</span></div>
      <div class="spinner-item"><div class="spinner spinner-primary"></div><span>Primary</span></div>
      <div class="spinner-item"><div class="spinner spinner-success"></div><span>Success</span></div>
      <div class="spinner-item"><div class="spinner spinner-warning"></div><span>Warning</span></div>
    </div>
  </main>
</body>
</html>
