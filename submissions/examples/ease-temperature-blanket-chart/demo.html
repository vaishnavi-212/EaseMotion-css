<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Temperature Blanket Chart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="temperature-card">
    <h2>Temperature Blanket Chart</h2>
    <p class="subtitle">Yearly temperature visualization</p>

    <div class="chart">

        <div class="bar low">
            <span>Jan</span>
        </div>

        <div class="bar medium">
            <span>Feb</span>
        </div>

        <div class="bar high">
            <span>Mar</span>
        </div>

        <div class="bar warm">
            <span>Apr</span>
        </div>

        <div class="bar hot">
            <span>May</span>
        </div>

        <div class="bar medium">
            <span>Jun</span>
        </div>

    </div>

</section>

</body>
</html>
