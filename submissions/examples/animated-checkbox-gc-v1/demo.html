<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Checkbox UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Checkbox UI Example</h1>
      <p>Custom checkboxes with smooth animations, focus states, and multiple variants.</p>
    </header>

    <section class="checkbox-grid">
      <div class="checkbox-group">
        <label class="animated-checkbox">
          <input type="checkbox" checked />
          <span class="animated-checkbox__box"></span>
          <span>Primary checkbox</span>
        </label>
      </div>

      <div class="checkbox-group">
        <label class="animated-checkbox animated-checkbox--accent">
          <input type="checkbox" />
          <span class="animated-checkbox__box"></span>
          <span>Accent variant</span>
        </label>
      </div>

      <div class="checkbox-group">
        <label class="animated-checkbox animated-checkbox--success">
          <input type="checkbox" checked />
          <span class="animated-checkbox__box"></span>
          <span>Success state</span>
        </label>
      </div>

      <div class="checkbox-group">
        <label class="animated-checkbox animated-checkbox--disabled">
          <input type="checkbox" disabled />
          <span class="animated-checkbox__box"></span>
          <span>Disabled checkbox</span>
        </label>
      </div>
    </section>
  </main>
</body>
</html>
