<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Dependency Status Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="grid-card">

<h2>Service Dependencies</h2>

<div class="grid">

<div class="service healthy">
<h3>API</h3>
<p>Connected</p>
</div>

<div class="service healthy">
<h3>Database</h3>
<p>Running</p>
</div>

<div class="service warning">
<h3>Redis</h3>
<p>High Load</p>
</div>

<div class="service offline">
<h3>Queue</h3>
<p>Offline</p>
</div>

</div>

</section>

</body>
</html>
