<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tooltip - Marketing</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="marketing-layout">
    <div class="feature-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      
      <h2>Enterprise Scalability</h2>
      <p>Deploy across global regions with a single click. High availability guaranteed for your infrastructure.</p>
      
      <!-- Tooltip Container -->
      <div class="tooltip-container">
        <!-- Integrated EaseMotion Class for button micro-interaction -->
        <button class="learn-more ease-squish-button" aria-label="Learn how it works" aria-describedby="tooltip-draw">
          How it works
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
        
        <!-- Tooltip Wrapper handles entrance animation -->
        <div class="tooltip-wrapper" role="tooltip" id="tooltip-draw">
          <div class="tooltip">
            <!-- SVG for the draw-border effect -->
            <!-- rx/ry match --ease-radius-xl (approx 24px/1.5rem) -->
            <svg class="tooltip-border-svg" width="100%" height="100%">
              <rect x="0" y="0" width="100%" height="100%" rx="24" ry="24" pathLength="100" />
            </svg>
            
            <div class="tooltip-content">
              <h3>Global CDN Integration</h3>
              <p>Your assets are automatically cached across 250+ edge nodes worldwide, reducing latency by up to 80%.</p>
              
              <div class="stats">
                <div class="stat-item">
                  <span class="stat-val">99.99%</span>
                  <span class="stat-lbl">Uptime</span>
                </div>
                <div class="stat-item">
                  <span class="stat-val">< 50ms</span>
                  <span class="stat-lbl">TTFB</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</body>
</html>
