<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Monitor Graph</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="monitor-container" aria-label="System Resource Monitor">
      <header class="monitor-header">
        <h1 class="monitor-title">System Monitor</h1>
        <span class="status-indicator online">● Live</span>
      </header>
      <div class="metrics-grid">
        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon">💻</span>
            <span class="metric-label">CPU Usage</span>
          </div>
          <div class="metric-value">67%</div>
          <div class="progress-bar">
            <div class="progress-fill cpu" style="--progress: 67%"></div>
          </div>
        </article>
        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon">🧠</span>
            <span class="metric-label">Memory</span>
          </div>
          <div class="metric-value">8.2 / 16 GB</div>
          <div class="progress-bar">
            <div class="progress-fill memory" style="--progress: 51%"></div>
          </div>
        </article>
        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon">💾</span>
            <span class="metric-label">Disk</span>
          </div>
          <div class="metric-value">256 / 512 GB</div>
          <div class="progress-bar">
            <div class="progress-fill disk" style="--progress: 50%"></div>
          </div>
        </article>
        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon">🌐</span>
            <span class="metric-label">Network</span>
          </div>
          <div class="metric-value">↑2.4 ↓12.8 MB/s</div>
          <div class="progress-bar">
            <div class="progress-fill network" style="--progress: 35%"></div>
          </div>
        </article>
      </div>
      <div class="chart-section">
        <h2 class="chart-title">Real-time Activity</h2>
        <div class="mini-chart">
          <div class="chart-bars">
            <div class="bar" style="--height: 40%"></div>
            <div class="bar" style="--height: 65%"></div>
            <div class="bar" style="--height: 45%"></div>
            <div class="bar" style="--height: 80%"></div>
            <div class="bar" style="--height: 55%"></div>
            <div class="bar" style="--height: 70%"></div>
            <div class="bar" style="--height: 60%"></div>
            <div class="bar" style="--height: 85%"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
