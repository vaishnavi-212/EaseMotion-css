<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Orbit Popover Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo container styling to center the element on screen */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F9FAFB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- EaseMotion Component: Floating Orbit Popover -->
  <div class="orbit-container">
    
    <!-- The trigger anchor -->
    <button class="orbit-trigger" aria-describedby="checkout-secure-popover">
      Secure Checkout
    </button>

    <!-- The orbital floating panel -->
    <div id="checkout-secure-popover" class="orbit-popover" role="tooltip">
      <h4 class="popover-header">SSL Encrypted Connection</h4>
      <p class="popover-body">
        Your payment credentials are fully encrypted and processed securely. We never store your CVV code.
      </p>
    </div>

  </div>

</body>
</html>
