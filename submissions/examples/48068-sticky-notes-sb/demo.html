<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Notes Grid</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="notes-container" aria-label="Sticky Notes">
      <div class="notes-grid">
        <article class="sticky-note yellow">
          <button class="pin"></button>
          <p class="note-content">Remember to call the dentist tomorrow at 3pm</p>
        </article>
        <article class="sticky-note pink">
          <button class="pin"></button>
          <p class="note-content">Buy groceries: milk, eggs, bread, and coffee</p>
        </article>
        <article class="sticky-note blue">
          <button class="pin"></button>
          <p class="note-content">Meeting notes: Project deadline is next Friday</p>
        </article>
        <article class="sticky-note green">
          <button class="pin"></button>
          <p class="note-content">Read chapter 5 of the design book</p>
        </article>
        <article class="sticky-note yellow">
          <button class="pin"></button>
          <p class="note-content">Schedule workout for tomorrow morning</p>
        </article>
        <article class="sticky-note pink">
          <button class="pin"></button>
          <p class="note-content">Fix the navigation bug on the website</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
