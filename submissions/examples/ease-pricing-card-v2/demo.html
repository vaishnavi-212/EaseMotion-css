<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-pricing-card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cards">
    <div class="ease-pricing-card">
      <div class="plan">Starter</div>
      <div class="price-wrap"><span class="price"><sup>$</sup>9<sub>/mo</sub></span></div>
      <ul class="features">
        <li>5 projects</li><li>10GB storage</li><li>Community support</li>
      </ul>
      <button class="cta-btn">Get started</button>
    </div>
    <div class="ease-pricing-card featured">
      <div class="badge">Most Popular</div>
      <div class="plan">Pro</div>
      <div class="price-wrap"><span class="price"><sup>$</sup>29<sub>/mo</sub></span></div>
      <ul class="features">
        <li>Unlimited projects</li><li>100GB storage</li><li>Priority support</li>
      </ul>
      <button class="cta-btn">Get started</button>
    </div>
    <div class="ease-pricing-card">
      <div class="plan">Enterprise</div>
      <div class="price-wrap"><span class="price"><sup>$</sup>99<sub>/mo</sub></span></div>
      <ul class="features">
        <li>Everything in Pro</li><li>Unlimited storage</li><li>Dedicated support</li>
      </ul>
      <button class="cta-btn">Contact sales</button>
    </div>
  </div>
</body>
</html>
