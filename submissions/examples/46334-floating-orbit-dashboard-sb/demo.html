<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tooltip - Responsive Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Dashboard floating orbit tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Floating Orbit Tooltip</h1>
        <p>Responsive Dashboard Layouts variant with floating orbit animation effect.</p>
        
        <div class="dashboard-layout">
          <div class="sidebar">
            <div class="logo-area">
              <span class="logo-icon"></span>
              <span class="logo-text">Dashboard</span>
            </div>
            
            <nav class="sidebar-nav">
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="View your personalized dashboard overview">
                <span class="dash-icon home"></span>
                <span class="nav-label">Dashboard</span>
              </button>
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="Analyze revenue, traffic, and conversion metrics">
                <span class="dash-icon analytics"></span>
                <span class="nav-label">Analytics</span>
              </button>
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="Manage your product inventory and listings">
                <span class="dash-icon products"></span>
                <span class="nav-label">Products</span>
              </button>
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="View and manage customer orders">
                <span class="dash-icon orders"></span>
                <span class="nav-label">Orders</span>
              </button>
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="Communicate with customers via messages">
                <span class="dash-icon messages"></span>
                <span class="nav-label">Messages</span>
              </button>
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="Access customer database and profiles">
                <span class="dash-icon customers"></span>
                <span class="nav-label">Customers</span>
              </button>
            </nav>
            
            <div class="sidebar-footer">
              <button class="ease-dash-item-sb ease-floating-orbit-dash-sb" data-tooltip="Configure system settings and preferences">
                <span class="dash-icon settings"></span>
                <span class="nav-label">Settings</span>
              </button>
            </div>
          </div>
          
          <div class="main-content">
            <header class="content-header">
              <div class="header-left">
                <h2>Dashboard Overview</h2>
              </div>
              <div class="header-actions">
                <button class="ease-header-btn-sb ease-floating-orbit-dash-sb" data-tooltip="Refresh all dashboard data">
                  <span class="action-icon refresh"></span>
                </button>
                <button class="ease-header-btn-sb ease-floating-orbit-dash-sb" data-tooltip="Filter dashboard view by date range">
                  <span class="action-icon filter"></span>
                </button>
                <button class="ease-header-btn-sb ease-floating-orbit-dash-sb" data-tooltip="Download dashboard report as PDF">
                  <span class="action-icon download"></span>
                </button>
              </div>
            </header>
            
            <div class="metrics-grid">
              <div class="metric-card">
                <div class="metric-header">
                  <span>Total Sales</span>
                  <button class="ease-metric-info-sb ease-floating-orbit-dash-sb" data-tooltip="Sum of all completed transactions">
                    <span class="info-icon"></span>
                  </button>
                </div>
                <div class="metric-value">$124,563</div>
                <div class="metric-trend up">+15.3%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-header">
                  <span>New Customers</span>
                  <button class="ease-metric-info-sb ease-floating-orbit-dash-sb" data-tooltip="Customers who made first purchase this month">
                    <span class="info-icon"></span>
                  </button>
                </div>
                <div class="metric-value">2,847</div>
                <div class="metric-trend up">+8.2%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-header">
                  <span>Pending Orders</span>
                  <button class="ease-metric-info-sb ease-floating-orbit-dash-sb" data-tooltip="Orders awaiting processing or shipment">
                    <span class="info-icon"></span>
                  </button>
                </div>
                <div class="metric-value">156</div>
                <div class="metric-trend down">-3.5%</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
