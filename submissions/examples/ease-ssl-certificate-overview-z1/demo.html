<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Certificate Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="ssl-card">

<h2>SSL Certificates</h2>

<div class="certificate">
<span>example.com</span>
<b class="valid">Valid</b>
</div>

<div class="certificate">
<span>store.app</span>
<b class="warning">15 Days Left</b>
</div>

<div class="certificate">
<span>admin.io</span>
<b class="expired">Expired</b>
</div>

<div class="certificate">
<span>company.org</span>
<b class="valid">210 Days Left</b>
</div>

</section>

</body>
</html>
