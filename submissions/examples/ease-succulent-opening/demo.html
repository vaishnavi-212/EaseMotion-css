<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Succulent Opening – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌵 Succulent Opening</h1>
    <p class="subtitle">Succulent petals opening and closing</p>

    <div class="succulent-container">
      <div class="succulent-scene">
        <!-- Soil -->
        <div class="soil"></div>

        <!-- Succulent -->
        <div class="succulent">
          <!-- Outer petals (largest) -->
          <div class="petal outer-petal op1"></div>
          <div class="petal outer-petal op2"></div>
          <div class="petal outer-petal op3"></div>
          <div class="petal outer-petal op4"></div>
          <div class="petal outer-petal op5"></div>
          <div class="petal outer-petal op6"></div>

          <!-- Middle petals -->
          <div class="petal middle-petal mp1"></div>
          <div class="petal middle-petal mp2"></div>
          <div class="petal middle-petal mp3"></div>
          <div class="petal middle-petal mp4"></div>
          <div class="petal middle-petal mp5"></div>
          <div class="petal middle-petal mp6"></div>

          <!-- Inner petals (smallest) -->
          <div class="petal inner-petal ip1"></div>
          <div class="petal inner-petal ip2"></div>
          <div class="petal inner-petal ip3"></div>
          <div class="petal inner-petal ip4"></div>
          <div class="petal inner-petal ip5"></div>
          <div class="petal inner-petal ip6"></div>

          <!-- Center -->
          <div class="center">
            <div class="center-glow"></div>
          </div>

          <!-- Succulent glow -->
          <div class="succulent-glow"></div>

          <!-- Dew drops -->
          <div class="dew dew-1"></div>
          <div class="dew dew-2"></div>
          <div class="dew dew-3"></div>
          <div class="dew dew-4"></div>
        </div>

        <!-- Ambient particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
      </div>
    </div>

    <div class="controls">
      <button id="openBtn">🌿 Open</button>
      <button id="closeBtn">🌱 Close</button>
      <label>
        Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Petal Size
        <input type="range" id="sizeControl" min="0.5" max="1.5" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const succulent = document.querySelector('.succulent');
      const petals = document.querySelectorAll('.petal');
      const outerPetals = document.querySelectorAll('.outer-petal');
      const middlePetals = document.querySelectorAll('.middle-petal');
      const innerPetals = document.querySelectorAll('.inner-petal');
      const center = document.querySelector('.center');
      const centerGlow = document.querySelector('.center-glow');
      const succulentGlow = document.querySelector('.succulent-glow');
      const dews = document.querySelectorAll('.dew');
      const particles = document.querySelectorAll('.particle');

      const openBtn = document.getElementById('openBtn');
      const closeBtn = document.getElementById('closeBtn');
      const speedInput = document.getElementById('speedControl');
      const sizeInput = document.getElementById('sizeControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let sizeMultiplier = 1;
      let isOpen = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        const baseDuration = 1.5 / speedMultiplier;

        // Outer petals
        outerPetals.forEach((p, i) => {
          const delay = i * 0.08;
          p.style.setProperty('--petal-duration', baseDuration + 's');
          p.style.setProperty('--petal-delay', (delay / speedMultiplier) + 's');
        });

        // Middle petals
        middlePetals.forEach((p, i) => {
          const delay = 0.2 + i * 0.06;
          p.style.setProperty('--petal-duration', baseDuration + 's');
          p.style.setProperty('--petal-delay', (delay / speedMultiplier) + 's');
        });

        // Inner petals
        innerPetals.forEach((p, i) => {
          const delay = 0.4 + i * 0.05;
          p.style.setProperty('--petal-duration', baseDuration + 's');
          p.style.setProperty('--petal-delay', (delay / speedMultiplier) + 's');
        });

        // Center glow
        centerGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');

        // Succulent glow
        succulentGlow.style.setProperty('--succulent-glow-duration', (2.5 / speedMultiplier) + 's');

        // Dew drops
        dews.forEach((d, i) => {
          const duration = (2 + i * 0.5) / speedMultiplier;
          d.style.setProperty('--dew-duration', duration + 's');
        });

        // Particles
        particles.forEach((p, i) => {
          const duration = (5 + i * 0.8) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
        });
      }

      // ----- Apply size -----
      function applySize() {
        succulent.style.setProperty('--succulent-scale', sizeMultiplier);
      }

      // ----- Open succulent -----
      function openSucculent() {
        if (isOpen) return;
        isOpen = true;

        succulent.classList.add('opening');
        succulent.classList.remove('closing');

        // Remove any existing animation classes and re-add
        petals.forEach(p => {
          p.classList.remove('petal-open', 'petal-close');
          void p.offsetWidth;
          p.classList.add('petal-open');
        });

        center.classList.add('center-open');
        centerGlow.classList.add('glow-active');
        succulentGlow.classList.add('glow-intense');

        dews.forEach(d => {
          d.classList.add('dew-shimmer');
        });

        openBtn.textContent = '🌿 Opening...';
        setTimeout(() => {
          openBtn.textContent = '🌿 Open';
        }, 500 / speedMultiplier);
      }

      // ----- Close succulent -----
      function closeSucculent() {
        if (!isOpen) return;
        isOpen = false;

        succulent.classList.add('closing');
        succulent.classList.remove('opening');

        petals.forEach(p => {
          p.classList.remove('petal-open', 'petal-close');
          void p.offsetWidth;
          p.classList.add('petal-close');
        });

        center.classList.remove('center-open');
        centerGlow.classList.remove('glow-active');
        succulentGlow.classList.remove('glow-intense');

        dews.forEach(d => {
          d.classList.remove('dew-shimmer');
        });

        closeBtn.textContent = '🌱 Closing...';
        setTimeout(() => {
          closeBtn.textContent = '🌱 Close';
        }, 500 / speedMultiplier);
      }

      // ----- Toggle -----
      function toggleSucculent() {
        if (isOpen) {
          closeSucculent();
        } else {
          openSucculent();
        }
      }

      // ----- Reset -----
      function resetSucculent() {
        // Force close
        isOpen = false;
        succulent.classList.remove('opening', 'closing');
        petals.forEach(p => {
          p.classList.remove('petal-open', 'petal-close');
          p.style.transform = '';
          p.style.opacity = '';
        });
        center.classList.remove('center-open');
        centerGlow.classList.remove('glow-active');
        succulentGlow.classList.remove('glow-intense');
        dews.forEach(d => d.classList.remove('dew-shimmer'));

        openBtn.textContent = '🌿 Open';
        closeBtn.textContent = '🌱 Close';

        // Re-apply animations
        setTimeout(() => {
          petals.forEach(p => {
            p.classList.add('petal-close');
          });
        }, 100);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update size -----
      function updateSize(value) {
        sizeMultiplier = parseFloat(value);
        applySize();
      }

      // ----- Glow pulse animation -----
      function animateGlow(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle glow pulse for center
        const pulse = Math.sin(timestamp / 1200) * 0.05 + 0.95;
        const baseOpacity = parseFloat(centerGlow.style.opacity) || 0.4;
        const targetOpacity = isOpen ? 
          Math.min(0.5 * pulse * 1.2, 0.8) : 
          Math.min(0.2 * pulse, 0.3);
        centerGlow.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;

        // Succulent glow
        const glowPulse = Math.sin(timestamp / 2000 + 0.5) * 0.03 + 0.97;
        const glowBase = parseFloat(succulentGlow.style.opacity) || 0.15;
        const glowTarget = isOpen ? 
          Math.min(0.25 * glowPulse * 1.3, 0.4) : 
          Math.min(0.1 * glowPulse, 0.15);
        succulentGlow.style.opacity = glowBase * 0.9 + glowTarget * 0.1;

        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Init -----
      function init() {
        // Start closed
        isOpen = false;
        succulent.classList.add('closing');

        applySpeed();
        applySize();

        // Start glow loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlow);

        // Auto-open after 1.5 seconds to show the effect
        setTimeout(() => {
          openSucculent();
        }, 1500);

        // Auto-close after 4 seconds
        setTimeout(() => {
          closeSucculent();
        }, 5500);

        // Cycle again
        setTimeout(() => {
          openSucculent();
        }, 7000);

        setTimeout(() => {
          closeSucculent();
        }, 10000);
      }

      // ----- Event listeners -----
      openBtn.addEventListener('click', openSucculent);
      closeBtn.addEventListener('click', closeSucculent);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      sizeInput.addEventListener('input', function() {
        updateSize(this.value);
      });
      resetBtn.addEventListener('click', resetSucculent);

      // Click on succulent to toggle
      succulent.addEventListener('click', toggleSucculent);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
