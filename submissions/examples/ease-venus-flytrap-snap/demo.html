<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venus Flytrap Snap – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🪴 Venus Flytrap Snap</h1>
    <p class="subtitle">Plant snapping shut on prey</p>

    <div class="flytrap-container">
      <div class="flytrap-scene">
        <!-- Ground -->
        <div class="ground"></div>

        <!-- Venus Flytrap -->
        <div class="flytrap">
          <!-- Stem -->
          <div class="stem"></div>

          <!-- Trap (open state) -->
          <div class="trap">
            <!-- Left lobe -->
            <div class="lobe lobe-left">
              <div class="lobe-inner"></div>
              <!-- Trigger hairs -->
              <div class="hair hair-1"></div>
              <div class="hair hair-2"></div>
              <div class="hair hair-3"></div>
            </div>

            <!-- Right lobe -->
            <div class="lobe lobe-right">
              <div class="lobe-inner"></div>
              <!-- Trigger hairs -->
              <div class="hair hair-4"></div>
              <div class="hair hair-5"></div>
              <div class="hair hair-6"></div>
            </div>

            <!-- Hinge/center -->
            <div class="hinge"></div>

            <!-- Teeth (marginal spines) -->
            <div class="teeth teeth-left">
              <div class="tooth t1"></div>
              <div class="tooth t2"></div>
              <div class="tooth t3"></div>
              <div class="tooth t4"></div>
              <div class="tooth t5"></div>
              <div class="tooth t6"></div>
              <div class="tooth t7"></div>
              <div class="tooth t8"></div>
            </div>
            <div class="teeth teeth-right">
              <div class="tooth t9"></div>
              <div class="tooth t10"></div>
              <div class="tooth t11"></div>
              <div class="tooth t12"></div>
              <div class="tooth t13"></div>
              <div class="tooth t14"></div>
              <div class="tooth t15"></div>
              <div class="tooth t16"></div>
            </div>

            <!-- Prey (fly) -->
            <div class="prey">
              <div class="fly-body"></div>
              <div class="fly-wing fw-left"></div>
              <div class="fly-wing fw-right"></div>
              <div class="fly-eye eye-left"></div>
              <div class="fly-eye eye-right"></div>
            </div>

            <!-- Nectar droplets -->
            <div class="nectar nectar-1"></div>
            <div class="nectar nectar-2"></div>
            <div class="nectar nectar-3"></div>
            <div class="nectar nectar-4"></div>
          </div>

          <!-- Glow aura -->
          <div class="aura"></div>
        </div>

        <!-- Ambient particles -->
        <div class="ambient-particle ap-1"></div>
        <div class="ambient-particle ap-2"></div>
        <div class="ambient-particle ap-3"></div>
        <div class="ambient-particle ap-4"></div>
      </div>
    </div>

    <div class="controls">
      <button id="snapBtn">⚡ Snap Shut</button>
      <button id="openBtn">🌿 Open Trap</button>
      <label>
        Animation Speed
        <input type="range" id="speedControl" min="0.5" max="3" step="0.1" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const flytrap = document.querySelector('.flytrap');
      const trap = document.querySelector('.trap');
      const lobeLeft = document.querySelector('.lobe-left');
      const lobeRight = document.querySelector('.lobe-right');
      const prey = document.querySelector('.prey');
      const aura = document.querySelector('.aura');
      const hairs = document.querySelectorAll('.hair');
      const teeth = document.querySelectorAll('.tooth');
      const nectar = document.querySelectorAll('.nectar');
      const ambientParticles = document.querySelectorAll('.ambient-particle');

      const snapBtn = document.getElementById('snapBtn');
      const openBtn = document.getElementById('openBtn');
      const speedInput = document.getElementById('speedControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isSnapped = false;
      let snapTimeout = null;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Trap snap speed
        trap.style.setProperty('--snap-duration', (0.15 / speedMultiplier) + 's');
        trap.style.setProperty('--open-duration', (1.2 / speedMultiplier) + 's');

        // Stem sway
        flytrap.style.setProperty('--sway-duration', (4 / speedMultiplier) + 's');

        // Prey struggle
        prey.style.setProperty('--struggle-duration', (0.3 / speedMultiplier) + 's');

        // Hair twitch
        hairs.forEach((h, i) => {
          const duration = (0.4 + i * 0.05) / speedMultiplier;
          h.style.setProperty('--hair-duration', duration + 's');
        });

        // Ambient particles
        ambientParticles.forEach((p, i) => {
          const duration = (10 + i * 2) / speedMultiplier;
          p.style.setProperty('--ambient-duration', duration + 's');
        });

        // Aura pulse
        aura.style.setProperty('--aura-duration', (2.5 / speedMultiplier) + 's');
      }

      // ----- Snap shut -----
      function snapShut() {
        if (isSnapped) return;
        isSnapped = true;

        // Add snap class to trap
        trap.classList.add('snapped');
        trap.classList.remove('opening');

        // Trigger hair animation
        hairs.forEach(h => {
          h.classList.remove('twitch');
          void h.offsetWidth;
          h.classList.add('twitch');
        });

        // Prey gets caught - start struggling
        prey.classList.add('struggling');

        // Nectar tremble
        nectar.forEach(n => {
          n.classList.add('tremble');
        });

        // Aura intensifies
        aura.style.opacity = '0.6';

        // Clear any existing timeout
        if (snapTimeout) clearTimeout(snapTimeout);

        // Auto-open after 4 seconds (slowed by speed)
        const autoOpenDelay = 4000 / speedMultiplier;
        snapTimeout = setTimeout(() => {
          openTrap();
        }, autoOpenDelay);
      }

      // ----- Open trap -----
      function openTrap() {
        if (!isSnapped) return;
        isSnapped = false;

        trap.classList.remove('snapped');
        trap.classList.add('opening');

        prey.classList.remove('struggling');

        nectar.forEach(n => {
          n.classList.remove('tremble');
        });

        aura.style.opacity = '0.3';

        // Remove opening class after animation completes
        setTimeout(() => {
          trap.classList.remove('opening');
        }, 1200 / speedMultiplier);
      }

      // ----- Reset everything -----
      function resetFlytrap() {
        if (snapTimeout) clearTimeout(snapTimeout);
        isSnapped = false;
        trap.classList.remove('snapped', 'opening');
        prey.classList.remove('struggling');
        nectar.forEach(n => n.classList.remove('tremble'));
        hairs.forEach(h => h.classList.remove('twitch'));
        aura.style.opacity = '0.3';

        // Force reflow and restart animations
        const elements = [
          flytrap,
          trap,
          ...hairs,
          ...teeth,
          ...nectar,
          ...ambientParticles,
          aura,
          prey
        ];

        elements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });
      }

      // ----- Glow pulse via JS -----
      function animateGlow(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle aura pulse
        const pulse = Math.sin(timestamp / 1500) * 0.05 + 0.95;
        const baseOpacity = parseFloat(aura.style.opacity) || 0.3;
        const targetOpacity = isSnapped ? 
          Math.min(0.5 * pulse * 1.2, 0.8) : 
          Math.min(0.25 * pulse, 0.4);
        aura.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;

        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        flytrap.classList.add('animate');
        trap.classList.add('animate');
        hairs.forEach(h => h.classList.add('animate'));
        teeth.forEach(t => t.classList.add('animate'));
        nectar.forEach(n => n.classList.add('animate'));
        ambientParticles.forEach(p => p.classList.add('animate'));
        aura.classList.add('animate');
        prey.classList.add('animate');

        applySpeed();

        // Start glow loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Event listeners -----
      snapBtn.addEventListener('click', snapShut);
      openBtn.addEventListener('click', openTrap);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      resetBtn.addEventListener('click', resetFlytrap);

      // Click on trap also triggers snap
      trap.addEventListener('click', snapShut);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (snapTimeout) clearTimeout(snapTimeout);
      });

      init();

      // Auto-snap after 2 seconds to show the effect
      setTimeout(() => {
        snapShut();
      }, 1500);

    })();
  </script>

</body>
</html>
