<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline Step Pulse</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="timeline-stage" aria-label="Timeline step pulse animation demo">
      <ol class="timeline">
        <li class="done">
          <span></span>
          <div>
            <h1>Queued</h1>
            <p>Contribution added to the review queue.</p>
          </div>
        </li>
        <li class="active">
          <span></span>
          <div>
            <h2>Reviewing</h2>
            <p>Maintainer checks labels and implementation.</p>
          </div>
        </li>
        <li>
          <span></span>
          <div>
            <h2>Merged</h2>
            <p>Changes become part of the examples library.</p>
          </div>
        </li>
      </ol>
    </main>
  </body>
</html>
