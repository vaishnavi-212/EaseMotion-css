
<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ease Rate Check 150</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <main class="page-shell">

    <section class="rating-panel" aria-labelledby="rating-title">

      <p class="eyebrow">EaseMotion CSS Component</p>

      <h1 id="rating-title">Ease Rate Check 150</h1>

      <p class="intro">

        A clean rating selector with animated check feedback for surveys, onboarding screens,

        product reviews, and feedback forms.

      </p>



      <fieldset class="rate-check" aria-describedby="rating-help">

        <legend>Rate your experience</legend>

        <p id="rating-help" class="helper-text">Choose one option. The selected card shows a check animation.</p>



        <label class="rate-option">

          <input type="radio" name="rating" value="1" />

          <span class="rate-card">

            <span class="rate-top">

              <span class="rate-number">1</span>

              <span class="rate-checkmark" aria-hidden="true">✓</span>

            </span>

            <span class="rate-label">Needs work</span>

            <span class="rate-copy">The flow felt confusing.</span>

          </span>

        </label>



        <label class="rate-option">

          <input type="radio" name="rating" value="2" />

          <span class="rate-card">

            <span class="rate-top">

              <span class="rate-number">2</span>

              <span class="rate-checkmark" aria-hidden="true">✓</span>

            </span>

            <span class="rate-label">Okay</span>

            <span class="rate-copy">It works, but can improve.</span>

          </span>

        </label>



        <label class="rate-option">

          <input type="radio" name="rating" value="3" checked />

          <span class="rate-card">

            <span class="rate-top">

              <span class="rate-number">3</span>

              <span class="rate-checkmark" aria-hidden="true">✓</span>

            </span>

            <span class="rate-label">Good</span>

            <span class="rate-copy">Useful and easy enough.</span>

          </span>

        </label>



        <label class="rate-option">

          <input type="radio" name="rating" value="4" />

          <span class="rate-card">

            <span class="rate-top">

              <span class="rate-number">4</span>

              <span class="rate-checkmark" aria-hidden="true">✓</span>

            </span>

            <span class="rate-label">Great</span>

            <span class="rate-copy">Smooth, polished, reliable.</span>

          </span>

        </label>



        <label class="rate-option">

          <input type="radio" name="rating" value="5" />

          <span class="rate-card">

            <span class="rate-top">

              <span class="rate-number">5</span>

              <span class="rate-checkmark" aria-hidden="true">✓</span>

            </span>

            <span class="rate-label">Excellent</span>

            <span class="rate-copy">A delightful experience.</span>

          </span>

        </label>

      </fieldset>

    </section>

  </main>

</body>

</html>
