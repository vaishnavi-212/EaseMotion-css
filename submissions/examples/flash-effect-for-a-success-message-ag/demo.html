<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Flash Success Message</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Form Submission</h1>
        <p>This page demonstrates a flash effect for a success message that appears upon completing an action.</p>
        
        <!-- Success Message Component -->
        <div class="success-message" role="status" aria-live="polite">
            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <div class="message-content">
                <strong>Success!</strong>
                <span>Your profile has been updated successfully.</span>
            </div>
        </div>

        <!-- Dummy form to provide context -->
        <form class="dummy-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" value="Jane Doe" disabled>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" value="jane@example.com" disabled>
            </div>
            <button type="submit" disabled class="btn-submit">Update Profile</button>
        </form>

    </main>

</body>
</html>
