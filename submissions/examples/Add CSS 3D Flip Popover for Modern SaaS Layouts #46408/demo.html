<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Popover - SaaS Aesthetics</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="demo-card">
      <h2>Profile Settings</h2>
      <p>Configure your account preferences using the beautifully animated popover menu.</p>
      
      <button class="trigger-btn" popovertarget="settings-popover">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: text-bottom;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Open Settings
      </button>

      <div id="settings-popover" class="popover" popover>
        <div class="popover-header">
          <h3>Preferences</h3>
          <button class="close-btn" popovertarget="settings-popover" popovertargetaction="hide" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="popover-body">
          <label class="setting-row">
            <div class="setting-info">
              <strong>Email Notifications</strong>
              <span>Receive weekly reports</span>
            </div>
            <div class="switch">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </div>
          </label>
          <label class="setting-row">
            <div class="setting-info">
              <strong>Dark Mode</strong>
              <span>Toggle application theme</span>
            </div>
            <div class="switch">
              <input type="checkbox">
              <span class="slider"></span>
            </div>
          </label>
        </div>
        <div class="popover-footer">
          <button class="btn-secondary" popovertarget="settings-popover" popovertargetaction="hide">Cancel</button>
          <button class="btn-primary" popovertarget="settings-popover" popovertargetaction="hide">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
