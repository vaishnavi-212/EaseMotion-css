<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jello progress bar component example for EaseMotion CSS."
    />
    <title>Jello Progress Bar | EaseMotion CSS</title>

    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="jello-progress-demo-bj">
      <section class="jello-progress-demo-bj__hero ease-fade-in">
        <p class="jello-progress-demo-bj__eyebrow">EaseMotion CSS Example</p>
        <h1>Jello Progress Bar</h1>
        <p>
          A dark-mode inspired progress component with elastic fill motion,
          glowing tracks, accessible labels, and pure CSS animation.
        </p>
      </section>

      <section
        class="jello-progress-demo-bj__panel ease-hover-lift-shadow"
        aria-labelledby="progress-title"
      >
        <div class="jello-progress-demo-bj__panel-header">
          <div>
            <p class="jello-progress-demo-bj__eyebrow">Upload Status</p>
            <h2 id="progress-title">Project Build Progress</h2>
          </div>
          <span class="jello-progress-demo-bj__badge ease-bounce-in">
            Live
          </span>
        </div>

        <div class="jello-progress-bj" style="--progress-value: 72%">
          <div class="jello-progress-bj__meta">
            <span id="frontend-label">Frontend bundle</span>
            <strong>72%</strong>
          </div>

          <div
            class="jello-progress-bj__track"
            role="progressbar"
            aria-labelledby="frontend-label"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="72"
          >
            <span class="jello-progress-bj__fill"></span>
          </div>
        </div>

        <div
          class="jello-progress-bj jello-progress-bj--cyan"
          style="--progress-value: 48%"
        >
          <div class="jello-progress-bj__meta">
            <span id="api-label">API checks</span>
            <strong>48%</strong>
          </div>

          <div
            class="jello-progress-bj__track"
            role="progressbar"
            aria-labelledby="api-label"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="48"
          >
            <span class="jello-progress-bj__fill"></span>
          </div>
        </div>

        <div
          class="jello-progress-bj jello-progress-bj--green"
          style="--progress-value: 91%"
        >
          <div class="jello-progress-bj__meta">
            <span id="docs-label">Documentation</span>
            <strong>91%</strong>
          </div>

          <div
            class="jello-progress-bj__track"
            role="progressbar"
            aria-labelledby="docs-label"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="91"
          >
            <span class="jello-progress-bj__fill"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
