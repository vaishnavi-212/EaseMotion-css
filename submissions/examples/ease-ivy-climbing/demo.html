<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivy Climbing – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌿 Ivy Climbing</h1>
    <p class="subtitle">Ivy growing up a wall with curling tendrils</p>

    <div class="ivy-container">
      <div class="ivy-scene">
        <!-- Wall -->
        <div class="wall"></div>

        <!-- Brick pattern -->
        <div class="brick-pattern"></div>

        <!-- Ivy plant base (rooted at bottom) -->
        <div class="ivy-base">
          <div class="vine vine-1">
            <!-- Vine stem -->
            <div class="vine-stem stem-1"></div>
            <!-- Tendrils (curling) -->
            <div class="tendril tendril-1a"></div>
            <div class="tendril tendril-1b"></div>
            <div class="tendril tendril-1c"></div>
            <!-- Leaves -->
            <div class="leaf ivy-leaf l1a"></div>
            <div class="leaf ivy-leaf l1b"></div>
            <div class="leaf ivy-leaf l1c"></div>
            <div class="leaf ivy-leaf l1d"></div>
            <div class="leaf ivy-leaf l1e"></div>
          </div>

          <div class="vine vine-2">
            <div class="vine-stem stem-2"></div>
            <div class="tendril tendril-2a"></div>
            <div class="tendril tendril-2b"></div>
            <div class="tendril tendril-2c"></div>
            <div class="leaf ivy-leaf l2a"></div>
            <div class="leaf ivy-leaf l2b"></div>
            <div class="leaf ivy-leaf l2c"></div>
            <div class="leaf ivy-leaf l2d"></div>
          </div>

          <div class="vine vine-3">
            <div class="vine-stem stem-3"></div>
            <div class="tendril tendril-3a"></div>
            <div class="tendril tendril-3b"></div>
            <div class="leaf ivy-leaf l3a"></div>
            <div class="leaf ivy-leaf l3b"></div>
            <div class="leaf ivy-leaf l3c"></div>
          </div>

          <div class="vine vine-4">
            <div class="vine-stem stem-4"></div>
            <div class="tendril tendril-4a"></div>
            <div class="tendril tendril-4b"></div>
            <div class="leaf ivy-leaf l4a"></div>
            <div class="leaf ivy-leaf l4b"></div>
          </div>

          <div class="vine vine-5">
            <div class="vine-stem stem-5"></div>
            <div class="tendril tendril-5a"></div>
            <div class="leaf ivy-leaf l5a"></div>
            <div class="leaf ivy-leaf l5b"></div>
          </div>
        </div>

        <!-- Growth glow -->
        <div class="growth-glow"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Growth Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Vine Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset Growth</button>
    </div>
  </div>

  <script>
    (function() {
      const ivyBase = document.querySelector('.ivy-base');
      const vines = document.querySelectorAll('.vine');
      const stems = document.querySelectorAll('.vine-stem');
      const tendrils = document.querySelectorAll('.tendril');
      const leaves = document.querySelectorAll('.ivy-leaf');
      const growthGlow = document.querySelector('.growth-glow');

      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        // Vines grow with staggered timing
        vines.forEach((vine, i) => {
          const baseDelay = i * 0.3;
          const duration = 1.5 / speedMultiplier;
          vine.style.setProperty('--vine-duration', duration + 's');
          vine.style.setProperty('--vine-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Stems
        stems.forEach((stem, i) => {
          const baseDelay = Math.floor(i / 2) * 0.3 + 0.1;
          const duration = 1.8 / speedMultiplier;
          stem.style.setProperty('--stem-duration', duration + 's');
          stem.style.setProperty('--stem-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Tendrils curl with vine growth
        tendrils.forEach((tendril, i) => {
          const baseDelay = 0.3 + (i % 3) * 0.15;
          const duration = 0.8 / speedMultiplier;
          tendril.style.setProperty('--tendril-duration', duration + 's');
          tendril.style.setProperty('--tendril-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Leaves appear as vines grow
        leaves.forEach((leaf, i) => {
          const baseDelay = 0.5 + (i % 4) * 0.12;
          const duration = 0.6 / speedMultiplier;
          leaf.style.setProperty('--leaf-duration', duration + 's');
          leaf.style.setProperty('--leaf-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Growth glow
        growthGlow.style.setProperty('--glow-duration', (2.5 / speedMultiplier) + 's');
      }

      // ----- Apply density -----
      function applyDensity() {
        // Scale leaf sizes
        leaves.forEach((leaf) => {
          const baseSize = 12;
          const size = baseSize * densityMultiplier * 0.7;
          leaf.style.setProperty('--leaf-size', size + 'px');
          leaf.style.setProperty('--leaf-opacity', Math.min(0.6 * densityMultiplier, 1));
        });

        // Adjust tendril thickness
        tendrils.forEach((tendril) => {
          const thickness = 1.5 * densityMultiplier;
          tendril.style.setProperty('--tendril-thickness', thickness + 'px');
        });

        // Vine stem thickness
        stems.forEach((stem) => {
          const thickness = 2 * densityMultiplier;
          stem.style.setProperty('--stem-thickness', thickness + 'px');
        });
      }

      // ----- Update growth progress -----
      function updateGrowth(deltaTime) {
        if (isPaused) return;

        const speed = 0.015 * speedMultiplier;
        progress += deltaTime * speed * 0.5;

        if (progress > 1) {
          progress = 1;
        }

        // Apply growth to each vine via transform scale
        vines.forEach((vine, i) => {
          const vineProgress = Math.max(0, Math.min(1, (progress - i * 0.08) * 2.5));
          const scale = vineProgress;
          vine.style.setProperty('--vine-scale', scale);
          vine.style.transform = `scaleY(${scale})`;
          vine.style.opacity = scale > 0.05 ? 1 : 0;
        });

        // Stems grow
        stems.forEach((stem, i) => {
          const stemProgress = Math.max(0, Math.min(1, (progress - 0.05 - Math.floor(i / 2) * 0.08) * 2.8));
          stem.style.setProperty('--stem-scale', stemProgress);
          stem.style.transform = `scaleY(${stemProgress})`;
        });

        // Tendrils curl
        tendrils.forEach((tendril, i) => {
          const tendrilProgress = Math.max(0, Math.min(1, (progress - 0.15 - (i % 3) * 0.05) * 3));
          tendril.style.setProperty('--tendril-scale', tendrilProgress);
          tendril.style.opacity = tendrilProgress > 0.1 ? 1 : 0;
        });

        // Leaves appear
        leaves.forEach((leaf, i) => {
          const leafProgress = Math.max(0, Math.min(1, (progress - 0.2 - (i % 4) * 0.04) * 3.5));
          leaf.style.setProperty('--leaf-scale', leafProgress);
          leaf.style.opacity = leafProgress > 0.05 ? 1 : 0;
          leaf.style.transform = `scale(${0.3 + leafProgress * 0.7}) rotate(${leafProgress * 20}deg)`;
        });

        // Growth glow intensity
        const glowIntensity = 0.15 + progress * 0.35;
        growthGlow.style.opacity = glowIntensity;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGrowth(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetGrowth() {
        progress = 0;
        vines.forEach(vine => {
          vine.style.transform = 'scaleY(0)';
          vine.style.opacity = '0';
        });
        stems.forEach(stem => {
          stem.style.transform = 'scaleY(0)';
        });
        tendrils.forEach(tendril => {
          tendril.style.opacity = '0';
        });
        leaves.forEach(leaf => {
          leaf.style.opacity = '0';
          leaf.style.transform = 'scale(0) rotate(0deg)';
        });
        growthGlow.style.opacity = '0.05';

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        setTimeout(() => {
          progress = 0.01;
        }, 300);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Set initial state
        progress = 0;

        // Hide everything initially
        vines.forEach(vine => {
          vine.style.transform = 'scaleY(0)';
          vine.style.opacity = '0';
        });
        stems.forEach(stem => {
          stem.style.transform = 'scaleY(0)';
        });
        tendrils.forEach(tendril => {
          tendril.style.opacity = '0';
        });
        leaves.forEach(leaf => {
          leaf.style.opacity = '0';
          leaf.style.transform = 'scale(0) rotate(0deg)';
        });
        growthGlow.style.opacity = '0.05';

        applySpeed();
        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start growth after a short delay
        setTimeout(() => {
          progress = 0.01;
        }, 500);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetGrowth);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
