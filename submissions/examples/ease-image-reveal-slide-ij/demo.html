<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Image Reveal Slide</title>
</head>
<body>
  <div class="container">
    <div class="reveal-image" id="revealImg">
      <img src="https://picsum.photos/seed/ease/400/300" alt="Sample">
    </div>
    <button class="toggle" id="toggleReveal">Toggle Reveal</button>
  </div>
  <script>
    const el = document.querySelector('.reveal-image');
    document.getElementById('toggleReveal').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--reveal').trim() || '0';
      el.style.setProperty('--reveal', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
