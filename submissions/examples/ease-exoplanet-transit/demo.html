<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exoplanet Transit – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🪐 Exoplanet Transit</h1>
    <p class="subtitle">Planet crossing in front of star</p>

    <div class="et-container">
      <div class="et-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>

        <!-- Star -->
        <div class="star-system">
          <div class="star-core"></div>
          <div class="star-glow"></div>
          <div class="star-rays">
            <div class="ray r1"></div>
            <div class="ray r2"></div>
            <div class="ray r3"></div>
            <div class="ray r4"></div>
            <div class="ray r5"></div>
            <div class="ray r6"></div>
            <div class="ray r7"></div>
            <div class="ray r8"></div>
          </div>
          <div class="star-pulse"></div>

          <!-- Exoplanet -->
          <div class="planet">
            <div class="planet-body"></div>
            <div class="planet-atmosphere"></div>
            <div class="planet-shadow"></div>
            <!-- Planet orbit ring -->
            <div class="orbit-ring"></div>
          </div>

          <!-- Transit light curve indicator -->
          <div class="light-curve">
            <div class="curve-line"></div>
            <div class="curve-dot"></div>
          </div>
        </div>

        <!-- Transit glow -->
        <div class="transit-glow"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Orbital Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Planet Size
        <input type="range" id="sizeControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const planet = document.querySelector('.planet');
      const planetBody = document.querySelector('.planet-body');
      const planetAtmosphere = document.querySelector('.planet-atmosphere');
      const planetShadow = document.querySelector('.planet-shadow');
      const orbitRing = document.querySelector('.orbit-ring');
      const starCore = document.querySelector('.star-core');
      const starGlow = document.querySelector('.star-glow');
      const starPulse = document.querySelector('.star-pulse');
      const transitGlow = document.querySelector('.transit-glow');
      const lightCurve = document.querySelector('.light-curve');
      const curveDot = document.querySelector('.curve-dot');
      const rays = document.querySelectorAll('.ray');

      const speedInput = document.getElementById('speedControl');
      const sizeInput = document.getElementById('sizeControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let sizeMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let transitProgress = 0;

      // ----- Apply speed -----
      function applySpeed() {
        const baseDuration = 8 / speedMultiplier;

        // Planet orbit
        planet.style.setProperty('--orbit-duration', baseDuration + 's');

        // Star pulse
        starPulse.style.setProperty('--pulse-duration', (2 / speedMultiplier) + 's');

        // Star rays
        rays.forEach((ray, i) => {
          const duration = (3 + i * 0.3) / speedMultiplier;
          ray.style.setProperty('--ray-duration', duration + 's');
        });

        // Transit glow
        transitGlow.style.setProperty('--transit-duration', (1.5 / speedMultiplier) + 's');

        // Light curve dot
        curveDot.style.setProperty('--curve-duration', baseDuration + 's');
      }

      // ----- Apply size -----
      function applySize() {
        const planetSize = 30 * sizeMultiplier;
        planetBody.style.setProperty('--planet-size', planetSize + 'px');
        planetAtmosphere.style.setProperty('--atmosphere-size', (planetSize * 1.4) + 'px');
        planetShadow.style.setProperty('--shadow-size', (planetSize * 1.6) + 'px');

        // Orbit ring size
        const ringSize = 180 * sizeMultiplier;
        orbitRing.style.setProperty('--ring-size', ringSize + 'px');

        // Star size adjustment
        const starSize = 120 * (0.8 + sizeMultiplier * 0.1);
        starCore.style.setProperty('--star-size', starSize + 'px');
      }

      // ----- Update transit progress -----
      function updateTransit(timestamp) {
        if (isPaused) return;

        const speed = 0.005 * speedMultiplier;
        transitProgress += speed;

        if (transitProgress > 1) {
          transitProgress = 0;
        }

        // Update light curve dot position
        const curveX = 20 + transitProgress * 160;
        curveDot.style.left = curveX + 'px';

        // Transit glow intensity
        const glowIntensity = 0.1 + Math.sin(transitProgress * Math.PI * 2) * 0.2 + 0.2;
        transitGlow.style.opacity = glowIntensity;

        // Star dimming during transit
        const dimming = 1 - Math.sin(transitProgress * Math.PI) * 0.15;
        starCore.style.setProperty('--star-brightness', dimming);
        starGlow.style.setProperty('--glow-brightness', dimming);
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateTransit(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetTransit() {
        transitProgress = 0;
        curveDot.style.left = '20px';
        transitGlow.style.opacity = '0.1';
        starCore.style.setProperty('--star-brightness', 1);
        starGlow.style.setProperty('--glow-brightness', 1);

        // Reset planet position
        planet.style.animation = 'none';
        void planet.offsetWidth;
        planet.style.animation = '';

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        setTimeout(() => {
          transitProgress = 0.01;
        }, 300);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update size -----
      function updateSize(value) {
        sizeMultiplier = parseFloat(value);
        applySize();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applySize();

        // Set initial state
        curveDot.style.left = '20px';
        transitGlow.style.opacity = '0.1';
        starCore.style.setProperty('--star-brightness', 1);
        starGlow.style.setProperty('--glow-brightness', 1);

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      sizeInput.addEventListener('input', function() {
        updateSize(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetTransit);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
