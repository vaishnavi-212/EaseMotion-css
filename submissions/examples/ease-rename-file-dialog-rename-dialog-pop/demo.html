<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System File Management Dialog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="workspace-canvas">
    <!-- Pure CSS Toggle Switch managing modal pop windows -->
    <input type="checkbox" id="rename-dialog-toggle" class="hidden-modal-checkbox">
    
    <!-- Outer Launch Surface Button -->
    <label for="rename-dialog-toggle" class="open-dialog-trigger" tabindex="0" role="button">
      📄 Rename Selected Asset
    </label>

    <!-- Overlay Backdrop Mask layer -->
    <div class="dialog-overlay-backdrop">
      
      <!-- Elastic Scaling Modal Box Container -->
      <div class="rename-dialog-modal" role="dialog" aria-labelledby="dialog-title">
        <div class="dialog-header">
          <h3 id="dialog-title">Rename File Node</h3>
          <label for="rename-dialog-toggle" class="close-icon-cross" aria-label="Close dialog">×</label>
        </div>

        <div class="dialog-body">
          <p class="body-context-alert">Specify a unique alphanumeric tracking path identity label:</p>
          <div class="input-container-row">
            <input type="text" class="file-rename-input" value="aura_lens_model_v1" placeholder="Enter file name...">
            <span class="file-extension-tag">.py</span>
          </div>
        </div>

        <div class="dialog-footer-actions">
          <label for="rename-dialog-toggle" class="action-btn cancel-trigger">Cancel</label>
          <label for="rename-dialog-toggle" class="action-btn confirm-trigger">Save Changes</label>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Accessibility layout mapper binding key signals onto checkbox controls
    const triggerBtn = document.querySelector('.open-dialog-trigger');
    triggerBtn.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('rename-dialog-toggle').click();
      }
    });
  </script>
</body>
</html>
