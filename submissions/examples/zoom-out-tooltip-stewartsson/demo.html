<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Showcase - Zoom-Out Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-viewport">
        <!-- Main Premium SaaS Showcase Card Elevation Container Hub Shell -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="neon-matrix-badge">SHOWCASE CORE v7</div>
                <h2 class="control-title">Cluster Provisioning</h2>
                <p class="control-subtitle">Hover over or interact with the secure info target trigger below to reveal the pure-CSS inverse zoom-out tooltip overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">⚡</span>
                        <span class="btn-text">Open Context Terminal</span>
                    </button>

                    <!-- Floating Tooltip Inverse Zoom-Out Overlay Menu Shell Box -->
                    <div class="zoom-out-tooltip ease-zoom-out-fly">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Node Status: Operational</span>
                            <span class="tooltip-meta">Exposed Core Variables Active</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
