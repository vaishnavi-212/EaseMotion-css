<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Countdown Flip Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="flip-clock">

    <div class="time-box">
        <div class="digit">12</div>
        <span>Hours</span>
    </div>

    <div class="separator">:</div>

    <div class="time-box">
        <div class="digit">34</div>
        <span>Minutes</span>
    </div>

    <div class="separator">:</div>

    <div class="time-box">
        <div class="digit">56</div>
        <span>Seconds</span>
    </div>

</div>

</body>
</html>
