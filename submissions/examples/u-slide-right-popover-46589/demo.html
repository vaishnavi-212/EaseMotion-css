<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Cyberpunk Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Neon Panel
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    ⚡
                </div>

                <div>
                    <h2>Cyber Control</h2>
                    <p>Neon Interface Online</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Power</h3>
                    <span>99%</span>
                </div>

                <div class="card">
                    <h3>Nodes</h3>
                    <span>512</span>
                </div>

                <div class="card">
                    <h3>Status</h3>
                    <span>Secure</span>
                </div>

            </div>

            <button class="action">
                Launch System
            </button>

        </div>

    </div>

</div>

</body>
</html>
