<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Task Kanban Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kanban-board">

    <div class="kanban-column">
        <h2>To Do</h2>

        <div class="ease-task-card todo">
            <span class="priority high">High</span>
            <h3>Design Landing Page</h3>
            <p>Create responsive hero section.</p>

            <div class="footer">
                <span>📅 Jul 20</span>
                <span>👤 Alex</span>
            </div>
        </div>
    </div>

    <div class="kanban-column">
        <h2>In Progress</h2>

        <div class="ease-task-card progress">
            <span class="priority medium">Medium</span>
            <h3>Authentication UI</h3>
            <p>Build login & signup screens.</p>

            <div class="footer">
                <span>📅 Jul 21</span>
                <span>👤 Emma</span>
            </div>
        </div>
    </div>

    <div class="kanban-column">
        <h2>Done</h2>

        <div class="ease-task-card done">
            <span class="priority low">Done</span>
            <h3>Navbar Component</h3>
            <p>Responsive navigation completed.</p>

            <div class="footer">
                <span>✔ Completed</span>
                <span>👤 John</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
