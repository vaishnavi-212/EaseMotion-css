<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Swing-Hover Popover - Minimalist Tech</title>
    <!-- Import EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="demo-layout">
    <div class="demo-container">
        <h1 class="demo-title">Minimalist Tech Popover</h1>
        
        <!-- Swing-Hover Popover Component -->
        <div class="ease-popover-wrapper">
            <button class="ease-popover-trigger" aria-haspopup="dialog">
                Hover or Focus
            </button>
            <div class="ease-popover-content" role="dialog" aria-label="Tech Info">
                <div class="ease-popover-header">
                    <h3>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        System Status
                    </h3>
                </div>
                <div class="ease-popover-body">
                    <p>All core systems are functioning at optimal capacity. No anomalies detected in the mainframe parameters.</p>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
