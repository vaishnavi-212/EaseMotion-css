<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Sweep Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-card">

  <img 
    src="https://via.placeholder.com/220"
    alt="Product"
  >

  <h2>Smart Watch</h2>

  <div class="tooltip-wrapper">

    <button class="product-btn">
      View Details
    </button>

    <div class="tooltip">
      Premium smartwatch with advanced features
    </div>

  </div>

</div>

</body>
</html>
