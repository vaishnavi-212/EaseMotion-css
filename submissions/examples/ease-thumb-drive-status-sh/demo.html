<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Thumb Drive Status</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-thumb-wrapper">
    <div class="ease-thumb-card">
      <div class="ease-thumb-icon" id="thumbIcon">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="7" y="2" width="10" height="6" rx="1"></rect>
          <path d="M8 8 L8 20 Q8 22 10 22 L14 22 Q16 22 16 20 L16 8"></path>
          <circle cx="12" cy="15" r="2"></circle>
        </svg>
        <span class="ease-thumb-pulse-ring"></span>
      </div>
      <h2 class="ease-thumb-status-text" id="statusText">Disconnected</h2>
      <p class="ease-thumb-sub-text" id="subText">Insert a USB drive to begin</p>
      <button class="ease-thumb-btn" id="actionBtn">Connect Drive</button>
    </div>
  </div>
  <script>
    let state = 0; // 0 disconnected, 1 connected, 2 transferring, 3 safe-to-eject
    const icon = document.getElementById('thumbIcon');
    const statusText = document.getElementById('statusText');
    const subText = document.getElementById('subText');
    const btn = document.getElementById('actionBtn');

    const states = [
      { label: 'Disconnected', sub: 'Insert a USB drive to begin', btn: 'Connect Drive', cls: '' },
      { label: 'Connected', sub: 'Drive ready', btn: 'Start Transfer', cls: 'ease-thumb-connected' },
      { label: 'Transferring…', sub: 'Do not remove the drive', btn: 'Finish Transfer', cls: 'ease-thumb-transferring' },
      { label: 'Safe to Eject', sub: 'You may remove the drive now', btn: 'Disconnect', cls: 'ease-thumb-safe' }
    ];

    function render() {
      const s = states[state];
      statusText.textContent = s.label;
      subText.textContent = s.sub;
      btn.textContent = s.btn;
      icon.className = 'ease-thumb-icon ' + s.cls;
    }

    btn.addEventListener('click', () => {
      state = (state + 1) % states.length;
      render();
    });

    render();
  </script>
</body>
</html>
