<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Glassmorphism UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Glass Panel
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    ✨
                </div>

                <div>

                    <h2>Glass Workspace</h2>

                    <p>Elegant Frosted Interface</p>

                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Documents</h3>
                    <span>84</span>
                </div>

                <div class="card">
                    <h3>Storage</h3>
                    <span>68%</span>
                </div>

                <div class="card">
                    <h3>Sync</h3>
                    <span>Active</span>
                </div>

            </div>

            <button class="action">
                Continue
            </button>

        </div>

    </div>

</div>

</body>
</html>
