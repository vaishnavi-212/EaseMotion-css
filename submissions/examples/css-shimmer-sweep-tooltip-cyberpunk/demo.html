<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shimmer Sweep Tooltip - Cyberpunk Neon</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cyber-viewport">
        <div class="terminal-container">
            <div class="terminal-header">
                <span class="system-tag">CORE_PROCESSOR_MAIN</span>
                <span class="system-load">CRITICAL_89%</span>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-glow-text">OVERCLOCK_NODE</span>
                        <svg class="terminal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                    </button>
                    
                    <div class="shimmer-sweep-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-neon">SYS_WARNING</span>
                                <p class="alert-title">Thermal Ceiling Reached</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="alert-desc">Core parameters exceeding reference boundaries. Engaging secondary coolant grids to damp structural heat accumulation paths.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
