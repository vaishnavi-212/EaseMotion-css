<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subway Map – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🚇 Subway Map</h1>
    <p class="subtitle">Animated subway line connections</p>

    <div class="sm-container">
      <div class="sm-scene">
        <!-- Background -->
        <div class="bg-grid"></div>

        <!-- Subway Map -->
        <svg class="subway-map" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet">
          <!-- Subway lines -->
          <!-- Line 1 - Red (horizontal) -->
          <path class="subway-line line-red" d="M 50 200 L 550 200" />
          <!-- Line 2 - Blue (vertical) -->
          <path class="subway-line line-blue" d="M 300 50 L 300 350" />
          <!-- Line 3 - Green (diagonal) -->
          <path class="subway-line line-green" d="M 100 100 L 500 300" />
          <!-- Line 4 - Orange (curved) -->
          <path class="subway-line line-orange" d="M 80 300 Q 200 100, 400 120 Q 500 130, 520 250" />
          <!-- Line 5 - Purple (circular) -->
          <path class="subway-line line-purple" d="M 200 150 C 350 80, 500 150, 450 280 C 400 350, 250 350, 180 250 C 120 180, 150 180, 200 150" />
          <!-- Line 6 - Yellow (branch) -->
          <path class="subway-line line-yellow" d="M 150 200 L 80 120 L 50 60" />

          <!-- Stations -->
          <!-- Red line stations -->
          <circle class="station s1" cx="50" cy="200" r="6" />
          <circle class="station s2" cx="150" cy="200" r="6" />
          <circle class="station s3" cx="250" cy="200" r="6" />
          <circle class="station s4" cx="350" cy="200" r="6" />
          <circle class="station s5" cx="450" cy="200" r="6" />
          <circle class="station s6" cx="550" cy="200" r="6" />

          <!-- Blue line stations -->
          <circle class="station s7" cx="300" cy="50" r="6" />
          <circle class="station s8" cx="300" cy="120" r="6" />
          <circle class="station s9" cx="300" cy="180" r="6" />
          <circle class="station s10" cx="300" cy="250" r="6" />
          <circle class="station s11" cx="300" cy="300" r="6" />
          <circle class="station s12" cx="300" cy="350" r="6" />

          <!-- Green line stations -->
          <circle class="station s13" cx="100" cy="100" r="6" />
          <circle class="station s14" cx="200" cy="150" r="6" />
          <circle class="station s15" cx="300" cy="200" r="6" />
          <circle class="station s16" cx="400" cy="250" r="6" />
          <circle class="station s17" cx="500" cy="300" r="6" />

          <!-- Orange line stations -->
          <circle class="station s18" cx="80" cy="300" r="6" />
          <circle class="station s19" cx="150" cy="180" r="6" />
          <circle class="station s20" cx="250" cy="130" r="6" />
          <circle class="station s21" cx="350" cy="120" r="6" />
          <circle class="station s22" cx="450" cy="150" r="6" />
          <circle class="station s23" cx="520" cy="250" r="6" />

          <!-- Purple line stations -->
          <circle class="station s24" cx="200" cy="150" r="6" />
          <circle class="station s25" cx="280" cy="120" r="6" />
          <circle class="station s26" cx="350" cy="120" r="6" />
          <circle class="station s27" cx="420" cy="160" r="6" />
          <circle class="station s28" cx="450" cy="250" r="6" />
          <circle class="station s29" cx="380" cy="320" r="6" />
          <circle class="station s30" cx="280" cy="320" r="6" />
          <circle class="station s31" cx="200" cy="280" r="6" />
          <circle class="station s32" cx="180" cy="220" r="6" />

          <!-- Yellow line stations -->
          <circle class="station s33" cx="150" cy="200" r="6" />
          <circle class="station s34" cx="80" cy="120" r="6" />
          <circle class="station s35" cx="50" cy="60" r="6" />

          <!-- Transfer stations (larger) -->
          <circle class="station transfer t1" cx="300" cy="200" r="9" />
          <circle class="station transfer t2" cx="150" cy="200" r="9" />
          <circle class="station transfer t3" cx="350" cy="120" r="9" />
          <circle class="station transfer t4" cx="200" cy="150" r="9" />
          <circle class="station transfer t5" cx="450" cy="250" r="9" />

          <!-- Station labels -->
          <text class="station-label" x="50" y="215">A</text>
          <text class="station-label" x="150" y="215">B</text>
          <text class="station-label" x="250" y="215">C</text>
          <text class="station-label" x="350" y="215">D</text>
          <text class="station-label" x="450" y="215">E</text>
          <text class="station-label" x="550" y="215">F</text>

          <text class="station-label" x="305" y="45">G</text>
          <text class="station-label" x="305" y="115">H</text>
          <text class="station-label" x="305" y="175">I</text>
          <text class="station-label" x="305" y="245">J</text>
          <text class="station-label" x="305" y="295">K</text>
          <text class="station-label" x="305" y="345">L</text>

          <text class="station-label" x="105" y="95">M</text>
          <text class="station-label" x="205" y="145">N</text>
          <text class="station-label" x="305" y="195">O</text>
          <text class="station-label" x="405" y="245">P</text>
          <text class="station-label" x="505" y="295">Q</text>

          <text class="station-label" x="85" y="295">R</text>
          <text class="station-label" x="155" y="175">S</text>
          <text class="station-label" x="255" y="125">T</text>
          <text class="station-label" x="355" y="115">U</text>
          <text class="station-label" x="455" y="145">V</text>
          <text class="station-label" x="525" y="245">W</text>

          <text class="station-label" x="205" y="145">X</text>
          <text class="station-label" x="285" y="115">Y</text>
          <text class="station-label" x="355" y="115">Z</text>
          <text class="station-label" x="425" y="155">AA</text>
          <text class="station-label" x="455" y="245">AB</text>
          <text class="station-label" x="385" y="315">AC</text>
          <text class="station-label" x="285" y="315">AD</text>
          <text class="station-label" x="205" y="275">AE</text>
          <text class="station-label" x="185" y="215">AF</text>

          <text class="station-label" x="155" y="195">AG</text>
          <text class="station-label" x="85" y="115">AH</text>
          <text class="station-label" x="55" y="55">AI</text>

          <!-- Transfer labels -->
          <text class="station-label transfer-label" x="305" y="195">●</text>
          <text class="station-label transfer-label" x="155" y="195">●</text>
          <text class="station-label transfer-label" x="355" y="115">●</text>
          <text class="station-label transfer-label" x="205" y="145">●</text>
          <text class="station-label transfer-label" x="455" y="245">●</text>

          <!-- Train animation -->
          <circle class="train train-red" r="5">
            <animateMotion dur="6s" repeatCount="indefinite">
              <mpath href="#line-red-path" />
            </animateMotion>
          </circle>
          <circle class="train train-blue" r="5">
            <animateMotion dur="8s" repeatCount="indefinite">
              <mpath href="#line-blue-path" />
            </animateMotion>
          </circle>
          <circle class="train train-green" r="5">
            <animateMotion dur="10s" repeatCount="indefinite">
              <mpath href="#line-green-path" />
            </animateMotion>
          </circle>
          <circle class="train train-orange" r="5">
            <animateMotion dur="12s" repeatCount="indefinite">
              <mpath href="#line-orange-path" />
            </animateMotion>
          </circle>
          <circle class="train train-purple" r="5">
            <animateMotion dur="14s" repeatCount="indefinite">
              <mpath href="#line-purple-path" />
            </animateMotion>
          </circle>
          <circle class="train train-yellow" r="5">
            <animateMotion dur="7s" repeatCount="indefinite">
              <mpath href="#line-yellow-path" />
            </animateMotion>
          </circle>

          <!-- Hidden path definitions for trains -->
          <defs>
            <path id="line-red-path" d="M 50 200 L 550 200" />
            <path id="line-blue-path" d="M 300 50 L 300 350" />
            <path id="line-green-path" d="M 100 100 L 500 300" />
            <path id="line-orange-path" d="M 80 300 Q 200 100, 400 120 Q 500 130, 520 250" />
            <path id="line-purple-path" d="M 200 150 C 350 80, 500 150, 450 280 C 400 350, 250 350, 180 250 C 120 180, 150 180, 200 150" />
            <path id="line-yellow-path" d="M 150 200 L 80 120 L 50 60" />
          </defs>
        </svg>

        <!-- Line legend -->
        <div class="legend">
          <div class="legend-item"><span class="legend-color red"></span> Red Line</div>
          <div class="legend-item"><span class="legend-color blue"></span> Blue Line</div>
          <div class="legend-item"><span class="legend-color green"></span> Green Line</div>
          <div class="legend-item"><span class="legend-color orange"></span> Orange Line</div>
          <div class="legend-item"><span class="legend-color purple"></span> Purple Line</div>
          <div class="legend-item"><span class="legend-color yellow"></span> Yellow Line</div>
          <div class="legend-item"><span class="legend-color transfer"></span> Transfer Station</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Train Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const trains = document.querySelectorAll('.train');
      const subwayLines = document.querySelectorAll('.subway-line');
      const stations = document.querySelectorAll('.station');
      const transferStations = document.querySelectorAll('.transfer');
      const speedInput = document.getElementById('speedControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        trains.forEach((train) => {
          const motion = train.querySelector('animateMotion');
          if (motion) {
            const baseDur = parseFloat(motion.getAttribute('dur')) || 6;
            const newDur = baseDur / speedMultiplier;
            motion.setAttribute('dur', newDur + 's');
          }
        });
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;

        // Pause/resume SVG animations
        const svg = document.querySelector('.subway-map');
        if (isPaused) {
          svg.pauseAnimations();
          pauseBtn.textContent = '▶️ Play';
        } else {
          svg.unpauseAnimations();
          pauseBtn.textContent = '⏸️ Pause';
        }
      }

      // ----- Reset -----
      function resetMap() {
        if (isPaused) {
          togglePause();
        }

        // Reset train positions by restarting animations
        const svg = document.querySelector('.subway-map');
        svg.setCurrentTime(0);

        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        applySpeed();

        // Start animation loop for any additional effects
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle station pulse
        stations.forEach((station, i) => {
          const pulse = Math.sin(timestamp / 2000 + i * 0.3) * 0.1 + 0.9;
          const r = parseFloat(station.getAttribute('r')) || 6;
          station.setAttribute('r', r * pulse);
        });

        // Transfer stations pulse differently
        transferStations.forEach((station, i) => {
          const pulse = Math.sin(timestamp / 1500 + i * 0.5) * 0.15 + 0.85;
          const r = parseFloat(station.getAttribute('r')) || 9;
          station.setAttribute('r', r * pulse);
        });

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetMap);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
