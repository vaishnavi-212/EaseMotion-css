<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Pulse Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h2>EaseMotion Table Pulse</h2>
    <p>Hover over the rows to see the pulse animation. Notice the highlighted row and the live status badge.</p>
    
    <table class="demo-table table-hover-pulse">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>#1001</td>
          <td>John Doe</td>
          <td><span class="status-badge status-live">Live</span></td>
          <td>Edit</td>
        </tr>
        <tr class="table-row-selected">
          <td>#1002</td>
          <td>Jane Smith (Selected)</td>
          <td><span class="status-badge" style="background-color: #6c757d; color: white;">Offline</span></td>
          <td>Edit</td>
        </tr>
        <tr>
          <td>#1003</td>
          <td>Alex Johnson</td>
          <td><span class="status-badge" style="background-color: #ffc107; color: black;">Idle</span></td>
          <td>Edit</td>
        </tr>
      </tbody>
    </table>

    <h3 style="margin-top: 40px;">Loading State (Skeletons)</h3>
    <table class="demo-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="ease-pulse-skeleton skeleton-text"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text skeleton-short"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text skeleton-short"></span></td>
        </tr>
        <tr>
          <td><span class="ease-pulse-skeleton skeleton-text"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text skeleton-short"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text"></span></td>
          <td><span class="ease-pulse-skeleton skeleton-text skeleton-short"></span></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
