<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Popover - Dashboard Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Analytics Summary
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">📊</div>

                <div>
                    <h2>Performance Report</h2>
                    <p>Last 30 Days</p>
                </div>

            </div>

            <div class="metrics">

                <div class="metric">
                    <h3>Revenue</h3>
                    <span>$48K</span>
                </div>

                <div class="metric">
                    <h3>Visitors</h3>
                    <span>126K</span>
                </div>

                <div class="metric">
                    <h3>Growth</h3>
                    <span>+18%</span>
                </div>

            </div>

            <button class="action">
                View Full Report
            </button>

        </div>

    </div>

</div>

</body>
</html>
