<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Pulse Shadow Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>EaseMotion Pulse-Shadow Examples</h1>

    <div class="examples-container">
        
        <!-- Example 1: Notification Bell -->
        <div class="example-box">
            <button class="notification-bell" aria-label="Notifications">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                </svg>
                <!-- The pulse shadow is applied to the indicator dot -->
                <span class="notification-indicator ease-pulse-shadow"></span>
            </button>
            <p>Notification Indicator</p>
        </div>

        <!-- Example 2: Primary CTA Button -->
        <div class="example-box">
            <!-- The pulse shadow is applied directly to the button -->
            <button class="cta-button ease-pulse-shadow">
                Start Free Trial
            </button>
            <p>Primary CTA Button</p>
        </div>

        <!-- Example 3: Live Status Indicator -->
        <div class="example-box">
            <div class="status-indicator">
                <!-- The pulse shadow is applied to the status dot -->
                <div class="status-dot ease-pulse-shadow"></div>
                <span>System Operational</span>
            </div>
            <p>Live Status Indicator</p>
        </div>

    </div>

</body>
</html>
