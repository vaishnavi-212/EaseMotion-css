<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Zoom-Out Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Launch Console
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">⚡</div>

                <div>
                    <h2>Neon Console</h2>
                    <p>System Online</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Energy</h3>
                    <span>98%</span>
                </div>

                <div class="card">
                    <h3>Shield</h3>
                    <span>84%</span>
                </div>

                <div class="card">
                    <h3>Signal</h3>
                    <span>Strong</span>
                </div>

            </div>

            <button class="action">
                Access Interface
            </button>

        </div>

    </div>

</div>

</body>
</html>
