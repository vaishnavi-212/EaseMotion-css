<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Elastic Gauge</title>

    

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="page">

        <section class="gauge-card ease-fade-up">

            <div class="neon-line"></div>

            <h1 class="title ease-slide-up">
                Elastic Gauge
            </h1>

            <div class="gauge">

                <!-- Gauge Arc -->
                <div class="gauge-ring">

                    <div class="gauge-fill"></div>

                    <div class="gauge-center">

                        <span class="value">
                            72%
                        </span>

                    </div>

                    <!-- Needle -->
                    <div class="needle ease-scale">

                        <span class="needle-head"></span>

                    </div>

                </div>

                <!-- Scale -->

                <div class="scale">

                    <span>0</span>
                    <span>20</span>
                    <span>40</span>
                    <span>60</span>
                    <span>80</span>
                    <span>100</span>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
