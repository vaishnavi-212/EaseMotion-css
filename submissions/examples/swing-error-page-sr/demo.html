<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Swing Error Page</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="error-page ease-fade-in">

    <div class="error-card ease-hover-lift">

        <div class="error-icon">

            <div class="error-circle">

                <h1>
                    404
                </h1>

            </div>

        </div>

        <div class="error-content">

            <span class="badge">
                Error
            </span>

            <h2>
                Page Not Found
            </h2>

            <p>
                Sorry, the page you are looking for doesn't exist or may have
                been moved. Please return to the homepage or contact support if
                the problem continues.
            </p>

            <div class="button-group">

                <a href="#"
                   class="primary-btn">

                    Go to Homepage

                </a>

                <a href="#"
                   class="secondary-btn">

                    Contact Support

                </a>

            </div>

        </div>

    </div>

</section>

</body>

</html>
