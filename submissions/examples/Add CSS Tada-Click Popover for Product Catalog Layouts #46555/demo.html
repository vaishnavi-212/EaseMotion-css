<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click Popover - Product Catalog</title>
    <!-- Import EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="demo-layout">
    <div class="demo-container">
        
        <header class="demo-header">
            <h1 class="demo-title">Latest Arrivals</h1>
            <p class="demo-subtitle">Explore our new collection of premium sneakers</p>
        </header>
        
        <div class="catalog-grid">
            <!-- Sample Product Card -->
            <div class="product-card">
                <div class="product-image-wrapper">
                    <!-- Placeholder for product image -->
                    <div class="product-image-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon">
                            <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path>
                        </svg>
                    </div>
                    <span class="product-badge">New</span>
                </div>
                
                <div class="product-info">
                    <h3 class="product-title">AeroGlide Runner</h3>
                    <div class="product-price">$129.99</div>
                </div>
                
                <div class="product-actions">
                    <!-- Tada-Click Popover Component -->
                    <div class="ease-popover-wrapper">
                        <!-- Hidden checkbox for Pure CSS click toggle -->
                        <input type="checkbox" id="product-options-toggle" class="ease-popover-checkbox" aria-hidden="true">
                        
                        <!-- The Label acts as the trigger -->
                        <label for="product-options-toggle" class="ease-popover-trigger" role="button" tabindex="0" aria-haspopup="dialog" aria-label="Select Options">
                            Select Options
                        </label>
                        
                        <!-- Popover Content -->
                        <div class="ease-popover-content" role="dialog">
                            <div class="ease-popover-header">
                                <h4>Choose Size</h4>
                            </div>
                            <div class="ease-popover-body">
                                <div class="size-selector">
                                    <label class="size-option"><input type="radio" name="size" value="7"><span>7</span></label>
                                    <label class="size-option"><input type="radio" name="size" value="8"><span>8</span></label>
                                    <label class="size-option"><input type="radio" name="size" value="9"><span>9</span></label>
                                    <label class="size-option"><input type="radio" name="size" value="10"><span>10</span></label>
                                    <label class="size-option"><input type="radio" name="size" value="11"><span>11</span></label>
                                </div>
                                <button class="add-to-cart-btn ease-squish-button">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                    <!-- End Popover Component -->
                </div>
            </div>
            
            <!-- Sample Product Card 2 (For visual balance) -->
            <div class="product-card">
                <div class="product-image-wrapper">
                    <div class="product-image-placeholder alt-bg">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon">
                            <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path>
                        </svg>
                    </div>
                </div>
                <div class="product-info">
                    <h3 class="product-title">Urban Strider</h3>
                    <div class="product-price">$95.00</div>
                </div>
                <div class="product-actions">
                     <button class="ease-popover-trigger static-btn">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
