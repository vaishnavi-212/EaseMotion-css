<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scale Hover Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">

    <input type="radio" id="home" name="tabs" checked>
    <input type="radio" id="projects" name="tabs">
    <input type="radio" id="contact" name="tabs">

    <div class="tab-buttons">
        <label for="home">Home</label>
        <label for="projects">Projects</label>
        <label for="contact">Contact</label>
    </div>

    <div class="tab-content">

        <div class="content home">
            <h2>Home</h2>
            <p>Welcome to the CSS Scale Hover Tabs component.</p>
        </div>

        <div class="content projects">
            <h2>Projects</h2>
            <p>Build beautiful portfolio layouts using smooth CSS animations.</p>
        </div>

        <div class="content contact">
            <h2>Contact</h2>
            <p>Let's collaborate on your next creative project.</p>
        </div>

    </div>

</div>

</body>
</html>
