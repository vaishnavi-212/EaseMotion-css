<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floating Orbit Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="popover-container" data-orbit-theme="blue">
    <button class="trigger-btn" aria-expanded="false">Product Catalog</button>
    <div class="popover-panel" role="tooltip">
        <div class="orbit-container">
            <div class="orbit-ring"></div>
            <div class="orbit-satellite"></div>
        </div>
        <p class="panel-text">Orbit-based insights enabled.</p>
    </div>
</div>

</body>
</html>
