<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ease-popover-vv — Neon Popover (Pure CSS)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="em-page" aria-label="EaseMotion examples">
    <section class="em-card" aria-label="Neon popover demo">
      <header class="em-header">
        <h1 class="em-title">Neon Popover</h1>
        <p class="em-subtitle">Pure CSS interaction • smooth scale + glow • zero JavaScript</p>
      </header>

      <div class="em-popover-demo">
        <!-- Popover root: no JS; animation is driven via :hover and :focus-within -->
        <div class="em-popover" data-popover>
          <button
            type="button"
            class="em-trigger"
            aria-describedby="em-popover-desc"
          >
            <span class="em-trigger__label">Neon Access</span>
            <span class="em-trigger__badge" aria-hidden="true">NEW</span>
          </button>

          <div class="em-popover__content" role="tooltip" id="em-popover-desc">
            <div class="em-popover__inner">
              <div class="em-popover__top">
                <h2 class="em-popover__title">Neon Access</h2>
                <span class="em-popover__smallbadge" aria-label="New feature">NEW</span>
              </div>

              <p class="em-popover__desc">
                Unlock premium interface effects with zero JavaScript animations.
              </p>

              <a class="em-cta" href="#" aria-label="Explore premium interface effects">
                <span class="em-cta__text">Explore</span>
                <span class="em-cta__arrow" aria-hidden="true">↗</span>
              </a>
            </div>

            <span class="em-popover__arrow" aria-hidden="true"></span>
          </div>
        </div>
      </div>

      <footer class="em-footer">
        <p>
          Try <kbd>Tab</kbd> to focus the button, then <kbd>Enter</kbd> / <kbd>Space</kbd>.
          The popover opens with <code>:focus-within</code>.
        </p>
      </footer>
    </section>
  </main>
</body>
</html>
