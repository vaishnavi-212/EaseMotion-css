<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Comparison Slider - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Before & After</h1>
    <div class="ics-compare" id="icsCompare" style="--ics-pos: 50;">
      <div class="ics-after" style="background: linear-gradient(135deg, #e94560, #f97316);">After</div>
      <div class="ics-before" style="background: linear-gradient(135deg, #8b5cf6, #3b82f6);">Before</div>
      <div class="ics-handle" id="icsHandle">&#x21C4;</div>
    </div>
  </div>
  <script>
    var compare = document.getElementById('icsCompare');
    var handle = document.getElementById('icsHandle');
    var dragging = false;

    handle.addEventListener('mousedown', function(e) { dragging = true; e.preventDefault(); });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var rect = compare.getBoundingClientRect();
      var pos = ((e.clientX - rect.left) / rect.width) * 100;
      pos = Math.max(5, Math.min(95, pos));
      compare.style.setProperty('--ics-pos', pos);
    });
    document.addEventListener('mouseup', function() { dragging = false; });
  </script>
</body>
</html>
