<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Roll Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Notifications
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    💡
                </div>

                <div>
                    <h2>Soft Dashboard</h2>
                    <p>Neumorphic Popover</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <span class="value">28</span>
                    <span class="label">Tasks</span>
                </div>

                <div class="card">
                    <span class="value">97%</span>
                    <span class="label">Progress</span>
                </div>

                <div class="card">
                    <span class="value">12</span>
                    <span class="label">Alerts</span>
                </div>

            </div>

            <button class="action">
                View Details
            </button>

        </div>

    </div>

</div>

</body>
</html>
