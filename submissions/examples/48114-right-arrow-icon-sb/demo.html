<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Right Arrow Icon Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Right arrow icon component demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Right Arrow Icon</h1>
        <p>A versatile right arrow icon with multiple animation variants for navigation and UI components.</p>
        
        <div class="icon-grid">
          <div class="icon-item">
            <button class="ease-arrow-btn ease-arrow-right-sb">
              <span class="ease-arrow-icon"></span>
            </button>
            <span class="icon-label">Default</span>
          </div>
          
          <div class="icon-item">
            <button class="ease-arrow-btn ease-arrow-right-bounce-sb">
              <span class="ease-arrow-icon"></span>
            </button>
            <span class="icon-label">Bounce</span>
          </div>
          
          <div class="icon-item">
            <button class="ease-arrow-btn ease-arrow-right-slide-sb">
              <span class="ease-arrow-icon"></span>
            </button>
            <span class="icon-label">Slide</span>
          </div>
          
          <div class="icon-item">
            <button class="ease-arrow-btn ease-arrow-right-grow-sb">
              <span class="ease-arrow-icon"></span>
            </button>
            <span class="icon-label">Grow</span>
          </div>
        </div>
        
        <div class="icon-sizes">
          <button class="ease-arrow-btn ease-arrow-right-sb ease-arrow-sm">
            <span class="ease-arrow-icon"></span>
          </button>
          <button class="ease-arrow-btn ease-arrow-right-sb ease-arrow-md">
            <span class="ease-arrow-icon"></span>
          </button>
          <button class="ease-arrow-btn ease-arrow-right-sb ease-arrow-lg">
            <span class="ease-arrow-icon"></span>
          </button>
        </div>
        
        <div class="nav-example">
          <a href="#" class="ease-nav-link-sb">
            View Products
            <span class="ease-arrow-inline-sb"></span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
