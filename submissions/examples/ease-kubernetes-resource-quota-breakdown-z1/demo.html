<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Kubernetes Resource Quota Breakdown</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Kubernetes Resource Quotas</h2>

<div class="quota healthy">
<div>
<h3>CPU Allocation</h3>
<p>48 of 64 cores allocated</p>
</div>
<span>75%</span>
</div>

<div class="quota active">
<div>
<h3>Memory Usage</h3>
<p>186 GB of 256 GB utilized</p>
</div>
<span>73%</span>
</div>

<div class="quota warning">
<div>
<h3>Persistent Volumes</h3>
<p>92 of 100 volumes claimed</p>
</div>
<span>92%</span>
</div>

<div class="quota critical">
<div>
<h3>Running Pods</h3>
<p>198 of 200 pod quota consumed</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
