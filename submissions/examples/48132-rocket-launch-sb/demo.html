<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket Launch Animation</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="launch-container" aria-label="Rocket Launch Animation">
      <div class="sky">
        <div class="stars"></div>
        <div class="clouds">
          <div class="cloud cloud-1"></div>
          <div class="cloud cloud-2"></div>
        </div>
        <div class="rocket-wrapper">
          <div class="rocket">
            <div class="rocket-body">
              <div class="window"></div>
            </div>
            <div class="fins">
              <div class="fin fin-left"></div>
              <div class="fin fin-right"></div>
            </div>
            <div class="flame">
              <div class="flame-inner"></div>
              <div class="flame-outer"></div>
            </div>
          </div>
          <div class="smoke-trail"></div>
        </div>
      </div>
      <div class="launch-platform">
        <div class="platform-base"></div>
        <div class="support-tower"></div>
      </div>
      <button class="launch-btn" type="button">
        <span class="btn-icon">🚀</span>
        <span class="btn-text">Launch!</span>
      </button>
      <div class="status-display">
        <div class="status-item">
          <span class="status-label">Status</span>
          <span class="status-value ready">Ready</span>
        </div>
        <div class="status-item">
          <span class="status-label">Altitude</span>
          <span class="status-value">0 km</span>
        </div>
        <div class="status-item">
          <span class="status-label">Velocity</span>
          <span class="status-value">0 m/s</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
