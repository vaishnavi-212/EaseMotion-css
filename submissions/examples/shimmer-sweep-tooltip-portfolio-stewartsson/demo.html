<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio - Shimmer Sweep Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="portfolio-viewport">
        <!-- Main Premium Portfolio Card Elevation Container Hub Shell -->
        <div class="showcase-card-node">
            <header class="showcase-header">
                <span class="portfolio-badge">Creative Studio // v7</span>
                <h3 class="showcase-title">Interactive Portfolio</h3>
                <p class="showcase-subtitle">Hover over or interact with the action trigger node below to reveal the pure-CSS linear shimmer sweep tooltip overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">🎨</span>
                        <span class="btn-text">Showcase Project Ingress</span>
                    </button>

                    <!-- Floating Tooltip Continuous Shimmer Sweep Overlay Shell Box -->
                    <div class="shimmer-sweep-tooltip ease-shimmer-sweep">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Project Type: 3D Spatial</span>
                            <span class="tooltip-meta">Hardware Accelerated</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="showcase-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Custom Properties Verified</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
