<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Rotate-Click Popover - Glassmorphism UI</title>
    <!-- Import EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="demo-layout">
    <!-- Abstract background shapes for Glassmorphism effect -->
    <div class="glass-bg-shape shape-1"></div>
    <div class="glass-bg-shape shape-2"></div>
    <div class="glass-bg-shape shape-3"></div>
    
    <div class="demo-container">
        
        <header class="demo-header">
            <h1 class="demo-title">Media Library</h1>
        </header>
        
        <div class="glass-grid">
            
            <!-- Media Item 1 -->
            <div class="media-card">
                <div class="media-image" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);"></div>
                <div class="media-info">
                    <span class="media-name">Project_Alpha_Asset.png</span>
                    
                    <!-- Rotate-Click Popover Component -->
                    <div class="ease-popover-wrapper">
                        <!-- Hidden Checkbox for Click Hack -->
                        <input type="checkbox" id="popover-toggle-1" class="ease-popover-toggle">
                        
                        <!-- Label acts as the clickable trigger -->
                        <label for="popover-toggle-1" class="ease-popover-trigger" aria-label="Media Options" tabindex="0">
                            <span class="trigger-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </span>
                        </label>
                        
                        <!-- Popover Content (triggers when checkbox is checked) -->
                        <div class="ease-popover-content" role="menu">
                            <ul class="action-menu">
                                <li class="action-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    Preview Image
                                </li>
                                <li class="action-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    Download High-Res
                                </li>
                                <li class="action-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                    Share Asset
                                </li>
                                <div class="menu-divider"></div>
                                <li class="action-item danger">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    Delete Permanently
                                </li>
                            </ul>
                        </div>
                    </div>
                    <!-- End Popover Component -->
                    
                </div>
            </div>
            
            <!-- Media Item 2 -->
            <div class="media-card">
                <div class="media-image" style="background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);"></div>
                <div class="media-info">
                    <span class="media-name">Logo_Draft_V2.svg</span>
                    
                    <div class="ease-popover-wrapper">
                        <input type="checkbox" id="popover-toggle-2" class="ease-popover-toggle">
                        
                        <label for="popover-toggle-2" class="ease-popover-trigger" aria-label="Media Options" tabindex="0">
                            <span class="trigger-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </span>
                        </label>
                        
                        <div class="ease-popover-content" role="menu">
                            <ul class="action-menu">
                                <li class="action-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    Preview Image
                                </li>
                                <li class="action-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    Edit Vector
                                </li>
                                <div class="menu-divider"></div>
                                <li class="action-item danger">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    Delete Permanently
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
