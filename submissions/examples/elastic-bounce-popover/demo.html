<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-card">

    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Product">

    <div class="content">
        <h2>Premium Sneakers</h2>
        <p>Comfort meets modern design.</p>

        <button class="buy-btn">
            View Offer

            <span class="popover">
                <strong>Limited Deal</strong>
                <span>25% OFF + Free Delivery</span>
            </span>

        </button>
    </div>

</div>

</body>
</html>
