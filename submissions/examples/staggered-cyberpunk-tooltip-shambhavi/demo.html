<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Staggered Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="cyberpunk-dashboard">

        <section class="panel">
            <p class="eyebrow">SYSTEM // 2077</p>

            <h1>NEON NETWORK</h1>

            <p class="description">
                Hover or focus the system status indicator to inspect network activity.
            </p>

            <div class="tooltip-wrapper">

                <button class="status-button">
                    <span class="status-dot"></span>
                    SYSTEM STATUS
                </button>

                <div class="tooltip" role="tooltip">
                    <p class="tooltip-label">LIVE DATA</p>

                    <h2>Network Online</h2>

                    <ul class="stats">
                        <li>
                            <span>Signal</span>
                            <strong>98%</strong>
                        </li>

                        <li>
                            <span>Latency</span>
                            <strong>12ms</strong>
                        </li>

                        <li>
                            <span>Nodes</span>
                            <strong>2,048</strong>
                        </li>
                    </ul>
                </div>

            </div>

        </section>

    </main>

</body>
</html>
