<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Swing-Hover Tabs - SaaS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="saas-container">
    <div class="tabs-wrapper">
      
      <!-- Accessible visually hidden radio inputs for state -->
      <input type="radio" id="tab-analytics" name="saastabs" class="tab-input" checked>
      <input type="radio" id="tab-team" name="saastabs" class="tab-input">
      <input type="radio" id="tab-settings" name="saastabs" class="tab-input">

      <!-- Tabs Navigation with Swing-Hover Effect -->
      <nav class="tabs-nav" aria-label="Dashboard Tabs">
        <label for="tab-analytics" class="tab-label">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          Analytics
        </label>
        
        <label for="tab-team" class="tab-label">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          Team
        </label>

        <label for="tab-settings" class="tab-label">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </label>
      </nav>

      <!-- Tabs Body containing Panels -->
      <div class="tabs-body">
        
        <!-- Panel 1: Analytics -->
        <article class="tab-panel" id="panel-analytics">
          <header class="panel-header">
            <h2>Analytics Overview</h2>
            <button type="button" class="action-btn">Export Data</button>
          </header>
          <div class="mock-chart" aria-hidden="true">
            <div class="bar" style="height: 60%"></div>
            <div class="bar" style="height: 40%"></div>
            <div class="bar" style="height: 80%"></div>
            <div class="bar" style="height: 30%"></div>
            <div class="bar" style="height: 90%"></div>
            <div class="bar" style="height: 50%"></div>
            <div class="bar" style="height: 75%"></div>
          </div>
        </article>

        <!-- Panel 2: Team -->
        <article class="tab-panel" id="panel-team">
          <header class="panel-header">
            <h2>Team Members</h2>
            <button type="button" class="action-btn">Invite User</button>
          </header>
          <div class="user-list">
            <div class="user-item">
              <div class="avatar">AL</div>
              <div class="user-info">
                <span class="name">Ada Lovelace</span>
                <span class="role">Admin</span>
              </div>
            </div>
            <div class="user-item">
              <div class="avatar">AT</div>
              <div class="user-info">
                <span class="name">Alan Turing</span>
                <span class="role">Developer</span>
              </div>
            </div>
            <div class="user-item">
              <div class="avatar">GH</div>
              <div class="user-info">
                <span class="name">Grace Hopper</span>
                <span class="role">Developer</span>
              </div>
            </div>
          </div>
        </article>

        <!-- Panel 3: Settings -->
        <article class="tab-panel" id="panel-settings">
          <header class="panel-header">
            <h2>Account Settings</h2>
            <button type="button" class="action-btn">Save Changes</button>
          </header>
          <div class="settings-form">
            <div class="form-group">
              <label>Workspace Name</label>
              <input type="text" value="Acme Corp">
            </div>
            <div class="form-group">
              <label>Support Email</label>
              <input type="email" value="support@acme.com">
            </div>
          </div>
        </article>
        
      </div>
    </div>
  </main>
</body>
</html>
