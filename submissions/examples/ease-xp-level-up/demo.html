<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP Level Up – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>⭐ XP Level Up</h1>
    <p class="subtitle">Level up with star explosion</p>

    <div class="lu-container">
      <div class="lu-scene">
        <!-- XP Bar -->
        <div class="xp-container">
          <div class="xp-bar-bg"></div>
          <div class="xp-fill">
            <div class="xp-glow"></div>
          </div>

          <!-- XP text -->
          <div class="xp-text">
            <span class="xp-level">Lv. <span id="levelDisplay">1</span></span>
            <span class="xp-progress"><span id="xpDisplay">0</span> / <span id="xpMaxDisplay">100</span> XP</span>
          </div>

          <!-- Level up overlay -->
          <div class="level-up-overlay">
            <div class="level-up-text">✨ LEVEL UP! ✨</div>
            <div class="level-up-sub">+1</div>
          </div>

          <!-- Star particles -->
          <div class="star-particle sp1"></div>
          <div class="star-particle sp2"></div>
          <div class="star-particle sp3"></div>
          <div class="star-particle sp4"></div>
          <div class="star-particle sp5"></div>
          <div class="star-particle sp6"></div>
          <div class="star-particle sp7"></div>
          <div class="star-particle sp8"></div>
          <div class="star-particle sp9"></div>
          <div class="star-particle sp10"></div>
          <div class="star-particle sp11"></div>
          <div class="star-particle sp12"></div>
          <div class="star-particle sp13"></div>
          <div class="star-particle sp14"></div>
          <div class="star-particle sp15"></div>
          <div class="star-particle sp16"></div>
          <div class="star-particle sp17"></div>
          <div class="star-particle sp18"></div>
          <div class="star-particle sp19"></div>
          <div class="star-particle sp20"></div>
          <div class="star-particle sp21"></div>
          <div class="star-particle sp22"></div>
          <div class="star-particle sp23"></div>
          <div class="star-particle sp24"></div>
          <div class="star-particle sp25"></div>
          <div class="star-particle sp26"></div>
          <div class="star-particle sp27"></div>
          <div class="star-particle sp28"></div>
          <div class="star-particle sp29"></div>
          <div class="star-particle sp30"></div>

          <!-- Flash overlay -->
          <div class="flash-overlay"></div>

          <!-- Level up glow -->
          <div class="level-glow"></div>
        </div>

        <!-- Controls -->
        <div class="xp-controls">
          <button id="gainXpBtn">⚡ Gain XP</button>
          <button id="resetXpBtn">⟳ Reset</button>
          <label>
            XP Gain
            <input type="range" id="xpGainControl" min="5" max="50" step="1" value="25" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const xpFill = document.querySelector('.xp-fill');
      const xpDisplay = document.getElementById('xpDisplay');
      const xpMaxDisplay = document.getElementById('xpMaxDisplay');
      const levelDisplay = document.getElementById('levelDisplay');
      const levelUpOverlay = document.querySelector('.level-up-overlay');
      const levelUpText = document.querySelector('.level-up-text');
      const levelUpSub = document.querySelector('.level-up-sub');
      const starParticles = document.querySelectorAll('.star-particle');
      const flashOverlay = document.querySelector('.flash-overlay');
      const levelGlow = document.querySelector('.level-glow');

      const gainXpBtn = document.getElementById('gainXpBtn');
      const resetXpBtn = document.getElementById('resetXpBtn');
      const xpGainControl = document.getElementById('xpGainControl');

      let currentXP = 0;
      let currentLevel = 1;
      let xpToNext = 100;
      let isLevelingUp = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Calculate XP needed for next level -----
      function getXpForLevel(level) {
        return Math.floor(100 * Math.pow(1.15, level - 1));
      }

      // ----- Update XP bar -----
      function updateXP(newXP, animate = true) {
        const oldXP = currentXP;
        currentXP = newXP;

        // Check for level up
        while (currentXP >= xpToNext) {
          currentXP -= xpToNext;
          currentLevel++;
          xpToNext = getXpForLevel(currentLevel);
          triggerLevelUp();
        }

        // Update display
        const percent = (currentXP / xpToNext) * 100;
        xpFill.style.width = Math.min(percent, 100) + '%';
        xpDisplay.textContent = Math.floor(currentXP);
        xpMaxDisplay.textContent = xpToNext;
        levelDisplay.textContent = currentLevel;

        // Update bar color based on level
        const hue = (currentLevel * 30) % 360;
        xpFill.style.setProperty('--xp-color', `hsl(${hue}, 80%, 60%)`);
        xpFill.style.setProperty('--xp-glow', `hsl(${hue}, 80%, 60%, 0.3)`);
      }

      // ----- Trigger level up -----
      function triggerLevelUp() {
        if (isLevelingUp) return;
        isLevelingUp = true;

        // Show overlay
        levelUpOverlay.classList.add('active');
        levelUpText.textContent = `✨ LEVEL ${currentLevel}! ✨`;
        levelUpSub.textContent = `+1`;

        // Flash
        flashOverlay.classList.add('active');
        setTimeout(() => {
          flashOverlay.classList.remove('active');
        }, 300);

        // Glow
        levelGlow.classList.add('active');
        setTimeout(() => {
          levelGlow.classList.remove('active');
        }, 800);

        // Star particles
        starParticles.forEach((p, i) => {
          p.classList.add('explode');
          // Randomize burst direction and distance
          const angle = Math.random() * Math.PI * 2;
          const distance = 100 + Math.random() * 150;
          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance;
          p.style.setProperty('--burst-x', x + 'px');
          p.style.setProperty('--burst-y', y + 'px');
          const delay = Math.random() * 0.3;
          p.style.animationDelay = delay + 's';
        });

        // Update button
        gainXpBtn.textContent = '🎉 Level Up!';

        setTimeout(() => {
          levelUpOverlay.classList.remove('active');
          starParticles.forEach(p => {
            p.classList.remove('explode');
            p.style.animationDelay = '0s';
          });
          gainXpBtn.textContent = '⚡ Gain XP';
          isLevelingUp = false;
        }, 1500);
      }

      // ----- Gain XP -----
      function gainXP() {
        if (isLevelingUp) return;
        const gain = parseInt(xpGainControl.value);
        updateXP(currentXP + gain);
      }

      // ----- Reset -----
      function resetXP() {
        if (isLevelingUp) return;
        currentXP = 0;
        currentLevel = 1;
        xpToNext = getXpForLevel(1);
        xpFill.style.width = '0%';
        xpDisplay.textContent = '0';
        xpMaxDisplay.textContent = xpToNext;
        levelDisplay.textContent = '1';
        xpFill.style.setProperty('--xp-color', 'hsl(0, 80%, 60%)');
        xpFill.style.setProperty('--xp-glow', 'hsl(0, 80%, 60%, 0.3)');
        levelUpOverlay.classList.remove('active');
        starParticles.forEach(p => p.classList.remove('explode'));
        flashOverlay.classList.remove('active');
        levelGlow.classList.remove('active');
        gainXpBtn.textContent = '⚡ Gain XP';
        isLevelingUp = false;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle XP bar glow pulse
        const pulse = Math.sin(timestamp / 2000) * 0.02 + 0.98;
        xpFill.style.setProperty('--glow-pulse', pulse);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial XP
        xpToNext = getXpForLevel(1);
        xpMaxDisplay.textContent = xpToNext;
        xpFill.style.width = '0%';

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      gainXpBtn.addEventListener('click', gainXP);
      resetXpBtn.addEventListener('click', resetXP);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
