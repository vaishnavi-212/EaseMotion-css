<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Response Time Display</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-rtd-container">
    <div class="ease-rtd-card" data-status="fast">
      <div class="ease-rtd-header">
        <span class="ease-rtd-label">API Response</span>
        <span class="ease-rtd-badge">FAST</span>
      </div>
      <div class="ease-rtd-value">
        <span class="ease-rtd-number">128</span>
        <span class="ease-rtd-unit">ms</span>
      </div>
      <div class="ease-rtd-bar">
        <div class="ease-rtd-bar-fill" style="--fill: 20%;"></div>
      </div>
    </div>

    <div class="ease-rtd-card" data-status="medium">
      <div class="ease-rtd-header">
        <span class="ease-rtd-label">DB Query</span>
        <span class="ease-rtd-badge">MEDIUM</span>
      </div>
      <div class="ease-rtd-value">
        <span class="ease-rtd-number">640</span>
        <span class="ease-rtd-unit">ms</span>
      </div>
      <div class="ease-rtd-bar">
        <div class="ease-rtd-bar-fill" style="--fill: 55%;"></div>
      </div>
    </div>

    <div class="ease-rtd-card" data-status="slow">
      <div class="ease-rtd-header">
        <span class="ease-rtd-label">External Service</span>
        <span class="ease-rtd-badge">SLOW</span>
      </div>
      <div class="ease-rtd-value">
        <span class="ease-rtd-number">2140</span>
        <span class="ease-rtd-unit">ms</span>
      </div>
      <div class="ease-rtd-bar">
        <div class="ease-rtd-bar-fill" style="--fill: 90%;"></div>
      </div>
    </div>
  </div>

</body>
</html>
