<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Select All Checkbox</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Your complete HTML goes here -->

    <div class="container">

        <h1>Ease Select All Checkbox</h1>

        <p id="counter">0 / 6 Selected</p>

        <div class="progress">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="checkbox-card">

    <label class="checkbox-item select-all">
        <input type="checkbox" id="selectAll">
        <span>📋 Select All</span>
    </label>

    <hr>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>🌐 HTML</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>🎨 CSS</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>⚡ JavaScript</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>⚛ React</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>🟢 Node.js</span>
    </label>

    <label class="checkbox-item">
        <input type="checkbox" class="item">
        <span>🐍 Python</span>
    </label>

</div>

    </div>

    <!-- ⬇️ PUT THE JAVASCRIPT HERE -->
    <script>

    const selectAll = document.getElementById("selectAll");
    const checkboxes = document.querySelectorAll(".item");
    const counter = document.getElementById("counter");
    const progress = document.getElementById("progress");

    function updateState() {
        const checked = document.querySelectorAll(".item:checked").length;
        const total = checkboxes.length;

        counter.textContent = `${checked} / ${total} Selected`;
        progress.style.width = `${(checked / total) * 100}%`;

        if (checked === 0) {
            selectAll.checked = false;
            selectAll.indeterminate = false;
        } else if (checked === total) {
            selectAll.checked = true;
            selectAll.indeterminate = false;

            document.querySelector(".checkbox-card").classList.add("celebrate");

            setTimeout(() => {
                document.querySelector(".checkbox-card").classList.remove("celebrate");
            }, 400);

        } else {
            selectAll.checked = false;
            selectAll.indeterminate = true;
        }
    }

    selectAll.addEventListener("change", () => {
        checkboxes.forEach(box => {
            box.checked = selectAll.checked;
        });

        updateState();
    });

    checkboxes.forEach(box => {
        box.addEventListener("change", updateState);
    });

    updateState();

    </script>

</body>
</html>
