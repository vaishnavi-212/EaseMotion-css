<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tooltip - Accessible Web</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Accessible floating orbit tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Floating Orbit Tooltip</h1>
        <p>Accessible Web Layouts variant with floating orbit animation effect.</p>
        
        <div class="accessibility-demo">
          <div class="focus-demo">
            <h3>Focus Management</h3>
            <div class="demo-row">
              <label for="email-input">Email Address</label>
              <div class="input-wrapper">
                <input type="email" id="email-input" class="ease-input-accessible-sb" placeholder="Enter your email" />
                <button class="ease-orbit-btn-sb ease-floating-tooltip-sb" data-tooltip="Enter a valid email address" aria-label="Email help">
                  <span class="help-icon"></span>
                </button>
              </div>
            </div>
            
            <div class="demo-row">
              <label for="password-input">Password</label>
              <div class="input-wrapper">
                <input type="password" id="password-input" class="ease-input-accessible-sb" placeholder="Enter your password" />
                <button class="ease-orbit-btn-sb ease-floating-tooltip-sb" data-tooltip="Must be 8+ characters with numbers" aria-label="Password requirements">
                  <span class="help-icon"></span>
                </button>
              </div>
            </div>
          </div>
          
          <div class="nav-demo">
            <h3>Navigation</h3>
            <nav class="accessible-nav-sb" aria-label="Main navigation">
              <button class="ease-nav-item-sb ease-floating-tooltip-sb" data-tooltip="Go to homepage">
                <span class="home-icon"></span>
                Home
              </button>
              <button class="ease-nav-item-sb ease-floating-tooltip-sb" data-tooltip="Browse products catalog">
                <span class="catalog-icon"></span>
                Products
              </button>
              <button class="ease-nav-item-sb ease-floating-tooltip-sb" data-tooltip="View your shopping cart">
                <span class="cart-icon"></span>
                Cart (3)
              </button>
              <button class="ease-nav-item-sb ease-floating-tooltip-sb" data-tooltip="Manage your account settings">
                <span class="user-icon"></span>
                Account
              </button>
            </nav>
          </div>
          
          <div class="button-demo">
            <h3>Accessible Actions</h3>
            <div class="action-row">
              <button class="ease-access-btn-sb ease-floating-tooltip-sb" data-tooltip="Submit your completed form">
                Submit Form
              </button>
              <button class="ease-access-btn-sb ease-cancel-sb ease-floating-tooltip-sb" data-tooltip="Clear all entered information">
                Cancel
              </button>
              <button class="ease-access-btn-sb ease-help-sb ease-floating-tooltip-sb" data-tooltip="Get help with this form">
                <span class="question-icon"></span>
                Help
              </button>
            </div>
          </div>
          
          <div class="icon-only-demo">
            <h3>Icon Buttons</h3>
            <div class="icon-row">
              <button class="ease-icon-btn-sb ease-floating-tooltip-sb" data-tooltip="Increase text size" aria-label="Zoom in">
                <span class="zoom-in-icon"></span>
              </button>
              <button class="ease-icon-btn-sb ease-floating-tooltip-sb" data-tooltip="Decrease text size" aria-label="Zoom out">
                <span class="zoom-out-icon"></span>
              </button>
              <button class="ease-icon-btn-sb ease-floating-tooltip-sb" data-tooltip="Toggle high contrast mode" aria-label="High contrast">
                <span class="contrast-icon"></span>
              </button>
              <button class="ease-icon-btn-sb ease-floating-tooltip-sb" data-tooltip="Enable screen reader support" aria-label="Screen reader">
                <span class="reader-icon"></span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
