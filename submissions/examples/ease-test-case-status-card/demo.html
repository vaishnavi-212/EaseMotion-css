<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ease Test Case Status Card</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="test-card">

    <div class="status-header">

        <h2>Login Test Case</h2>

        <span class="status success">
            Passed
        </span>

    </div>


    <p class="description">
        User login functionality validation test.
    </p>


    <div class="details">

        <div>
            <span>ID</span>
            <strong>TC-101</strong>
        </div>


        <div>
            <span>Duration</span>
            <strong>2.4s</strong>
        </div>


        <div>
            <span>Environment</span>
            <strong>Chrome</strong>
        </div>

    </div>


</div>


</body>
</html>
