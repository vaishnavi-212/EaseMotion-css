<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meditation Mandala – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🕉️ Meditation Mandala</h1>
    <p class="subtitle">Intricate mandala with rotating patterns</p>

    <div class="mandala-container">
      <div class="mandala-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Mandala -->
        <div class="mandala">
          <!-- Outer ring 1 - Large petals -->
          <div class="ring ring-1">
            <div class="petal p1a"></div>
            <div class="petal p1b"></div>
            <div class="petal p1c"></div>
            <div class="petal p1d"></div>
            <div class="petal p1e"></div>
            <div class="petal p1f"></div>
            <div class="petal p1g"></div>
            <div class="petal p1h"></div>
            <div class="petal p1i"></div>
            <div class="petal p1j"></div>
            <div class="petal p1k"></div>
            <div class="petal p1l"></div>
          </div>

          <!-- Outer ring 2 - Medium petals -->
          <div class="ring ring-2">
            <div class="petal p2a"></div>
            <div class="petal p2b"></div>
            <div class="petal p2c"></div>
            <div class="petal p2d"></div>
            <div class="petal p2e"></div>
            <div class="petal p2f"></div>
            <div class="petal p2g"></div>
            <div class="petal p2h"></div>
            <div class="petal p2i"></div>
            <div class="petal p2j"></div>
            <div class="petal p2k"></div>
            <div class="petal p2l"></div>
          </div>

          <!-- Outer ring 3 - Small petals -->
          <div class="ring ring-3">
            <div class="petal p3a"></div>
            <div class="petal p3b"></div>
            <div class="petal p3c"></div>
            <div class="petal p3d"></div>
            <div class="petal p3e"></div>
            <div class="petal p3f"></div>
            <div class="petal p3g"></div>
            <div class="petal p3h"></div>
            <div class="petal p3i"></div>
            <div class="petal p3j"></div>
            <div class="petal p3k"></div>
            <div class="petal p3l"></div>
          </div>

          <!-- Inner geometric rings -->
          <div class="ring ring-4">
            <div class="geo-shape gs1"></div>
            <div class="geo-shape gs2"></div>
            <div class="geo-shape gs3"></div>
            <div class="geo-shape gs4"></div>
            <div class="geo-shape gs5"></div>
            <div class="geo-shape gs6"></div>
          </div>

          <div class="ring ring-5">
            <div class="geo-shape gs7"></div>
            <div class="geo-shape gs8"></div>
            <div class="geo-shape gs9"></div>
            <div class="geo-shape gs10"></div>
            <div class="geo-shape gs11"></div>
            <div class="geo-shape gs12"></div>
          </div>

          <!-- Concentric circles -->
          <div class="circle-ring cr1"></div>
          <div class="circle-ring cr2"></div>
          <div class="circle-ring cr3"></div>
          <div class="circle-ring cr4"></div>
          <div class="circle-ring cr5"></div>

          <!-- Center -->
          <div class="center">
            <div class="center-core"></div>
            <div class="center-glow"></div>
          </div>

          <!-- Mandala glow -->
          <div class="mandala-glow"></div>

          <!-- Floating particles -->
          <div class="m-particle mp1"></div>
          <div class="m-particle mp2"></div>
          <div class="m-particle mp3"></div>
          <div class="m-particle mp4"></div>
          <div class="m-particle mp5"></div>
          <div class="m-particle mp6"></div>
          <div class="m-particle mp7"></div>
          <div class="m-particle mp8"></div>
          <div class="m-particle mp9"></div>
          <div class="m-particle mp10"></div>
          <div class="m-particle mp11"></div>
          <div class="m-particle mp12"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Rotation Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Pattern Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const mandala = document.querySelector('.mandala');
      const rings = document.querySelectorAll('.ring');
      const petals = document.querySelectorAll('.petal');
      const geoShapes = document.querySelectorAll('.geo-shape');
      const circleRings = document.querySelectorAll('.circle-ring');
      const centerCore = document.querySelector('.center-core');
      const centerGlow = document.querySelector('.center-glow');
      const mandalaGlow = document.querySelector('.mandala-glow');
      const particles = document.querySelectorAll('.m-particle');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Rings rotate at different speeds
        rings.forEach((ring, i) => {
          const baseDuration = 8 - i * 0.8;
          const duration = baseDuration / speedMultiplier;
          ring.style.setProperty('--ring-duration', duration + 's');
        });

        // Petals pulse
        petals.forEach((petal, i) => {
          const duration = (1.5 + (i % 4) * 0.2) / speedMultiplier;
          petal.style.setProperty('--petal-duration', duration + 's');
          petal.style.setProperty('--petal-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Circle rings
        circleRings.forEach((ring, i) => {
          const duration = (3 + i * 0.5) / speedMultiplier;
          ring.style.setProperty('--circle-duration', duration + 's');
          ring.style.setProperty('--circle-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Center glow
        centerGlow.style.setProperty('--center-duration', (1.5 / speedMultiplier) + 's');

        // Mandala glow
        mandalaGlow.style.setProperty('--mandala-duration', (4 / speedMultiplier) + 's');

        // Particles
        particles.forEach((p, i) => {
          const duration = (5 + (i % 4) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.08) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Petal opacity and size
        petals.forEach((petal) => {
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          petal.style.setProperty('--petal-opacity', opacity);
          const scale = 0.7 + intensityMultiplier * 0.3;
          petal.style.setProperty('--petal-scale', scale);
        });

        // Geo shapes
        geoShapes.forEach((shape) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          shape.style.setProperty('--geo-opacity', opacity);
          const size = 20 * intensityMultiplier;
          shape.style.setProperty('--geo-size', size + 'px');
        });

        // Center glow
        const glowSize = 80 * intensityMultiplier;
        centerGlow.style.setProperty('--center-size', glowSize + 'px');
        centerGlow.style.setProperty('--center-intensity', Math.min(0.4 * intensityMultiplier, 0.8));

        // Mandala glow
        const mgSize = 300 * intensityMultiplier;
        mandalaGlow.style.setProperty('--mandala-size', mgSize + 'px');

        // Particles
        particles.forEach((p) => {
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
          p.style.setProperty('--particle-opacity', Math.min(0.3 * intensityMultiplier, 0.6));
        });
      }

      // ----- Update mandala (additional rotation) -----
      function updateMandala(timestamp) {
        if (isPaused) return;

        // Center core pulse
        const pulse = Math.sin(timestamp / 2000) * 0.05 + 0.95;
        centerCore.style.transform = `translate(-50%, -50%) scale(${pulse})`;

        // Subtle color shift
        const hue = Math.sin(timestamp / 5000) * 10 + 330;
        centerCore.style.background = `radial-gradient(circle at 50% 40%,
          rgba(220, 180, 255, 0.4) 0%,
          rgba(180, 130, 255, 0.3) 30%,
          rgba(140, 80, 220, 0.15) 60%,
          rgba(100, 50, 180, 0.05) 100%
        )`;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateMandala(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetMandala() {
        // Reset all animations by reapplying classes
        const elements = [
          ...rings,
          ...petals,
          ...geoShapes,
          ...circleRings,
          centerCore,
          centerGlow,
          mandalaGlow,
          ...particles
        ];

        elements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        rings.forEach(r => r.classList.add('animate'));
        petals.forEach(p => p.classList.add('animate'));
        geoShapes.forEach(g => g.classList.add('animate'));
        circleRings.forEach(c => c.classList.add('animate'));
        centerCore.classList.add('animate');
        centerGlow.classList.add('animate');
        mandalaGlow.classList.add('animate');
        particles.forEach(p => p.classList.add('animate'));

        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetMandala);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
