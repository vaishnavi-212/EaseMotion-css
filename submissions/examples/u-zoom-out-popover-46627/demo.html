<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Popover - SaaS Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Product Overview
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="logo">☁️</div>

                <div>
                    <h2>CloudFlow</h2>
                    <p>Modern SaaS Platform</p>
                </div>

            </div>

            <div class="features">

                <div class="feature">
                    <h3>Users</h3>
                    <span>25K+</span>
                </div>

                <div class="feature">
                    <h3>Uptime</h3>
                    <span>99.99%</span>
                </div>

                <div class="feature">
                    <h3>Support</h3>
                    <span>24/7</span>
                </div>

            </div>

            <button class="action">
                Start Free Trial
            </button>

        </div>

    </div>

</div>

</body>
</html>
