<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Zoom-Out Tooltip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="dashboard-wrapper">

  <section class="analytics-card">

    <div class="card-header">

      <div>
        <h2>Revenue Analytics</h2>
        <p>Weekly Performance Overview</p>
      </div>

      <div class="tooltip-container">

        <button
          class="tooltip-trigger"
          aria-describedby="analytics-tooltip"
          aria-label="Analytics information">
          ?
        </button>

        <div
          id="analytics-tooltip"
          class="tooltip"
          role="tooltip">

          <h3>Performance Summary</h3>

          <p>
            Revenue increased by
            <strong>18%</strong>
            compared to last week.
          </p>

          <div class="tooltip-footer">
            Updated 2 hours ago
          </div>

        </div>

      </div>

    </div>

    <div class="chart">

      <div class="bar one"></div>
      <div class="bar two"></div>
      <div class="bar three"></div>
      <div class="bar four"></div>
      <div class="bar five"></div>
      <div class="bar six"></div>

    </div>

    <div class="stats">

      <div class="stat-box">
        <span class="label">Active Users</span>
        <span class="value">15,438</span>
      </div>

      <div class="stat-box">
        <span class="label">Conversion</span>
        <span class="value success">+18%</span>
      </div>

    </div>

  </section>

</main>

</body>
</html>
