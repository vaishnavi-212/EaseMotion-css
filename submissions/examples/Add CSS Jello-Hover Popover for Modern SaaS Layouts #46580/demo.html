<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Jello-Hover Popover for Modern SaaS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="saas-container">
    <div class="popover-wrapper" tabindex="0">
      <button class="trigger-btn" aria-describedby="jello-popover-content">
        <div class="avatar-placeholder">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        My Account
      </button>
      
      <div id="jello-popover-content" class="ease-jello-popover" role="tooltip">
        <div class="popover-content">
          <div class="user-info">
            <p class="user-name">Alex Smith</p>
            <p class="user-email">alex.smith@example.com</p>
          </div>
          <ul class="popover-menu">
            <li><a href="#">Workspace Settings</a></li>
            <li><a href="#">Billing & Invoices</a></li>
            <li><a href="#">Team Management</a></li>
            <li class="divider"></li>
            <li><a href="#" class="logout">Log out</a></li>
          </ul>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
