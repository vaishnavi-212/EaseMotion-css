<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Popover - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            View Product
        </button>

        <div class="popover" tabindex="0">

            <div class="product-header">

                <img src="https://picsum.photos/90" alt="Product">

                <div>
                    <h2>Wireless Headphones</h2>
                    <p>Premium Audio Experience</p>
                </div>

            </div>

            <div class="details">

                <div class="info">
                    <h3>Price</h3>
                    <span>$149</span>
                </div>

                <div class="info">
                    <h3>Rating</h3>
                    <span>4.9 ★</span>
                </div>

                <div class="info">
                    <h3>Stock</h3>
                    <span>Available</span>
                </div>

            </div>

            <button class="action">
                Add to Cart
            </button>

        </div>

    </div>

</div>

</body>
</html>
