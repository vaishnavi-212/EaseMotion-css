<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Bounce Effect for a Down Arrow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to EaseMotion</h1>
            <p>Your journey into seamless web animations starts here.</p>
            <a href="#features" class="primary-btn">Get Started</a>
        </div>
        
        <!-- Scroll Indicator Container -->
        <div class="scroll-indicator">
            <span class="scroll-text">Scroll down to explore</span>
            <!-- Bouncing Down Arrow -->
            <div class="down-arrow ease-bounce-down" aria-hidden="true">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M19 12l-7 7-7-7"/>
                </svg>
            </div>
        </div>
    </section>

    <!-- Content Section to demonstrate scrolling -->
    <section id="features" class="content-section">
        <h2>Features</h2>
        <p>This is where the user lands after scrolling down.</p>
    </section>

</body>
</html>
