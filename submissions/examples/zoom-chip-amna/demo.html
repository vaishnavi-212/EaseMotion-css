<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EaseMotion CSS - Zoom Chip Demo</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">

  <!-- Component -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="ease-center" style="min-height:100vh;padding:3rem 1.5rem;">

  <div style="max-width:900px;width:100%;text-align:center;">

    <h1 class="ease-fade-in">
      Zoom Chip Component
    </h1>

    <p class="ease-slide-up ease-delay-100" style="margin:1rem auto 2.5rem;max-width:650px;">
      A reusable pill-shaped chip that gently zooms on hover and provides
      accessible focus states. Built with pure CSS using EaseMotion design tokens.
    </p>

    <!-- Default -->
    <h3 style="margin-bottom:1rem;">Default</h3>

    <div class="ease-chip-group ease-slide-up ease-delay-200">

      <button class="ease-zoom-chip">
        HTML
      </button>

      <button class="ease-zoom-chip">
        CSS
      </button>

      <button class="ease-zoom-chip">
        JavaScript
      </button>

      <button class="ease-zoom-chip">
        React
      </button>

      <button class="ease-zoom-chip">
        Next.js
      </button>

    </div>

    <br><br>

    <!-- Variants -->

    <h3 style="margin-bottom:1rem;">
      Color Variants
    </h3>

    <div class="ease-chip-group ease-slide-up ease-delay-300">

      <button class="ease-zoom-chip ease-zoom-chip-primary">
        Featured
      </button>

      <button class="ease-zoom-chip ease-zoom-chip-success">
        Success
      </button>

      <button class="ease-zoom-chip ease-zoom-chip-danger">
        Trending
      </button>

    </div>

    <br><br>

    <h3 style="margin-bottom:1rem;">
      Blog Tags
    </h3>

    <div class="ease-chip-group ease-slide-up ease-delay-400">

      <button class="ease-zoom-chip">Open Source</button>

      <button class="ease-zoom-chip">Animation</button>

      <button class="ease-zoom-chip">Frontend</button>

      <button class="ease-zoom-chip">Accessibility</button>

      <button class="ease-zoom-chip">UI Design</button>

      <button class="ease-zoom-chip">EaseMotion CSS</button>

    </div>

  </div>

</section>

</body>
</html>
