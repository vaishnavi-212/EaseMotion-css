<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease 3D Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-3d-wrapper">
    <div class="ease-3d-stage" id="stage">
      <div class="ease-3d-cube" id="cube">
        <div class="ease-3d-face ease-3d-front">Front</div>
        <div class="ease-3d-face ease-3d-back">Back</div>
        <div class="ease-3d-face ease-3d-right">Right</div>
        <div class="ease-3d-face ease-3d-left">Left</div>
        <div class="ease-3d-face ease-3d-top">Top</div>
        <div class="ease-3d-face ease-3d-bottom">Bottom</div>
      </div>
    </div>
    <p class="ease-3d-hint">Drag to rotate</p>
  </div>
  <script>
    const cube = document.getElementById('cube');
    const stage = document.getElementById('stage');
    let isDragging = false;
    let startX, startY;
    let rotX = -20, rotY = 30;

    function setRotation() {
      cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    stage.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      rotY += dx * 0.5;
      rotX -= dy * 0.5;
      startX = e.clientX;
      startY = e.clientY;
      setRotation();
    });

    setRotation();
  </script>
</body>
</html>
