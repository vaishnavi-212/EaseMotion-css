<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing Ping Utility Demo</title>
    
    <!-- Link the proposed fix -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Include the existing keyframe for demo purposes -->
    <style>
        @keyframes ease-kf-ping {
          75%, 100% {
            transform: scale(2);
            opacity: 0;
          }
        }
        
        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .notification {
            position: relative;
            background: #333;
            padding: 20px;
            border-radius: 8px;
        }
        
        /* The ping dot */
        .dot {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 15px;
            height: 15px;
            background: #ef4444;
            border-radius: 50%;
        }
        
        /* The pinging aura (using the fixed class) */
        .dot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #ef4444;
        }
    </style>
</head>
<body>
    <h1>Missing .ease-ping Utility</h1>
    <p>The ping animation is applied to the red dot's aura.</p>
    
    <div class="notification">
        Messages
        <!-- The ::before pseudo-element applies the ping -->
        <span class="dot ease-ping"></span>
    </div>
</body>
</html>
