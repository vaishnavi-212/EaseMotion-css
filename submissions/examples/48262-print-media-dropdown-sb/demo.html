<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Dropdown Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized dropdown demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Dropdown</h1>
        <p>Demonstrates dropdown component with print media query optimization.</p>
        
        <div class="ease-dropdown">
          <button class="ease-dropdown-trigger">
            Select an option
            <span class="ease-dropdown-arrow"></span>
          </button>
          <ul class="ease-dropdown-menu">
            <li class="ease-dropdown-item"><a href="#">Option One</a></li>
            <li class="ease-dropdown-item"><a href="#">Option Two</a></li>
            <li class="ease-dropdown-item ease-dropdown-item-active"><a href="#">Option Three (Active)</a></li>
            <li class="ease-dropdown-divider"></li>
            <li class="ease-dropdown-item"><a href="#">Option Four</a></li>
          </ul>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see simplified dropdown in print mode.</p>
      </section>
    </main>
  </body>
</html>
