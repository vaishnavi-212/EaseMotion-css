<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Dashboard Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Analytics
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    📊
                </div>

                <div>
                    <h2>Analytics Panel</h2>
                    <p>Performance Summary</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Revenue</h3>
                    <span>$48K</span>
                </div>

                <div class="card">
                    <h3>Visitors</h3>
                    <span>18.2K</span>
                </div>

                <div class="card">
                    <h3>Growth</h3>
                    <span>+14%</span>
                </div>

            </div>

            <button class="action">
                View Report
            </button>

        </div>

    </div>

</div>

</body>
</html>
