<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ease-t-shirt-size-picker</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
    <h1>t shirt size picker</h1>
    <p class="subtitle">Click the input to focus</p>
    <div class="demo-box">
        <label class="form-label">Value</label>
        <input type="text" class="form-input" id="formInput" placeholder="Type here..." />
        <div class="input-indicator" id="animTarget"></div>
    </div>
    <button class="trigger" id="trigger">Reset</button>
</div>
<script>const t=document.getElementById("animTarget");const i=document.getElementById("formInput");const b=document.getElementById("trigger");i.addEventListener("focus",()=>{t.classList.add("active");});i.addEventListener("blur",()=>{t.classList.remove("active");});b.addEventListener("click",()=>{i.value="";i.blur();t.classList.remove("active");});</script>
</body>
</html>
