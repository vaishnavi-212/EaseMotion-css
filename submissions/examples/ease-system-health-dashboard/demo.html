<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease System Health Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <h2>System Health</h2>

    <div class="metric">
        <span>CPU</span>
        <div class="progress">
            <div class="fill cpu">72%</div>
        </div>
    </div>

    <div class="metric">
        <span>RAM</span>
        <div class="progress">
            <div class="fill ram">58%</div>
        </div>
    </div>

    <div class="metric">
        <span>Storage</span>
        <div class="progress">
            <div class="fill storage">83%</div>
        </div>
    </div>

    <div class="metric">
        <span>Network</span>
        <div class="progress">
            <div class="fill network">41%</div>
        </div>
    </div>

</div>

</body>
</html>
