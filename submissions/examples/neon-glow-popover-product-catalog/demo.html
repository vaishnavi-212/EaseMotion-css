<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glow Popover - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="catalog">
    <h1>Featured Product</h1>

    <div class="popover-wrapper">
        <button class="product-btn" aria-describedby="popover">
            View Details
        </button>

        <div id="popover" class="popover" role="tooltip">
            <h3>Wireless Headphones</h3>
            <p>
                Experience immersive sound with premium quality audio and all-day comfort.
            </p>
        </div>
    </div>
</section>

</body>
</html>
