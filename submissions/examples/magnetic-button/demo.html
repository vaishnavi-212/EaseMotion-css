<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Button Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Magnetic Button Effect</h2>
    
    <div class="demo-row">
      <!-- Default Magnetic -->
      <div class="demo-item">
        <button class="magnetic-btn" data-magnetic>
          <span>Hover Me</span>
        </button>
        <span class="demo-label">Default</span>
      </div>
      
      <!-- Magnetic with Glow -->
      <div class="demo-item">
        <button class="magnetic-btn magnetic-glow" data-magnetic>
          <span>Glow</span>
        </button>
        <span class="demo-label">With Glow</span>
      </div>
      
      <!-- Magnetic Circle -->
      <div class="demo-item">
        <button class="magnetic-btn magnetic-circle" data-magnetic>
          <span>+</span>
        </button>
        <span class="demo-label">Circle</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Magnetic Large -->
      <div class="demo-item">
        <button class="magnetic-btn magnetic-large" data-magnetic>
          <span>Large Button</span>
        </button>
        <span class="demo-label">Large</span>
      </div>
      
      <!-- Magnetic Outline -->
      <div class="demo-item">
        <button class="magnetic-btn magnetic-outline" data-magnetic>
          <span>Outline</span>
        </button>
        <span class="demo-label">Outline</span>
      </div>
      
      <!-- Magnetic Icon -->
      <div class="demo-item">
        <a href="#" class="magnetic-btn magnetic-icon-btn" data-magnetic>
          <span>→</span>
        </a>
        <span class="demo-label">Icon Link</span>
      </div>
    </div>
  </div>

  <script>
    // Magnetic effect
    document.querySelectorAll('[data-magnetic]').forEach(btn => {
      btn.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        
        const strength = this.dataset.magneticStrength || 0.3;
        
        this.style.transform = `translate(${x * strength}px, ${y * strength}px)`;
      });
      
      btn.addEventListener('mouseleave', function() {
        this.style.transform = 'translate(0, 0)';
      });
    });
  </script>
</body>
</html>
