<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Blur-Entrance Popover - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="portfolio-container">
    <div class="portfolio-card">
      <div class="avatar-frame">
        <span class="avatar-initials">EA</span>
      </div>
      <h1 class="portfolio-title">Elena Anderson</h1>
      <p class="portfolio-subtitle">UX Architect & Digital Designer</p>

      <!-- ─── BLUR-ENTRANCE PURE CSS POPOVER INTERACTION BLOCK ─── -->
      <div class="popover-wrapper">
        
        <!-- Trigger Button (Accessible via Keyboard Tab/Enter) -->
        <button class="popover-trigger" aria-haspopup="true" aria-expanded="false">
          View Project Meta
        </button>

        <!-- Popover Body (Targets focus-within/hover states natively) -->
        <div class="popover-content" role="tooltip">
          <div class="popover-arrow"></div>
          <h3 class="popover-heading">Case Study // 2026</h3>
          <p class="popover-body-text">
            Implements dynamic backdrop blur configurations running smoothly off hardware-accelerated transformation pipelines.
          </p>
          <a href="#case-study" class="popover-link">Explore Interactive Exhibition &rarr;</a>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
