<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Fade-out-Down Closing Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page-content">
        <h1>Closing Modal Example</h1>
        <p>Wait a few seconds to see the modal automatically close with a smooth fade-out-down animation.</p>
    </main>
    
    <!-- Modal Overlay -->
    <!-- Placed directly in DOM. Typically injected/removed by JS. -->
    <section class="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="modal-title">
        <div class="modal">
            <h2 id="modal-title">Confirm Action</h2>
            <p>Your changes have been saved successfully.</p>

            <button class="btn-close" aria-label="Close modal">
                Close
            </button>
        </div>
    </section>

</body>
</html>
