<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Staggered Entrance Tooltip - Neumorphic Soft</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="neumorphic-viewport">
        <div class="soft-panel-card">
            <div class="panel-header">
                <span class="soft-label">SYSTEM_DIAGNOSTICS</span>
                <span class="soft-value">94.2%</span>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label-text">Node Analytics</span>
                        <svg class="analytics-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                    </button>
                    
                    <div class="staggered-soft-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-row-stagger entry-1">
                                <span class="badge-soft">METRIC_OK</span>
                            </div>
                            <div class="tooltip-row-stagger entry-2">
                                <p class="soft-title">Cluster Memory Stable</p>
                            </div>
                            <div class="tooltip-row-stagger entry-3">
                                <p class="soft-desc">Allocation structures working efficiently across standard threads. Zero leakage thresholds observed inside past tracking sequences.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
