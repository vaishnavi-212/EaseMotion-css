<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Drawer Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized drawer demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Drawer</h1>
        <p>Demonstrates drawer/sidebar component with print media query optimization.</p>
        
        <aside class="ease-drawer ease-drawer-left">
          <div class="ease-drawer-header">
            <h3>Navigation</h3>
          </div>
          <nav class="ease-drawer-nav">
            <a href="#" class="ease-drawer-link">Dashboard</a>
            <a href="#" class="ease-drawer-link ease-drawer-link-active">Profile</a>
            <a href="#" class="ease-drawer-link">Settings</a>
            <a href="#" class="ease-drawer-link">Help</a>
          </nav>
        </aside>
        
        <div class="ease-drawer ease-drawer-right">
          <div class="ease-drawer-header">
            <h3>Details</h3>
          </div>
          <p class="ease-drawer-content">Additional information and details can be shown in this panel.</p>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see drawer hidden in print mode.</p>
      </section>
    </main>
  </body>
</html>
