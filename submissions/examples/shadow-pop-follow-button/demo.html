<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Pop Follow Button</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">

    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="demo-container">

        <header class="demo-header ease-fade-in">
            <h1>Shadow Pop Follow Button</h1>
            <p>
                A pure CSS follow button featuring a smooth shadow-pop hover
                interaction for modern admin panel and dashboard interfaces.
            </p>
        </header>

        <section class="button-showcase ease-slide-up">

            <button class="shadow-pop-follow-btn">
                <span class="icon">+</span>
                <span>Follow</span>
            </button>

            <button class="shadow-pop-follow-btn is-following">
                <span class="icon">✓</span>
                <span>Following</span>
            </button>

            <button class="shadow-pop-follow-btn" disabled>
                <span class="icon">+</span>
                <span>Disabled</span>
            </button>

        </section>

    </main>

</body>
</html>
