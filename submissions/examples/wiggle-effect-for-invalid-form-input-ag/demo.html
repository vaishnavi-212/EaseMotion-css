<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Wiggle Effect for Invalid Form Input</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="content">
        <h1>Sign In</h1>
        <p>Demonstrating visual validation feedback using CSS animations.</p>

        <form class="login-form" novalidate onsubmit="event.preventDefault(); document.getElementById('email').classList.add('ease-wiggle-invalid');">
            <div class="form-group">
                <label for="email">Email Address</label>
                <!-- We apply the invalid styling and animation to simulate a validation failure -->
                <input 
                    id="email" 
                    type="email" 
                    placeholder="Enter your email" 
                    value="invalid-email-format"
                    required 
                    class="invalid ease-wiggle-invalid"
                    aria-invalid="true"
                    aria-describedby="email-error">
                
                <p id="email-error" class="error-message" role="alert">
                    Please enter a valid email address.
                </p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    id="password" 
                    type="password" 
                    placeholder="Enter your password" 
                    required>
            </div>

            <button type="submit" class="submit-btn">Continue</button>
        </form>
    </main>

</body>
</html>
