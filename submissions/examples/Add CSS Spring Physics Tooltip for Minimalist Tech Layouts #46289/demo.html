<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Spring Physics Tooltip - Minimalist Tech</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="tech-layout">
    <div class="contributors-card">
      <div class="card-header">
        <h3>Repository Contributors</h3>
        <span class="badge">4 Online</span>
      </div>
      
      <div class="avatar-group">
        <!-- Tooltip Container 1 -->
        <div class="tooltip-container">
          <button class="avatar-btn" aria-describedby="tooltip-1" style="background: linear-gradient(135deg, #333, #000);">
            AL
          </button>
          
          <div id="tooltip-1" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Ada Lovelace</strong>
              <span>Lead Engineer</span>
              <kbd>@ada_l</kbd>
            </div>
          </div>
        </div>

        <!-- Tooltip Container 2 -->
        <div class="tooltip-container">
          <button class="avatar-btn" aria-describedby="tooltip-2" style="background: linear-gradient(135deg, #666, #333);">
            AT
          </button>
          
          <div id="tooltip-2" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Alan Turing</strong>
              <span>Cryptography</span>
              <kbd>@turing_a</kbd>
            </div>
          </div>
        </div>
        
        <!-- Tooltip Container 3 -->
        <div class="tooltip-container">
          <button class="avatar-btn" aria-describedby="tooltip-3" style="background: linear-gradient(135deg, #999, #666);">
            GH
          </button>
          
          <div id="tooltip-3" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Grace Hopper</strong>
              <span>Systems Architecture</span>
              <kbd>@ghopper</kbd>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
