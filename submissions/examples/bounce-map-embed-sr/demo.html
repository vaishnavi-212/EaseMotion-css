<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Map Embed - EaseMotion CSS</title>

    <link rel="stylesheet" href="../../../dist/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <h1>Bounce Map Embed</h1>

    <p class="subtitle">
        Responsive animated map component built with EaseMotion CSS.
    </p>

    <div class="bounce-map ease-fade-in">

        <div class="map-header">

            <div class="location">

                📍 New York Office

            </div>

            <button class="direction-btn ease-hover-lift">

                Get Directions

            </button>

        </div>

        <div class="map-wrapper ease-scale-in">

            <iframe
                title="Google Map"
                loading="lazy"
                src="https://maps.google.com/maps?q=New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed">
            </iframe>

            <div class="pin"></div>

        </div>

    </div>

</div>

</body>
</html>
