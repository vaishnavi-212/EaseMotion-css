<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Connection Infrastructure Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="workspace-canvas">
    <div class="remote-indicator-card">
      
      <div class="card-meta-header">
        <div class="title-group">
          <h4>VIRTUAL NODE ARCHITECTURE</h4>
          <p>Host ID: central-node-hpl</p>
        </div>
        
        <!-- Pure CSS Interactive Indicator Wrapper Zone -->
        <div class="indicator-status-zone">
          <div class="pulse-beacon-container">
            <div class="pulse-ring propagation-ring-1"></div>
            <div class="pulse-ring propagation-ring-2"></div>
            <div class="core-indicator-dot"></div>
          </div>
          <span class="status-label-text">CONNECTED</span>
        </div>
      </div>

      <div class="connection-details-body">
        <div class="metric-row">
          <span class="metric-key">Latency Vector:</span>
          <span class="metric-value signal-green">12 ms</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Bandwidth Stream:</span>
          <span class="metric-value">48.5 Mbps</span>
        </div>
      </div>

      <p class="panel-caption-footer">Monitors infinite multi-stage pulse expansion loops and status arrays natively.</p>
    </div>
  </main>

</body>
</html>
