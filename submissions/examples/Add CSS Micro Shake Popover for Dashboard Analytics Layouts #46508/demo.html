<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Micro Shake Popover - Dashboard Analytics</title>
    <meta name="description" content="A pure CSS animated popover with a micro shake interaction and dashboard analytics aesthetics.">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <div class="dashboard-popover-wrapper">
        <button class="dashboard-trigger" aria-haspopup="dialog">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-filter">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
            Filter Data
        </button>
        
        <div class="dashboard-popover" role="dialog" aria-label="Data Filters">
            <div class="dashboard-popover-header">
                <h3>Active Filters</h3>
                <span class="badge">3</span>
            </div>
            <div class="dashboard-popover-body">
                <div class="filter-item">
                    <span class="filter-label">Date Range:</span>
                    <span class="filter-value">Last 30 Days</span>
                </div>
                <div class="filter-item">
                    <span class="filter-label">Region:</span>
                    <span class="filter-value">North America</span>
                </div>
                <div class="filter-item">
                    <span class="filter-label">Status:</span>
                    <span class="filter-value">Completed</span>
                </div>
            </div>
            <div class="dashboard-popover-footer">
                <button class="dashboard-btn-ghost">Clear All</button>
                <button class="dashboard-btn-primary">Apply</button>
            </div>
        </div>
    </div>

</body>
</html>
