<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline Alert Pulse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion alert</p>
    <h1 id="demo-title">Inline alert pulse</h1>
    <p class="intro">A compact alert row with a pulsing severity marker and stable readable copy.</p>

    <div class="alert" role="alert">
      <span class="marker" aria-hidden="true"></span>
      <div>
        <strong>Review required</strong>
        <span>One setting needs attention before publish.</span>
      </div>
    </div>
  </main>
</body>
</html>
