<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Contract Animation Fix Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- EaseMotion CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div class="content-card">
            <h1>Contract Animation Safari Fix</h1>
            <p>Toggle the interactive cards below to test the comparison between standard rendering stutter and the hardware-accelerated GPU layer optimization on Safari viewports.</p>
            
            <div class="demo-box">
                <!-- Interactive Target Box -->
                <div id="animationTarget" class="animated-box">
                    <span>Target Card</span>
                </div>
            </div>

            <div class="controls">
                <button id="triggerBtn" class="btn">Trigger Contract Animation</button>
            </div>
        </div>
    </main>

    <script>
        const target = document.getElementById('animationTarget');
        const btn = document.getElementById('triggerBtn');

        btn.addEventListener('click', () => {
            // Apply contract effect
            target.classList.add('is-contracting');
            
            // Reset after animation finishes loop
            setTimeout(() => {
                target.classList.remove('is-contracting');
            }, 600);
        });
    </script>
</body>
</html>
