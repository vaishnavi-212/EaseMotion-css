<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Color Shift Pricing Card</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="pricing-section ease-fade-in">

    <div class="pricing-card ease-hover-lift">

        <div class="card-header">

            <span class="plan-tag">
                Creative Plan
            </span>

            <h1>
                $29
                <small>/month</small>
            </h1>

            <p>
                Perfect for freelancers, creators,
                and creative agencies looking for
                premium tools.
            </p>

        </div>

        <ul class="feature-list">

            <li>✔ Unlimited Projects</li>

            <li>✔ Team Collaboration</li>

            <li>✔ 100 GB Cloud Storage</li>

            <li>✔ Premium Templates</li>

            <li>✔ Priority Support</li>

        </ul>

        <a href="#"
           class="pricing-btn">

            Get Started

        </a>

    </div>

</section>

</body>

</html>
