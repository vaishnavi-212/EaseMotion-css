<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scale-Hover Popover - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="checkout-layout">
    <div class="checkout-container">
      <div class="checkout-header">
        <h2>Order Summary</h2>
        <div class="secure-checkout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Secure Checkout
        </div>
      </div>
      
      <div class="order-total-row">
        <span>Total to pay</span>
        <div class="total-price-group">
          <strong>$129.00</strong>
          <button class="trigger-btn" popovertarget="cart-details-popover">
            View Details
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>
      </div>

      <!-- Popover anchored to the trigger button -->
      <div id="cart-details-popover" class="popover" popover>
        <div class="popover-header">
          <h3>Cart Details (2 items)</h3>
          <button class="close-btn" popovertarget="cart-details-popover" popovertargetaction="hide" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="popover-body">
          <div class="cart-item">
            <div class="item-img"></div>
            <div class="item-info">
              <span class="item-title">Minimalist Wireless Headphones</span>
              <span class="item-qty">Qty: 1</span>
            </div>
            <div class="item-price">$89.00</div>
          </div>
          <div class="cart-item">
            <div class="item-img alt"></div>
            <div class="item-info">
              <span class="item-title">Premium Braided Cable (2m)</span>
              <span class="item-qty">Qty: 2</span>
            </div>
            <div class="item-price">$40.00</div>
          </div>
        </div>
        <div class="popover-footer">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>$129.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span class="free">Free</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
