<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="A responsive, keyboard-accessible CSS-only 3D flip carousel."
  >
  <title>CSS 3D Flip Carousel | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">EaseMotion CSS</p>
      <h1>Accessible 3D Flip Carousel</h1>
      <p class="hero__description">
        Explore interface patterns through a responsive, CSS-only carousel
        with configurable motion and keyboard-friendly controls.
      </p>
    </header>

    <section class="flip-carousel" aria-labelledby="carousel-title">
      <div class="flip-carousel__component">
        <input class="flip-carousel__control" type="radio" name="carousel-slide"
          id="slide-control-1" aria-label="Show slide 1: Inclusive navigation" checked>
        <input class="flip-carousel__control" type="radio" name="carousel-slide"
          id="slide-control-2" aria-label="Show slide 2: Calm transitions">
        <input class="flip-carousel__control" type="radio" name="carousel-slide"
          id="slide-control-3" aria-label="Show slide 3: Responsive structure">
        <input class="flip-carousel__control" type="radio" name="carousel-slide"
          id="slide-control-4" aria-label="Show slide 4: Custom motion">

        <div class="flip-carousel__viewport" aria-live="polite">
          <div class="flip-carousel__track">
            <article class="flip-card flip-card--1">
              <label class="flip-card__next" for="slide-control-2"
                aria-label="Show next slide: Calm transitions">
                <span class="flip-card__surface">
                  <span class="flip-card__visual" aria-hidden="true">
                    <span class="flip-card__number">01</span>
                    <span class="flip-card__symbol">⌘</span>
                  </span>
                  <span class="flip-card__content">
                    <span class="flip-card__eyebrow">Accessibility</span>
                    <span class="flip-card__title">Inclusive navigation</span>
                    <span class="flip-card__description">
                      Native radio controls preserve keyboard interaction while
                      clear focus states make the current control easy to locate.
                    </span>
                    <span class="feature-list" role="list">
                      <span role="listitem">Keyboard-operable controls</span>
                      <span role="listitem">Visible focus indicators</span>
                      <span role="listitem">Semantic content structure</span>
                    </span>
                  </span>
                </span>
              </label>
            </article>

            <article class="flip-card flip-card--2">
              <label class="flip-card__next" for="slide-control-3"
                aria-label="Show next slide: Responsive structure">
                <span class="flip-card__surface">
                  <span class="flip-card__visual" aria-hidden="true">
                    <span class="flip-card__number">02</span>
                    <span class="flip-card__symbol">≈</span>
                  </span>
                  <span class="flip-card__content">
                    <span class="flip-card__eyebrow">Comfort</span>
                    <span class="flip-card__title">Calm transitions</span>
                    <span class="flip-card__description">
                      The 3D rotation communicates change without autoplay,
                      flashing, or excessive movement.
                    </span>
                    <span class="feature-list" role="list">
                      <span role="listitem">No automatic slide changes</span>
                      <span role="listitem">Reduced-motion fallback</span>
                      <span role="listitem">Configurable timing and easing</span>
                    </span>
                  </span>
                </span>
              </label>
            </article>

            <article class="flip-card flip-card--3">
              <label class="flip-card__next" for="slide-control-4"
                aria-label="Show next slide: Custom motion">
                <span class="flip-card__surface">
                  <span class="flip-card__visual" aria-hidden="true">
                    <span class="flip-card__number">03</span>
                    <span class="flip-card__symbol">↔</span>
                  </span>
                  <span class="flip-card__content">
                    <span class="flip-card__eyebrow">Layout</span>
                    <span class="flip-card__title">Responsive structure</span>
                    <span class="flip-card__description">
                      Flexible sizing keeps the component readable across mobile,
                      tablet, and desktop layouts.
                    </span>
                    <span class="feature-list" role="list">
                      <span role="listitem">Fluid width and height</span>
                      <span role="listitem">Touch-friendly interaction</span>
                      <span role="listitem">Content-safe spacing</span>
                    </span>
                  </span>
                </span>
              </label>
            </article>

            <article class="flip-card flip-card--4">
              <label class="flip-card__next" for="slide-control-1"
                aria-label="Return to first slide: Inclusive navigation">
                <span class="flip-card__surface">
                  <span class="flip-card__visual" aria-hidden="true">
                    <span class="flip-card__number">04</span>
                    <span class="flip-card__symbol">✦</span>
                  </span>
                  <span class="flip-card__content">
                    <span class="flip-card__eyebrow">Customization</span>
                    <span class="flip-card__title">Custom motion</span>
                    <span class="flip-card__description">
                      CSS custom properties expose duration, easing, perspective,
                      scale, spacing, and component sizing.
                    </span>
                    <span class="feature-list" role="list">
                      <span role="listitem">Reusable design tokens</span>
                      <span role="listitem">Easy theme adaptation</span>
                      <span role="listitem">Zero JavaScript dependency</span>
                    </span>
                  </span>
                </span>
              </label>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
