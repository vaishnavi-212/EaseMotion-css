<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Wave – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌊 Gravity Wave</h1>
    <p class="subtitle">Ripples in spacetime</p>

    <div class="gw-container">
      <div class="gw-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>

        <!-- Spacetime grid -->
        <div class="spacetime-grid">
          <!-- Grid lines - horizontal -->
          <div class="grid-line h1"></div>
          <div class="grid-line h2"></div>
          <div class="grid-line h3"></div>
          <div class="grid-line h4"></div>
          <div class="grid-line h5"></div>
          <div class="grid-line h6"></div>
          <div class="grid-line h7"></div>
          <div class="grid-line h8"></div>
          <div class="grid-line h9"></div>
          <div class="grid-line h10"></div>
          <div class="grid-line h11"></div>
          <div class="grid-line h12"></div>

          <!-- Grid lines - vertical -->
          <div class="grid-line v1"></div>
          <div class="grid-line v2"></div>
          <div class="grid-line v3"></div>
          <div class="grid-line v4"></div>
          <div class="grid-line v5"></div>
          <div class="grid-line v6"></div>
          <div class="grid-line v7"></div>
          <div class="grid-line v8"></div>
          <div class="grid-line v9"></div>
          <div class="grid-line v10"></div>
          <div class="grid-line v11"></div>
          <div class="grid-line v12"></div>

          <!-- Grid nodes -->
          <div class="grid-node n1"></div>
          <div class="grid-node n2"></div>
          <div class="grid-node n3"></div>
          <div class="grid-node n4"></div>
          <div class="grid-node n5"></div>
          <div class="grid-node n6"></div>
          <div class="grid-node n7"></div>
          <div class="grid-node n8"></div>
          <div class="grid-node n9"></div>
          <div class="grid-node n10"></div>
          <div class="grid-node n11"></div>
          <div class="grid-node n12"></div>
          <div class="grid-node n13"></div>
          <div class="grid-node n14"></div>
          <div class="grid-node n15"></div>
          <div class="grid-node n16"></div>
          <div class="grid-node n17"></div>
          <div class="grid-node n18"></div>
          <div class="grid-node n19"></div>
          <div class="grid-node n20"></div>
          <div class="grid-node n21"></div>
          <div class="grid-node n22"></div>
          <div class="grid-node n23"></div>
          <div class="grid-node n24"></div>
        </div>

        <!-- Gravity wave rings -->
        <div class="wave-ring wr1"></div>
        <div class="wave-ring wr2"></div>
        <div class="wave-ring wr3"></div>
        <div class="wave-ring wr4"></div>
        <div class="wave-ring wr5"></div>
        <div class="wave-ring wr6"></div>
        <div class="wave-ring wr7"></div>
        <div class="wave-ring wr8"></div>
        <div class="wave-ring wr9"></div>
        <div class="wave-ring wr10"></div>

        <!-- Wave center -->
        <div class="wave-center"></div>

        <!-- Wave glow -->
        <div class="wave-glow"></div>

        <!-- Wave particles -->
        <div class="wave-particle wp1"></div>
        <div class="wave-particle wp2"></div>
        <div class="wave-particle wp3"></div>
        <div class="wave-particle wp4"></div>
        <div class="wave-particle wp5"></div>
        <div class="wave-particle wp6"></div>
        <div class="wave-particle wp7"></div>
        <div class="wave-particle wp8"></div>
        <div class="wave-particle wp9"></div>
        <div class="wave-particle wp10"></div>
        <div class="wave-particle wp11"></div>
        <div class="wave-particle wp12"></div>

        <!-- Mass objects (black holes merging) -->
        <div class="mass mass-1"></div>
        <div class="mass mass-2"></div>
        <div class="mass mass-3"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Wave Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Wave Amplitude
        <input type="range" id="amplitudeControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const waveRings = document.querySelectorAll('.wave-ring');
      const waveCenter = document.querySelector('.wave-center');
      const waveGlow = document.querySelector('.wave-glow');
      const waveParticles = document.querySelectorAll('.wave-particle');
      const gridLines = document.querySelectorAll('.grid-line');
      const gridNodes = document.querySelectorAll('.grid-node');
      const masses = document.querySelectorAll('.mass');

      const speedInput = document.getElementById('speedControl');
      const amplitudeInput = document.getElementById('amplitudeControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let amplitudeMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let wavePhase = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Wave rings expand
        waveRings.forEach((ring, i) => {
          const baseDelay = i * 0.15;
          const duration = 1.5 / speedMultiplier;
          ring.style.setProperty('--ring-duration', duration + 's');
          ring.style.setProperty('--ring-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Wave glow
        waveGlow.style.setProperty('--glow-duration', (1.2 / speedMultiplier) + 's');

        // Wave particles
        waveParticles.forEach((p, i) => {
          const duration = (1.2 + (i % 4) * 0.2) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Grid line distortion
        gridLines.forEach((line, i) => {
          const duration = (2 + (i % 3) * 0.3) / speedMultiplier;
          line.style.setProperty('--grid-duration', duration + 's');
          line.style.setProperty('--grid-delay', ((i * 0.04) / speedMultiplier) + 's');
        });

        // Grid nodes
        gridNodes.forEach((node, i) => {
          const duration = (1.8 + (i % 4) * 0.2) / speedMultiplier;
          node.style.setProperty('--node-duration', duration + 's');
          node.style.setProperty('--node-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Mass objects
        masses.forEach((mass, i) => {
          const duration = (3 + i * 0.5) / speedMultiplier;
          mass.style.setProperty('--mass-duration', duration + 's');
          mass.style.setProperty('--mass-delay', ((i * 0.3) / speedMultiplier) + 's');
        });

        // Wave center pulse
        waveCenter.style.setProperty('--center-duration', (0.8 / speedMultiplier) + 's');
      }

      // ----- Apply amplitude -----
      function applyAmplitude() {
        // Ring sizes
        waveRings.forEach((ring, i) => {
          const baseSize = 20 + i * 25;
          const size = baseSize * (0.5 + amplitudeMultiplier * 0.5);
          ring.style.setProperty('--ring-size', size + 'px');
          ring.style.setProperty('--ring-opacity', Math.min(0.3 * amplitudeMultiplier, 0.6));
          ring.style.setProperty('--ring-border', Math.min(1.5 * amplitudeMultiplier, 3) + 'px');
        });

        // Wave glow
        const glowSize = 200 * amplitudeMultiplier;
        waveGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Wave center
        const centerSize = 16 * amplitudeMultiplier;
        waveCenter.style.setProperty('--center-size', centerSize + 'px');

        // Grid line distortion intensity
        gridLines.forEach((line) => {
          line.style.setProperty('--distortion-intensity', amplitudeMultiplier);
        });
      }

      // ----- Update wave phase -----
      function updateWave(timestamp) {
        if (isPaused) return;

        const speed = 0.02 * speedMultiplier;
        wavePhase += speed;

        if (wavePhase > 1) {
          wavePhase = 0;
        }

        // Grid distortion based on wave phase
        gridLines.forEach((line, i) => {
          const offset = i * 0.05;
          const distortion = Math.sin((wavePhase + offset) * Math.PI * 2) * 3 * amplitudeMultiplier;
          const transform = line.classList.contains('h1') || line.classList.contains('h2') ||
                            line.classList.contains('h3') || line.classList.contains('h4') ||
                            line.classList.contains('h5') || line.classList.contains('h6') ||
                            line.classList.contains('h7') || line.classList.contains('h8') ||
                            line.classList.contains('h9') || line.classList.contains('h10') ||
                            line.classList.contains('h11') || line.classList.contains('h12') ?
                            `translateX(${distortion}px)` :
                            `translateY(${distortion}px)`;
          line.style.transform = transform;
        });

        // Grid node distortion
        gridNodes.forEach((node, i) => {
          const row = Math.floor(i / 4);
          const col = i % 4;
          const offset = row * 0.05 + col * 0.03;
          const distortion = Math.sin((wavePhase + offset) * Math.PI * 2) * 4 * amplitudeMultiplier;
          const xOffset = Math.sin((wavePhase + offset + 0.3) * Math.PI * 2) * 3 * amplitudeMultiplier;
          node.style.transform = `translate(${xOffset}px, ${distortion}px)`;
          node.style.opacity = 0.3 + Math.sin((wavePhase + offset) * Math.PI * 2) * 0.2 + 0.2;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateWave(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetWave() {
        wavePhase = 0;
        gridLines.forEach(line => {
          line.style.transform = '';
        });
        gridNodes.forEach(node => {
          node.style.transform = '';
          node.style.opacity = '0.5';
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update amplitude -----
      function updateAmplitude(value) {
        amplitudeMultiplier = parseFloat(value);
        applyAmplitude();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyAmplitude();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      amplitudeInput.addEventListener('input', function() {
        updateAmplitude(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetWave);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
