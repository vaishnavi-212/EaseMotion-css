<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Neon Glow Popover - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cyber-container">
    <div class="cyber-panel">
      <!-- Decorative UI corner borders -->
      <div class="cyber-glitch-line"></div>
      <h1 class="cyber-title" data-text="NET_CORE_v2.6">NET_CORE_v2.6</h1>
      <p class="cyber-subtitle">TERMINAL OVERLAY INTERACTIVE STATUS</p>

      <!-- ─── CYBERPUNK CSS POPOVER INTERACTION BLOCK ─── -->
      <div class="popover-wrapper">
        
        <!-- Trigger Button (Accessible via Keyboard Tab/Enter) -->
        <button class="popover-trigger" aria-haspopup="true" aria-expanded="false">
          INITIALIZE SCAN
        </button>

        <!-- Popover Body (Targets focus-within/hover states natively) -->
        <div class="popover-content" role="tooltip">
          <div class="popover-arrow"></div>
          <div class="popover-header">
            <span class="cyber-badge">CRITICAL</span>
            <h3 class="popover-heading">OVERLOAD IMMINENT</h3>
          </div>
          <p class="popover-body-text">
            Grid system power matrices are fluctuating. Adjust custom parameters inside the root selector to recalibrate scale factors.
          </p>
          <a href="#override" class="popover-link">// BYPASS FIREWALL &rarr;</a>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
