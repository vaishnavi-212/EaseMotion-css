<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Scale-Down Pressing Button</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Interactive Button Feedback</h1>
        <p>Click, tap, or focus and press Space/Enter on the button below to see the scale-down press effect.</p>
        
        <div class="button-wrapper">
            <!-- Scale-Down Button Component -->
            <button class="action-button" aria-label="Confirm action">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path>
                    <path d="M12 5l7 7-7 7"></path>
                </svg>
                Continue
            </button>
        </div>

    </main>

</body>
</html>
