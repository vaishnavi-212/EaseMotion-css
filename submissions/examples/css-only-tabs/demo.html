<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Tabs Component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  
  <!-- Component Specific CSS -->
  <link rel="stylesheet" href="../../../components/cards.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: var(--ease-color-text);
      margin-bottom: var(--ease-space-6);
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h1>EaseMotion Tabs</h1>
    
    <div class="ease-tabs-container">
      <!-- Hidden Radio Inputs -->
      <input type="radio" id="tab1" name="tab-group" class="ease-tab-input" checked>
      <input type="radio" id="tab2" name="tab-group" class="ease-tab-input">
      <input type="radio" id="tab3" name="tab-group" class="ease-tab-input">

      <!-- Tab Header / Labels -->
      <div class="ease-tabs-header">
        <label for="tab1" class="ease-tab-label">Profile</label>
        <label for="tab2" class="ease-tab-label">Settings</label>
        <label for="tab3" class="ease-tab-label">Security</label>
      </div>

      <!-- Tab Panels Wrapper -->
      <div class="ease-tabs-content-wrapper ease-card ease-card-shadow" style="padding: 1.5rem;">
        <!-- Panel 1 -->
        <div class="ease-tab-panel" id="panel1">
          <h3 style="font-size: 1.125rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--ease-color-text);">User Profile</h3>
          <p style="color: var(--ease-color-muted);">Manage your public profile details, avatar, and biography.</p>
        </div>
        
        <!-- Panel 2 -->
        <div class="ease-tab-panel" id="panel2">
          <h3 style="font-size: 1.125rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--ease-color-text);">Account Settings</h3>
          <p style="color: var(--ease-color-muted);">Update your email preferences, notification alerts, and general account settings.</p>
        </div>
        
        <!-- Panel 3 -->
        <div class="ease-tab-panel" id="panel3">
          <h3 style="font-size: 1.125rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--ease-color-text);">Security & Privacy</h3>
          <p style="color: var(--ease-color-muted);">Configure two-factor authentication, view active sessions, and manage password updates.</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
