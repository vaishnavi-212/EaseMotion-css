<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Horizontal Roll Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Panel
        </button>

        <div class="popover" tabindex="0">

            <div class="glass-header">

                <div class="avatar">
                    ✨
                </div>

                <div>
                    <h2>Glass Dashboard</h2>
                    <p>Horizontal Roll Popover</p>
                </div>

            </div>

            <div class="cards">

                <div class="item">
                    <h3>Projects</h3>
                    <span>12 Active</span>
                </div>

                <div class="item">
                    <h3>Messages</h3>
                    <span>34 New</span>
                </div>

                <div class="item">
                    <h3>Storage</h3>
                    <span>76%</span>
                </div>

            </div>

            <button class="action">
                Continue
            </button>

        </div>

    </div>

</div>

</body>
</html>
