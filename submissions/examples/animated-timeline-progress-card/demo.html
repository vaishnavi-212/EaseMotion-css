<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Timeline Progress Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Animated Timeline Progress Card</h1>
    <div class="timeline">
      <div class="step completed">
        <div class="circle">✓</div>
        <div class="content">
          <h3>Account Created</h3>
          <p>Your account has been successfully created.</p>
        </div>
      </div>
      <div class="step completed">
        <div class="circle">✓</div>
        <div class="content">
          <h3>Email Verified</h3>
          <p>Your email address has been verified.</p>
        </div>
      </div>
      <div class="step active">
        <div class="circle"></div>
        <div class="content">
          <h3>Profile Setup</h3>
          <p>Complete your profile information.</p>
        </div>
      </div>
      <div class="step">
        <div class="circle"></div>
        <div class="content">
          <h3>Completed</h3>
          <p>You're ready to start using the platform.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
