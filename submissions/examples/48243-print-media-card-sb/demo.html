<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Card Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card-grid">
        <article class="ease-card ease-card-shadow">
          <div class="ease-card-image">
            <img src="https://picsum.photos/300/200?random=1" alt="Card image" />
          </div>
          <div class="ease-card-content">
            <span class="ease-badge ease-badge-primary">Featured</span>
            <h2 class="ease-card-title">Card Title One</h2>
            <p class="ease-card-text">This is a sample card with print optimization. Cards render cleanly when printed.</p>
            <button class="ease-btn ease-btn-primary">Read More</button>
          </div>
        </article>
        
        <article class="ease-card ease-card-border">
          <div class="ease-card-content">
            <span class="ease-badge ease-badge-secondary">Simple</span>
            <h2 class="ease-card-title">Card Title Two</h2>
            <p class="ease-card-text">This card has a border style instead of shadow.</p>
            <button class="ease-btn ease-btn-outline">Learn More</button>
          </div>
        </article>
      </section>
      
      <p class="print-hint">Press Ctrl+P (Cmd+P) to see cards with simplified styling in print mode.</p>
    </main>
  </body>
</html>
