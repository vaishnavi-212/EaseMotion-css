<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Wobble-Focus Popover for Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="catalog-container">
    <div class="product-card">
      <div class="product-image">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.38 3.46 16 2a8.5 8.5 0 0 1-8 8.5V15l7.39 7.39a2 2 0 0 0 2.83 0l2.83-2.83a2 2 0 0 0 0-2.83L16 11V8.5a6.5 6.5 0 0 0 4.38-5.04Z"></path>
          <path d="M11 10.5 4.3 17.2a2 2 0 0 0 0 2.8l2.8 2.8a2 2 0 0 0 2.8 0L16.6 16"></path>
        </svg>
      </div>
      <h3 class="product-name">Minimalist Sneakers</h3>
      <p class="product-price">$89.00</p>
      
      <div class="popover-wrapper">
        <button class="trigger-btn" aria-describedby="wobble-popover-content">
          Quick Details
        </button>
        
        <div id="wobble-popover-content" class="ease-wobble-popover" role="dialog" aria-labelledby="popover-title">
          <div class="popover-content">
            <h4 id="popover-title">Product Details</h4>
            <ul class="product-specs">
              <li>100% Organic Cotton Canvas</li>
              <li>Recycled rubber outsole</li>
              <li>Machine washable</li>
            </ul>
            <button class="add-to-cart-btn">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
