<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fade-In Popover SaaS Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="saas-wrapper">

  <section class="pricing-card">
    <span class="badge">Starter Plan</span>

    <h1>Grow Faster</h1>

    <p class="description">
      Unlock advanced analytics, unlimited projects and priority support.
    </p>

    <div class="price">
      <span class="amount">$19</span>
      <span class="period">/month</span>
    </div>

    <div class="popover-container">

      <button
        class="upgrade-btn"
        aria-describedby="pro-popover"
      >
        Upgrade to Pro
      </button>

      <div
        id="pro-popover"
        class="popover"
        role="dialog"
      >
        <h3>Pro Features</h3>

        <ul>
          <li>✓ Unlimited Projects</li>
          <li>✓ Team Collaboration</li>
          <li>✓ AI Insights</li>
          <li>✓ Priority Support</li>
        </ul>

        <button class="trial-btn">
          Start Free Trial
        </button>

      </div>

    </div>

  </section>

</main>

</body>
</html>
