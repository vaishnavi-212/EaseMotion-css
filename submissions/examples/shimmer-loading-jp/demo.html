<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Loading Animation Demo</title>
  
  <!-- Link to the core framework -->
  <link rel="stylesheet" href="../../easemotion.css">
  
  <!-- Our specific feature CSS -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      padding: 3rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    
    h2 {
      color: #334155;
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  
  <div>
    <h2>Basic usage with skeleton elements</h2>
    <div class="ease-skeleton ease-shimmer">
      <div style="height: 20px; width: 80%; border-radius: 4px;"></div>
    </div>
  </div>

  <div>
    <h2>Multiple skeleton lines</h2>
    <div class="ease-skeleton ease-shimmer">
      <div style="height: 16px; width: 100%; border-radius: 4px; margin-bottom: 12px;"></div>
      <div style="height: 16px; width: 90%; border-radius: 4px; margin-bottom: 12px;"></div>
      <div style="height: 16px; width: 85%; border-radius: 4px;"></div>
    </div>
  </div>

  <div>
    <h2>Card placeholder with shimmer</h2>
    <div class="ease-card ease-skeleton ease-shimmer" style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
      <div style="height: 200px; width: 100%; border-radius: 8px;"></div>
      <div style="height: 16px; width: 75%; margin-top: 16px; border-radius: 4px;"></div>
    </div>
  </div>
  
</body>
</html>
