<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geneva Drive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="tagV">turn it steadily, and it steps</span>
    <div class="wheelV">
      <span class="stnV" style="transform: rotate(0.0000deg) translateY(-36.0px)"></span>
      <span class="stnV" style="transform: rotate(60.0000deg) translateY(-36.0px)"></span>
      <span class="stnV" style="transform: rotate(120.0000deg) translateY(-36.0px)"></span>
      <span class="stnV" style="transform: rotate(180.0000deg) translateY(-36.0px)"></span>
      <span class="stnV" style="transform: rotate(240.0000deg) translateY(-36.0px)"></span>
      <span class="stnV" style="transform: rotate(300.0000deg) translateY(-36.0px)"></span>
    </div>
    <span class="camV"></span>
    <div class="crankV">
      <span class="armV"></span>
      <span class="pinV"></span>
      <span class="hubV"></span>
    </div>
    <span class="markV"></span>
    <span class="lblIn">driver: steady</span>
    <span class="lblOut">wheel: 60 degrees, then nothing</span>
    <span class="capV">two thirds of every turn the wheel is locked, and it starts and stops at rest</span>
  </div>
</body>
</html>
