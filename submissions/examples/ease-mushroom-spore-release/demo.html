<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mushroom Spore Release – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🍄 Mushroom Spore Release</h1>
    <p class="subtitle">Mushroom releasing glowing spores</p>

    <div class="mushroom-container">
      <div class="mushroom-scene">
        <!-- Ground -->
        <div class="ground"></div>

        <!-- Mushroom -->
        <div class="mushroom">
          <!-- Stem -->
          <div class="stem"></div>

          <!-- Cap -->
          <div class="cap">
            <div class="cap-top"></div>
            <div class="cap-gills"></div>
          </div>

          <!-- Glowing spots on cap -->
          <div class="spot spot-1"></div>
          <div class="spot spot-2"></div>
          <div class="spot spot-3"></div>
          <div class="spot spot-4"></div>
          <div class="spot spot-5"></div>
          <div class="spot spot-6"></div>

          <!-- Spore particles released from gills -->
          <div class="spore spore-1"></div>
          <div class="spore spore-2"></div>
          <div class="spore spore-3"></div>
          <div class="spore spore-4"></div>
          <div class="spore spore-5"></div>
          <div class="spore spore-6"></div>
          <div class="spore spore-7"></div>
          <div class="spore spore-8"></div>
          <div class="spore spore-9"></div>
          <div class="spore spore-10"></div>
          <div class="spore spore-11"></div>
          <div class="spore spore-12"></div>
          <div class="spore spore-13"></div>
          <div class="spore spore-14"></div>
          <div class="spore spore-15"></div>
          <div class="spore spore-16"></div>
          <div class="spore spore-17"></div>
          <div class="spore spore-18"></div>
          <div class="spore spore-19"></div>
          <div class="spore spore-20"></div>

          <!-- Mushroom glow -->
          <div class="mushroom-glow"></div>
        </div>

        <!-- Ambient particles (floating in air) -->
        <div class="ambient-particle ap-1"></div>
        <div class="ambient-particle ap-2"></div>
        <div class="ambient-particle ap-3"></div>
        <div class="ambient-particle ap-4"></div>
        <div class="ambient-particle ap-5"></div>
        <div class="ambient-particle ap-6"></div>
        <div class="ambient-particle ap-7"></div>
        <div class="ambient-particle ap-8"></div>

        <!-- Background glow -->
        <div class="background-glow"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Spore Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Release Spores</button>
    </div>
  </div>

  <script>
    (function() {
      const mushroom = document.querySelector('.mushroom');
      const cap = document.querySelector('.cap');
      const spores = document.querySelectorAll('.spore');
      const spots = document.querySelectorAll('.spot');
      const mushroomGlow = document.querySelector('.mushroom-glow');
      const ambientParticles = document.querySelectorAll('.ambient-particle');
      const backgroundGlow = document.querySelector('.background-glow');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        // Mushroom gentle sway
        mushroom.style.setProperty('--mushroom-sway-duration', (4 / speedMultiplier) + 's');

        // Cap pulse
        cap.style.setProperty('--cap-pulse-duration', (2.5 / speedMultiplier) + 's');

        // Spores - each with different timing
        spores.forEach((s, i) => {
          const baseDuration = 3 + (i % 5) * 0.6;
          const duration = baseDuration / speedMultiplier;
          s.style.setProperty('--spore-duration', duration + 's');

          // Adjust delay proportionally
          const baseDelay = (i * 0.2) % 2;
          s.style.setProperty('--spore-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Spots on cap
        spots.forEach((s, i) => {
          const duration = (1.2 + i * 0.3) / speedMultiplier;
          s.style.setProperty('--spot-duration', duration + 's');
        });

        // Ambient particles
        ambientParticles.forEach((p, i) => {
          const duration = (10 + i * 1.5) / speedMultiplier;
          p.style.setProperty('--ambient-duration', duration + 's');
        });

        // Mushroom glow pulse
        mushroomGlow.style.setProperty('--glow-pulse-duration', (2 / speedMultiplier) + 's');

        // Background glow
        backgroundGlow.style.setProperty('--bg-glow-duration', (6 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        const glowIntensity = Math.min(0.7 * intensityMultiplier, 1.5);

        // Mushroom glow
        mushroomGlow.style.opacity = glowIntensity;
        mushroomGlow.style.setProperty('--glow-intensity', intensityMultiplier);

        // Background glow
        backgroundGlow.style.opacity = Math.min(0.3 * intensityMultiplier, 0.6);

        // Spore brightness
        spores.forEach((s) => {
          const bright = Math.min(60 + 40 * intensityMultiplier, 150);
          s.style.setProperty('--spore-brightness', bright + '%');
          s.style.opacity = Math.min(0.4 * intensityMultiplier, 0.9);
        });

        // Spot brightness
        spots.forEach((s) => {
          const bright = Math.min(70 + 30 * intensityMultiplier, 160);
          s.style.setProperty('--spot-brightness', bright + '%');
        });

        // Ambient particles
        ambientParticles.forEach((p) => {
          p.style.opacity = Math.min(0.1 * intensityMultiplier, 0.3);
        });
      }

      // ----- Extra glow pulse via JS -----
      function animateGlow(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle mushroom glow pulse
        const pulse = Math.sin(timestamp / 1000) * 0.08 + 0.92;
        const baseOpacity = parseFloat(mushroomGlow.style.opacity) || 0.7;
        const targetOpacity = Math.min(0.6 * intensityMultiplier * pulse * 1.1, 1.5);
        mushroomGlow.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;

        // Background glow subtle shift
        const bgPulse = Math.sin(timestamp / 2000 + 0.5) * 0.05 + 0.95;
        const bgBase = parseFloat(backgroundGlow.style.opacity) || 0.3;
        const bgTarget = Math.min(0.25 * intensityMultiplier * bgPulse, 0.6);
        backgroundGlow.style.opacity = bgBase * 0.95 + bgTarget * 0.05;

        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Update functions -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Reset animation -----
      function resetMushroom() {
        const animElements = [
          mushroom,
          cap,
          ...spores,
          ...spots,
          mushroomGlow,
          ...ambientParticles,
          backgroundGlow
        ];

        animElements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        mushroom.classList.add('animate');
        cap.classList.add('animate');
        spores.forEach(s => s.classList.add('animate'));
        spots.forEach(s => s.classList.add('animate'));
        mushroomGlow.classList.add('animate');
        ambientParticles.forEach(p => p.classList.add('animate'));
        backgroundGlow.classList.add('animate');

        // Apply initial values
        updateSpeed(speedInput.value);
        updateIntensity(intensityInput.value);

        // Start glow loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetMushroom);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
