<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sculpture Rotating – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🗿 Sculpture Rotating</h1>
    <p class="subtitle">3D sculpture rotating with light changes</p>

    <div class="sr-container">
      <div class="sr-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- 3D Sculpture -->
        <div class="sculpture-container">
          <div class="sculpture">
            <!-- Base -->
            <div class="base">
              <div class="base-top"></div>
              <div class="base-body"></div>
            </div>

            <!-- Pedestal -->
            <div class="pedestal"></div>

            <!-- Sculpture body - abstract geometric form -->
            <div class="sculpture-body">
              <!-- Main form -->
              <div class="form main-form">
                <div class="form-face f1"></div>
                <div class="form-face f2"></div>
                <div class="form-face f3"></div>
                <div class="form-face f4"></div>
                <div class="form-face f5"></div>
                <div class="form-face f6"></div>
                <div class="form-face f7"></div>
                <div class="form-face f8"></div>
              </div>

              <!-- Upper form -->
              <div class="form upper-form">
                <div class="form-face uf1"></div>
                <div class="form-face uf2"></div>
                <div class="form-face uf3"></div>
                <div class="form-face uf4"></div>
                <div class="form-face uf5"></div>
                <div class="form-face uf6"></div>
                <div class="form-face uf7"></div>
                <div class="form-face uf8"></div>
              </div>

              <!-- Lower form -->
              <div class="form lower-form">
                <div class="form-face lf1"></div>
                <div class="form-face lf2"></div>
                <div class="form-face lf3"></div>
                <div class="form-face lf4"></div>
                <div class="form-face lf5"></div>
                <div class="form-face lf6"></div>
                <div class="form-face lf7"></div>
                <div class="form-face lf8"></div>
              </div>

              <!-- Connecting elements -->
              <div class="connector c1"></div>
              <div class="connector c2"></div>
              <div class="connector c3"></div>
              <div class="connector c4"></div>
              <div class="connector c5"></div>
              <div class="connector c6"></div>
              <div class="connector c7"></div>
              <div class="connector c8"></div>
            </div>

            <!-- Sculpture glow -->
            <div class="sculpture-glow"></div>

            <!-- Light spots -->
            <div class="light-spot ls1"></div>
            <div class="light-spot ls2"></div>
            <div class="light-spot ls3"></div>
            <div class="light-spot ls4"></div>

            <!-- Shadow -->
            <div class="shadow"></div>
          </div>
        </div>

        <!-- Floating particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Rotation Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Light Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const sculpture = document.querySelector('.sculpture');
      const sculptureGlow = document.querySelector('.sculpture-glow');
      const lightSpots = document.querySelectorAll('.light-spot');
      const shadow = document.querySelector('.shadow');
      const particles = document.querySelectorAll('.particle');
      const forms = document.querySelectorAll('.form');
      const connectors = document.querySelectorAll('.connector');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Sculpture rotation
        sculpture.style.setProperty('--rotation-duration', (12 / speedMultiplier) + 's');

        // Forms pulse
        forms.forEach((form, i) => {
          const duration = (2 + i * 0.3) / speedMultiplier;
          form.style.setProperty('--form-duration', duration + 's');
          form.style.setProperty('--form-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Connectors
        connectors.forEach((conn, i) => {
          const duration = (1.5 + i * 0.15) / speedMultiplier;
          conn.style.setProperty('--conn-duration', duration + 's');
          conn.style.setProperty('--conn-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Sculpture glow
        sculptureGlow.style.setProperty('--glow-duration', (3 / speedMultiplier) + 's');

        // Light spots
        lightSpots.forEach((spot, i) => {
          const duration = (2.5 + i * 0.3) / speedMultiplier;
          spot.style.setProperty('--spot-duration', duration + 's');
          spot.style.setProperty('--spot-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Particles
        particles.forEach((p, i) => {
          const duration = (5 + (i % 3) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.08) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Sculpture glow
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        sculptureGlow.style.setProperty('--glow-opacity', glowOpacity);
        const glowSize = 300 * intensityMultiplier;
        sculptureGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Light spots
        lightSpots.forEach((spot) => {
          const opacity = Math.min(0.1 * intensityMultiplier, 0.2);
          spot.style.setProperty('--spot-opacity', opacity);
          const size = 80 * intensityMultiplier;
          spot.style.setProperty('--spot-size', size + 'px');
        });

        // Shadow
        const shadowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        shadow.style.setProperty('--shadow-opacity', shadowOpacity);

        // Particles
        particles.forEach((p) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          p.style.setProperty('--particle-opacity', opacity);
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
        });

        // Form faces - subtle brightness change
        document.querySelectorAll('.form-face').forEach((face) => {
          const brightness = Math.min(0.6 * intensityMultiplier, 1);
          face.style.setProperty('--face-brightness', brightness);
        });
      }

      // ----- Update light colors -----
      function updateLights(timestamp) {
        if (isPaused) return;

        // Change light colors over time
        const hue1 = (timestamp / 8000) % 360;
        const hue2 = (timestamp / 10000 + 60) % 360;
        const hue3 = (timestamp / 12000 + 120) % 360;
        const hue4 = (timestamp / 9000 + 180) % 360;

        lightSpots.forEach((spot, i) => {
          const hues = [hue1, hue2, hue3, hue4];
          const hue = hues[i % hues.length];
          const sat = 60 + Math.sin(timestamp / 5000 + i) * 20;
          const light = 50 + Math.sin(timestamp / 6000 + i * 0.5) * 20;
          spot.style.background = `radial-gradient(circle at center,
            hsla(${hue}, ${sat}%, ${light}%, var(--spot-opacity, 0.1)),
            hsla(${(hue + 30) % 360}, ${sat - 10}%, ${light - 10}%, 0)
          )`;
          spot.style.boxShadow = `0 0 ${30 * intensityMultiplier}px hsla(${hue}, ${sat}%, ${light}%, 0.05)`;
        });

        // Update sculpture glow color
        const glowHue = (timestamp / 12000) % 360;
        sculptureGlow.style.background = `radial-gradient(circle at center,
          hsla(${glowHue}, 60%, 60%, ${0.02 * intensityMultiplier}),
          hsla(${(glowHue + 40) % 360}, 50%, 40%, ${0.01 * intensityMultiplier}),
          transparent 80%
        )`;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateLights(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetSculpture() {
        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetSculpture);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
