<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Selection Highlight Utility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Text Selection Highlight Utility</h1>

    <p class="ease-selection-primary">
        Select this paragraph to see a blue text selection highlight.
    </p>

    <p class="ease-selection-success">
        Select this paragraph to see a green text selection highlight.
    </p>

    <p class="ease-selection-danger">
        Select this paragraph to see a red text selection highlight.
    </p>

</body>
</html>
