<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Tilt Animation Effect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-tilt-wrapper">
    <div class="ease-tilt-card" id="tiltCard" tabindex="0">
      <div class="ease-tilt-glare"></div>
      <div class="ease-tilt-card-inner">
        <h2 class="ease-tilt-title">Tilt Me</h2>
        <p class="ease-tilt-text">Move your mouse over this card, or tab to it with your keyboard, to see the 3D tilt + glare effect.</p>
      </div>
    </div>
  </div>
  <script>
    const card = document.getElementById('tiltCard');
    const glare = card.querySelector('.ease-tilt-glare');

    function applyTilt(x, y, rect) {
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * -10;
      const rotateY = ((x - centerX) / centerX) * 10;
      card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
      glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.25), transparent 60%)`;
    }

    function resetTilt() {
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
      glare.style.background = 'transparent';
    }

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      applyTilt(e.clientX - rect.left, e.clientY - rect.top, rect);
    });

    card.addEventListener('mouseleave', resetTilt);

    card.addEventListener('focus', () => {
      const rect = card.getBoundingClientRect();
      applyTilt(rect.width / 2, rect.height / 3, rect);
    });

    card.addEventListener('blur', resetTilt);
  </script>
</body>
</html>
