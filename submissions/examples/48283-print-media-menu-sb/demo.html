<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Menu Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized menu demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Menu</h1>
        <p>Demonstrates navigation menu with print media query optimization.</p>
        
        <nav class="ease-menu">
          <ul class="ease-menu-list">
            <li class="ease-menu-item"><a href="#" class="ease-menu-link">Home</a></li>
            <li class="ease-menu-item ease-menu-has-dropdown">
              <a href="#" class="ease-menu-link">Products</a>
              <ul class="ease-menu-dropdown">
                <li><a href="#">Electronics</a></li>
                <li><a href="#">Clothing</a></li>
                <li><a href="#">Books</a></li>
              </ul>
            </li>
            <li class="ease-menu-item"><a href="#" class="ease-menu-link">About</a></li>
            <li class="ease-menu-item"><a href="#" class="ease-menu-link">Contact</a></li>
          </ul>
        </nav>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see simplified menu in print mode.</p>
      </section>
    </main>
  </body>
</html>
