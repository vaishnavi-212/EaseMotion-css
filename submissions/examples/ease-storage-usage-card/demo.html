<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Storage Usage Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="storage-card">
    <h2>Storage Usage</h2>

    <div class="storage-info">
        <span>75 GB Used</span>
        <span>100 GB Total</span>
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="stats">
        <div>
            <h3>75%</h3>
            <p>Used</p>
        </div>

        <div>
            <h3>25 GB</h3>
            <p>Available</p>
        </div>
    </div>

    <button>Manage Storage</button>
</div>

</body>
</html>
