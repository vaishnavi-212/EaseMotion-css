<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thought Bubble – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>💭 Thought Bubble</h1>
    <p class="subtitle">Expanding thought bubble with images</p>

    <div class="tb-container">
      <div class="tb-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Character (thinking person) -->
        <div class="character">
          <div class="head">
            <div class="face"></div>
            <div class="eye eye-left"></div>
            <div class="eye eye-right"></div>
            <div class="mouth"></div>
          </div>
          <div class="body"></div>
        </div>

        <!-- Thought bubble -->
        <div class="thought-bubble">
          <!-- Bubble trails (small circles leading to character) -->
          <div class="bubble-trail trail-1"></div>
          <div class="bubble-trail trail-2"></div>
          <div class="bubble-trail trail-3"></div>

          <!-- Main bubble -->
          <div class="bubble-main">
            <!-- Bubble content -->
            <div class="bubble-content">
              <!-- Idea images (emojis/icons as visual thoughts) -->
              <div class="thought-icon icon-1">💡</div>
              <div class="thought-icon icon-2">✨</div>
              <div class="thought-icon icon-3">🌟</div>
              <div class="thought-icon icon-4">🎯</div>
              <div class="thought-icon icon-5">🚀</div>
              <div class="thought-icon icon-6">🌈</div>
              <div class="thought-icon icon-7">🎨</div>
              <div class="thought-icon icon-8">💪</div>
              <div class="thought-icon icon-9">🧠</div>
              <div class="thought-icon icon-10">❤️</div>
              <div class="thought-icon icon-11">⭐</div>
              <div class="thought-icon icon-12">🔥</div>

              <!-- Floating thought particles -->
              <div class="thought-particle tp1"></div>
              <div class="thought-particle tp2"></div>
              <div class="thought-particle tp3"></div>
              <div class="thought-particle tp4"></div>
              <div class="thought-particle tp5"></div>
              <div class="thought-particle tp6"></div>
              <div class="thought-particle tp7"></div>
              <div class="thought-particle tp8"></div>

              <!-- Glow -->
              <div class="thought-glow"></div>
            </div>
          </div>
        </div>

        <!-- Ambient particles -->
        <div class="ambient-particle ap1"></div>
        <div class="ambient-particle ap2"></div>
        <div class="ambient-particle ap3"></div>
        <div class="ambient-particle ap4"></div>
        <div class="ambient-particle ap5"></div>
        <div class="ambient-particle ap6"></div>
      </div>
    </div>

    <div class="controls">
      <button id="expandBtn">💭 Expand Thought</button>
      <button id="shrinkBtn">🔄 Shrink</button>
      <label>
        Bubble Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const thoughtBubble = document.querySelector('.thought-bubble');
      const bubbleMain = document.querySelector('.bubble-main');
      const bubbleContent = document.querySelector('.bubble-content');
      const thoughtIcons = document.querySelectorAll('.thought-icon');
      const thoughtParticles = document.querySelectorAll('.thought-particle');
      const thoughtGlow = document.querySelector('.thought-glow');
      const trailDots = document.querySelectorAll('.bubble-trail');
      const character = document.querySelector('.character');
      const expandBtn = document.getElementById('expandBtn');
      const shrinkBtn = document.getElementById('shrinkBtn');
      const speedInput = document.getElementById('speedControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isExpanded = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Bubble expansion
        thoughtBubble.style.setProperty('--bubble-duration', (1.5 / speedMultiplier) + 's');

        // Icons float
        thoughtIcons.forEach((icon, i) => {
          const duration = (3 + (i % 4) * 0.5) / speedMultiplier;
          icon.style.setProperty('--icon-duration', duration + 's');
          icon.style.setProperty('--icon-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Particles
        thoughtParticles.forEach((p, i) => {
          const duration = (2 + (i % 3) * 0.3) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Glow
        thoughtGlow.style.setProperty('--glow-duration', (2 / speedMultiplier) + 's');

        // Trail dots
        trailDots.forEach((dot, i) => {
          const duration = (1.5 + i * 0.2) / speedMultiplier;
          dot.style.setProperty('--trail-duration', duration + 's');
          dot.style.setProperty('--trail-delay', ((i * 0.15) / speedMultiplier) + 's');
        });

        // Character thinking
        character.style.setProperty('--think-duration', (2 / speedMultiplier) + 's');
      }

      // ----- Expand thought bubble -----
      function expandBubble() {
        if (isExpanded) return;
        isExpanded = true;

        thoughtBubble.classList.add('expanded');
        thoughtBubble.classList.remove('shrunk');

        // Show content
        bubbleContent.style.opacity = '1';
        bubbleContent.style.transform = 'scale(1)';

        // Animate icons
        thoughtIcons.forEach((icon, i) => {
          icon.classList.add('float');
          icon.style.animationDelay = (i * 0.1) / speedMultiplier + 's';
        });

        // Animate particles
        thoughtParticles.forEach((p, i) => {
          p.classList.add('drift');
          p.style.animationDelay = (i * 0.08) / speedMultiplier + 's';
        });

        // Glow
        thoughtGlow.classList.add('pulse');

        // Trail dots
        trailDots.forEach((dot, i) => {
          dot.classList.add('pulse');
          dot.style.animationDelay = (i * 0.15) / speedMultiplier + 's';
        });

        expandBtn.textContent = '💭 Expanding...';
        setTimeout(() => {
          expandBtn.textContent = '💭 Expand Thought';
        }, 500 / speedMultiplier);
      }

      // ----- Shrink thought bubble -----
      function shrinkBubble() {
        if (!isExpanded) return;
        isExpanded = false;

        thoughtBubble.classList.remove('expanded');
        thoughtBubble.classList.add('shrunk');

        // Hide content
        bubbleContent.style.opacity = '0';
        bubbleContent.style.transform = 'scale(0.8)';

        // Stop animations
        thoughtIcons.forEach((icon) => {
          icon.classList.remove('float');
        });
        thoughtParticles.forEach((p) => {
          p.classList.remove('drift');
        });
        thoughtGlow.classList.remove('pulse');
        trailDots.forEach((dot) => {
          dot.classList.remove('pulse');
        });

        shrinkBtn.textContent = '🔄 Shrinking...';
        setTimeout(() => {
          shrinkBtn.textContent = '🔄 Shrink';
        }, 500 / speedMultiplier);
      }

      // ----- Toggle -----
      function toggleBubble() {
        if (isExpanded) {
          shrinkBubble();
        } else {
          expandBubble();
        }
      }

      // ----- Reset -----
      function resetBubble() {
        if (isExpanded) {
          shrinkBubble();
          setTimeout(() => {
            isExpanded = false;
            thoughtBubble.classList.remove('shrunk');
            thoughtBubble.style.transform = '';
          }, 300 / speedMultiplier);
        } else {
          thoughtBubble.classList.remove('shrunk');
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop for ambient -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state
        thoughtBubble.classList.add('shrunk');
        bubbleContent.style.opacity = '0';
        bubbleContent.style.transform = 'scale(0.8)';

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-expand after 1.5 seconds to show the effect
        setTimeout(() => {
          expandBubble();
        }, 1500);

        // Auto-shrink after 4 seconds
        setTimeout(() => {
          shrinkBubble();
        }, 5500);
      }

      // ----- Event listeners -----
      expandBtn.addEventListener('click', expandBubble);
      shrinkBtn.addEventListener('click', shrinkBubble);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      resetBtn.addEventListener('click', resetBubble);

      // Click on bubble to toggle
      thoughtBubble.addEventListener('click', toggleBubble);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
