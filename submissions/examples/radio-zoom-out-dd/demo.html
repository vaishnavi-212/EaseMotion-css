<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Zoom Out Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo specific styles */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f3f4f6;
      margin: 0;
      color: #1f2937;
    }
    .demo-container {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      color: #111827;
      text-align: center;
    }
    .description {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.5;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2>Subscription Plan</h2>
    <p class="description">Select a plan to see the smooth zoom out animation applied to the radio button.</p>
    
    <div class="radio-group">
      <label class="radio-container">
        <input type="radio" name="plan" class="ease-zoom-out" value="basic" checked>
        Basic Plan ($9/mo)
      </label>
      <label class="radio-container">
        <input type="radio" name="plan" class="ease-zoom-out" value="pro">
        Pro Plan ($19/mo)
      </label>
      <label class="radio-container">
        <input type="radio" name="plan" class="ease-zoom-out" value="enterprise">
        Enterprise ($49/mo)
      </label>
    </div>
  </div>

</body>
</html>
