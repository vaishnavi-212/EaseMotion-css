<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tooltip - E-Commerce Checkout</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="E-Commerce floating orbit tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Floating Orbit Tooltip</h1>
        <p>E-Commerce Checkout Layouts variant with floating orbit animation effect.</p>
        
        <div class="checkout-flow">
          <div class="cart-items">
            <h3>Shopping Cart</h3>
            
            <div class="cart-item">
              <div class="item-image">
                <span class="placeholder"></span>
              </div>
              <div class="item-details">
                <h4>Wireless Headphones Pro</h4>
                <p class="item-price">$199.00</p>
              </div>
              <div class="item-quantity">
                <button class="ease-qty-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Decrease quantity">
                  <span class="minus"></span>
                </button>
                <span>1</span>
                <button class="ease-qty-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Increase quantity">
                  <span class="plus"></span>
                </button>
              </div>
              <button class="ease-remove-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Remove item from cart">
                <span class="trash-icon"></span>
              </button>
            </div>
            
            <div class="cart-item">
              <div class="item-image">
                <span class="placeholder"></span>
              </div>
              <div class="item-details">
                <h4>Bluetooth Speaker</h4>
                <p class="item-price">$89.00</p>
              </div>
              <div class="item-quantity">
                <button class="ease-qty-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Decrease quantity">
                  <span class="minus"></span>
                </button>
                <span>2</span>
                <button class="ease-qty-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Increase quantity">
                  <span class="plus"></span>
                </button>
              </div>
              <button class="ease-remove-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Remove item from cart">
                <span class="trash-icon"></span>
              </button>
            </div>
          </div>
          
          <div class="order-summary">
            <h3>Order Summary</h3>
            
            <div class="summary-row">
              <span>Subtotal</span>
              <span class="ease-floating-orbit-ec-sb" data-tooltip="Sum of all items before tax">$377.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span class="ease-floating-orbit-ec-sb" data-tooltip="Free shipping on orders over $100">Free</span>
            </div>
            <div class="summary-row">
              <span>Tax</span>
              <span class="ease-floating-orbit-ec-sb" data-tooltip="Estimated tax based on your location">$33.93</span>
            </div>
            
            <div class="summary-total">
              <span>Total</span>
              <span>$410.93</span>
            </div>
            
            <button class="ease-checkout-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Proceed to secure payment">
              Proceed to Checkout
            </button>
            
            <div class="trust-badges">
              <span class="ease-floating-orbit-ec-sb" data-tooltip="256-bit SSL encrypted payment">
                <span class="badge-icon secure"></span>
              </span>
              <span class="ease-floating-orbit-ec-sb" data-tooltip="30-day money-back guarantee">
                <span class="badge-icon guarantee"></span>
              </span>
              <span class="ease-floating-orbit-ec-sb" data-tooltip="24/7 customer support available">
                <span class="badge-icon support"></span>
              </span>
            </div>
          </div>
        </div>
        
        <div class="payment-methods">
          <h3>We Accept</h3>
          <div class="payment-icons">
            <button class="ease-payment-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Pay with Visa">
              <span class="visa-icon"></span>
            </button>
            <button class="ease-payment-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Pay with Mastercard">
              <span class="mc-icon"></span>
            </button>
            <button class="ease-payment-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Pay with PayPal">
              <span class="paypal-icon"></span>
            </button>
            <button class="ease-payment-btn-sb ease-floating-orbit-ec-sb" data-tooltip="Pay with Apple Pay">
              <span class="apple-icon"></span>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
