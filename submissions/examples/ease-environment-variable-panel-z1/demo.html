<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environment Variable Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="env-card">
<h2>Environment Variables</h2>

<div class="env">
<span>NODE_ENV</span>
<code>production</code>
<b class="public">Public</b>
</div>

<div class="env">
<span>API_URL</span>
<code>https://api.app.com</code>
<b class="public">Public</b>
</div>

<div class="env">
<span>JWT_SECRET</span>
<code>••••••••••••</code>
<b class="private">Private</b>
</div>

<div class="env">
<span>DB_PASSWORD</span>
<code>••••••••••••</code>
<b class="private">Private</b>
</div>

</section>
</body>
</html>
