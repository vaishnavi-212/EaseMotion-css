<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunflower Tracking – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌻 Sunflower Tracking</h1>
    <p class="subtitle">Sunflower rotating to follow virtual sun</p>

    <div class="sunflower-container">
      <div class="sunflower-scene">
        <!-- Sky gradient -->
        <div class="sky"></div>

        <!-- Virtual Sun -->
        <div class="sun">
          <div class="sun-core"></div>
          <div class="sun-glow"></div>
          <div class="sun-ray ray-1"></div>
          <div class="sun-ray ray-2"></div>
          <div class="sun-ray ray-3"></div>
          <div class="sun-ray ray-4"></div>
          <div class="sun-ray ray-5"></div>
          <div class="sun-ray ray-6"></div>
          <div class="sun-ray ray-7"></div>
          <div class="sun-ray ray-8"></div>
        </div>

        <!-- Sun path arc (visual guide) -->
        <div class="sun-path"></div>

        <!-- Sunflower -->
        <div class="sunflower">
          <!-- Stem -->
          <div class="stem"></div>

          <!-- Leaves -->
          <div class="leaf leaf-1"></div>
          <div class="leaf leaf-2"></div>

          <!-- Flower head -->
          <div class="flower-head">
            <!-- Petals - outer ring -->
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="petal p7"></div>
            <div class="petal p8"></div>
            <div class="petal p9"></div>
            <div class="petal p10"></div>
            <div class="petal p11"></div>
            <div class="petal p12"></div>

            <!-- Petals - inner ring -->
            <div class="petal inner-petal ip1"></div>
            <div class="petal inner-petal ip2"></div>
            <div class="petal inner-petal ip3"></div>
            <div class="petal inner-petal ip4"></div>
            <div class="petal inner-petal ip5"></div>
            <div class="petal inner-petal ip6"></div>
            <div class="petal inner-petal ip7"></div>
            <div class="petal inner-petal ip8"></div>

            <!-- Center disc (seeds) -->
            <div class="center-disc">
              <div class="seed-pattern"></div>
            </div>

            <!-- Flower glow -->
            <div class="flower-glow"></div>
          </div>
        </div>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Grass blades -->
        <div class="grass g1"></div>
        <div class="grass g2"></div>
        <div class="grass g3"></div>
        <div class="grass g4"></div>
        <div class="grass g5"></div>
        <div class="grass g6"></div>
        <div class="grass g7"></div>
        <div class="grass g8"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Sun Speed
        <input type="range" id="speedControl" min="0.2" max="3" step="0.1" value="1" />
      </label>
      <label>
        Tracking Sensitivity
        <input type="range" id="sensitivityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const sunflower = document.querySelector('.sunflower');
      const flowerHead = document.querySelector('.flower-head');
      const sun = document.querySelector('.sun');
      const sunPath = document.querySelector('.sun-path');
      const stem = document.querySelector('.stem');
      const leaves = document.querySelectorAll('.leaf');
      const petals = document.querySelectorAll('.petal');
      const innerPetals = document.querySelectorAll('.inner-petal');
      const centerDisc = document.querySelector('.center-disc');
      const flowerGlow = document.querySelector('.flower-glow');
      const grass = document.querySelectorAll('.grass');
      const sky = document.querySelector('.sky');

      const speedInput = document.getElementById('speedControl');
      const sensitivityInput = document.getElementById('sensitivityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let sensitivityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let sunAngle = 0; // 0 to 360 degrees
      let targetAngle = 0;
      let currentAngle = 0;

      // ----- Update sun position -----
      function updateSun(progress) {
        // Sun moves in an arc from left to right
        const angle = progress * 180; // 0 to 180 degrees
        const radians = angle * Math.PI / 180;

        // Arc path: semicircle
        const radius = 40;
        const centerX = 50;
        const centerY = 60;

        const x = centerX + radius * Math.cos(radians + Math.PI);
        const y = centerY - radius * Math.sin(radians);

        sun.style.left = x + '%';
        sun.style.top = y + '%';

        // Sun color changes based on position (morning → noon → evening)
        const morningProgress = 1 - Math.abs(progress - 0.5) * 2;
        const warmth = Math.min(morningProgress * 1.2, 1);

        const r = Math.round(255 - 20 * (1 - warmth));
        const g = Math.round(200 - 60 * (1 - warmth));
        const b = Math.round(100 - 80 * (1 - warmth));

        sun.style.setProperty('--sun-color', `rgb(${r}, ${g}, ${b})`);
        sun.style.setProperty('--sun-glow-color', `rgba(${r}, ${g}, ${b}, 0.3)`);

        // Sky color changes with sun position
        const skyR = Math.round(135 + 80 * (1 - warmth));
        const skyG = Math.round(180 + 50 * (1 - warmth));
        const skyB = Math.round(220 + 30 * (1 - warmth));
        sky.style.background = `linear-gradient(180deg, 
          rgb(${skyR}, ${skyG}, ${skyB}) 0%, 
          rgb(${skyR - 30}, ${skyG - 20}, ${skyB - 10}) 100%)`;

        // Sun glow intensity
        const glowScale = 0.8 + warmth * 0.4;
        sun.style.setProperty('--sun-glow-scale', glowScale);

        // Sun path position indicator
        sunPath.style.setProperty('--sun-progress', (progress * 100) + '%');

        // Calculate target angle for sunflower
        // Sunflower tracks the sun, but with a slight delay
        const trackAngle = 90 + (progress - 0.5) * 120;
        targetAngle = trackAngle;
      }

      // ----- Update sunflower rotation -----
      function updateSunflower(deltaTime) {
        if (isPaused) return;

        const trackingSpeed = 0.8 * speedMultiplier * sensitivityMultiplier;

        // Smoothly interpolate current angle toward target
        const diff = targetAngle - currentAngle;

        // Normalize the difference to avoid going the long way
        let normalizedDiff = diff;
        if (normalizedDiff > 180) normalizedDiff -= 360;
        if (normalizedDiff < -180) normalizedDiff += 360;

        currentAngle += normalizedDiff * trackingSpeed * deltaTime * 0.02;

        // Apply rotation to flower head
        flowerHead.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;

        // Stem sways slightly with the flower
        const stemSway = Math.sin(currentAngle * Math.PI / 180) * 3;
        stem.style.transform = `translateX(-50%) rotate(${stemSway * 0.3}deg)`;

        // Leaves respond to stem sway
        leaves.forEach((leaf, i) => {
          const direction = i === 0 ? 1 : -1;
          const leafAngle = 30 + stemSway * 0.2 * direction;
          leaf.style.transform = `rotate(${leafAngle}deg)`;
        });

        // Petals respond to tracking
        const petalSway = Math.sin(currentAngle * Math.PI / 180) * 2;
        petals.forEach((p, i) => {
          const baseRot = (i / petals.length) * 360;
          const offset = petalSway * 0.5 * Math.sin(baseRot * Math.PI / 180);
          p.style.setProperty('--petal-sway', offset + 'deg');
        });

        innerPetals.forEach((p, i) => {
          const baseRot = (i / innerPetals.length) * 360;
          const offset = petalSway * 0.3 * Math.sin(baseRot * Math.PI / 180);
          p.style.setProperty('--petal-sway', offset + 'deg');
        });

        // Flower glow intensity follows sun position
        const glowIntensity = 0.4 + 0.6 * (1 - Math.abs((sunAngle / 180) - 0.5) * 2);
        flowerGlow.style.opacity = glowIntensity * 0.6;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        if (!isPaused) {
          // Update sun position
          const speed = 0.04 * speedMultiplier;
          sunAngle += deltaTime * speed * 0.5;

          // Loop the sun
          if (sunAngle > 360) {
            sunAngle -= 360;
          }

          const progress = (sunAngle % 360) / 360;
          updateSun(progress);
          updateSunflower(deltaTime);
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (isPaused) {
          pauseBtn.style.background = 'linear-gradient(135deg, #4a6a3a, #2a4a2a)';
        } else {
          pauseBtn.style.background = 'linear-gradient(135deg, #6a4a3a, #4a2a2a)';
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetScene() {
        sunAngle = 0;
        currentAngle = 90;
        targetAngle = 90;
        updateSun(0);
        flowerHead.style.transform = `translateX(-50%) rotate(90deg)`;
        stem.style.transform = 'translateX(-50%) rotate(0deg)';
        leaves.forEach((leaf, i) => {
          leaf.style.transform = i === 0 ? 'rotate(30deg)' : 'rotate(-30deg)';
        });
        petals.forEach(p => {
          p.style.setProperty('--petal-sway', '0deg');
        });
        innerPetals.forEach(p => {
          p.style.setProperty('--petal-sway', '0deg');
        });
        flowerGlow.style.opacity = '0.3';

        if (isPaused) {
          togglePause();
        }
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
      }

      // ----- Update sensitivity -----
      function updateSensitivity(value) {
        sensitivityMultiplier = parseFloat(value);
      }

      // ----- Init -----
      function init() {
        // Set initial sun position
        updateSun(0.1);
        currentAngle = 90 + (0.1 - 0.5) * 120;
        targetAngle = currentAngle;
        flowerHead.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      sensitivityInput.addEventListener('input', function() {
        updateSensitivity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetScene);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
