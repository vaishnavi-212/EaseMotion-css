<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Left Popover - Modern SaaS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Workspace
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    🚀
                </div>

                <div>
                    <h2>Team Workspace</h2>
                    <p>Modern SaaS Dashboard</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Projects</h3>
                    <span>28</span>
                </div>

                <div class="card">
                    <h3>Members</h3>
                    <span>14</span>
                </div>

                <div class="card">
                    <h3>Tasks</h3>
                    <span>132</span>
                </div>

            </div>

            <button class="action">
                Go to Dashboard
            </button>

        </div>

    </div>

</div>

</body>
</html>
