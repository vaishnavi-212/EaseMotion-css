<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Tea Brewing Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="tea-timer">
  <div class="cup">
    <div class="tea-fill"></div>
    <div class="steam steam1"></div>
    <div class="steam steam2"></div>
    <div class="steam steam3"></div>
  </div>

  <h2>Tea Brewing Timer</h2>

  <div class="time">03:00</div>

  <div class="buttons">
    <button>Start</button>
    <button>Pause</button>
    <button>Reset</button>
  </div>
</div>

</body>
</html>
