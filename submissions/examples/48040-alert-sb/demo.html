<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <h1 class="demo-title">Alert Component</h1>
    <div class="alert alert-info">
      <span class="alert-icon">ℹ</span>
      <div class="alert-content"><strong>Info:</strong> This is an informational message.</div>
    </div>
    <div class="alert alert-success">
      <span class="alert-icon">✓</span>
      <div class="alert-content"><strong>Success:</strong> Your action was completed successfully.</div>
    </div>
    <div class="alert alert-warning">
      <span class="alert-icon">⚠</span>
      <div class="alert-content"><strong>Warning:</strong> Please review your input before proceeding.</div>
    </div>
    <div class="alert alert-error">
      <span class="alert-icon">✕</span>
      <div class="alert-content"><strong>Error:</strong> Something went wrong. Please try again.</div>
    </div>
  </main>
</body>
</html>
