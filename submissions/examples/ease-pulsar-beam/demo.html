<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulsar Beam – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>⚡ Pulsar Beam</h1>
    <p class="subtitle">Rotating pulsar with sweeping beam</p>

    <div class="pulsar-container">
      <div class="pulsar-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>

        <!-- Pulsar -->
        <div class="pulsar">
          <!-- Neutron star core -->
          <div class="core"></div>

          <!-- Core glow -->
          <div class="core-glow"></div>

          <!-- Magnetic field lines -->
          <div class="field-line fl1"></div>
          <div class="field-line fl2"></div>
          <div class="field-line fl3"></div>
          <div class="field-line fl4"></div>

          <!-- Beam 1 (main) -->
          <div class="beam beam-1">
            <div class="beam-core"></div>
            <div class="beam-glow"></div>
            <div class="beam-particles">
              <div class="bp bp1"></div>
              <div class="bp bp2"></div>
              <div class="bp bp3"></div>
              <div class="bp bp4"></div>
              <div class="bp bp5"></div>
              <div class="bp bp6"></div>
              <div class="bp bp7"></div>
              <div class="bp bp8"></div>
            </div>
          </div>

          <!-- Beam 2 (counter) -->
          <div class="beam beam-2">
            <div class="beam-core"></div>
            <div class="beam-glow"></div>
            <div class="beam-particles">
              <div class="bp bp9"></div>
              <div class="bp bp10"></div>
              <div class="bp bp11"></div>
              <div class="bp bp12"></div>
              <div class="bp bp13"></div>
              <div class="bp bp14"></div>
              <div class="bp bp15"></div>
              <div class="bp bp16"></div>
            </div>
          </div>

          <!-- Nebula glow -->
          <div class="nebula"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Rotation Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Beam Width
        <input type="range" id="widthControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const pulsar = document.querySelector('.pulsar');
      const beams = document.querySelectorAll('.beam');
      const beamCores = document.querySelectorAll('.beam-core');
      const beamGlows = document.querySelectorAll('.beam-glow');
      const core = document.querySelector('.core');
      const coreGlow = document.querySelector('.core-glow');
      const nebula = document.querySelector('.nebula');
      const fieldLines = document.querySelectorAll('.field-line');
      const beamParticles = document.querySelectorAll('.bp');

      const speedInput = document.getElementById('speedControl');
      const widthInput = document.getElementById('widthControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let widthMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Pulsar rotation
        pulsar.style.setProperty('--rotation-duration', (2 / speedMultiplier) + 's');

        // Beam pulse
        beams.forEach((beam, i) => {
          const duration = (0.15 + i * 0.05) / speedMultiplier;
          beam.style.setProperty('--beam-duration', duration + 's');
        });

        // Core glow pulse
        coreGlow.style.setProperty('--core-glow-duration', (0.8 / speedMultiplier) + 's');

        // Nebula
        nebula.style.setProperty('--nebula-duration', (4 / speedMultiplier) + 's');

        // Field lines
        fieldLines.forEach((line, i) => {
          const duration = (1.5 + i * 0.3) / speedMultiplier;
          line.style.setProperty('--field-duration', duration + 's');
        });

        // Beam particles
        beamParticles.forEach((p, i) => {
          const duration = (0.5 + (i % 4) * 0.15) / speedMultiplier;
          p.style.setProperty('--bp-duration', duration + 's');
          p.style.setProperty('--bp-delay', ((i * 0.05) / speedMultiplier) + 's');
        });
      }

      // ----- Apply width -----
      function applyWidth() {
        beams.forEach((beam) => {
          const width = 4 * widthMultiplier;
          beam.style.setProperty('--beam-width', width + 'px');
        });

        beamCores.forEach((core) => {
          const size = 3 * widthMultiplier;
          core.style.setProperty('--core-width', size + 'px');
        });

        beamGlows.forEach((glow) => {
          const size = 60 * widthMultiplier;
          glow.style.setProperty('--glow-width', size + 'px');
        });

        // Particle sizes
        beamParticles.forEach((p) => {
          const size = 2 + Math.random() * 2 * widthMultiplier;
          p.style.setProperty('--bp-size', size + 'px');
        });
      }

      // ----- Update beam sweep (additional JS animation) -----
      function updateBeams(timestamp) {
        if (isPaused) return;

        const time = timestamp / 1000;
        const speed = 0.5 * speedMultiplier;

        // Beam particles drift along the beam
        beamParticles.forEach((p, i) => {
          const progress = (Math.sin(time * speed + i * 0.5) + 1) / 2;
          const distance = 20 + progress * 180;
          const spread = (Math.sin(time * speed * 0.7 + i * 0.3) * 0.5 + 0.5) * 20 * widthMultiplier;
          const beamIndex = Math.floor(i / 8);
          const angle = beamIndex === 0 ? 0 : 180;

          p.style.setProperty('--bp-distance', distance + 'px');
          p.style.setProperty('--bp-spread', spread + 'px');
          p.style.opacity = 0.2 + progress * 0.6;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateBeams(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetPulsar() {
        // Reset beam particles
        beamParticles.forEach((p) => {
          p.style.opacity = '0';
          p.style.setProperty('--bp-distance', '20px');
        });

        setTimeout(() => {
          beamParticles.forEach((p, i) => {
            p.style.opacity = '0.3';
          });
        }, 100);

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update width -----
      function updateWidth(value) {
        widthMultiplier = parseFloat(value);
        applyWidth();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyWidth();

        // Set initial particle positions
        beamParticles.forEach((p, i) => {
          p.style.opacity = '0.3';
        });

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      widthInput.addEventListener('input', function() {
        updateWidth(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetPulsar);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
