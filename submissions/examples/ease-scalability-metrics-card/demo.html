<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scalability Metrics Card</title>

</head>

<body>

<div class="metrics-card">

    <div class="header">
        <div>
            <h2>Scalability Metrics</h2>
            <p>System performance overview</p>
        </div>

        <span class="status">Healthy</span>
    </div>

    <div class="metrics-grid">

        <div class="metric">
            <div class="metric-title">Requests / sec</div>
            <div class="metric-value" id="req">1,240</div>
            <div class="metric-sub">Current throughput</div>
        </div>

        <div class="metric">
            <div class="metric-title">Response Time</div>
            <div class="metric-value" id="latency">82 ms</div>
            <div class="metric-sub">Average latency</div>
        </div>

        <div class="metric">
            <div class="metric-title">CPU Usage</div>
            <div class="metric-value" id="cpu">63%</div>
            <div class="metric-sub">Across all nodes</div>
        </div>

        <div class="metric">
            <div class="metric-title">Active Servers</div>
            <div class="metric-value" id="servers">12</div>
            <div class="metric-sub">Autoscaling enabled</div>
        </div>

    </div>

    <div class="footer">

        <div class="progress">
            <div class="progress-fill" id="progress"></div>
        </div>

        <button id="refreshBtn">
            Refresh Metrics
        </button>

    </div>

</div>

<script>
const progress = document.getElementById("progress");

document.getElementById("refreshBtn").addEventListener("click", () => {

    const req = Math.floor(Math.random() * 1000 + 1000);
    const latency = Math.floor(Math.random() * 80 + 40);
    const cpu = Math.floor(Math.random() * 70 + 20);
    const servers = Math.floor(Math.random() * 8 + 8);

    document.getElementById("req").textContent =
        req.toLocaleString();

    document.getElementById("latency").textContent =
        latency + " ms";

    document.getElementById("cpu").textContent =
        cpu + "%";

    document.getElementById("servers").textContent =
        servers;

    progress.style.width = cpu + "%";
});
</script>

</body>
</html>
