<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Animated Popover</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Interactive Interface</h1>
            <p>Pure CSS Fade-In Popover Component</p>
        </header>

        <main class="content-area">
            <!-- The Popover Component -->
            <div class="popover-container">
                <button class="popover-trigger" aria-haspopup="dialog" aria-label="Open settings">
                    <span>Settings</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>

                <!-- Popover Content -->
                <div class="popover-content" role="dialog" aria-label="Settings Popover">
                    <div class="popover-header">
                        <h3>Preferences</h3>
                    </div>
                    <div class="popover-body">
                        <div class="setting-item">
                            <div class="setting-info">
                                <span class="setting-title">Push Notifications</span>
                                <span class="setting-desc">Receive alerts and updates.</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" checked aria-label="Toggle push notifications">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <div class="setting-info">
                                <span class="setting-title">Dark Mode</span>
                                <span class="setting-desc">Toggle interface theme.</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" checked aria-label="Toggle dark mode">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="popover-footer">
                        <button class="btn-secondary" type="button">Dismiss</button>
                        <button class="btn-primary" type="button">Apply Changes</button>
                    </div>
                </div>
            </div>
            
            <p class="helper-text">Hover or focus the button above to interact with the popover.</p>
        </main>
    </div>
</body>
</html>
