<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Tooltip - Glassmorphism UI</title>

</head>
<body>

<div class="glass-card">

    </div>
</div>
