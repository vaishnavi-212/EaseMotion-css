<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Render Pipeline Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="pipeline-workspace">
    <div class="render-status-card">
      
      <div class="card-meta-header">
        <div class="status-title-group">
          <h4>RENDER QUEUE</h4>
          <p>Cluster Node: Delta-9</p>
        </div>
        <span class="active-pulse-badge">PROCESSING</span>
      </div>

      <!-- Pure CSS Render Queue Status Trackers -->
      <div class="queue-stack">
        
        <!-- Active Frame Row -->
        <div class="queue-item active-frame">
          <div class="item-meta">
            <span class="frame-id">Frame_0842_AuraLens</span>
            <span class="percentage-metric">64%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill-active">
              <div class="fluid-shimmer-overlay"></div>
            </div>
          </div>
        </div>

        <!-- Queued Frame Rows with Staggered Cascading Ambient Shimmers -->
        <div class="queue-item pending-frame" style="--stagger-index: 1;">
          <div class="item-meta">
            <span class="frame-id">Frame_0843_AuraLens</span>
            <span class="status-caption">Staged</span>
          </div>
          <div class="placeholder-skeleton"></div>
        </div>

        <div class="queue-item pending-frame" style="--stagger-index: 2;">
          <div class="item-meta">
            <span class="frame-id">Frame_0844_AuraLens</span>
            <span class="status-caption">Staged</span>
          </div>
          <div class="placeholder-skeleton"></div>
        </div>

      </div>

      <p class="panel-caption-footer">Monitors infinite synchronized sequence updates and backdrop shimmer passes natively.</p>
    </div>
  </main>

</body>
</html>
