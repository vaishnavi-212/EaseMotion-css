<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Popover for Minimalist Tech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tech-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="tech-popover-content">
        Copy API Key
      </button>
      
      <div id="tech-popover-content" class="ease-tada-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <div class="popover-header">
            <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <h3 id="popover-title">Copied to clipboard</h3>
          </div>
          <p>Your production API key has been securely copied. Please ensure you never share your secret keys publicly.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
