<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Glitch-Flicker Tooltip</title>
    <!-- Fonts for the cyberpunk aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="showcase-header">
            <h1>Glitch-Flicker Tooltip</h1>
            <p>A pure CSS cyberpunk-inspired tooltip for creative portfolios.</p>
        </header>

        <section class="demo-section">
            <p>
                In the neon-lit streets of the 
                <span class="tooltip-container">
                    <span class="trigger">Cyber-City</span>
                    <span class="tooltip" data-text="Population: 14,000,000. Sector 7 Active.">
                        Population: 14,000,000. Sector 7 Active.
                    </span>
                </span>, 
                everything is connected.
            </p>
            
            <p style="margin-top: 3.5rem;">
                Access the 
                <span class="tooltip-container">
                    <span class="trigger">Mainframe</span>
                    <span class="tooltip" data-text="Uplink established. Connection secure.">
                        Uplink established. Connection secure.
                    </span>
                </span>
                to download the latest encrypted data.
            </p>
        </section>
    </main>
</body>
</html>
