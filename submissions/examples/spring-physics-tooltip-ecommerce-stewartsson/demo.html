<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront Hub - Spring Physics Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ecommerce-viewport">
        <!-- Main Premium E-Commerce Checkout Card Elevation Container Hub Shell -->
        <div class="checkout-container-card">
            <header class="checkout-header">
                <div class="neon-matrix-badge">SECURE GATEWAY v7</div>
                <h2 class="checkout-title">Order Ledger Total</h2>
                <p class="checkout-subtitle">Hover over or interact with the summary trigger target below to witness the pure-CSS mechanical spring physics recoil tooltip.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">💳</span>
                        <span class="btn-text">Review Processing Charges</span>
                    </button>

                    <!-- Floating Tooltip Mechanical Spring Physics Recoil Overlay Shell Box -->
                    <div class="spring-physics-tooltip ease-spring-bounce">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Surcharge: $04.55</span>
                            <span class="tooltip-meta">SSL Vault Encrypted</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="checkout-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
