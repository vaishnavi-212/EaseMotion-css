<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Tower Reflection – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🏙️ Glass Tower Reflection</h1>
    <p class="subtitle">Skyscraper with changing reflections</p>

    <div class="gt-container">
      <div class="gt-scene">
        <!-- Sky -->
        <div class="sky">
          <div class="sun"></div>
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="cloud c3"></div>
        </div>

        <!-- Glass Tower -->
        <div class="tower">
          <!-- Tower structure -->
          <div class="tower-body">
            <!-- Glass panels -->
            <div class="glass-panel gp1"></div>
            <div class="glass-panel gp2"></div>
            <div class="glass-panel gp3"></div>
            <div class="glass-panel gp4"></div>
            <div class="glass-panel gp5"></div>
            <div class="glass-panel gp6"></div>
            <div class="glass-panel gp7"></div>
            <div class="glass-panel gp8"></div>
            <div class="glass-panel gp9"></div>
            <div class="glass-panel gp10"></div>
            <div class="glass-panel gp11"></div>
            <div class="glass-panel gp12"></div>
            <div class="glass-panel gp13"></div>
            <div class="glass-panel gp14"></div>
            <div class="glass-panel gp15"></div>
            <div class="glass-panel gp16"></div>
            <div class="glass-panel gp17"></div>
            <div class="glass-panel gp18"></div>
            <div class="glass-panel gp19"></div>
            <div class="glass-panel gp20"></div>
            <div class="glass-panel gp21"></div>
            <div class="glass-panel gp22"></div>
            <div class="glass-panel gp23"></div>
            <div class="glass-panel gp24"></div>
            <div class="glass-panel gp25"></div>
            <div class="glass-panel gp26"></div>
            <div class="glass-panel gp27"></div>
            <div class="glass-panel gp28"></div>
            <div class="glass-panel gp29"></div>
            <div class="glass-panel gp30"></div>
            <div class="glass-panel gp31"></div>
            <div class="glass-panel gp32"></div>
            <div class="glass-panel gp33"></div>
            <div class="glass-panel gp34"></div>
            <div class="glass-panel gp35"></div>
            <div class="glass-panel gp36"></div>
            <div class="glass-panel gp37"></div>
            <div class="glass-panel gp38"></div>
            <div class="glass-panel gp39"></div>
            <div class="glass-panel gp40"></div>

            <!-- Window grid lines -->
            <div class="grid-line gl-h1"></div>
            <div class="grid-line gl-h2"></div>
            <div class="grid-line gl-h3"></div>
            <div class="grid-line gl-h4"></div>
            <div class="grid-line gl-h5"></div>
            <div class="grid-line gl-h6"></div>
            <div class="grid-line gl-h7"></div>
            <div class="grid-line gl-h8"></div>
            <div class="grid-line gl-h9"></div>
            <div class="grid-line gl-h10"></div>
            <div class="grid-line gl-v1"></div>
            <div class="grid-line gl-v2"></div>
            <div class="grid-line gl-v3"></div>
            <div class="grid-line gl-v4"></div>
            <div class="grid-line gl-v5"></div>
            <div class="grid-line gl-v6"></div>
            <div class="grid-line gl-v7"></div>
            <div class="grid-line gl-v8"></div>
            <div class="grid-line gl-v9"></div>
            <div class="grid-line gl-v10"></div>
            <div class="grid-line gl-v11"></div>
            <div class="grid-line gl-v12"></div>
          </div>

          <!-- Reflections -->
          <div class="reflection reflection-1"></div>
          <div class="reflection reflection-2"></div>
          <div class="reflection reflection-3"></div>
          <div class="reflection reflection-4"></div>
          <div class="reflection reflection-5"></div>
          <div class="reflection reflection-6"></div>
          <div class="reflection reflection-7"></div>
          <div class="reflection reflection-8"></div>

          <!-- Tower glow -->
          <div class="tower-glow"></div>

          <!-- Light rays -->
          <div class="light-ray lr1"></div>
          <div class="light-ray lr2"></div>
          <div class="light-ray lr3"></div>
          <div class="light-ray lr4"></div>
          <div class="light-ray lr5"></div>
          <div class="light-ray lr6"></div>
        </div>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Ground reflection -->
        <div class="ground-reflection"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Reflection Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Light Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const reflections = document.querySelectorAll('.reflection');
      const glassPanels = document.querySelectorAll('.glass-panel');
      const towerGlow = document.querySelector('.tower-glow');
      const lightRays = document.querySelectorAll('.light-ray');
      const sun = document.querySelector('.sun');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Reflections
        reflections.forEach((ref, i) => {
          const duration = (2 + i * 0.2) / speedMultiplier;
          ref.style.setProperty('--ref-duration', duration + 's');
          ref.style.setProperty('--ref-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Glass panels
        glassPanels.forEach((panel, i) => {
          const duration = (1.5 + (i % 4) * 0.1) / speedMultiplier;
          panel.style.setProperty('--panel-duration', duration + 's');
          panel.style.setProperty('--panel-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Tower glow
        towerGlow.style.setProperty('--glow-duration', (2.5 / speedMultiplier) + 's');

        // Light rays
        lightRays.forEach((ray, i) => {
          const duration = (3 + i * 0.2) / speedMultiplier;
          ray.style.setProperty('--ray-duration', duration + 's');
          ray.style.setProperty('--ray-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Sun
        sun.style.setProperty('--sun-duration', (8 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Reflections
        reflections.forEach((ref) => {
          const opacity = Math.min(0.2 * intensityMultiplier, 0.4);
          ref.style.setProperty('--ref-opacity', opacity);
        });

        // Tower glow
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        towerGlow.style.setProperty('--glow-opacity', glowOpacity);
        const glowSize = 200 * intensityMultiplier;
        towerGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Light rays
        lightRays.forEach((ray) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          ray.style.setProperty('--ray-opacity', opacity);
        });

        // Glass panels
        glassPanels.forEach((panel) => {
          const brightness = Math.min(0.3 * intensityMultiplier, 0.6);
          panel.style.setProperty('--panel-brightness', brightness);
        });
      }

      // ----- Update tower -----
      function updateTower(timestamp) {
        if (isPaused) return;

        // Update reflection colors based on time
        const hue = (timestamp / 8000) % 360;
        const hue2 = (timestamp / 10000 + 60) % 360;
        const hue3 = (timestamp / 12000 + 120) % 360;

        reflections.forEach((ref, i) => {
          const offset = i * 30;
          const refHue = (hue + offset) % 360;
          const sat = 60 + Math.sin(timestamp / 3000 + i) * 20;
          const light = 40 + Math.sin(timestamp / 4000 + i * 0.5) * 20;
          ref.style.background = `linear-gradient(135deg,
            hsla(${refHue}, ${sat}%, ${light}%, var(--ref-opacity, 0.2)),
            hsla(${(refHue + 30) % 360}, ${sat + 10}%, ${light + 10}%, var(--ref-opacity, 0.2)),
            hsla(${(refHue + 60) % 360}, ${sat - 10}%, ${light - 10}%, var(--ref-opacity, 0.2))
          )`;
        });

        // Update glass panel colors
        glassPanels.forEach((panel, i) => {
          const offset = i * 5;
          const panelHue = (hue2 + offset) % 360;
          const light = 30 + Math.sin(timestamp / 5000 + i * 0.1) * 20;
          panel.style.background = `linear-gradient(135deg,
            hsla(${panelHue}, 60%, ${light}%, var(--panel-brightness, 0.3)),
            hsla(${(panelHue + 40) % 360}, 50%, ${light + 10}%, var(--panel-brightness, 0.3))
          )`;
        });

        // Sun position
        const sunAngle = (timestamp / 8000) % 1;
        const sunX = 20 + sunAngle * 60;
        const sunY = 10 + Math.sin(sunAngle * Math.PI) * 30;
        sun.style.left = sunX + '%';
        sun.style.top = sunY + '%';

        // Sun color
        const warmth = Math.sin(sunAngle * Math.PI) * 0.5 + 0.5;
        const r = Math.round(255 - 30 * (1 - warmth));
        const g = Math.round(220 - 80 * (1 - warmth));
        const b = Math.round(180 - 100 * (1 - warmth));
        sun.style.background = `radial-gradient(circle at 50% 40%,
          rgba(255, 255, 230, 0.8),
          rgba(${r}, ${g}, ${b}, 0.6),
          rgba(${r - 40}, ${g - 60}, ${b - 80}, 0.3)
        )`;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateTower(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetTower() {
        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetTower);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
