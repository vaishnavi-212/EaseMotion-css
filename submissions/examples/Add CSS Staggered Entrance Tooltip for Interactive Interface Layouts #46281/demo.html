<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Staggered Entrance Tooltip - Interactive Interface</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="interactive-layout">
    
    <div class="app-header">
      <div class="user-profile">
        <div class="avatar"></div>
        <div class="user-info">
          <h2>Player_One</h2>
          <span>Level 42</span>
        </div>
      </div>
      
      <div class="action-bar">
        <!-- Tooltip Container -->
        <div class="tooltip-container">
          <button class="interactive-btn" aria-label="View Daily Quests" aria-describedby="tooltip-1">
            <span class="btn-icon">⭐</span>
            <span class="btn-text">Quests</span>
            <span class="badge">3</span>
          </button>
          
          <div id="tooltip-1" class="tooltip playful-panel" role="tooltip">
            <div class="stagger-item tooltip-header">
              <h3>Daily Quests</h3>
              <span class="timer">14:22:09 left</span>
            </div>
            
            <div class="stagger-item quest-item">
              <div class="quest-icon">🏃</div>
              <div class="quest-details">
                <h4>Complete 5 lessons</h4>
                <div class="progress-bar"><div class="progress" style="width: 80%;"></div></div>
              </div>
              <span class="reward">+50 XP</span>
            </div>
            
            <div class="stagger-item quest-item">
              <div class="quest-icon">🔥</div>
              <div class="quest-details">
                <h4>Maintain a 7-day streak</h4>
                <div class="progress-bar"><div class="progress" style="width: 100%;"></div></div>
              </div>
              <span class="reward done">Done</span>
            </div>
            
            <div class="stagger-item quest-item">
              <div class="quest-icon">🏆</div>
              <div class="quest-details">
                <h4>Score perfect in Quiz</h4>
                <div class="progress-bar"><div class="progress" style="width: 0%;"></div></div>
              </div>
              <span class="reward">+100 XP</span>
            </div>
          </div>
        </div>
        
      </div>
    </div>

  </div>
</body>
</html>
