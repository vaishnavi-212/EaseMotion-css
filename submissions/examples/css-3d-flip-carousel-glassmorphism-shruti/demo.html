<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flip Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="carousel" aria-label="Glassmorphism UI Carousel">

  <input type="radio" name="slides" id="slide1" checked>
  <input type="radio" name="slides" id="slide2">
  <input type="radio" name="slides" id="slide3">

  <div class="slides">

    <div class="card card1">
      <h2>Dashboard</h2>
      <p>Interactive analytics with modern glass effects.</p>
    </div>

    <div class="card card2">
      <h2>Workspace</h2>
      <p>Collaborate seamlessly with elegant UI components.</p>
    </div>

    <div class="card card3">
      <h2>Reports</h2>
      <p>Generate insights through responsive interfaces.</p>
    </div>

  </div>

  <div class="controls">
    <label for="slide1"></label>
    <label for="slide2"></label>
    <label for="slide3"></label>
  </div>

</div>

</body>
</html>
