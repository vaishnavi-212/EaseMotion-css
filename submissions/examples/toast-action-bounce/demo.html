<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast Action Bounce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion toast</p>
    <h1 id="demo-title">Toast action bounce</h1>
    <p class="intro">A toast action where the button bounces gently when users hover or focus it.</p>
    <section class="toast" role="status">
      <span>Draft restored</span>
      <button type="button">Undo</button>
    </section>
  </main>
</body>
</html>
