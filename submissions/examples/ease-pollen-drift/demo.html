<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pollen Drift – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌸 Pollen Drift</h1>
    <p class="subtitle">Pollen particles floating through air</p>

    <div class="pollen-container">
      <div class="pollen-scene">
        <!-- Sky gradient -->
        <div class="sky"></div>

        <!-- Sunlight rays -->
        <div class="sun-ray sr-1"></div>
        <div class="sun-ray sr-2"></div>
        <div class="sun-ray sr-3"></div>
        <div class="sun-ray sr-4"></div>

        <!-- Flower in background -->
        <div class="flower-bg">
          <div class="flower-stem"></div>
          <div class="flower-head">
            <div class="flower-petal fp1"></div>
            <div class="flower-petal fp2"></div>
            <div class="flower-petal fp3"></div>
            <div class="flower-petal fp4"></div>
            <div class="flower-petal fp5"></div>
            <div class="flower-petal fp6"></div>
            <div class="flower-center"></div>
          </div>
        </div>

        <!-- Pollen particles -->
        <div class="pollen p1"></div>
        <div class="pollen p2"></div>
        <div class="pollen p3"></div>
        <div class="pollen p4"></div>
        <div class="pollen p5"></div>
        <div class="pollen p6"></div>
        <div class="pollen p7"></div>
        <div class="pollen p8"></div>
        <div class="pollen p9"></div>
        <div class="pollen p10"></div>
        <div class="pollen p11"></div>
        <div class="pollen p12"></div>
        <div class="pollen p13"></div>
        <div class="pollen p14"></div>
        <div class="pollen p15"></div>
        <div class="pollen p16"></div>
        <div class="pollen p17"></div>
        <div class="pollen p18"></div>
        <div class="pollen p19"></div>
        <div class="pollen p20"></div>
        <div class="pollen p21"></div>
        <div class="pollen p22"></div>
        <div class="pollen p23"></div>
        <div class="pollen p24"></div>
        <div class="pollen p25"></div>

        <!-- Glow overlay -->
        <div class="glow-overlay"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Drift Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Particle Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const pollenParticles = document.querySelectorAll('.pollen');
      const glowOverlay = document.querySelector('.glow-overlay');
      const sunRays = document.querySelectorAll('.sun-ray');

      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        pollenParticles.forEach((p, i) => {
          const baseDuration = 12 + (i % 7) * 1.5;
          const duration = baseDuration / speedMultiplier;
          p.style.setProperty('--pollen-duration', duration + 's');
        });

        sunRays.forEach((ray, i) => {
          const duration = (8 + i * 2) / speedMultiplier;
          ray.style.setProperty('--ray-duration', duration + 's');
        });

        glowOverlay.style.setProperty('--glow-duration', (4 / speedMultiplier) + 's');
      }

      // ----- Apply density -----
      function applyDensity() {
        pollenParticles.forEach((p) => {
          const baseSize = parseFloat(p.dataset.baseSize) || 3;
          const size = baseSize * densityMultiplier * 0.7;
          p.style.setProperty('--pollen-size', size + 'px');
          p.style.setProperty('--pollen-opacity', Math.min(0.5 * densityMultiplier, 0.9));
        });
      }

      // ----- Update pollen positions (additional drift via JS) -----
      function updatePollen(deltaTime) {
        if (isPaused) return;

        // Small random drift adjustment
        pollenParticles.forEach((p, i) => {
          const currentX = parseFloat(p.dataset.x) || 0;
          const currentY = parseFloat(p.dataset.y) || 0;
          const speed = 0.02 * speedMultiplier;

          // Add subtle drift
          const driftX = (Math.sin(Date.now() / 3000 + i) * 0.3 + Math.sin(Date.now() / 5000 + i * 0.7) * 0.2) * speed;
          const driftY = (Math.cos(Date.now() / 4000 + i * 0.5) * 0.3 + Math.cos(Date.now() / 6000 + i * 0.8) * 0.2) * speed;

          // Update position (we'll use transform for the actual movement)
          // The CSS animation handles the main movement, we just store for reference
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updatePollen(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetPollen() {
        // Reset all particles to their initial positions
        pollenParticles.forEach((p) => {
          p.style.animation = 'none';
          void p.offsetWidth;
          p.style.animation = '';
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Store base sizes for density scaling
        pollenParticles.forEach((p) => {
          const size = parseFloat(getComputedStyle(p).width) || 3;
          p.dataset.baseSize = size;
        });

        applySpeed();
        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetPollen);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
