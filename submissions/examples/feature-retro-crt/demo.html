<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro CRT Effect Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #050505; /* Deep black for monitor background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .monitor-frame {
            padding: 40px;
            border: 15px solid #222;
            border-radius: 20px;
            background: #111;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #4ade80;
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="monitor-frame">
        <!-- The CRT effect is applied here -->
        <h1 class="ease-retro-crt">SYSTEM OVERRIDE</h1>
        <p>Terminal connection established...</p>
    </div>
</body>
</html>
