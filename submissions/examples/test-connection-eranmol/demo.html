<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-test-connection - EaseMotion CSS</title>
  <meta name="description" content="A network connection test component with status indicators, latency display, and animated feedback.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>ease-test-connection</h1>
      <p class="subtitle">Network connection status &amp; test component</p>
    </header>

    <!-- Connection Status Card -->
    <div class="connection-card" id="connectionCard">
      <div class="connection-header">
        <div class="status-indicator" id="statusDot">
          <span class="status-ring"></span>
          <span class="status-core"></span>
        </div>
        <div class="status-text">
          <h2 class="status-label" id="statusLabel">Connected</h2>
          <p class="status-sub" id="statusSub">Stable connection</p>
        </div>
        <button class="test-btn" id="testBtn" onclick="runTest()">Test Connection</button>
      </div>

      <div class="connection-metrics">
        <div class="metric">
          <span class="metric-value" id="latencyValue">24ms</span>
          <span class="metric-label">Latency</span>
        </div>
        <div class="metric">
          <span class="metric-value" id="speedValue">85 Mbps</span>
          <span class="metric-label">Speed</span>
        </div>
        <div class="metric">
          <span class="metric-value" id="jitterValue">2ms</span>
          <span class="metric-label">Jitter</span>
        </div>
        <div class="metric">
          <span class="metric-value" id="packetValue">0%</span>
          <span class="metric-label">Packet Loss</span>
        </div>
      </div>

      <!-- Latency Graph -->
      <div class="latency-graph">
        <div class="graph-label">Latency History</div>
        <div class="graph-bars" id="graphBars">
          <div class="graph-bar" style="height: 30%"></div>
          <div class="graph-bar" style="height: 45%"></div>
          <div class="graph-bar" style="height: 25%"></div>
          <div class="graph-bar" style="height: 60%"></div>
          <div class="graph-bar" style="height: 35%"></div>
          <div class="graph-bar" style="height: 50%"></div>
          <div class="graph-bar" style="height: 20%"></div>
          <div class="graph-bar" style="height: 40%"></div>
          <div class="graph-bar" style="height: 55%"></div>
          <div class="graph-bar" style="height: 30%"></div>
          <div class="graph-bar" style="height: 45%"></div>
          <div class="graph-bar" style="height: 28%"></div>
        </div>
      </div>

      <!-- Test Progress -->
      <div class="test-progress" id="testProgress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">Ready to test</span>
      </div>
    </div>

    <!-- Connection Log -->
    <div class="connection-log">
      <h3 class="log-title">Connection Log</h3>
      <div class="log-entries" id="logEntries">
        <div class="log-entry">
          <span class="log-time">--:--:--</span>
          <span class="log-dot idle"></span>
          <span class="log-msg">Waiting for test...</span>
        </div>
      </div>
    </div>

  </main>

  <script>
    let testing = false;

    function addLog(msg, type) {
      const entries = document.getElementById('logEntries');
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${time}</span><span class="log-dot ${type}"></span><span class="log-msg">${msg}</span>`;
      entries.prepend(entry);
      if (entries.children.length > 10) entries.removeChild(entries.lastChild);
    }

    function updateGraph(value) {
      const bars = document.querySelectorAll('.graph-bar');
      bars.forEach((bar, i) => {
        if (i < bars.length - 1) {
          bar.style.height = bars[i + 1].style.height;
        } else {
          bar.style.height = value + '%';
        }
      });
    }

    function setMetric(id, value) {
      document.getElementById(id).textContent = value;
    }

    function setStatus(state, label, sub) {
      const card = document.getElementById('connectionCard');
      const dot = document.getElementById('statusDot');
      const lbl = document.getElementById('statusLabel');
      const subEl = document.getElementById('statusSub');

      card.className = 'connection-card ' + state;
      dot.className = 'status-indicator ' + state;
      lbl.textContent = label;
      subEl.textContent = sub;
    }

    function setProgress(pct, text) {
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = text;
    }

    function runTest() {
      if (testing) return;
      testing = true;

      const btn = document.getElementById('testBtn');
      btn.disabled = true;
      btn.textContent = 'Testing...';

      setStatus('testing', 'Testing...', 'Running diagnostics');
      setProgress(0, 'Initializing...');
      addLog('Test started', 'active');

      setTimeout(() => {
        setProgress(20, 'Pinging server...');
        addLog('Pinging 8.8.8.8...', 'active');
      }, 300);

      setTimeout(() => {
        setProgress(40, 'Measuring latency...');
        const latency = Math.floor(Math.random() * 40) + 10;
        setMetric('latencyValue', latency + 'ms');
        addLog('Latency: ' + latency + 'ms', latency < 50 ? 'ok' : 'warn');
        updateGraph(Math.min(latency * 2, 100));
      }, 800);

      setTimeout(() => {
        setProgress(60, 'Testing bandwidth...');
        const speed = Math.floor(Math.random() * 50) + 60;
        setMetric('speedValue', speed + ' Mbps');
        addLog('Speed: ' + speed + ' Mbps', 'ok');
      }, 1300);

      setTimeout(() => {
        setProgress(80, 'Checking jitter...');
        const jitter = Math.floor(Math.random() * 5) + 1;
        setMetric('jitterValue', jitter + 'ms');
        addLog('Jitter: ' + jitter + 'ms', jitter < 4 ? 'ok' : 'warn');
      }, 1800);

      setTimeout(() => {
        setProgress(100, 'Test complete');
        setMetric('packetValue', '0%');
        addLog('Packet loss: 0%', 'ok');
        setStatus('connected', 'Connected', 'Stable connection');
        addLog('Test completed successfully', 'ok');
        btn.disabled = false;
        btn.textContent = 'Test Connection';
        testing = false;
      }, 2200);
    }
  </script>

</body>
</html>
