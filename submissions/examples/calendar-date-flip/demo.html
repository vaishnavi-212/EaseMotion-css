<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Date Flip</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="calendar-stage" aria-label="Calendar date flip animation demo">
      <section class="calendar-card">
        <p class="month">July</p>
        <div class="date-tile" aria-label="Friday July 17">
          <span class="top">17</span>
          <span class="bottom">17</span>
        </div>
        <h1>Design review</h1>
        <p class="time">10:30 AM - 11:00 AM</p>
      </section>
    </main>
  </body>
</html>
