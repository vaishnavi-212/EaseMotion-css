<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Taxi Fare Meter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fare-meter">
    <h2>🚖 Taxi Fare Meter</h2>

    <div class="display">
        <span class="currency">$</span>
        <span class="fare">18.50</span>
    </div>

    <div class="details">
        <p>Distance: <strong>7.4 km</strong></p>
        <p>Time: <strong>18 mins</strong></p>
    </div>

    <div class="buttons">
        <button>Start</button>
        <button>Stop</button>
        <button>Reset</button>
    </div>
</div>

</body>
</html>
