<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - Spring Physics Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="catalog-viewport">
        <!-- Main Premium Catalog Card Container Hub Shell -->
        <div class="product-container-card">
            <header class="catalog-header">
                <div class="store-matrix-badge">STOREFRONT v7</div>
                <h2 class="catalog-title">Premium Soundbar System</h2>
                <p class="catalog-subtitle">Hover over or interact with the product info trigger target below to witness the pure-CSS mechanical spring physics recoil tooltip.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">🛒</span>
                        <span class="btn-text">Review Shipping Details</span>
                    </button>

                    <!-- Floating Tooltip Mechanical Spring Physics Recoil Overlay Shell Box -->
                    <div class="spring-physics-tooltip ease-spring-bounce">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Delivery: Free Overnight</span>
                            <span class="tooltip-meta">In Stock - Dispatches Instantly</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="catalog-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
