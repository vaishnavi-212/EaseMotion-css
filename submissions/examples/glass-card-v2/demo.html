<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pro Glass Card Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="wrap">
        <header class="page-header">
            <h1>Glassmorphism Cards</h1>
            <button id="theme-toggle" class="btn btn-icon" aria-label="Toggle theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </header>

        <section class="grid">
            <article class="glass-card">
                <header class="card-head">
                    <h2>Profile</h2>
                    <p class="muted">Member since 2024</p>
                </header>

                <div class="card-body">
                    <p>
                        Clean, translucent card using <code>backdrop-filter</code> and a subtle gradient accent. Dynamically adapts to dark and light modes.
                    </p>
                </div>

                <footer class="card-actions">
                    <button class="btn primary">Follow</button>
                    <button class="btn secondary">Message</button>
                </footer>
            </article>

            <article class="glass-card glass-card--accent">
                <header class="card-head">
                    <h2>Project</h2>
                    <p class="muted">UI exploration</p>
                </header>

                <div class="card-body">
                    <p>Use this layout for feature promos, dialogs, or highlighted cards in dashboards to draw user attention.</p>
                </div>

                <footer class="card-actions">
                    <button class="btn primary">Open Project</button>
                </footer>
            </article>
        </section>
    </main>

    <script>
        // Theme Toggle Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');

        // Check for saved theme preference or OS default
        const currentTheme = localStorage.getItem('theme') ? localStorage.getItem('theme') : null;
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }

        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        });
    </script>
</body>
</html>
