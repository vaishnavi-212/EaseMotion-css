<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="cards-demo" aria-label="Cards">
      <h1 class="demo-title">Card Component</h1>
      
      <div class="cards-grid">
        <article class="card">
          <div class="card-image">
            <span class="card-icon">📱</span>
          </div>
          <div class="card-body">
            <span class="card-tag">Mobile</span>
            <h2 class="card-title">Responsive Design</h2>
            <p class="card-text">Create beautiful experiences across all devices and screen sizes.</p>
            <button class="card-btn">Learn More</button>
          </div>
        </article>
        
        <article class="card">
          <div class="card-image">
            <span class="card-icon">⚡</span>
          </div>
          <div class="card-body">
            <span class="card-tag">Performance</span>
            <h2 class="card-title">Lightning Fast</h2>
            <p class="card-text">Optimized for speed with minimal bundle size and fast load times.</p>
            <button class="card-btn">Learn More</button>
          </div>
        </article>
        
        <article class="card">
          <div class="card-image">
            <span class="card-icon">🎨</span>
          </div>
          <div class="card-body">
            <span class="card-tag">Design</span>
            <h2 class="card-title">Beautiful UI</h2>
            <p class="card-text">Modern, clean components that look great out of the box.</p>
            <button class="card-btn">Learn More</button>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
