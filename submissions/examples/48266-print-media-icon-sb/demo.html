<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Icon Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized icon demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Icons</h1>
        <p>Demonstrates icon components with print media query optimization.</p>
        
        <div class="icon-showcase">
          <div class="icon-item">
            <span class="ease-icon ease-icon-home"></span>
            <span class="icon-label">Home</span>
          </div>
          <div class="icon-item">
            <span class="ease-icon ease-icon-settings"></span>
            <span class="icon-label">Settings</span>
          </div>
          <div class="icon-item">
            <span class="ease-icon ease-icon-user"></span>
            <span class="icon-label">User</span>
          </div>
          <div class="icon-item">
            <span class="ease-icon ease-icon-mail"></span>
            <span class="icon-label">Mail</span>
          </div>
        </div>
        
        <div class="icon-sizes">
          <span class="ease-icon ease-icon-home ease-icon-xs"></span>
          <span class="ease-icon ease-icon-home ease-icon-sm"></span>
          <span class="ease-icon ease-icon-home ease-icon-md"></span>
          <span class="ease-icon ease-icon-home ease-icon-lg"></span>
          <span class="ease-icon ease-icon-home ease-icon-xl"></span>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see icons hidden in print mode.</p>
      </section>
    </main>
  </body>
</html>
