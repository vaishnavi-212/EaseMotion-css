<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification Stack Slide</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="notification-stage" aria-label="Notification stack slide animation demo">
      <section class="stack" aria-live="polite">
        <article class="notice notice-one">
          <span class="dot"></span>
          <div>
            <h1>Build uploaded</h1>
            <p>Preview deploy finished successfully.</p>
          </div>
        </article>
        <article class="notice notice-two">
          <span class="dot"></span>
          <div>
            <h2>Review ready</h2>
            <p>Two comments need attention.</p>
          </div>
        </article>
        <article class="notice notice-three">
          <span class="dot"></span>
          <div>
            <h2>Checks passed</h2>
            <p>All workflow jobs completed.</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
