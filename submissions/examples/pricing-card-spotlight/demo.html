<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Card Spotlight</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="pricing-stage" aria-label="Pricing card spotlight animation demo">
      <article class="pricing-card" tabindex="0">
        <p class="eyebrow">Starter</p>
        <h1>Launch Plan</h1>
        <p class="price"><span>$19</span> / month</p>
        <ul>
          <li>10 motion presets</li>
          <li>Export-ready CSS</li>
          <li>Responsive examples</li>
        </ul>
        <button type="button">Choose plan</button>
      </article>
    </main>
  </body>
</html>
