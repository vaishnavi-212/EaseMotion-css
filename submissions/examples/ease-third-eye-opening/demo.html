<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Third Eye Opening – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>👁️ Third Eye Opening</h1>
    <p class="subtitle">Eye opening with mystical light</p>

    <div class="te-container">
      <div class="te-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Third Eye -->
        <div class="third-eye">
          <!-- Outer eye shape -->
          <div class="eye-outer">
            <!-- Eye lid -->
            <div class="eye-lid upper-lid"></div>
            <div class="eye-lid lower-lid"></div>

            <!-- Eye white -->
            <div class="eye-white"></div>

            <!-- Iris -->
            <div class="iris">
              <!-- Iris patterns -->
              <div class="iris-pattern ip1"></div>
              <div class="iris-pattern ip2"></div>
              <div class="iris-pattern ip3"></div>
              <div class="iris-pattern ip4"></div>
              <div class="iris-pattern ip5"></div>
              <div class="iris-pattern ip6"></div>
              <div class="iris-pattern ip7"></div>
              <div class="iris-pattern ip8"></div>

              <!-- Pupil -->
              <div class="pupil">
                <div class="pupil-glow"></div>
              </div>

              <!-- Iris glow -->
              <div class="iris-glow"></div>
            </div>

            <!-- Eye glow -->
            <div class="eye-glow"></div>

            <!-- Mystical light rays -->
            <div class="light-ray lr1"></div>
            <div class="light-ray lr2"></div>
            <div class="light-ray lr3"></div>
            <div class="light-ray lr4"></div>
            <div class="light-ray lr5"></div>
            <div class="light-ray lr6"></div>
            <div class="light-ray lr7"></div>
            <div class="light-ray lr8"></div>
            <div class="light-ray lr9"></div>
            <div class="light-ray lr10"></div>
            <div class="light-ray lr11"></div>
            <div class="light-ray lr12"></div>
          </div>

          <!-- Third eye glow -->
          <div class="third-eye-glow"></div>

          <!-- Energy particles -->
          <div class="energy-particle ep1"></div>
          <div class="energy-particle ep2"></div>
          <div class="energy-particle ep3"></div>
          <div class="energy-particle ep4"></div>
          <div class="energy-particle ep5"></div>
          <div class="energy-particle ep6"></div>
          <div class="energy-particle ep7"></div>
          <div class="energy-particle ep8"></div>
          <div class="energy-particle ep9"></div>
          <div class="energy-particle ep10"></div>
          <div class="energy-particle ep11"></div>
          <div class="energy-particle ep12"></div>
          <div class="energy-particle ep13"></div>
          <div class="energy-particle ep14"></div>
          <div class="energy-particle ep15"></div>
          <div class="energy-particle ep16"></div>
          <div class="energy-particle ep17"></div>
          <div class="energy-particle ep18"></div>
          <div class="energy-particle ep19"></div>
          <div class="energy-particle ep20"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="openBtn">👁️ Open Eye</button>
      <button id="closeBtn">😌 Close Eye</button>
      <label>
        Light Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const thirdEye = document.querySelector('.third-eye');
      const upperLid = document.querySelector('.upper-lid');
      const lowerLid = document.querySelector('.lower-lid');
      const eyeWhite = document.querySelector('.eye-white');
      const iris = document.querySelector('.iris');
      const pupil = document.querySelector('.pupil');
      const irisGlow = document.querySelector('.iris-glow');
      const eyeGlow = document.querySelector('.eye-glow');
      const thirdEyeGlow = document.querySelector('.third-eye-glow');
      const lightRays = document.querySelectorAll('.light-ray');
      const energyParticles = document.querySelectorAll('.energy-particle');

      const openBtn = document.getElementById('openBtn');
      const closeBtn = document.getElementById('closeBtn');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let intensityMultiplier = 1;
      let isOpen = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply intensity -----
      function applyIntensity() {
        // Eye glow
        const glowSize = 150 * intensityMultiplier;
        eyeGlow.style.setProperty('--eye-glow-size', glowSize + 'px');
        eyeGlow.style.setProperty('--eye-glow-intensity', Math.min(0.4 * intensityMultiplier, 0.8));

        // Third eye glow
        const teGlowSize = 250 * intensityMultiplier;
        thirdEyeGlow.style.setProperty('--te-glow-size', teGlowSize + 'px');
        thirdEyeGlow.style.setProperty('--te-glow-intensity', Math.min(0.3 * intensityMultiplier, 0.6));

        // Iris glow
        irisGlow.style.setProperty('--iris-glow-intensity', Math.min(0.5 * intensityMultiplier, 1));

        // Light rays
        lightRays.forEach((ray) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          ray.style.setProperty('--ray-opacity', opacity);
          const length = 40 * intensityMultiplier;
          ray.style.setProperty('--ray-length', length + 'px');
        });

        // Energy particles
        energyParticles.forEach((p) => {
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--energy-size', size + 'px');
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          p.style.setProperty('--energy-opacity', opacity);
        });
      }

      // ----- Open eye -----
      function openEye() {
        if (isOpen) return;
        isOpen = true;

        thirdEye.classList.add('open');
        thirdEye.classList.remove('closed');

        upperLid.classList.add('open');
        upperLid.classList.remove('closed');
        lowerLid.classList.add('open');
        lowerLid.classList.remove('closed');

        eyeWhite.classList.add('reveal');
        iris.classList.add('reveal');
        pupil.classList.add('reveal');
        irisGlow.classList.add('active');
        eyeGlow.classList.add('active');
        thirdEyeGlow.classList.add('active');

        lightRays.forEach((ray) => {
          ray.classList.add('active');
        });

        energyParticles.forEach((p) => {
          p.classList.add('active');
        });

        openBtn.textContent = '👁️ Opening...';
        setTimeout(() => {
          openBtn.textContent = '👁️ Open Eye';
        }, 800);
      }

      // ----- Close eye -----
      function closeEye() {
        if (!isOpen) return;
        isOpen = false;

        thirdEye.classList.remove('open');
        thirdEye.classList.add('closed');

        upperLid.classList.remove('open');
        upperLid.classList.add('closed');
        lowerLid.classList.remove('open');
        lowerLid.classList.add('closed');

        eyeWhite.classList.remove('reveal');
        iris.classList.remove('reveal');
        pupil.classList.remove('reveal');
        irisGlow.classList.remove('active');
        eyeGlow.classList.remove('active');
        thirdEyeGlow.classList.remove('active');

        lightRays.forEach((ray) => {
          ray.classList.remove('active');
        });

        energyParticles.forEach((p) => {
          p.classList.remove('active');
        });

        closeBtn.textContent = '😌 Closing...';
        setTimeout(() => {
          closeBtn.textContent = '😌 Close Eye';
        }, 800);
      }

      // ----- Toggle -----
      function toggleEye() {
        if (isOpen) {
          closeEye();
        } else {
          openEye();
        }
      }

      // ----- Reset -----
      function resetEye() {
        if (isOpen) {
          closeEye();
          setTimeout(() => {
            isOpen = false;
            thirdEye.classList.remove('closed');
          }, 400);
        } else {
          thirdEye.classList.remove('closed');
        }
        lastTimestamp = 0;
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Energy particle animation -----
      function animateParticles(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        energyParticles.forEach((p, i) => {
          if (p.classList.contains('active')) {
            const phase = Math.sin(timestamp / 2000 + i * 0.5) * 0.5 + 0.5;
            const scale = 0.5 + phase * 1;
            p.style.transform = `translate(${Math.sin(timestamp / 3000 + i * 1.2) * 20}px, 
              ${Math.cos(timestamp / 2500 + i * 1.5) * 20}px) scale(${scale})`;
            p.style.opacity = 0.2 + phase * 0.6;
          }
        });

        animationFrame = requestAnimationFrame(animateParticles);
      }

      // ----- Init -----
      function init() {
        // Start closed
        thirdEye.classList.add('closed');
        upperLid.classList.add('closed');
        lowerLid.classList.add('closed');

        applyIntensity();

        // Start particle animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animateParticles);

        // Auto-open after 1.5 seconds
        setTimeout(() => {
          openEye();
        }, 1500);

        // Auto-close after 4 seconds
        setTimeout(() => {
          closeEye();
        }, 5500);

        // Cycle again
        setTimeout(() => {
          openEye();
        }, 7000);

        setTimeout(() => {
          closeEye();
        }, 10000);
      }

      // ----- Event listeners -----
      openBtn.addEventListener('click', openEye);
      closeBtn.addEventListener('click', closeEye);
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });
      resetBtn.addEventListener('click', resetEye);

      // Click on eye to toggle
      thirdEye.addEventListener('click', toggleEye);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
