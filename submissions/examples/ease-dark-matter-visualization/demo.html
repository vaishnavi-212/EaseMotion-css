<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Matter Visualization – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌌 Dark Matter Visualization</h1>
    <p class="subtitle">Invisible matter bending light</p>

    <div class="dm-container">
      <div class="dm-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>
        <div class="star s16"></div>
        <div class="star s17"></div>
        <div class="star s18"></div>
        <div class="star s19"></div>
        <div class="star s20"></div>

        <!-- Dark matter halo -->
        <div class="dm-halo">
          <div class="halo-layer h1"></div>
          <div class="halo-layer h2"></div>
          <div class="halo-layer h3"></div>
          <div class="halo-layer h4"></div>
          <div class="halo-layer h5"></div>
          <div class="halo-layer h6"></div>
          <div class="halo-layer h7"></div>
          <div class="halo-layer h8"></div>
        </div>

        <!-- Gravitational lensing distortion grid -->
        <div class="lensing-grid">
          <div class="grid-line lh1"></div>
          <div class="grid-line lh2"></div>
          <div class="grid-line lh3"></div>
          <div class="grid-line lh4"></div>
          <div class="grid-line lh5"></div>
          <div class="grid-line lh6"></div>
          <div class="grid-line lh7"></div>
          <div class="grid-line lh8"></div>
          <div class="grid-line lv1"></div>
          <div class="grid-line lv2"></div>
          <div class="grid-line lv3"></div>
          <div class="grid-line lv4"></div>
          <div class="grid-line lv5"></div>
          <div class="grid-line lv6"></div>
          <div class="grid-line lv7"></div>
          <div class="grid-line lv8"></div>
        </div>

        <!-- Einstein rings (bent light) -->
        <div class="einstein-ring er1"></div>
        <div class="einstein-ring er2"></div>
        <div class="einstein-ring er3"></div>
        <div class="einstein-ring er4"></div>

        <!-- Light rays bending -->
        <div class="light-ray lr1"></div>
        <div class="light-ray lr2"></div>
        <div class="light-ray lr3"></div>
        <div class="light-ray lr4"></div>
        <div class="light-ray lr5"></div>
        <div class="light-ray lr6"></div>
        <div class="light-ray lr7"></div>
        <div class="light-ray lr8"></div>

        <!-- Gravitational lensing glow -->
        <div class="lensing-glow"></div>

        <!-- Dark matter particles -->
        <div class="dm-particle dp1"></div>
        <div class="dm-particle dp2"></div>
        <div class="dm-particle dp3"></div>
        <div class="dm-particle dp4"></div>
        <div class="dm-particle dp5"></div>
        <div class="dm-particle dp6"></div>
        <div class="dm-particle dp7"></div>
        <div class="dm-particle dp8"></div>
        <div class="dm-particle dp9"></div>
        <div class="dm-particle dp10"></div>
        <div class="dm-particle dp11"></div>
        <div class="dm-particle dp12"></div>

        <!-- Hidden mass indicator -->
        <div class="mass-indicator"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Lensing Strength
        <input type="range" id="strengthControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <label>
        Halo Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const dmHalo = document.querySelector('.dm-halo');
      const haloLayers = document.querySelectorAll('.halo-layer');
      const lensingGrid = document.querySelector('.lensing-grid');
      const gridLines = document.querySelectorAll('.grid-line');
      const einsteinRings = document.querySelectorAll('.einstein-ring');
      const lightRays = document.querySelectorAll('.light-ray');
      const lensingGlow = document.querySelector('.lensing-glow');
      const dmParticles = document.querySelectorAll('.dm-particle');
      const massIndicator = document.querySelector('.mass-indicator');

      const strengthInput = document.getElementById('strengthControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let strengthMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let phase = 0;

      // ----- Apply strength -----
      function applyStrength() {
        // Einstein rings
        einsteinRings.forEach((ring, i) => {
          const baseSize = 30 + i * 20;
          const size = baseSize * strengthMultiplier;
          ring.style.setProperty('--ring-size', size + 'px');
          ring.style.setProperty('--ring-opacity', Math.min(0.3 * strengthMultiplier, 0.6));
        });

        // Lensing glow
        const glowSize = 250 * strengthMultiplier;
        lensingGlow.style.setProperty('--glow-size', glowSize + 'px');
        lensingGlow.style.setProperty('--glow-intensity', Math.min(0.3 * strengthMultiplier, 0.6));

        // Light rays
        lightRays.forEach((ray) => {
          const bend = 30 * strengthMultiplier;
          ray.style.setProperty('--ray-bend', bend + 'deg');
          ray.style.setProperty('--ray-opacity', Math.min(0.15 * strengthMultiplier, 0.4));
        });

        // Grid distortion
        gridLines.forEach((line) => {
          line.style.setProperty('--grid-distortion', strengthMultiplier);
        });

        // Mass indicator
        const indicatorSize = 80 * strengthMultiplier;
        massIndicator.style.setProperty('--indicator-size', indicatorSize + 'px');
        massIndicator.style.setProperty('--indicator-opacity', Math.min(0.15 * strengthMultiplier, 0.3));
      }

      // ----- Apply density -----
      function applyDensity() {
        // Halo layers
        haloLayers.forEach((layer, i) => {
          const baseOpacity = 0.05 + i * 0.02;
          const opacity = Math.min(baseOpacity * densityMultiplier, 0.3);
          layer.style.setProperty('--halo-opacity', opacity);
          const size = 100 + i * 25;
          layer.style.setProperty('--halo-size', (size * densityMultiplier) + 'px');
        });

        // Dark matter particles
        dmParticles.forEach((p) => {
          const baseSize = parseFloat(p.dataset.baseSize) || 3;
          const size = baseSize * densityMultiplier * 0.7;
          p.style.setProperty('--dm-size', size + 'px');
          p.style.setProperty('--dm-opacity', Math.min(0.4 * densityMultiplier, 0.8));
        });
      }

      // ----- Update distortion -----
      function updateDistortion(timestamp) {
        if (isPaused) return;

        const speed = 0.015 * strengthMultiplier;
        phase += speed;

        if (phase > 1) {
          phase = 0;
        }

        // Distort grid lines based on phase
        gridLines.forEach((line, i) => {
          const offset = i * 0.03;
          const distortion = Math.sin((phase + offset) * Math.PI * 2) * 3 * strengthMultiplier;
          const isHorizontal = line.classList.contains('lh1') || line.classList.contains('lh2') ||
                              line.classList.contains('lh3') || line.classList.contains('lh4') ||
                              line.classList.contains('lh5') || line.classList.contains('lh6') ||
                              line.classList.contains('lh7') || line.classList.contains('lh8');
          const transform = isHorizontal ?
            `translateX(${distortion}px)` :
            `translateY(${distortion}px)`;
          line.style.transform = transform;
        });

        // Pulse Einstein rings
        einsteinRings.forEach((ring, i) => {
          const offset = i * 0.2;
          const pulse = Math.sin((phase + offset) * Math.PI * 2) * 0.2 + 0.8;
          ring.style.transform = `translate(-50%, -50%) scale(${pulse})`;
          ring.style.opacity = Math.min(0.15 * strengthMultiplier * pulse, 0.4);
        });

        // Dark matter particles drift
        dmParticles.forEach((p, i) => {
          const offset = i * 0.05;
          const drift = Math.sin((phase + offset) * Math.PI * 2) * 5 * strengthMultiplier;
          const drift2 = Math.cos((phase + offset + 0.3) * Math.PI * 2) * 5 * strengthMultiplier;
          p.style.transform = `translate(${drift}px, ${drift2}px) scale(${0.5 + Math.sin((phase + offset) * Math.PI * 2) * 0.3 + 0.5})`;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateDistortion(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetVisualization() {
        phase = 0;
        gridLines.forEach(line => {
          line.style.transform = '';
        });
        einsteinRings.forEach(ring => {
          ring.style.transform = 'translate(-50%, -50%) scale(1)';
        });
        dmParticles.forEach(p => {
          p.style.transform = '';
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update strength -----
      function updateStrength(value) {
        strengthMultiplier = parseFloat(value);
        applyStrength();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Set base sizes for particles
        dmParticles.forEach((p) => {
          const size = 2 + Math.random() * 4;
          p.dataset.baseSize = size;
        });

        applyStrength();
        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      strengthInput.addEventListener('input', function() {
        updateStrength(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetVisualization);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
