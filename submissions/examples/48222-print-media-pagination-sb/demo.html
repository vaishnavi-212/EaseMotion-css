<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Pagination Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized pagination demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Pagination</h1>
        <p>Demonstrates pagination component with print media query optimization.</p>
        
        <nav class="ease-pagination" aria-label="Pagination">
          <a href="#" class="ease-page-item ease-page-prev">Previous</a>
          <a href="#" class="ease-page-item">1</a>
          <span class="ease-page-item ease-page-current">2</span>
          <a href="#" class="ease-page-item">3</a>
          <span class="ease-page-ellipsis">...</span>
          <a href="#" class="ease-page-item">10</a>
          <a href="#" class="ease-page-item ease-page-next">Next</a>
        </nav>
        
        <div class="ease-pagination-simple">
          <nav class="ease-pagination" aria-label="Simple pagination">
            <a href="#" class="ease-page-item ease-page-prev">&laquo; Previous</a>
            <a href="#" class="ease-page-item">1</a>
            <a href="#" class="ease-page-item ease-page-current">2</a>
            <a href="#" class="ease-page-item">3</a>
            <a href="#" class="ease-page-item ease-page-next">Next &raquo;</a>
          </nav>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see pagination hidden in print mode.</p>
      </section>
    </main>
  </body>
</html>
