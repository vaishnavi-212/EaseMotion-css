<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Skeleton Jello Animation</title>
    <!-- Component styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Skeleton Jello Animation</h1>
            <p>A dynamic, accessible loading state for UI placeholders using <code>ease-jello</code>.</p>
        </header>

        <section class="demo-section">
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton-avatar ease-jello"></div>
                    <div class="skeleton-titles">
                        <div class="skeleton-title ease-jello"></div>
                        <div class="skeleton-subtitle ease-jello"></div>
                    </div>
                </div>
                <div class="skeleton-body">
                    <div class="skeleton-line ease-jello" style="width: 100%;"></div>
                    <div class="skeleton-line ease-jello" style="width: 90%;"></div>
                    <div class="skeleton-line ease-jello" style="width: 95%;"></div>
                    <div class="skeleton-line ease-jello" style="width: 60%;"></div>
                </div>
                <div class="skeleton-footer">
                    <div class="skeleton-button ease-jello"></div>
                    <div class="skeleton-button ease-jello"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
