<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Magnetic Pull Tooltip - Product Catalog</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="catalog-viewport">
        <div class="product-item-card">
            <div class="product-image-frame">
                <span class="catalog-category-tag">PREMIUM AUDIO</span>
                <div class="product-placeholder-graphic"></div>
            </div>
            
            <div class="product-details">
                <h4 class="product-name">Acoustic Pro Headphones</h4>
                <p class="product-price">$299.00</p>
            </div>

            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label-text">View Specs</span>
                        <svg class="spec-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </button>
                    
                    <div class="magnetic-pull-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-catalog">HARDWARE_SPECS</span>
                                <p class="spec-title">Active Noise Isolation</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="spec-desc">Equipped with a custom hybrid acoustic filter canceling up to 40dB of ambient operational feedback channels automatically.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
