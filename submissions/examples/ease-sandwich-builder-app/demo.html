<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandwich Builder</title>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🥪 Sandwich Builder</h1>

        <!-- Bread -->
        <div class="section">
            <div class="section-title">Bread</div>

            <label class="option">
                <input type="radio" name="bread" value="White">
                White
            </label>

            <label class="option">
                <input type="radio" name="bread" value="Brown" checked>
                Brown
            </label>

            <label class="option">
                <input type="radio" name="bread" value="Multigrain">
                Multigrain
            </label>
        </div>

        <!-- Protein -->
        <div class="section">
            <div class="section-title">Protein</div>

            <label class="option">
                <input type="radio" name="protein" value="Chicken" checked>
                Chicken
            </label>

            <label class="option">
                <input type="radio" name="protein" value="Paneer">
                Paneer
            </label>
        </div>

        <!-- Extras -->
        <div class="section">
            <div class="section-title">Extras</div>

            <label class="option">
                <input type="checkbox" value="Cheese" checked>
                Cheese
            </label>

            <label class="option">
                <input type="checkbox" value="Lettuce" checked>
                Lettuce
            </label>

            <label class="option">
                <input type="checkbox" value="Tomato">
                Tomato
            </label>

            <label class="option">
                <input type="checkbox" value="Onion">
                Onion
            </label>
        </div>

        <button id="buildBtn">Build Sandwich</button>

    </div>

    <div class="result">
        <h2>Selected:</h2>

        <p><strong>Bread:</strong> <span id="bread">Brown</span></p>

        <p><strong>Protein:</strong> <span id="protein">Chicken</span></p>

        <p><strong>Extras:</strong> <span id="extras">Cheese, Lettuce</span></p>
    </div>

</div>

<script>
const buildBtn = document.getElementById("buildBtn");

buildBtn.addEventListener("click", () => {

    const bread =
        document.querySelector('input[name="bread"]:checked')?.value || "None";

    const protein =
        document.querySelector('input[name="protein"]:checked')?.value || "None";

    const extras = [...document.querySelectorAll('input[type="checkbox"]:checked')]
        .map(item => item.value);

    document.getElementById("bread").textContent = bread;
    document.getElementById("protein").textContent = protein;

    document.getElementById("extras").textContent =
        extras.length ? extras.join(", ") : "None";
});
</script>

</body>
</html>
