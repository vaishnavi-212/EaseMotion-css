<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stats Counter Pop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="stats-stage" aria-label="Stats counter pop animation demo">
      <section class="stats-card">
        <p class="label">Weekly activity</p>
        <div class="stats-grid">
          <article style="--delay: 0ms">
            <strong>42</strong>
            <span>Commits</span>
          </article>
          <article style="--delay: 120ms">
            <strong>18</strong>
            <span>Reviews</span>
          </article>
          <article style="--delay: 240ms">
            <strong>7</strong>
            <span>Deploys</span>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
