<!DOCTYPE html>
<html>
<head>
    <title>Ease Telephone Dialer Pad</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dialer">
    <h2>Telephone</h2>

    <div class="screen">
        9876543210
    </div>

    <div class="keys">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>
        <button>0</button>
        <button>#</button>
    </div>

    <button class="call">Call</button>
</div>

</body>
</html>
