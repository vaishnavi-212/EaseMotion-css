<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimap Fog – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🗺️ Minimap Fog</h1>
    <p class="subtitle">Fog of war clearing on minimap</p>

    <div class="mf-container">
      <div class="mf-scene">
        <!-- Minimap -->
        <div class="minimap">
          <!-- Minimap background -->
          <div class="minimap-bg"></div>

          <!-- Terrain features -->
          <div class="terrain terrain-1"></div>
          <div class="terrain terrain-2"></div>
          <div class="terrain terrain-3"></div>
          <div class="terrain terrain-4"></div>
          <div class="terrain terrain-5"></div>
          <div class="terrain terrain-6"></div>
          <div class="terrain terrain-7"></div>
          <div class="terrain terrain-8"></div>

          <!-- Fog of war overlay -->
          <div class="fog-overlay">
            <!-- Fog particles -->
            <div class="fog-particle fp1"></div>
            <div class="fog-particle fp2"></div>
            <div class="fog-particle fp3"></div>
            <div class="fog-particle fp4"></div>
            <div class="fog-particle fp5"></div>
            <div class="fog-particle fp6"></div>
            <div class="fog-particle fp7"></div>
            <div class="fog-particle fp8"></div>
            <div class="fog-particle fp9"></div>
            <div class="fog-particle fp10"></div>
            <div class="fog-particle fp11"></div>
            <div class="fog-particle fp12"></div>
            <div class="fog-particle fp13"></div>
            <div class="fog-particle fp14"></div>
            <div class="fog-particle fp15"></div>
            <div class="fog-particle fp16"></div>
            <div class="fog-particle fp17"></div>
            <div class="fog-particle fp18"></div>
            <div class="fog-particle fp19"></div>
            <div class="fog-particle fp20"></div>
          </div>

          <!-- Cleared areas (revealed terrain) -->
          <div class="cleared-area ca1"></div>
          <div class="cleared-area ca2"></div>
          <div class="cleared-area ca3"></div>
          <div class="cleared-area ca4"></div>
          <div class="cleared-area ca5"></div>

          <!-- Player indicator -->
          <div class="player-indicator">
            <div class="player-dot"></div>
            <div class="player-ring"></div>
          </div>

          <!-- Reveal radius -->
          <div class="reveal-radius"></div>

          <!-- Exploration trail -->
          <div class="trail t1"></div>
          <div class="trail t2"></div>
          <div class="trail t3"></div>
          <div class="trail t4"></div>
          <div class="trail t5"></div>
          <div class="trail t6"></div>
          <div class="trail t7"></div>
          <div class="trail t8"></div>
          <div class="trail t9"></div>
          <div class="trail t10"></div>
          <div class="trail t11"></div>
          <div class="trail t12"></div>
          <div class="trail t13"></div>
          <div class="trail t14"></div>
          <div class="trail t15"></div>
          <div class="trail t16"></div>
          <div class="trail t17"></div>
          <div class="trail t18"></div>
          <div class="trail t19"></div>
          <div class="trail t20"></div>

          <!-- Minimap border -->
          <div class="minimap-border">
            <div class="border-corner bc-tl"></div>
            <div class="border-corner bc-tr"></div>
            <div class="border-corner bc-bl"></div>
            <div class="border-corner bc-br"></div>
          </div>

          <!-- Fog percentage -->
          <div class="fog-percentage">
            <span id="fogPercent">100</span>%
          </div>
        </div>

        <!-- Controls overlay -->
        <div class="minimap-controls">
          <button id="exploreBtn">🔦 Explore</button>
          <button id="clearBtn">☀️ Clear All</button>
          <button id="resetBtn">🌫️ Reset Fog</button>
          <label>
            Speed
            <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const fogOverlay = document.querySelector('.fog-overlay');
      const fogParticles = document.querySelectorAll('.fog-particle');
      const clearedAreas = document.querySelectorAll('.cleared-area');
      const playerIndicator = document.querySelector('.player-indicator');
      const revealRadius = document.querySelector('.reveal-radius');
      const trailDots = document.querySelectorAll('.trail');
      const fogPercent = document.getElementById('fogPercent');
      const minimap = document.querySelector('.minimap');

      const exploreBtn = document.getElementById('exploreBtn');
      const clearBtn = document.getElementById('clearBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');

      let speedMultiplier = 1;
      let isExploring = false;
      let explorationProgress = 0;
      let fogRemaining = 100;
      let animationFrame = null;
      let lastTimestamp = 0;
      let playerX = 50;
      let playerY = 50;
      let targetX = 50;
      let targetY = 50;
      let trailIndex = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Fog particles
        fogParticles.forEach((p, i) => {
          const duration = (3 + (i % 3) * 0.5) / speedMultiplier;
          p.style.setProperty('--fog-duration', duration + 's');
          p.style.setProperty('--fog-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Player ring
        const ring = document.querySelector('.player-ring');
        ring.style.setProperty('--ring-duration', (1.5 / speedMultiplier) + 's');

        // Reveal radius
        revealRadius.style.setProperty('--radius-duration', (0.8 / speedMultiplier) + 's');

        // Cleared areas
        clearedAreas.forEach((area, i) => {
          const duration = (0.6 + i * 0.05) / speedMultiplier;
          area.style.setProperty('--clear-duration', duration + 's');
          area.style.setProperty('--clear-delay', ((i * 0.02) / speedMultiplier) + 's');
        });
      }

      // ----- Explore -----
      function explore() {
        if (isExploring) return;
        if (fogRemaining <= 0) return;

        isExploring = true;
        exploreBtn.textContent = '🔦 Exploring...';

        // Generate random target position
        targetX = 10 + Math.random() * 80;
        targetY = 10 + Math.random() * 80;

        // Animate player movement
        const startX = playerX;
        const startY = playerY;
        const startTime = Date.now();
        const duration = 1500 / speedMultiplier;

        function movePlayer() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);

          const currentX = startX + (targetX - startX) * eased;
          const currentY = startY + (targetY - startY) * eased;

          playerX = currentX;
          playerY = currentY;

          // Update player position
          playerIndicator.style.left = currentX + '%';
          playerIndicator.style.top = currentY + '%';

          // Update reveal radius
          revealRadius.style.left = currentX + '%';
          revealRadius.style.top = currentY + '%';

          // Add trail dots
          if (progress > 0.05 && Math.random() < 0.15 * speedMultiplier) {
            addTrailDot(currentX, currentY);
          }

          // Clear fog in radius
          clearFogInRadius(currentX, currentY, 15);

          // Update fog percentage
          updateFogPercentage();

          if (progress < 1) {
            requestAnimationFrame(movePlayer);
          } else {
            // Add final trail dots
            for (let i = 0; i < 5; i++) {
              const offsetX = (Math.random() - 0.5) * 10;
              const offsetY = (Math.random() - 0.5) * 10;
              addTrailDot(currentX + offsetX, currentY + offsetY);
            }

            isExploring = false;
            exploreBtn.textContent = '🔦 Explore';

            // Auto-explore if fog remains
            if (fogRemaining > 0) {
              setTimeout(() => {
                if (!isExploring) explore();
              }, 500 / speedMultiplier);
            }
          }
        }

        movePlayer();
      }

      // ----- Clear fog in radius -----
      function clearFogInRadius(cx, cy, radius) {
        const areaId = Math.floor(Math.random() * 5) + 1;
        const area = document.querySelector(`.ca${areaId}`);
        if (area) {
          const x = Math.max(0, Math.min(100 - 20, cx - 10 + Math.random() * 20));
          const y = Math.max(0, Math.min(100 - 20, cy - 10 + Math.random() * 20));
          area.style.left = x + '%';
          area.style.top = y + '%';
          area.style.width = (15 + Math.random() * 15) + '%';
          area.style.height = (15 + Math.random() * 15) + '%';
          area.classList.add('revealed');
          area.style.opacity = '1';
        }
      }

      // ----- Add trail dot -----
      function addTrailDot(x, y) {
        const dot = trailDots[trailIndex % trailDots.length];
        if (dot) {
          dot.style.left = x + '%';
          dot.style.top = y + '%';
          dot.style.opacity = '0.8';
          dot.style.transform = 'scale(1)';
          setTimeout(() => {
            dot.style.opacity = '0';
            dot.style.transform = 'scale(0.3)';
          }, 3000 / speedMultiplier);
        }
        trailIndex++;
      }

      // ----- Update fog percentage -----
      function updateFogPercentage() {
        const totalPixels = 100 * 100;
        let clearedPixels = 0;

        clearedAreas.forEach(area => {
          if (area.classList.contains('revealed')) {
            const w = parseFloat(area.style.width) || 0;
            const h = parseFloat(area.style.height) || 0;
            clearedPixels += w * h;
          }
        });

        fogRemaining = Math.max(0, 100 - (clearedPixels / totalPixels) * 100);
        fogPercent.textContent = Math.round(fogRemaining);
      }

      // ----- Clear all fog -----
      function clearAllFog() {
        if (isExploring) return;

        clearedAreas.forEach(area => {
          area.classList.add('revealed');
          area.style.opacity = '1';
          area.style.left = (5 + Math.random() * 70) + '%';
          area.style.top = (5 + Math.random() * 70) + '%';
          area.style.width = (20 + Math.random() * 30) + '%';
          area.style.height = (20 + Math.random() * 30) + '%';
        });

        fogRemaining = 0;
        fogPercent.textContent = '0';
        exploreBtn.textContent = '🎉 Clear!';
        setTimeout(() => {
          exploreBtn.textContent = '🔦 Explore';
        }, 1000);
      }

      // ----- Reset fog -----
      function resetFog() {
        if (isExploring) return;

        isExploring = false;
        exploreBtn.textContent = '🔦 Explore';

        clearedAreas.forEach(area => {
          area.classList.remove('revealed');
          area.style.opacity = '0';
          area.style.left = '0%';
          area.style.top = '0%';
          area.style.width = '0%';
          area.style.height = '0%';
        });

        trailDots.forEach(dot => {
          dot.style.opacity = '0';
          dot.style.transform = 'scale(0.3)';
        });

        fogRemaining = 100;
        fogPercent.textContent = '100';

        playerX = 50;
        playerY = 50;
        playerIndicator.style.left = '50%';
        playerIndicator.style.top = '50%';
        revealRadius.style.left = '50%';
        revealRadius.style.top = '50%';

        lastTimestamp = 0;
        trailIndex = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Update fog particles
        fogParticles.forEach((p, i) => {
          const phase = Math.sin(timestamp / 3000 + i * 0.5) * 0.5 + 0.5;
          const x = Math.sin(timestamp / 2000 + i * 1.2) * 20;
          const y = Math.cos(timestamp / 2500 + i * 1.5) * 20;
          p.style.transform = `translate(${x}px, ${y}px) scale(${0.5 + phase * 0.5})`;
          p.style.opacity = 0.1 + phase * 0.2;
        });

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state
        resetFog();

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-explore after 1.5 seconds
        setTimeout(() => {
          explore();
        }, 1500);
      }

      // ----- Event listeners -----
      exploreBtn.addEventListener('click', explore);
      clearBtn.addEventListener('click', clearAllFog);
      resetBtn.addEventListener('click', resetFog);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
