<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Jello-Hover Popover - EaseMotion</title>
  
  <!-- Load EaseMotion core CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Component specific styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="popover-container">
    <button class="popover-trigger" aria-haspopup="true">
      Hover For Jello
    </button>
    <div class="popover-content" role="tooltip">
      <div class="popover-header">Interactive Jello</div>
      <div class="popover-body">
        This popover utilizes a pure CSS jello-hover interaction. It is fully responsive, keyboard accessible, and seamlessly integrates with EaseMotion CSS variables.
      </div>
    </div>
  </div>

</body>
</html>
