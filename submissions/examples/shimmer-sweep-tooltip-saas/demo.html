<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Shimmer Sweep Tooltip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="showcase-viewport">
    <div class="showcase-card em-fade-in">
      
      <span class="badge-premium">Enterprise Edition</span>
      <h2>Multi-Region CDN Node</h2>
      <p class="card-desc">Deploy static and dynamic assets closer to your global client clusters instantly.</p>

      <!-- The Tooltip Trigger Container -->
      <div class="tooltip-wrapper">
        <button class="tooltip-trigger" aria-describedby="shimmer-tooltip">
          <span>Optimization Metrics</span>
          <svg class="info-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        </button>

        <!-- The Shimmer Sweep Tooltip Element -->
        <div id="shimmer-tooltip" class="shimmer-tooltip-node" role="tooltip">
          <div class="tooltip-shimmer-sweep"></div>
          <div class="tooltip-inner">
            <div class="tooltip-header">
              <span class="pulse-emerald"></span>
              <h4>Static Cache Hit Ratio</h4>
            </div>
            <p>Edge caches are routing <b>99.4%</b> of assets without hitting origin servers.</p>
          </div>
          <!-- Structural Pointer Arrow -->
          <div class="tooltip-arrow"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
