<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recurring Payment Card Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Recurring Payment Card</h1>
  <p>A payment method card with a pulsing "recurring" badge and a hover-lift animation.</p>

  <div class="demo-row">

    <div class="recurring-payment-card">
      <div class="rpc-top">
        <span class="rpc-brand">VISA</span>
        <span class="rpc-badge">
          <span class="rpc-badge-dot"></span>
          Recurring
        </span>
      </div>
      <div class="rpc-number">•••• •••• •••• 4242</div>
      <div class="rpc-bottom">
        <div class="rpc-field">
          <span class="rpc-label">Cardholder</span>
          <span class="rpc-value">Aaniya K.</span>
        </div>
        <div class="rpc-field">
          <span class="rpc-label">Next billing</span>
          <span class="rpc-value">Aug 14, 2026</span>
        </div>
      </div>
    </div>

    <div class="recurring-payment-card is-paused">
      <div class="rpc-top">
        <span class="rpc-brand">MASTERCARD</span>
        <span class="rpc-badge">
          <span class="rpc-badge-dot"></span>
          Paused
        </span>
      </div>
      <div class="rpc-number">•••• •••• •••• 8891</div>
      <div class="rpc-bottom">
        <div class="rpc-field">
          <span class="rpc-label">Cardholder</span>
          <span class="rpc-value">Aaniya K.</span>
        </div>
        <div class="rpc-field">
          <span class="rpc-label">Next billing</span>
          <span class="rpc-value">—</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
