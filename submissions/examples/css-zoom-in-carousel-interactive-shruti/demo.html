<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion Zoom-In Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="carousel" aria-label="Interactive Interface Carousel">

  <input type="radio" name="slide" id="slide1" checked>
  <input type="radio" name="slide" id="slide2">
  <input type="radio" name="slide" id="slide3">

  <div class="slides">

    <div class="slide s1">
      <h2>Dashboard</h2>
      <p>Monitor analytics with smooth transitions.</p>
    </div>

    <div class="slide s2">
      <h2>Collaboration</h2>
      <p>Work together using modern UI interactions.</p>
    </div>

    <div class="slide s3">
      <h2>Automation</h2>
      <p>Build interactive experiences effortlessly.</p>
    </div>

  </div>

  <div class="controls">
    <label for="slide1"></label>
    <label for="slide2"></label>
    <label for="slide3"></label>
  </div>

</div>

</body>
</html>
