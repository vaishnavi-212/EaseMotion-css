<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimmer Sweep Tooltip - Neumorphic Soft Layouts</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Shimmer sweep tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Shimmer Sweep Tooltip</h1>
        <p>Neumorphic Soft Layout variant with elegant shimmer sweep animation.</p>
        
        <div class="tooltip-grid">
          <div class="tooltip-item">
            <button class="ease-btn-neumorphic-sb" data-tooltip="Save Document">
              <span class="ease-icon-sb ease-icon-save-sb"></span>
            </button>
          </div>
          
          <div class="tooltip-item">
            <button class="ease-btn-neumorphic-sb" data-tooltip="Edit Settings">
              <span class="ease-icon-sb ease-icon-edit-sb"></span>
            </button>
          </div>
          
          <div class="tooltip-item">
            <button class="ease-btn-neumorphic-sb" data-tooltip="Share Link">
              <span class="ease-icon-sb ease-icon-share-sb"></span>
            </button>
          </div>
          
          <div class="tooltip-item">
            <button class="ease-btn-neumorphic-sb" data-tooltip="Delete Item">
              <span class="ease-icon-sb ease-icon-delete-sb"></span>
            </button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Interactive Cards</h3>
          <div class="neumorphic-card-sb">
            <div class="card-header">
              <h4>Project Dashboard</h4>
              <button class="ease-btn-icon-sb ease-shimmer-tooltip-sb" data-tooltip="Refresh Data">
                <span class="ease-icon-refresh-sb"></span>
              </button>
            </div>
            <p>Hover over the refresh button to see the tooltip animation.</p>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Form Controls</h3>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <input type="email" class="ease-input-neumorphic-sb" placeholder="Enter email" />
              <button class="ease-btn-icon-sb ease-shimmer-tooltip-sb" data-tooltip="Clear Input">
                <span class="ease-icon-clear-sb"></span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
