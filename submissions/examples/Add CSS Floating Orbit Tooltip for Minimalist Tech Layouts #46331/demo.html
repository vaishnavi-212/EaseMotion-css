<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Floating Orbit Tooltip - Minimalist Tech</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tech-layout">
    <div class="system-panel">
      <div class="panel-header">
        <span class="mono-label">SYS.CONFIG.V1</span>
      </div>
      
      <div class="panel-body">
        <div class="status-row">
          <div class="status-label">Network Relay</div>
          
          <div class="status-value">
            <span class="indicator active"></span>
            ACTIVE
            
            <!-- Tooltip Container -->
            <div class="tooltip-container">
              <button class="info-btn" aria-label="More information about Network Relay" aria-describedby="tooltip-orbit">
                ?
              </button>
              
              <!-- Tooltip Wrapper handles entrance animation -->
              <div id="tooltip-orbit" class="tooltip-wrapper" role="tooltip">
                <div class="tooltip">
                  <div class="tooltip-header">
                    <h3>LATENCY_NODE</h3>
                  </div>
                  <p>Current connection routed through redundant low-orbit relays. Ping 24ms.</p>
                </div>
              </div>
            </div>
            
          </div>
        </div>
        
        <div class="status-row" style="margin-top: 1rem;">
          <div class="status-label">Data Stream</div>
          <div class="status-value">
            ENCRYPTED
          </div>
        </div>
      </div>
      
      <div class="panel-footer">
        <button class="btn-outline">RECALIBRATE</button>
      </div>
    </div>
  </div>
</body>
</html>
