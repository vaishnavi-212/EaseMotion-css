<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="avatars-demo" aria-label="Avatars">
      <h1 class="demo-title">Avatar Component</h1>
      
      <div class="avatar-section">
        <h3>Sizes</h3>
        <div class="avatar-row">
          <div class="avatar avatar-sm" style="background: #4f46e5;">JD</div>
          <div class="avatar" style="background: #10b981;">JD</div>
          <div class="avatar avatar-lg" style="background: #f59e0b;">JD</div>
          <div class="avatar avatar-xl" style="background: #ef4444;">JD</div>
        </div>
      </div>

      <div class="avatar-section">
        <h3>With Images</h3>
        <div class="avatar-row">
          <img src="https://i.pravatar.cc/100?img=1" alt="User 1" class="avatar" />
          <img src="https://i.pravatar.cc/100?img=2" alt="User 2" class="avatar avatar-lg" />
          <img src="https://i.pravatar.cc/100?img=3" alt="User 3" class="avatar avatar-xl" />
        </div>
      </div>

      <div class="avatar-section">
        <h3>Avatar Group</h3>
        <div class="avatar-group">
          <img src="https://i.pravatar.cc/100?img=4" alt="User" class="avatar avatar-overlap" />
          <img src="https://i.pravatar.cc/100?img=5" alt="User" class="avatar avatar-overlap" />
          <img src="https://i.pravatar.cc/100?img=6" alt="User" class="avatar avatar-overlap" />
          <div class="avatar avatar-overlap avatar-count">+5</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
