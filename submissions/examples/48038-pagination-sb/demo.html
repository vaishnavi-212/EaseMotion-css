<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagination Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <h1 class="demo-title">Pagination Component</h1>
    <nav class="pagination" aria-label="Pagination">
      <a href="#" class="page-item page-prev" aria-label="Previous page">‹</a>
      <a href="#" class="page-item">1</a>
      <a href="#" class="page-item active">2</a>
      <a href="#" class="page-item">3</a>
      <a href="#" class="page-item">4</a>
      <a href="#" class="page-item">5</a>
      <span class="page-ellipsis">...</span>
      <a href="#" class="page-item">10</a>
      <a href="#" class="page-item page-next" aria-label="Next page">›</a>
    </nav>
  </main>
</body>
</html>
