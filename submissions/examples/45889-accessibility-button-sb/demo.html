<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility-First Button Variants</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Accessibility button variants demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Accessibility-First Button Variants</h1>
        <p>High-contrast, keyboard-friendly button components designed for maximum accessibility.</p>
        
        <div class="demo-section">
          <h3>Primary Buttons</h3>
          <div class="button-group">
            <button class="ease-btn-primary-sb ease-btn-large-sb">Large Button</button>
            <button class="ease-btn-primary-sb">Default</button>
            <button class="ease-btn-primary-sb ease-btn-small-sb">Small</button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Secondary Buttons</h3>
          <div class="button-group">
            <button class="ease-btn-secondary-sb ease-btn-large-sb">Large Button</button>
            <button class="ease-btn-secondary-sb">Default</button>
            <button class="ease-btn-secondary-sb ease-btn-small-sb">Small</button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Focus States (Tab Navigation)</h3>
          <div class="button-group">
            <button class="ease-btn-primary-sb">Primary</button>
            <button class="ease-btn-secondary-sb">Secondary</button>
            <button class="ease-btn-ghost-sb">Ghost</button>
            <button class="ease-btn-outline-sb">Outline</button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Disabled States</h3>
          <div class="button-group">
            <button class="ease-btn-primary-sb" disabled>Disabled Primary</button>
            <button class="ease-btn-secondary-sb" disabled>Disabled Secondary</button>
            <button class="ease-btn-ghost-sb" disabled>Disabled Ghost</button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Icon Buttons</h3>
          <div class="button-group">
            <button class="ease-btn-icon-sb ease-btn-large-sb" aria-label="Add item">
              <span class="icon add"></span>
            </button>
            <button class="ease-btn-icon-sb" aria-label="Add item">
              <span class="icon add"></span>
            </button>
            <button class="ease-btn-icon-sb ease-btn-small-sb" aria-label="Add item">
              <span class="icon add"></span>
            </button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Button with Loading State</h3>
          <div class="button-group">
            <button class="ease-btn-primary-sb ease-btn-loading-sb" aria-busy="true">
              <span class="spinner"></span>
              Loading...
            </button>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Button Variants</h3>
          <div class="button-group column">
            <button class="ease-btn-primary-sb">Primary</button>
            <button class="ease-btn-secondary-sb">Secondary</button>
            <button class="ease-btn-ghost-sb">Ghost</button>
            <button class="ease-btn-outline-sb">Outline</button>
            <button class="ease-btn-danger-sb">Danger</button>
            <button class="ease-btn-success-sb">Success</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
