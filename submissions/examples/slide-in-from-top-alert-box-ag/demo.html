<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Slide-in from Top Alert Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="content">
        <h1>Dashboard</h1>
        <p>The alert box above demonstrates a clean entrance animation, sliding down smoothly from the top of the screen upon page load.</p>
    </main>

    <!-- Slide-in from Top Alert Container -->
    <div class="alert-container">
        <div class="alert success ease-slide-down-in" role="status" aria-live="polite">
            <span class="icon" aria-hidden="true">✔</span>
            <div class="message">
                <strong>Success!</strong> Your changes have been saved successfully.
            </div>
        </div>

        <div class="alert warning ease-slide-down-in" role="alert" aria-live="assertive" style="animation-delay: 0.2s;">
            <span class="icon" aria-hidden="true">⚠</span>
            <div class="message">
                <strong>Warning!</strong> Your session will expire in 5 minutes.
            </div>
        </div>
    </div>

</body>
</html>
