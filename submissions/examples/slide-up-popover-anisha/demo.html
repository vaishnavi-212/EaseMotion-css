<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Up Popover Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Product Catalog Grid -->
    <div class="ease-catalog-grid">
        
        <!-- Individual Product Card -->
        <div class="ease-product-card">
            
            <!-- Product Image -->
            <img src="https://placehold.co/300x350/1e293b/6366f1?text=Aura+Headphones" alt="Product" class="ease-product-img">
            
            <!-- Basic Info (Always visible) -->
            <div class="ease-product-info">
                <h3>Aura Studio Pro</h3>
                <p>$299.00</p>
            </div>

            <div class="ease-slide-popover">
                <div class="ease-popover-content">
                    <h4>Quick Specifications</h4>
                    <ul>
                        <li>Active Noise Cancellation</li>
                        <li>40-Hour Battery Life</li>
                        <li>Spatial Audio Support</li>
                    </ul>
                    <button class="ease-buy-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: text-bottom;">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        Add to Cart
                    </button>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
