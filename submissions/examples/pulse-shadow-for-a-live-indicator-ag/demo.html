<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Pulse-Shadow Live Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Event Status</h1>
        <p>This indicator provides real-time status feedback.</p>
        
        <div class="status-container">
            <!-- Pulse-Shadow Live Indicator -->
            <div class="status live" aria-live="polite">
                <span class="live-indicator" aria-hidden="true"></span>
                <span class="status-text">Live Now</span>
            </div>
            
            <!-- Inactive Status Example for Comparison -->
            <div class="status offline" aria-live="polite">
                <span class="offline-indicator" aria-hidden="true"></span>
                <span class="status-text">Offline</span>
            </div>
        </div>

    </main>

</body>
</html>
