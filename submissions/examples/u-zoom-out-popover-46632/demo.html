<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Popover - Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Dashboard Overview
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    📊
                </div>

                <div>

                    <h2>Performance Summary</h2>

                    <p>Updated 5 minutes ago</p>

                </div>

            </div>

            <div class="metrics">

                <div class="metric">

                    <h3>Revenue</h3>

                    <span>$125K</span>

                </div>

                <div class="metric">

                    <h3>Users</h3>

                    <span>18.4K</span>

                </div>

                <div class="metric">

                    <h3>Growth</h3>

                    <span>+16%</span>

                </div>

            </div>

            <button class="action">

                Open Dashboard

            </button>

        </div>

    </div>

</div>

</body>
</html>
