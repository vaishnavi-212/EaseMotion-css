<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Color Shift Tag</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="page">

    <h1>Color Shift Tag</h1>

    <p class="subtitle">
      Animated color-shifting tags inspired by modern e-commerce and dashboard interfaces.
    </p>

    <section class="tag-container">

      <button class="tag tag-new">
        <span class="dot"></span>
        New
      </button>

      <button class="tag tag-sale">
        <span class="dot"></span>
        Sale
      </button>

      <button class="tag tag-premium">
        <span class="dot"></span>
        Premium
      </button>

      <button class="tag tag-beta">
        <span class="dot"></span>
        Beta
      </button>

      <button class="tag tag-trending">
        <span class="dot"></span>
        Trending
      </button>

      <button class="tag tag-pro">
        <span class="dot"></span>
        Pro
      </button>

    </section>

  </main>

</body>
</html>
