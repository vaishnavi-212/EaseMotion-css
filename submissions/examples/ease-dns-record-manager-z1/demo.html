<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Record Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dns-card">

<h2>DNS Records</h2>

<div class="record">
<span>A Record</span>
<code>192.168.1.10</code>
<b class="active">Active</b>
</div>

<div class="record">
<span>CNAME</span>
<code>app.example.com</code>
<b class="active">Active</b>
</div>

<div class="record">
<span>MX Record</span>
<code>mail.provider.com</code>
<b class="pending">Pending</b>
</div>

<div class="record">
<span>TXT Record</span>
<code>v=spf1 include</code>
<b class="failed">Error</b>
</div>

</section>

</body>
</html>
