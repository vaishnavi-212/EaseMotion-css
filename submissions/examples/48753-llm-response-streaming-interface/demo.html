<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion AI Streaming Demo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>

        <div class="logo">
            🤖
        </div>

        <div>

            <h1>EaseMotion AI</h1>

            <p>LLM Response Streaming Demo</p>

            <span class="status">
                <span class="dot"></span>
                Live Demo
            </span>

        </div>

    </header>

    <div class="chat">

        <div class="user-row">

            <div class="user-message">
                Explain React Hooks in simple words.
            </div>

        </div>

        <div class="assistant-row">

            <div class="avatar">
                🤖
            </div>

            <div>

                <div class="assistant-info">
                    Assistant • Today • Just now
                </div>

                <div class="assistant-message">

                    <span id="stream"></span>

                    <span class="cursor"></span>

                </div>

            </div>

        </div>

    </div>

    <div class="buttons">

        <button id="copyBtn">
            📋 Copy
        </button>

        <button id="regenBtn">
            🔄 Regenerate
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
