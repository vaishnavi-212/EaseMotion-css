<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Glitch Dark Mode Toggle</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="toggle-demo">

    <section class="toggle-card ease-fade-in">

      <span class="badge">
        Space UI
      </span>

      <h1 class="ease-slide-up">
        Glitch Dark Mode Toggle
      </h1>

      <p>
        A futuristic CSS-only dark mode toggle featuring a subtle glitch
        animation inspired by space-themed interfaces.
      </p>

      <div class="toggle-wrapper">

        <input
          type="checkbox"
          id="theme-toggle"
          class="toggle-input"
          aria-label="Toggle dark mode"
        />

        <label
          for="theme-toggle"
          class="toggle-track"
        >

          <span class="toggle-thumb">

            <span class="icon sun">☀</span>

            <span class="icon moon">🌙</span>

          </span>

        </label>

      </div>

    </section>

  </main>

</body>
</html>
