<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Jello-Hover Popover - E-Commerce Checkout</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-viewport">
        <div class="cart-summary-card">
            <div class="cart-header">
                <span class="cart-title">ORDER TOTAL</span>
                <span class="cart-total-value">$249.00</span>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">View Included Promotions</span>
                        <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                            <line x1="7" y1="7" x2="7.01" y2="7"/>
                        </svg>
                    </button>
                    
                    <div class="jello-popover-card" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-promo">PROMO APPLIED</span>
                                <p class="promo-title">Free Express Shipping</p>
                            </div>
                            <div class="popover-body">
                                <p class="promo-desc">Complimentary premium delivery service applied to this transaction session. Package expected inside 2 business days.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
