<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Player Controls — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="mp-demo">
    <header class="mp-demo__hero">
      <h1>Media Player Controls</h1>
      <p>Pure CSS media player control bar with hover animations. No JavaScript required.</p>
    </header>

    <section class="mp-player" aria-label="Media player demo">
      <div class="mp-player__artwork">
        <div class="mp-player__artwork-overlay"></div>
        <span class="mp-player__artwork-icon">&#9654;</span>
      </div>

      <div class="mp-controls">
        <div class="mp-controls__progress">
          <div class="mp-controls__progress-bar">
            <div class="mp-controls__progress-fill"></div>
            <div class="mp-controls__progress-thumb"></div>
          </div>
          <div class="mp-controls__time">
            <span>1:24</span>
            <span>3:47</span>
          </div>
        </div>

        <div class="mp-controls__row">
          <div class="mp-controls__left">
            <button class="mp-btn mp-btn--play" aria-label="Play">
              <span class="mp-btn__icon mp-btn__icon--play">&#9654;</span>
            </button>
            <button class="mp-btn mp-btn--skip-back" aria-label="Previous track">
              <span class="mp-btn__icon">&#9198;</span>
            </button>
            <button class="mp-btn mp-btn--skip-fwd" aria-label="Next track">
              <span class="mp-btn__icon">&#9197;</span>
            </button>
            <button class="mp-btn mp-btn--volume" aria-label="Volume">
              <span class="mp-btn__icon">&#128266;</span>
              <div class="mp-volume-slider">
                <div class="mp-volume-slider__track">
                  <div class="mp-volume-slider__fill"></div>
                </div>
              </div>
            </button>
          </div>

          <div class="mp-controls__center">
            <span class="mp-now-playing">
              <span class="mp-now-playing__title">EaseMotion Groove</span>
              <span class="mp-now-playing__artist">CSS Orchestra</span>
            </span>
          </div>

          <div class="mp-controls__right">
            <button class="mp-btn mp-btn--shuffle" aria-label="Shuffle">
              <span class="mp-btn__icon">&#128256;</span>
            </button>
            <button class="mp-btn mp-btn--repeat" aria-label="Repeat">
              <span class="mp-btn__icon">&#128257;</span>
            </button>
            <button class="mp-btn mp-btn--queue" aria-label="Queue">
              <span class="mp-btn__icon">&#9776;</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
