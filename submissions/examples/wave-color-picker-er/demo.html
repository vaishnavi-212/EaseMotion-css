<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Color Picker — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wave-picker-demo">
    <header class="wave-picker-hero">
      <h1>Wave Color Picker</h1>
      <p>Pure CSS color picker with animated wave ripple effects. No JavaScript required.</p>
    </header>

    <section class="wave-picker-card" aria-label="Product color selection">
      <div class="wave-picker-preview" aria-live="polite">
        <span class="wave-picker-preview__label">Selected</span>
        <span class="wave-picker-preview__color-name" id="colorName">Ocean Blue</span>
      </div>

      <fieldset class="wave-picker" role="radiogroup" aria-label="Choose a color">
        <legend class="sr-only">Select a product color</legend>

        <label class="wave-picker__swatch" style="--swatch-color: #3b82f6" data-color="Ocean Blue">
          <input type="radio" name="color" value="ocean-blue" class="wave-picker__input" checked />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #ef4444" data-color="Ruby Red">
          <input type="radio" name="color" value="ruby-red" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #10b981" data-color="Emerald">
          <input type="radio" name="color" value="emerald" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #f59e0b" data-color="Amber Gold">
          <input type="radio" name="color" value="amber-gold" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #8b5cf6" data-color="Violet">
          <input type="radio" name="color" value="violet" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #ec4899" data-color="Rose Pink">
          <input type="radio" name="color" value="rose-pink" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #06b6d4" data-color="Cyan">
          <input type="radio" name="color" value="cyan" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>

        <label class="wave-picker__swatch" style="--swatch-color: #1e293b" data-color="Charcoal">
          <input type="radio" name="color" value="charcoal" class="wave-picker__input" />
          <span class="wave-picker__face">
            <span class="wave-picker__wave"></span>
            <span class="wave-picker__wave wave-picker__wave--delay"></span>
          </span>
          <span class="wave-picker__ring"></span>
        </label>
      </fieldset>

      <div class="wave-picker-info">
        <p>Click a swatch to select. Watch the wave ripple animation on selection. Keyboard accessible via Tab + Space.</p>
      </div>
    </section>
  </main>
</body>
</html>
