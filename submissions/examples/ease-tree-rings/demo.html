<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Rings – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🪵 Tree Rings</h1>
    <p class="subtitle">Animated tree rings with growth patterns</p>

    <div class="rings-container">
      <div class="rings-scene">
        <!-- Tree rings -->
        <div class="tree-rings">
          <!-- Outer rings -->
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-3"></div>
          <div class="ring ring-4"></div>
          <div class="ring ring-5"></div>
          <div class="ring ring-6"></div>
          <div class="ring ring-7"></div>
          <div class="ring ring-8"></div>
          <div class="ring ring-9"></div>
          <div class="ring ring-10"></div>
          <div class="ring ring-11"></div>
          <div class="ring ring-12"></div>
          <div class="ring ring-13"></div>
          <div class="ring ring-14"></div>
          <div class="ring ring-15"></div>
          <div class="ring ring-16"></div>
          <div class="ring ring-17"></div>
          <div class="ring ring-18"></div>
          <div class="ring ring-19"></div>
          <div class="ring ring-20"></div>

          <!-- Center -->
          <div class="center-core"></div>

          <!-- Growth glow -->
          <div class="growth-glow"></div>

          <!-- Bark texture overlay -->
          <div class="bark-texture"></div>
        </div>

        <!-- Annotations -->
        <div class="annotation ann-1">
          <span class="ann-label">Spring Growth</span>
          <span class="ann-dot"></span>
        </div>
        <div class="annotation ann-2">
          <span class="ann-label">Summer Growth</span>
          <span class="ann-dot"></span>
        </div>
        <div class="annotation ann-3">
          <span class="ann-label">Drought Year</span>
          <span class="ann-dot"></span>
        </div>
        <div class="annotation ann-4">
          <span class="ann-label">Wet Season</span>
          <span class="ann-dot"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Growth Speed
        <input type="radio" name="speed" value="0.5" /> Slow
        <input type="radio" name="speed" value="1" checked /> Normal
        <input type="radio" name="speed" value="2" /> Fast
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
      <button id="toggleLabelsBtn">🏷️ Labels</button>
    </div>
  </div>

  <script>
    (function() {
      const rings = document.querySelectorAll('.ring');
      const centerCore = document.querySelector('.center-core');
      const growthGlow = document.querySelector('.growth-glow');
      const annotations = document.querySelectorAll('.annotation');
      const treeRings = document.querySelector('.tree-rings');

      const speedRadios = document.querySelectorAll('input[name="speed"]');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');
      const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');

      let speedMultiplier = 1;
      let isPaused = false;
      let isLabelsVisible = true;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed -----
      function applySpeed() {
        rings.forEach((ring, i) => {
          const baseDelay = i * 0.08;
          const duration = 2.5 / speedMultiplier;
          ring.style.setProperty('--ring-duration', duration + 's');
          ring.style.setProperty('--ring-delay', (baseDelay / speedMultiplier) + 's');
        });

        centerCore.style.setProperty('--core-duration', (1.5 / speedMultiplier) + 's');
        growthGlow.style.setProperty('--glow-duration', (3 / speedMultiplier) + 's');
      }

      // ----- Update growth progress -----
      function updateGrowth(deltaTime) {
        if (isPaused) return;

        const speed = 0.02 * speedMultiplier;
        progress += deltaTime * speed * 0.5;

        if (progress > 1) {
          progress = 1;
        }

        // Update ring animations via dashoffset
        rings.forEach((ring, i) => {
          const ringProgress = Math.max(0, Math.min(1, (progress - i * 0.03) * 2.5));
          const circumference = 2 * Math.PI * parseFloat(ring.dataset.radius);
          const offset = circumference * (1 - ringProgress);
          ring.style.strokeDashoffset = offset;
          ring.style.opacity = ringProgress > 0.05 ? 1 : 0;
        });

        // Center core
        const coreProgress = Math.max(0, Math.min(1, progress * 4));
        centerCore.style.transform = `scale(${coreProgress})`;
        centerCore.style.opacity = coreProgress;

        // Growth glow intensity
        const glowIntensity = 0.1 + progress * 0.3;
        growthGlow.style.opacity = glowIntensity;

        // Annotations appear with rings
        annotations.forEach((ann, i) => {
          const annProgress = Math.max(0, Math.min(1, (progress - 0.3 - i * 0.08) * 3));
          ann.style.opacity = annProgress;
          ann.style.transform = `translateX(-50%) scale(${0.5 + annProgress * 0.5})`;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGrowth(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetRings() {
        progress = 0;
        rings.forEach(ring => {
          const circumference = 2 * Math.PI * parseFloat(ring.dataset.radius);
          ring.style.strokeDashoffset = circumference;
          ring.style.opacity = '0';
        });
        centerCore.style.transform = 'scale(0)';
        centerCore.style.opacity = '0';
        growthGlow.style.opacity = '0.05';
        annotations.forEach(ann => {
          ann.style.opacity = '0';
          ann.style.transform = 'translateX(-50%) scale(0.5)';
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        setTimeout(() => {
          progress = 0.01;
        }, 300);
      }

      // ----- Toggle labels -----
      function toggleLabels() {
        isLabelsVisible = !isLabelsVisible;
        annotations.forEach(ann => {
          ann.style.display = isLabelsVisible ? 'block' : 'none';
        });
        toggleLabelsBtn.textContent = isLabelsVisible ? '🏷️ Labels' : '🏷️ Show Labels';
      }

      // ----- Update speed from radio -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        // Set initial state
        progress = 0;

        // Set ring data
        rings.forEach((ring, i) => {
          const radius = 10 + (i + 1) * 4.5;
          ring.dataset.radius = radius;
          const circumference = 2 * Math.PI * radius;
          ring.style.strokeDasharray = circumference;
          ring.style.strokeDashoffset = circumference;
          ring.style.opacity = '0';
        });

        centerCore.style.transform = 'scale(0)';
        centerCore.style.opacity = '0';
        growthGlow.style.opacity = '0.05';
        annotations.forEach(ann => {
          ann.style.opacity = '0';
          ann.style.transform = 'translateX(-50%) scale(0.5)';
        });

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start growth after a short delay
        setTimeout(() => {
          progress = 0.01;
        }, 500);
      }

      // ----- Event listeners -----
      speedRadios.forEach(radio => {
        radio.addEventListener('change', function() {
          if (this.checked) {
            updateSpeed(this.value);
          }
        });
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetRings);
      toggleLabelsBtn.addEventListener('click', toggleLabels);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
