<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropdown Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <h1 class="demo-title">Dropdown Component</h1>
    <div class="dropdown" id="dropdown1">
      <button class="dropdown-trigger" onclick="toggleDropdown('dropdown1')">Select Option <span class="arrow">▼</span></button>
      <div class="dropdown-menu">
        <a href="#" class="dropdown-item" onclick="selectItem(this, 'dropdown1')">Option 1</a>
        <a href="#" class="dropdown-item" onclick="selectItem(this, 'dropdown1')">Option 2</a>
        <a href="#" class="dropdown-item" onclick="selectItem(this, 'dropdown1')">Option 3</a>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item" onclick="selectItem(this, 'dropdown1')">Option 4</a>
      </div>
    </div>
  </main>
  <script>
    function toggleDropdown(id) {
      const dropdown = document.getElementById(id);
      dropdown.classList.toggle('open');
    }
    function selectItem(item, id) {
      const dropdown = document.getElementById(id);
      const trigger = dropdown.querySelector('.dropdown-trigger');
      trigger.innerHTML = item.textContent + ' <span class="arrow">▼</span>';
      dropdown.classList.remove('open');
      event.preventDefault();
    }
    document.addEventListener('click', function(e) {
      document.querySelectorAll('.dropdown.open').forEach(d => {
        if (!d.contains(e.target)) d.classList.remove('open');
      });
    });
  </script>
</body>
</html>
