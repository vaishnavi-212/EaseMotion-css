<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Clip Path Date Picker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="date-picker-card ease-fade-in">

    <div class="card-header">

        <span class="badge">
            Schedule
        </span>

        <h1>
            Choose Meeting Date
        </h1>

        <p>
            Select your preferred date for the upcoming meeting.
        </p>

    </div>

    <form class="date-form">

        <label for="meeting-date">
            Meeting Date
        </label>

        <div class="input-wrapper ease-hover-lift">

            <span class="calendar-icon">
                📅
            </span>

            <input
                id="meeting-date"
                type="date"
                aria-label="Meeting Date">

        </div>

        <button
            type="submit"
            class="book-btn">

            Schedule Meeting

        </button>

    </form>

</section>

</body>

</html>
