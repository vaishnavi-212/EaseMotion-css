<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart Badge</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="cart-section" aria-label="Shopping Cart">
      <h1 class="section-title">Your Cart</h1>
      
      <div class="cart-item">
        <div class="item-image">
          <span class="item-icon">👕</span>
        </div>
        <div class="item-info">
          <h2 class="item-name">Classic T-Shirt</h2>
          <p class="item-price">$29.99</p>
        </div>
        <div class="item-quantity">
          <button class="qty-btn minus">-</button>
          <span class="qty-value">1</span>
          <button class="qty-btn plus">+</button>
        </div>
        <div class="item-total">$29.99</div>
        <button class="remove-btn">×</button>
      </div>

      <div class="cart-item">
        <div class="item-image">
          <span class="item-icon">👟</span>
        </div>
        <div class="item-info">
          <h2 class="item-name">Running Shoes</h2>
          <p class="item-price">$89.99</p>
        </div>
        <div class="item-quantity">
          <button class="qty-btn minus">-</button>
          <span class="qty-value">2</span>
          <button class="qty-btn plus">+</button>
        </div>
        <div class="item-total">$179.98</div>
        <button class="remove-btn">×</button>
      </div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal</span>
          <span>$209.97</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>$5.99</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>$215.96</span>
        </div>
        <button class="checkout-btn">Proceed to Checkout</button>
      </div>
    </section>

    <div class="floating-cart">
      <button class="cart-btn">
        <span class="cart-icon">🛒</span>
        <span class="cart-badge">3</span>
      </button>
    </div>
  </main>
</body>
</html>
