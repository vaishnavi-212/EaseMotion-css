    <div class="controls">
      <button id="activateBtn">🟣 Activate All</button>
      <button id="deactivateBtn">⚪ Deactivate</button>
      <label>
        Spin Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Light Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const chakraWheels = document.querySelectorAll('.chakra-wheel');
      const chakraGlows = document.querySelectorAll('.chakra-glow');
      const chakraCenters = document.querySelectorAll('.chakra-center');
      const chakraRings = document.querySelectorAll('.chakra-ring');
      const chakraPetals = document.querySelectorAll('.chakra-petals');
      const energyLines = document.querySelectorAll('.energy-line');
      const chakraLabels = document.querySelectorAll('.chakra-label');

      const activateBtn = document.getElementById('activateBtn');
      const deactivateBtn = document.getElementById('deactivateBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isActive = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Chakra wheels rotate
        chakraWheels.forEach((wheel, i) => {
          const baseDuration = 6 - i * 0.3;
          const duration = baseDuration / speedMultiplier;
          wheel.style.setProperty('--chakra-duration', duration + 's');
          wheel.style.setProperty('--chakra-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Chakra rings
        chakraRings.forEach((ring, i) => {
          const duration = (2 + (i % 3) * 0.3) / speedMultiplier;
          ring.style.setProperty('--ring-duration', duration + 's');
          ring.style.setProperty('--ring-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Chakra petals
        chakraPetals.forEach((petal, i) => {
          const duration = (1.5 + (i % 4) * 0.15) / speedMultiplier;
          petal.style.setProperty('--petal-duration', duration + 's');
          petal.style.setProperty('--petal-delay', ((i * 0.01) / speedMultiplier) + 's');
        });

        // Chakra glows
        chakraGlows.forEach((glow, i) => {
          const duration = (1.8 + i * 0.1) / speedMultiplier;
          glow.style.setProperty('--glow-duration', duration + 's');
          glow.style.setProperty('--glow-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Energy lines
        energyLines.forEach((line, i) => {
          const duration = (2.5 + i * 0.2) / speedMultiplier;
          line.style.setProperty('--line-duration', duration + 's');
          line.style.setProperty('--line-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Chakra centers
        chakraCenters.forEach((center, i) => {
          const duration = (1.2 + i * 0.05) / speedMultiplier;
          center.style.setProperty('--center-duration', duration + 's');
          center.style.setProperty('--center-delay', ((i * 0.03) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Chakra glows
        chakraGlows.forEach((glow) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          glow.style.setProperty('--glow-opacity', opacity);
          const size = 80 * intensityMultiplier;
          glow.style.setProperty('--glow-size', size + 'px');
        });

        // Chakra centers
        chakraCenters.forEach((center) => {
          const size = 12 * intensityMultiplier;
          center.style.setProperty('--center-size', size + 'px');
          const opacity = Math.min(0.5 * intensityMultiplier, 0.9);
          center.style.setProperty('--center-opacity', opacity);
        });

        // Chakra rings
        chakraRings.forEach((ring) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          ring.style.setProperty('--ring-opacity', opacity);
          const width = 1 * intensityMultiplier;
          ring.style.setProperty('--ring-width', width + 'px');
        });

        // Chakra petals
        chakraPetals.forEach((petal) => {
          const opacity = Math.min(0.2 * intensityMultiplier, 0.4);
          petal.style.setProperty('--petal-opacity', opacity);
        });

        // Energy lines
        energyLines.forEach((line) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          line.style.setProperty('--line-opacity', opacity);
        });

        // Chakra labels
        chakraLabels.forEach((label) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          label.style.setProperty('--label-opacity', opacity);
        });
      }

      // ----- Activate chakras -----
      function activateChakras() {
        if (isActive) return;
        isActive = true;

        chakraWheels.forEach(wheel => {
          wheel.classList.add('active');
          wheel.classList.remove('inactive');
        });

        chakraGlows.forEach(glow => {
          glow.classList.add('active');
        });

        chakraCenters.forEach(center => {
          center.classList.add('active');
        });

        chakraRings.forEach(ring => {
          ring.classList.add('active');
        });

        chakraPetals.forEach(petal => {
          petal.classList.add('active');
        });

        energyLines.forEach(line => {
          line.classList.add('active');
        });

        chakraLabels.forEach(label => {
          label.classList.add('active');
        });

        activateBtn.textContent = '🟣 Activating...';
        setTimeout(() => {
          activateBtn.textContent = '🟣 Activate All';
        }, 500 / speedMultiplier);
      }

      // ----- Deactivate chakras -----
      function deactivateChakras() {
        if (!isActive) return;
        isActive = false;

        chakraWheels.forEach(wheel => {
          wheel.classList.remove('active');
          wheel.classList.add('inactive');
        });

        chakraGlows.forEach(glow => {
          glow.classList.remove('active');
        });

        chakraCenters.forEach(center => {
          center.classList.remove('active');
        });

        chakraRings.forEach(ring => {
          ring.classList.remove('active');
        });

        chakraPetals.forEach(petal => {
          petal.classList.remove('active');
        });

        energyLines.forEach(line => {
          line.classList.remove('active');
        });

        chakraLabels.forEach(label => {
          label.classList.remove('active');
        });

        deactivateBtn.textContent = '⚪ Deactivating...';
        setTimeout(() => {
          deactivateBtn.textContent = '⚪ Deactivate';
        }, 500 / speedMultiplier);
      }

      // ----- Reset -----
      function resetChakras() {
        if (isActive) {
          deactivateChakras();
          setTimeout(() => {
            isActive = false;
            chakraWheels.forEach(w => w.classList.remove('inactive'));
          }, 400);
        } else {
          chakraWheels.forEach(w => w.classList.remove('inactive'));
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial state (inactive)
        chakraWheels.forEach(w => w.classList.add('inactive'));

        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-activate after 1.5 seconds
        setTimeout(() => {
          activateChakras();
        }, 1500);

        // Auto-deactivate after 5 seconds
        setTimeout(() => {
          deactivateChakras();
        }, 6500);

        // Cycle again
        setTimeout(() => {
          activateChakras();
        }, 8000);

        setTimeout(() => {
          deactivateChakras();
        }, 12000);
      }

      // ----- Event listeners -----
      activateBtn.addEventListener('click', activateChakras);
      deactivateBtn.addEventListener('click', deactivateChakras);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });
      resetBtn.addEventListener('click', resetChakras);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>
