<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Heat Map Grid Component</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="component-viewport">
        <div class="heat-map-card">
            <div class="map-header">
                <div class="header-meta">
                    <span class="meta-label">ACTIVITY CONTRIBUTE MATRIX</span>
                    <h2 class="meta-title">Data Pipeline Commits</h2>
                </div>
                <div class="matrix-stats">
                    <span class="stat-count">3,482</span>
                    <span class="stat-label">Yearly Operations</span>
                </div>
            </div>

            <div class="grid-scroll-container">
                <div class="heat-map-matrix">
                    <div class="matrix-column">
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                    </div>
                    <div class="matrix-column">
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                    </div>
                    <div class="matrix-column">
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                    </div>
                    <div class="matrix-column">
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                    </div>
                    <div class="matrix-column">
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                    </div>
                    <div class="matrix-column">
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                        <div class="matrix-cell level-2" data-intensity="2"></div>
                        <div class="matrix-cell level-1" data-intensity="1"></div>
                        <div class="matrix-cell level-0" data-intensity="0"></div>
                        <div class="matrix-cell level-3" data-intensity="3"></div>
                        <div class="matrix-cell level-4" data-intensity="4"></div>
                    </div>
                </div>
            </div>

            <div class="matrix-legend">
                <span class="legend-text">Less</span>
                <div class="legend-cells">
                    <div class="legend-cell level-0"></div>
                    <div class="legend-cell level-1"></div>
                    <div class="legend-cell level-2"></div>
                    <div class="legend-cell level-3"></div>
                    <div class="legend-cell level-4"></div>
                </div>
                <span class="legend-text">More</span>
            </div>
        </div>
    </div>

</body>
</html>
