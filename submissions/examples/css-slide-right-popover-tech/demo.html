<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Right Popover - Minimalist Tech</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tech-viewport">
        <div class="minimal-terminal-card">
            <div class="card-identity">
                <span class="tech-mono-label">INTEGRATED_MODULES</span>
                <span class="tech-version">v4.11.0</span>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">Service Config</span>
                        <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                    
                    <div class="slide-right-popover" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-tech">SYS_ENVIRONMENT</span>
                                <p class="service-title">Staging Instance B</p>
                            </div>
                            <div class="popover-body">
                                <p class="service-desc">Isolated sandbox partition running container configurations directly inside edge proxy boundaries to verify payload structures safely.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
