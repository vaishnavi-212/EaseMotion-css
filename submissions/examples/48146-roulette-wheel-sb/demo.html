<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roulette Wheel Spinner</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="roulette-container" aria-label="Roulette Wheel Spinner">
      <header class="roulette-header">
        <h1 class="roulette-title">Lucky Wheel Draw</h1>
        <p class="roulette-subtitle">Spin to win exciting prizes!</p>
      </header>

      <div class="wheel-wrapper">
        <div class="pointer">
          <svg viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
            <polygon points="20,60 0,0 40,0" fill="currentColor"/>
          </svg>
        </div>

        <div class="wheel">
          <div class="wheel-inner">
            <div class="segment seg-1"><span>10% Off</span></div>
            <div class="segment seg-2"><span>Free Ship</span></div>
            <div class="segment seg-3"><span>50% Off</span></div>
            <div class="segment seg-4"><span>Buy 1 Get 1</span></div>
            <div class="segment seg-5"><span>$5 Off</span></div>
            <div class="segment seg-6"><span>$10 Off</span></div>
            <div class="segment seg-7"><span>Mystery</span></div>
            <div class="segment seg-8"><span>Try Again</span></div>
          </div>
          <div class="wheel-center">
            <span>Gift</span>
          </div>
        </div>
      </div>

      <button class="spin-btn" type="button">
        <span class="btn-text">Spin Now</span>
        <span class="btn-icon">🎰</span>
      </button>

      <div class="result-display">
        <p class="result-text">Click the button to spin!</p>
      </div>

      <div class="prize-history">
        <h3 class="history-title">Recent Winners</h3>
        <ul class="history-list">
          <li class="history-item winner-1">Sarah won <strong>$10 Off</strong></li>
          <li class="history-item winner-2">Mike won <strong>50% Off</strong></li>
          <li class="history-item winner-3">Emma won <strong>Free Ship</strong></li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
