<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recycle Bin Icon Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Recycle Bin Icon</h1>
  <p>An animated recycle bin icon — the lid tilts open and the bin bounces slightly on hover.</p>

  <div class="demo-row">

    <div class="recycle-bin-icon">
      <svg viewBox="0 0 64 64">
        <g class="bin-lid">
          <rect x="14" y="10" width="36" height="6" rx="2"></rect>
          <rect x="26" y="4" width="12" height="6" rx="2"></rect>
        </g>
        <path class="bin-body" d="M18 20 L46 20 L43 56 A4 4 0 0 1 39 60 L25 60 A4 4 0 0 1 21 56 Z"></path>
        <line class="bin-stripe" x1="26" y1="28" x2="27" y2="52"></line>
        <line class="bin-stripe" x1="32" y1="28" x2="32" y2="52"></line>
        <line class="bin-stripe" x1="38" y1="28" x2="37" y2="52"></line>
      </svg>
      <span class="bin-label">Hover me</span>
    </div>

    <div class="recycle-bin-icon is-filling">
      <svg viewBox="0 0 64 64">
        <g class="bin-lid">
          <rect x="14" y="10" width="36" height="6" rx="2"></rect>
          <rect x="26" y="4" width="12" height="6" rx="2"></rect>
        </g>
        <path class="bin-body" d="M18 20 L46 20 L43 56 A4 4 0 0 1 39 60 L25 60 A4 4 0 0 1 21 56 Z"></path>
        <line class="bin-stripe" x1="26" y1="28" x2="27" y2="52"></line>
        <line class="bin-stripe" x1="32" y1="28" x2="32" y2="52"></line>
        <line class="bin-stripe" x1="38" y1="28" x2="37" y2="52"></line>
      </svg>
      <span class="bin-label">Filling state</span>
    </div>

  </div>

</body>
</html>
