<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease User Presence Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="user online">
    <img src="https://i.pravatar.cc/120?img=12" alt="User">
    <span class="status"></span>
    <h3>Alex</h3>
    <p>Online</p>
  </div>

  <div class="user away">
    <img src="https://i.pravatar.cc/120?img=18" alt="User">
    <span class="status"></span>
    <h3>Sophia</h3>
    <p>Away</p>
  </div>

  <div class="user busy">
    <img src="https://i.pravatar.cc/120?img=32" alt="User">
    <span class="status"></span>
    <h3>David</h3>
    <p>Busy</p>
  </div>

  <div class="user offline">
    <img src="https://i.pravatar.cc/120?img=45" alt="User">
    <span class="status"></span>
    <h3>Emma</h3>
    <p>Offline</p>
  </div>

</div>

</body>
</html>
