<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Collision – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌌 Galaxy Collision</h1>
    <p class="subtitle">Two galaxies merging with stars</p>

    <div class="gc-container">
      <div class="gc-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>

        <!-- Galaxy 1 (blue/white) -->
        <div class="galaxy galaxy-1">
          <!-- Galaxy glow -->
          <div class="galaxy-glow g1-glow"></div>

          <!-- Spiral arms -->
          <div class="spiral-arm arm1-1"></div>
          <div class="spiral-arm arm1-2"></div>
          <div class="spiral-arm arm1-3"></div>
          <div class="spiral-arm arm1-4"></div>

          <!-- Stars -->
          <div class="star-particle gp1"></div>
          <div class="star-particle gp2"></div>
          <div class="star-particle gp3"></div>
          <div class="star-particle gp4"></div>
          <div class="star-particle gp5"></div>
          <div class="star-particle gp6"></div>
          <div class="star-particle gp7"></div>
          <div class="star-particle gp8"></div>
          <div class="star-particle gp9"></div>
          <div class="star-particle gp10"></div>
          <div class="star-particle gp11"></div>
          <div class="star-particle gp12"></div>
          <div class="star-particle gp13"></div>
          <div class="star-particle gp14"></div>
          <div class="star-particle gp15"></div>
          <div class="star-particle gp16"></div>
          <div class="star-particle gp17"></div>
          <div class="star-particle gp18"></div>
          <div class="star-particle gp19"></div>
          <div class="star-particle gp20"></div>
          <div class="star-particle gp21"></div>
          <div class="star-particle gp22"></div>
          <div class="star-particle gp23"></div>
          <div class="star-particle gp24"></div>
          <div class="star-particle gp25"></div>
          <div class="star-particle gp26"></div>
          <div class="star-particle gp27"></div>
          <div class="star-particle gp28"></div>
          <div class="star-particle gp29"></div>
          <div class="star-particle gp30"></div>

          <!-- Galaxy center -->
          <div class="galaxy-center gc1-center"></div>
        </div>

        <!-- Galaxy 2 (gold/red) -->
        <div class="galaxy galaxy-2">
          <div class="galaxy-glow g2-glow"></div>

          <div class="spiral-arm arm2-1"></div>
          <div class="spiral-arm arm2-2"></div>
          <div class="spiral-arm arm2-3"></div>
          <div class="spiral-arm arm2-4"></div>

          <div class="star-particle gp31"></div>
          <div class="star-particle gp32"></div>
          <div class="star-particle gp33"></div>
          <div class="star-particle gp34"></div>
          <div class="star-particle gp35"></div>
          <div class="star-particle gp36"></div>
          <div class="star-particle gp37"></div>
          <div class="star-particle gp38"></div>
          <div class="star-particle gp39"></div>
          <div class="star-particle gp40"></div>
          <div class="star-particle gp41"></div>
          <div class="star-particle gp42"></div>
          <div class="star-particle gp43"></div>
          <div class="star-particle gp44"></div>
          <div class="star-particle gp45"></div>
          <div class="star-particle gp46"></div>
          <div class="star-particle gp47"></div>
          <div class="star-particle gp48"></div>
          <div class="star-particle gp49"></div>
          <div class="star-particle gp50"></div>
          <div class="star-particle gp51"></div>
          <div class="star-particle gp52"></div>
          <div class="star-particle gp53"></div>
          <div class="star-particle gp54"></div>
          <div class="star-particle gp55"></div>
          <div class="star-particle gp56"></div>
          <div class="star-particle gp57"></div>
          <div class="star-particle gp58"></div>
          <div class="star-particle gp59"></div>
          <div class="star-particle gp60"></div>

          <div class="galaxy-center gc2-center"></div>
        </div>

        <!-- Collision glow -->
        <div class="collision-glow"></div>

        <!-- Tidal tails -->
        <div class="tidal-tail tail-1"></div>
        <div class="tidal-tail tail-2"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Collision Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Star Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const galaxy1 = document.querySelector('.galaxy-1');
      const galaxy2 = document.querySelector('.galaxy-2');
      const collisionGlow = document.querySelector('.collision-glow');
      const tidalTails = document.querySelectorAll('.tidal-tail');
      const starParticles = document.querySelectorAll('.star-particle');

      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Galaxy orbit
        galaxy1.style.setProperty('--galaxy-orbit', (6 / speedMultiplier) + 's');
        galaxy2.style.setProperty('--galaxy-orbit', (6 / speedMultiplier) + 's');

        // Spiral rotation
        document.querySelectorAll('.spiral-arm').forEach((arm, i) => {
          const duration = (4 + (i % 2) * 0.5) / speedMultiplier;
          arm.style.setProperty('--spiral-duration', duration + 's');
        });

        // Stars twinkle
        starParticles.forEach((p, i) => {
          const duration = (1.5 + (i % 5) * 0.3) / speedMultiplier;
          p.style.setProperty('--star-twinkle', duration + 's');
        });

        // Galaxy glow pulse
        document.querySelectorAll('.galaxy-glow').forEach((g, i) => {
          const duration = (3 + i * 0.5) / speedMultiplier;
          g.style.setProperty('--glow-pulse', duration + 's');
        });

        // Collision glow
        collisionGlow.style.setProperty('--collision-duration', (2 / speedMultiplier) + 's');

        // Tidal tails
        tidalTails.forEach((tail, i) => {
          const duration = (4 + i * 0.5) / speedMultiplier;
          tail.style.setProperty('--tail-duration', duration + 's');
        });
      }

      // ----- Apply density -----
      function applyDensity() {
        starParticles.forEach((p) => {
          const baseSize = parseFloat(p.dataset.baseSize) || 2;
          const size = baseSize * densityMultiplier * 0.7;
          p.style.setProperty('--star-size', size + 'px');
          p.style.setProperty('--star-opacity', Math.min(0.6 * densityMultiplier, 1));
        });
      }

      // ----- Update collision progress -----
      function updateCollision(deltaTime) {
        if (isPaused) return;

        const speed = 0.01 * speedMultiplier;
        progress += deltaTime * speed * 0.5;

        if (progress > 1) {
          progress = 1;
        }

        // Move galaxies toward each other
        const offset = progress * 60;
        const yOffset = progress * 20;

        galaxy1.style.transform = `translate(${-30 + offset}px, ${-10 + yOffset}px) scale(${1 - progress * 0.1})`;
        galaxy2.style.transform = `translate(${30 - offset}px, ${10 - yOffset}px) scale(${1 - progress * 0.1})`;

        // Collision glow intensity
        const glowIntensity = 0.1 + progress * 0.6;
        collisionGlow.style.opacity = glowIntensity;
        collisionGlow.style.transform = `translate(-50%, -50%) scale(${0.5 + progress * 0.5})`;

        // Tidal tails appear
        tidalTails.forEach((tail, i) => {
          const tailProgress = Math.max(0, Math.min(1, (progress - 0.3 - i * 0.1) * 2.5));
          tail.style.opacity = tailProgress;
          tail.style.transform = `scale(${tailProgress})`;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateCollision(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetCollision() {
        progress = 0;
        galaxy1.style.transform = 'translate(-30px, -10px) scale(1)';
        galaxy2.style.transform = 'translate(30px, 10px) scale(1)';
        collisionGlow.style.opacity = '0.05';
        collisionGlow.style.transform = 'translate(-50%, -50%) scale(0.5)';
        tidalTails.forEach(tail => {
          tail.style.opacity = '0';
          tail.style.transform = 'scale(0)';
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        setTimeout(() => {
          progress = 0.01;
        }, 300);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Set initial particle data
        starParticles.forEach((p) => {
          const size = 1.5 + Math.random() * 3;
          p.dataset.baseSize = size;
        });

        applySpeed();
        applyDensity();

        // Set initial state
        galaxy1.style.transform = 'translate(-30px, -10px) scale(1)';
        galaxy2.style.transform = 'translate(30px, 10px) scale(1)';
        collisionGlow.style.opacity = '0.05';
        collisionGlow.style.transform = 'translate(-50%, -50%) scale(0.5)';
        tidalTails.forEach(tail => {
          tail.style.opacity = '0';
          tail.style.transform = 'scale(0)';
        });

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start collision after a short delay
        setTimeout(() => {
          progress = 0.01;
        }, 500);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetCollision);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
