<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Orbit Tooltip - Neumorphic Soft</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Neumorphic floating orbit tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Floating Orbit Tooltip</h1>
        <p>Neumorphic Soft Layouts variant with floating orbit animation effect.</p>
        
        <div class="neumorphic-ui">
          <div class="profile-section">
            <div class="profile-card">
              <div class="avatar">
                <span class="avatar-initials">SB</span>
              </div>
              <div class="profile-info">
                <h3>Sarah Bennett</h3>
                <p>Product Designer</p>
              </div>
              <button class="ease-nm-icon-btn-sb ease-floating-orbit-nm-sb" data-tooltip="Edit profile settings">
                <span class="edit-icon"></span>
              </button>
            </div>
          </div>
          
          <div class="stats-section">
            <div class="stat-box">
              <span class="stat-number">847</span>
              <span class="stat-label">Followers</span>
              <button class="ease-nm-icon-btn-sm-sb ease-floating-orbit-nm-sb" data-tooltip="View all followers">
                <span class="info-icon"></span>
              </button>
            </div>
            <div class="stat-box">
              <span class="stat-number">126</span>
              <span class="stat-label">Projects</span>
              <button class="ease-nm-icon-btn-sm-sb ease-floating-orbit-nm-sb" data-tooltip="Browse all projects">
                <span class="info-icon"></span>
              </button>
            </div>
            <div class="stat-box">
              <span class="stat-number">4.9</span>
              <span class="stat-label">Rating</span>
              <button class="ease-nm-icon-btn-sm-sb ease-floating-orbit-nm-sb" data-tooltip="See all reviews">
                <span class="info-icon"></span>
              </button>
            </div>
          </div>
          
          <div class="action-section">
            <button class="ease-nm-btn-primary-sb ease-floating-orbit-nm-sb" data-tooltip="Connect with Sarah on LinkedIn">
              <span class="connect-icon"></span>
              Connect
            </button>
            <button class="ease-nm-btn-secondary-sb ease-floating-orbit-nm-sb" data-tooltip="Send Sarah a direct message">
              <span class="message-icon"></span>
              Message
            </button>
          </div>
          
          <div class="settings-section">
            <h4>Quick Settings</h4>
            <div class="setting-row">
              <span>Email Notifications</span>
              <button class="ease-nm-toggle-sb ease-floating-orbit-nm-sb" data-tooltip="Toggle email notifications on/off" aria-label="Toggle notifications">
                <span class="toggle-indicator"></span>
              </button>
            </div>
            <div class="setting-row">
              <span>Dark Mode</span>
              <button class="ease-nm-toggle-sb ease-floating-orbit-nm-sb" data-tooltip="Switch between light and dark theme" aria-label="Toggle dark mode">
                <span class="toggle-indicator"></span>
              </button>
            </div>
            <div class="setting-row">
              <span>Auto-save</span>
              <button class="ease-nm-toggle-sb ease-floating-orbit-nm-sb" data-tooltip="Enable automatic saving of changes" aria-label="Toggle auto-save">
                <span class="toggle-indicator"></span>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
