<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List Item Reorder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion list</p>
    <h1 id="demo-title">List item reorder</h1>
    <p class="intro">A list row that lifts and shows a drag handle when it is focused or hovered.</p>
    <ul class="list" aria-label="Task order">
      <li tabindex="0"><span class="handle">::</span><strong>Prepare release notes</strong></li>
      <li tabindex="0"><span class="handle">::</span><strong>Review preview build</strong></li>
    </ul>
  </main>
</body>
</html>
