<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Tier List Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tier-list">

  <div class="tier s">
    <div class="label">S</div>
    <div class="items">
      <div class="item">⭐</div>
      <div class="item">🔥</div>
    </div>
  </div>

  <div class="tier a">
    <div class="label">A</div>
    <div class="items">
      <div class="item">🎮</div>
      <div class="item">🎵</div>
    </div>
  </div>

  <div class="tier b">
    <div class="label">B</div>
    <div class="items">
      <div class="item">📚</div>
    </div>
  </div>

  <div class="tier c">
    <div class="label">C</div>
    <div class="items">
      <div class="item">💡</div>
    </div>
  </div>

  <div class="tier d">
    <div class="label">D</div>
    <div class="items">
      <div class="item">📝</div>
    </div>
  </div>

</div>

</body>
</html>
