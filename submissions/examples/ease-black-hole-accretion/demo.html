<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Hole Accretion – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🕳️ Black Hole Accretion</h1>
    <p class="subtitle">Matter spiraling into black hole</p>

    <div class="bh-container">
      <div class="bh-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>

        <!-- Black Hole -->
        <div class="black-hole">
          <!-- Event horizon -->
          <div class="event-horizon"></div>

          <!-- Inner shadow -->
          <div class="inner-shadow"></div>

          <!-- Photon ring -->
          <div class="photon-ring"></div>

          <!-- Accretion disk -->
          <div class="accretion-disk">
            <!-- Disk particles -->
            <div class="disk-particle dp1"></div>
            <div class="disk-particle dp2"></div>
            <div class="disk-particle dp3"></div>
            <div class="disk-particle dp4"></div>
            <div class="disk-particle dp5"></div>
            <div class="disk-particle dp6"></div>
            <div class="disk-particle dp7"></div>
            <div class="disk-particle dp8"></div>
            <div class="disk-particle dp9"></div>
            <div class="disk-particle dp10"></div>
            <div class="disk-particle dp11"></div>
            <div class="disk-particle dp12"></div>
            <div class="disk-particle dp13"></div>
            <div class="disk-particle dp14"></div>
            <div class="disk-particle dp15"></div>
            <div class="disk-particle dp16"></div>
            <div class="disk-particle dp17"></div>
            <div class="disk-particle dp18"></div>
            <div class="disk-particle dp19"></div>
            <div class="disk-particle dp20"></div>
            <div class="disk-particle dp21"></div>
            <div class="disk-particle dp22"></div>
            <div class="disk-particle dp23"></div>
            <div class="disk-particle dp24"></div>
            <div class="disk-particle dp25"></div>
            <div class="disk-particle dp26"></div>
            <div class="disk-particle dp27"></div>
            <div class="disk-particle dp28"></div>
            <div class="disk-particle dp29"></div>
            <div class="disk-particle dp30"></div>
            <div class="disk-particle dp31"></div>
            <div class="disk-particle dp32"></div>
            <div class="disk-particle dp33"></div>
            <div class="disk-particle dp34"></div>
            <div class="disk-particle dp35"></div>
            <div class="disk-particle dp36"></div>
            <div class="disk-particle dp37"></div>
            <div class="disk-particle dp38"></div>
            <div class="disk-particle dp39"></div>
            <div class="disk-particle dp40"></div>
          </div>

          <!-- Gravitational lensing glow -->
          <div class="lensing-glow"></div>

          <!-- Accretion glow -->
          <div class="accretion-glow"></div>
        </div>

        <!-- Incoming matter stream -->
        <div class="matter-stream">
          <div class="stream-particle sp1"></div>
          <div class="stream-particle sp2"></div>
          <div class="stream-particle sp3"></div>
          <div class="stream-particle sp4"></div>
          <div class="stream-particle sp5"></div>
          <div class="stream-particle sp6"></div>
          <div class="stream-particle sp7"></div>
          <div class="stream-particle sp8"></div>
          <div class="stream-particle sp9"></div>
          <div class="stream-particle sp10"></div>
          <div class="stream-particle sp11"></div>
          <div class="stream-particle sp12"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Accretion Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Particle Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const diskParticles = document.querySelectorAll('.disk-particle');
      const streamParticles = document.querySelectorAll('.stream-particle');
      const photonRing = document.querySelector('.photon-ring');
      const accretionGlow = document.querySelector('.accretion-glow');
      const lensingGlow = document.querySelector('.lensing-glow');
      const eventHorizon = document.querySelector('.event-horizon');

      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Disk particles orbit
        diskParticles.forEach((p, i) => {
          const baseDuration = 4 + (i % 5) * 0.8;
          const duration = baseDuration / speedMultiplier;
          p.style.setProperty('--orbit-duration', duration + 's');
          p.style.setProperty('--orbit-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Stream particles
        streamParticles.forEach((p, i) => {
          const baseDuration = 3 + (i % 4) * 0.5;
          const duration = baseDuration / speedMultiplier;
          p.style.setProperty('--stream-duration', duration + 's');
          p.style.setProperty('--stream-delay', ((i * 0.15) / speedMultiplier) + 's');
        });

        // Photon ring
        photonRing.style.setProperty('--photon-duration', (3 / speedMultiplier) + 's');

        // Accretion glow
        accretionGlow.style.setProperty('--glow-duration', (2 / speedMultiplier) + 's');

        // Lensing glow
        lensingGlow.style.setProperty('--lensing-duration', (4 / speedMultiplier) + 's');

        // Event horizon pulse
        eventHorizon.style.setProperty('--horizon-duration', (3.5 / speedMultiplier) + 's');
      }

      // ----- Apply density -----
      function applyDensity() {
        diskParticles.forEach((p) => {
          const baseSize = parseFloat(p.dataset.baseSize) || 3;
          const size = baseSize * densityMultiplier * 0.7;
          p.style.setProperty('--particle-size', size + 'px');
          p.style.setProperty('--particle-opacity', Math.min(0.6 * densityMultiplier, 1));
        });

        // Adjust photon ring thickness
        const ringSize = 180 * densityMultiplier;
        photonRing.style.setProperty('--ring-size', ringSize + 'px');

        // Adjust accretion glow
        const glowSize = 250 * densityMultiplier;
        accretionGlow.style.setProperty('--glow-size', glowSize + 'px');
      }

      // ----- Update particle positions for spiral effect -----
      function updateParticles(timestamp) {
        if (isPaused) return;

        diskParticles.forEach((p, i) => {
          const angle = parseFloat(p.dataset.angle) || (i / diskParticles.length) * 360;
          const radius = parseFloat(p.dataset.radius) || 40 + (i % 8) * 15;
          const speed = 0.02 * speedMultiplier;

          // Spiral inward over time
          const time = timestamp / 1000;
          const drift = Math.sin(time * 0.1 + i) * 0.05;
          const newRadius = radius - 0.5 * speedMultiplier * 0.1;
          const newAngle = angle + speed * 2;

          p.dataset.angle = newAngle;
          p.dataset.radius = Math.max(newRadius, 15);

          const rad = newAngle * Math.PI / 180;
          const x = Math.cos(rad) * newRadius;
          const y = Math.sin(rad) * newRadius * 0.3; // Flatten the disk

          p.style.transform = `translate(${x}px, ${y}px) scale(${1 - (newRadius - 15) / 80})`;
          p.style.opacity = Math.min(0.8 * (1 - (newRadius - 15) / 80), 1);
        });

        // Update stream particles
        streamParticles.forEach((p, i) => {
          const progress = parseFloat(p.dataset.progress) || 0;
          const newProgress = (progress + 0.005 * speedMultiplier) % 1;
          p.dataset.progress = newProgress;

          // Spiral path from outside to center
          const angle = newProgress * 720; // Two full rotations
          const radius = 10 + (1 - newProgress) * 180;
          const rad = angle * Math.PI / 180;
          const x = Math.cos(rad) * radius;
          const y = Math.sin(rad) * radius * 0.2;

          p.style.transform = `translate(${x}px, ${y}px) scale(${0.5 + newProgress * 0.5})`;
          p.style.opacity = Math.min(0.8 * (1 - newProgress * 0.5), 0.8);
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateParticles(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetAccretion() {
        diskParticles.forEach((p, i) => {
          p.dataset.angle = (i / diskParticles.length) * 360 + Math.random() * 20;
          p.dataset.radius = 40 + (i % 8) * 15 + Math.random() * 5;
        });

        streamParticles.forEach((p) => {
          p.dataset.progress = Math.random();
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Init -----
      function init() {
        // Set initial particle data
        diskParticles.forEach((p, i) => {
          p.dataset.angle = (i / diskParticles.length) * 360 + Math.random() * 30;
          p.dataset.radius = 40 + (i % 8) * 15 + Math.random() * 10;
          const size = 2 + Math.random() * 4;
          p.dataset.baseSize = size;
        });

        streamParticles.forEach((p) => {
          p.dataset.progress = Math.random();
        });

        applySpeed();
        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetAccretion);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
