<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wave Color Picker | EaseMotion</title>

  <link rel="stylesheet" href="style.css">
</head>


<body>


<section class="picker-card">


<header>
    <h1>Wave Color Picker</h1>

    <p>
      Choose product color with smooth wave animation
    </p>
</header>




<!-- Color Controls -->

<input 
type="radio" 
id="purple" 
name="color" 
checked>


<input 
type="radio" 
id="ocean" 
name="color">



<input 
type="radio" 
id="sunset" 
name="color">



<input 
type="radio" 
id="mint" 
name="color">



<input 
type="radio" 
id="rose" 
name="color">





<!-- Preview Area -->


<div class="preview">


    <div class="waves">

        <span></span>

        <span></span>

        <span></span>

    </div>




    <div class="product">

        <div class="box"></div>

        <h2>
          Premium Product
        </h2>

    </div>


</div>






<!-- Color Selection -->


<div class="colors">



<label for="purple">

<span class="swatch purple-color"></span>

Purple

</label>




<label for="ocean">

<span class="swatch ocean-color"></span>

Ocean

</label>




<label for="sunset">

<span class="swatch sunset-color"></span>

Sunset

</label>




<label for="mint">

<span class="swatch mint-color"></span>

Mint

</label>




<label for="rose">

<span class="swatch rose-color"></span>

Rose

</label>



</div>






<button class="apply">

Apply Color

</button>



</section>



</body>

</html>
