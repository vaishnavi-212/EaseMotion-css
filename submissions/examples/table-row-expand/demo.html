<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Row Expand</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="table-stage" aria-label="Table row expand animation demo">
      <section class="table-card">
        <h1>Deployments</h1>
        <button class="row" type="button">
          <span>Production</span>
          <strong>Ready</strong>
          <em>View details</em>
        </button>
        <p class="details">Build completed in 42 seconds with all checks passing.</p>
      </section>
    </main>
  </body>
</html>
