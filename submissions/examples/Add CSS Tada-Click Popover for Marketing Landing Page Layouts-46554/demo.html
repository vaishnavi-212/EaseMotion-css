<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Popover for Marketing Landing Page</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="marketing-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="marketing-offer-popover">
        Unlock Special Offer 🎁
      </button>
      
      <div id="marketing-offer-popover" class="ease-tada-popover" role="dialog" aria-labelledby="offer-title">
        <div class="popover-content">
          <div class="badge">Limited Time</div>
          <h3 id="offer-title">Wait! Take 20% Off</h3>
          <p>Sign up for our newsletter today and get an instant 20% discount code for your first purchase.</p>
          <div class="popover-form">
            <input type="email" placeholder="Enter your email address" aria-label="Email address" class="offer-input">
            <button class="btn-claim">Claim My 20% Off</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
