<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Elastic Bounce Popover - Neumorphic Soft</title>
  
  <!-- Import EaseMotion core styles -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  
  <!-- Import custom popover styles -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Page layout */
    body {
      background-color: var(--popover-bg, #e2e8f0); /* Match neumorphic base */
      color: var(--ease-color-text);
      font-family: var(--ease-font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ease-space-8);
      margin: 0;
      transition: background-color var(--ease-speed-medium) var(--ease-ease);
    }
    
    [data-theme="dark"] body {
      background-color: #2d3748;
      color: var(--ease-color-neutral-100);
    }

    .header-info {
      text-align: center;
      margin-bottom: var(--ease-space-16);
      max-width: 600px;
    }

    .header-info h1 {
      font-size: var(--ease-text-3xl);
      font-weight: 700;
      margin-bottom: var(--ease-space-4);
      color: inherit;
    }

    .header-info p {
      color: var(--ease-color-muted);
      font-size: var(--ease-text-lg);
      line-height: var(--ease-leading-normal);
    }
    
    /* Neumorphic UI Context */
    .neu-app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--ease-space-4) var(--ease-space-8);
      border-radius: var(--ease-radius-xl);
      width: 100%;
      max-width: 400px;
      /* Main element uses standard outer shadow */
      box-shadow: -6px -6px 12px rgba(255,255,255,0.7), 
                   6px 6px 12px rgba(163,177,198,0.5);
    }
    
    [data-theme="dark"] .neu-app-bar {
      box-shadow: -6px -6px 12px rgba(255,255,255,0.05), 
                   6px 6px 12px rgba(0,0,0,0.5);
    }

    /* Trigger Styling */
    .neu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: inherit;
      color: var(--ease-color-primary);
      cursor: pointer;
      box-shadow: -4px -4px 8px rgba(255,255,255,0.7), 
                   4px 4px 8px rgba(163,177,198,0.5);
      transition: all var(--ease-speed-fast) var(--ease-ease);
    }
    
    [data-theme="dark"] .neu-btn {
      box-shadow: -4px -4px 8px rgba(255,255,255,0.05), 
                   4px 4px 8px rgba(0,0,0,0.5);
    }

    .neu-btn:hover {
      box-shadow: -2px -2px 4px rgba(255,255,255,0.7), 
                   2px 2px 4px rgba(163,177,198,0.5);
    }
    
    [data-theme="dark"] .neu-btn:hover {
      box-shadow: -2px -2px 4px rgba(255,255,255,0.05), 
                   2px 2px 4px rgba(0,0,0,0.5);
    }

    .neu-btn:active,
    .neu-btn:focus-visible {
      box-shadow: inset 4px 4px 8px rgba(163,177,198,0.5), 
                  inset -4px -4px 8px rgba(255,255,255,0.7);
      outline: none;
    }
    
    [data-theme="dark"] .neu-btn:active,
    [data-theme="dark"] .neu-btn:focus-visible {
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), 
                  inset -4px -4px 8px rgba(255,255,255,0.05);
    }
    
    .neu-title {
      font-weight: 700;
      color: inherit;
    }

  </style>
</head>
<body>

  <div class="header-info">
    <h1>Elastic Bounce Popover</h1>
    <p>Hover over or click the settings icon to trigger the pure CSS Elastic Bounce animation, styled for Neumorphic Soft layouts.</p>
  </div>

  <div class="neu-app-bar">
    <span class="neu-title">Smart Home</span>
    
    <!-- Component Start -->
    <div class="ease-popover-container">
      <button class="neu-btn" aria-label="Settings" aria-haspopup="dialog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      
      <div class="ease-popover-content" role="dialog" aria-label="Quick Settings">
        <span class="neu-popover-header">Preferences</span>
        <p class="neu-popover-text">Adjust your smart home system preferences.</p>
        
        <div class="neu-popover-toggle">
          <span class="neu-popover-toggle-label">Auto-Brightness</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ease-color-success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="5" width="22" height="14" rx="7" ry="7"></rect>
            <circle cx="16" cy="12" r="3"></circle>
          </svg>
        </div>
      </div>
    </div>
    <!-- Component End -->
    
  </div>

</body>
</html>
