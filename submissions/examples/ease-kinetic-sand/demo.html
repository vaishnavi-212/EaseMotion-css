<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic Sand – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🏖️ Kinetic Sand</h1>
    <p class="subtitle">Sand forming and reshaping patterns</p>

    <div class="ks-container">
      <div class="ks-scene">
        <!-- Sand container -->
        <div class="sand-container">
          <!-- Sand particles -->
          <div class="sand-particle sp1"></div>
          <div class="sand-particle sp2"></div>
          <div class="sand-particle sp3"></div>
          <div class="sand-particle sp4"></div>
          <div class="sand-particle sp5"></div>
          <div class="sand-particle sp6"></div>
          <div class="sand-particle sp7"></div>
          <div class="sand-particle sp8"></div>
          <div class="sand-particle sp9"></div>
          <div class="sand-particle sp10"></div>
          <div class="sand-particle sp11"></div>
          <div class="sand-particle sp12"></div>
          <div class="sand-particle sp13"></div>
          <div class="sand-particle sp14"></div>
          <div class="sand-particle sp15"></div>
          <div class="sand-particle sp16"></div>
          <div class="sand-particle sp17"></div>
          <div class="sand-particle sp18"></div>
          <div class="sand-particle sp19"></div>
          <div class="sand-particle sp20"></div>
          <div class="sand-particle sp21"></div>
          <div class="sand-particle sp22"></div>
          <div class="sand-particle sp23"></div>
          <div class="sand-particle sp24"></div>
          <div class="sand-particle sp25"></div>
          <div class="sand-particle sp26"></div>
          <div class="sand-particle sp27"></div>
          <div class="sand-particle sp28"></div>
          <div class="sand-particle sp29"></div>
          <div class="sand-particle sp30"></div>
          <div class="sand-particle sp31"></div>
          <div class="sand-particle sp32"></div>
          <div class="sand-particle sp33"></div>
          <div class="sand-particle sp34"></div>
          <div class="sand-particle sp35"></div>
          <div class="sand-particle sp36"></div>
          <div class="sand-particle sp37"></div>
          <div class="sand-particle sp38"></div>
          <div class="sand-particle sp39"></div>
          <div class="sand-particle sp40"></div>
          <div class="sand-particle sp41"></div>
          <div class="sand-particle sp42"></div>
          <div class="sand-particle sp43"></div>
          <div class="sand-particle sp44"></div>
          <div class="sand-particle sp45"></div>
          <div class="sand-particle sp46"></div>
          <div class="sand-particle sp47"></div>
          <div class="sand-particle sp48"></div>
          <div class="sand-particle sp49"></div>
          <div class="sand-particle sp50"></div>
          <div class="sand-particle sp51"></div>
          <div class="sand-particle sp52"></div>
          <div class="sand-particle sp53"></div>
          <div class="sand-particle sp54"></div>
          <div class="sand-particle sp55"></div>
          <div class="sand-particle sp56"></div>
          <div class="sand-particle sp57"></div>
          <div class="sand-particle sp58"></div>
          <div class="sand-particle sp59"></div>
          <div class="sand-particle sp60"></div>

          <!-- Sand glow -->
          <div class="sand-glow"></div>
        </div>

        <!-- Pattern labels -->
        <div class="pattern-label">⏳ Forming...</div>
      </div>
    </div>

    <div class="controls">
      <button id="formBtn">🌀 Form Pattern</button>
      <button id="scatterBtn">💨 Scatter</button>
      <label>
        Pattern Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Sand Density
        <input type="range" id="densityControl" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const sandParticles = document.querySelectorAll('.sand-particle');
      const sandContainer = document.querySelector('.sand-container');
      const sandGlow = document.querySelector('.sand-glow');
      const patternLabel = document.querySelector('.pattern-label');

      const formBtn = document.getElementById('formBtn');
      const scatterBtn = document.getElementById('scatterBtn');
      const speedInput = document.getElementById('speedControl');
      const densityInput = document.getElementById('densityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let densityMultiplier = 1;
      let isForming = false;
      let isScattering = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let currentPattern = 0;

      // Patterns - array of positions for sand particles
      const patterns = [
        // Pattern 0 - Spiral
        () => {
          const positions = [];
          const centerX = 50;
          const centerY = 50;
          for (let i = 0; i < 60; i++) {
            const angle = i * 0.8;
            const radius = 5 + i * 1.2;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            positions.push({ x: Math.min(Math.max(x, 5), 95), y: Math.min(Math.max(y, 5), 95) });
          }
          return positions;
        },
        // Pattern 1 - Wave
        () => {
          const positions = [];
          for (let i = 0; i < 60; i++) {
            const row = Math.floor(i / 10);
            const col = i % 10;
            const x = 10 + col * 9;
            const y = 10 + row * 11 + Math.sin(col * 0.8 + row * 0.5) * 8;
            positions.push({ x: Math.min(Math.max(x, 5), 95), y: Math.min(Math.max(y, 5), 95) });
          }
          return positions;
        },
        // Pattern 2 - Circle
        () => {
          const positions = [];
          const centerX = 50;
          const centerY = 50;
          const radius = 30;
          for (let i = 0; i < 60; i++) {
            const angle = (i / 60) * Math.PI * 2;
            const x = centerX + Math.cos(angle) * radius + (Math.random() - 0.5) * 4;
            const y = centerY + Math.sin(angle) * radius + (Math.random() - 0.5) * 4;
            positions.push({ x: Math.min(Math.max(x, 5), 95), y: Math.min(Math.max(y, 5), 95) });
          }
          return positions;
        },
        // Pattern 3 - Heart
        () => {
          const positions = [];
          const centerX = 50;
          const centerY = 45;
          for (let i = 0; i < 60; i++) {
            const t = (i / 60) * Math.PI * 2;
            const x = centerX + 20 * Math.sin(t) * Math.sin(t) * Math.sin(t);
            const y = centerY - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            positions.push({ x: Math.min(Math.max(x + 50, 5), 95), y: Math.min(Math.max(y + 55, 5), 95) });
          }
          return positions;
        },
        // Pattern 4 - Star
        () => {
          const positions = [];
          const centerX = 50;
          const centerY = 50;
          for (let i = 0; i < 60; i++) {
            const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
            const outerRadius = 32;
            const innerRadius = 14;
            const radius = i % 2 === 0 ? outerRadius : innerRadius;
            const x = centerX + Math.cos(angle) * radius + (Math.random() - 0.5) * 3;
            const y = centerY + Math.sin(angle) * radius + (Math.random() - 0.5) * 3;
            positions.push({ x: Math.min(Math.max(x, 5), 95), y: Math.min(Math.max(y, 5), 95) });
          }
          return positions;
        }
      ];

      // ----- Apply density -----
      function applyDensity() {
        sandParticles.forEach((p) => {
          const size = 3 * densityMultiplier;
          p.style.setProperty('--sand-size', size + 'px');
          p.style.setProperty('--sand-opacity', Math.min(0.6 * densityMultiplier, 1));
        });
        sandGlow.style.setProperty('--glow-intensity', Math.min(0.15 * densityMultiplier, 0.3));
      }

      // ----- Form pattern -----
      function formPattern() {
        if (isForming || isScattering) return;
        isForming = true;

        // Get pattern positions
        const patternFn = patterns[currentPattern % patterns.length];
        const positions = patternFn();

        // Animate particles to pattern positions
        sandParticles.forEach((p, i) => {
          const pos = positions[i % positions.length];
          const delay = (i * 10) / speedMultiplier;
          const duration = (800 + Math.random() * 400) / speedMultiplier;
          
          p.style.transition = `all ${duration}ms cubic-bezier(0.34, 1.56, 0.64, 1) ${delay}ms`;
          p.style.left = pos.x + '%';
          p.style.top = pos.y + '%';
          p.style.transform = `scale(${0.7 + Math.random() * 0.6}) rotate(${Math.random() * 360}deg)`;
          p.style.opacity = '0.8';
        });

        // Glow
        sandGlow.style.transition = `opacity ${1000 / speedMultiplier}ms ease`;
        sandGlow.style.opacity = '0.6';

        // Label
        patternLabel.textContent = '🌀 Forming...';
        patternLabel.style.opacity = '1';

        formBtn.textContent = '🌀 Forming...';
        setTimeout(() => {
          formBtn.textContent = '🌀 Form Pattern';
          isForming = false;
          const names = ['Spiral', 'Wave', 'Circle', 'Heart', 'Star'];
          patternLabel.textContent = `✦ ${names[currentPattern % names.length]}`;
        }, (1200 / speedMultiplier) + 500);
      }

      // ----- Scatter -----
      function scatterSand() {
        if (isScattering || isForming) return;
        isScattering = true;

        sandParticles.forEach((p, i) => {
          const delay = (i * 8) / speedMultiplier;
          const duration = (600 + Math.random() * 300) / speedMultiplier;
          
          const x = 5 + Math.random() * 90;
          const y = 5 + Math.random() * 90;
          const scale = 0.3 + Math.random() * 0.5;
          const rotation = Math.random() * 720 - 360;
          
          p.style.transition = `all ${duration}ms cubic-bezier(0.5, 0, 0.5, 1) ${delay}ms`;
          p.style.left = x + '%';
          p.style.top = y + '%';
          p.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
          p.style.opacity = '0.3';
        });

        sandGlow.style.transition = `opacity ${800 / speedMultiplier}ms ease`;
        sandGlow.style.opacity = '0.05';

        patternLabel.textContent = '💨 Scattering...';
        patternLabel.style.opacity = '1';

        scatterBtn.textContent = '💨 Scattering...';
        setTimeout(() => {
          scatterBtn.textContent = '💨 Scatter';
          isScattering = false;
          patternLabel.textContent = '⏳ Ready';
          setTimeout(() => {
            patternLabel.style.opacity = '0.3';
          }, 1000 / speedMultiplier);
        }, (1000 / speedMultiplier) + 500);
      }

      // ----- Next pattern -----
      function nextPattern() {
        if (isForming || isScattering) return;
        currentPattern = (currentPattern + 1) % patterns.length;
        formPattern();
      }

      // ----- Reset -----
      function resetSand() {
        if (isForming) {
          isForming = false;
        }
        if (isScattering) {
          isScattering = false;
        }

        sandParticles.forEach((p, i) => {
          const delay = (i * 5) / speedMultiplier;
          p.style.transition = `all ${400 / speedMultiplier}ms ease ${delay}ms`;
          p.style.left = (5 + Math.random() * 90) + '%';
          p.style.top = (5 + Math.random() * 90) + '%';
          p.style.transform = `scale(${0.3 + Math.random() * 0.4}) rotate(${Math.random() * 360}deg)`;
          p.style.opacity = '0.2';
        });

        sandGlow.style.transition = `opacity ${400 / speedMultiplier}ms ease`;
        sandGlow.style.opacity = '0.05';

        patternLabel.textContent = '⏳ Ready';
        patternLabel.style.opacity = '0.3';

        formBtn.textContent = '🌀 Form Pattern';
        scatterBtn.textContent = '💨 Scatter';

        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
      }

      // ----- Update density -----
      function updateDensity(value) {
        densityMultiplier = parseFloat(value);
        applyDensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial scattered positions
        sandParticles.forEach((p, i) => {
          const x = 5 + Math.random() * 90;
          const y = 5 + Math.random() * 90;
          p.style.left = x + '%';
          p.style.top = y + '%';
          p.style.transform = `scale(${0.3 + Math.random() * 0.4}) rotate(${Math.random() * 360}deg)`;
          p.style.opacity = '0.2';
        });

        sandGlow.style.opacity = '0.05';
        patternLabel.style.opacity = '0.3';
        patternLabel.textContent = '⏳ Ready';

        applyDensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-form after 1.5 seconds
        setTimeout(() => {
          formPattern();
        }, 1500);

        // Auto-scatter after 5 seconds
        setTimeout(() => {
          scatterSand();
        }, 5500);
      }

      // ----- Event listeners -----
      formBtn.addEventListener('click', nextPattern);
      scatterBtn.addEventListener('click', scatterSand);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      densityInput.addEventListener('input', function() {
        updateDensity(this.value);
      });
      resetBtn.addEventListener('click', resetSand);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
