<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Badge Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized badge demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Badges</h1>
        <p>Demonstrates badge components with print media query optimization.</p>
        
        <div class="badge-row">
          <span class="ease-badge ease-badge-primary">Primary</span>
          <span class="ease-badge ease-badge-secondary">Secondary</span>
          <span class="ease-badge ease-badge-success">Success</span>
          <span class="ease-badge ease-badge-warning">Warning</span>
          <span class="ease-badge ease-badge-danger">Danger</span>
        </div>
        
        <div class="badge-row">
          <span class="ease-badge ease-badge-outline">Outline</span>
          <span class="ease-badge ease-badge-soft">Soft</span>
          <span class="ease-badge ease-badge-pill">Pill Shape</span>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see badges simplified in print mode.</p>
      </section>
    </main>
  </body>
</html>
