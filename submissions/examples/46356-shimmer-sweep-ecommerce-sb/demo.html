<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimmer Sweep Tooltip - E-Commerce Checkout</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="E-Commerce checkout tooltip demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Shimmer Sweep Tooltip</h1>
        <p>E-Commerce Checkout Layout variant with premium shimmer animation.</p>
        
        <div class="checkout-container">
          <div class="cart-summary">
            <h3>Your Cart</h3>
            <div class="cart-item">
              <div class="item-info">
                <span class="item-name">Premium Headphones</span>
                <span class="item-price">$299.00</span>
              </div>
              <div class="item-actions">
                <button class="ease-qty-btn-sb" data-tooltip="Decrease">
                  <span class="minus-icon"></span>
                </button>
                <span class="qty">1</span>
                <button class="ease-qty-btn-sb" data-tooltip="Increase">
                  <span class="plus-icon"></span>
                </button>
              </div>
            </div>
            
            <div class="cart-item">
              <div class="item-info">
                <span class="item-name">Wireless Charger</span>
                <span class="item-price">$49.00</span>
              </div>
              <div class="item-actions">
                <button class="ease-qty-btn-sb" data-tooltip="Decrease">
                  <span class="minus-icon"></span>
                </button>
                <span class="qty">2</span>
                <button class="ease-qty-btn-sb" data-tooltip="Increase">
                  <span class="plus-icon"></span>
                </button>
              </div>
            </div>
            
            <div class="promo-section">
              <input type="text" class="ease-promo-input-sb" placeholder="Promo code" />
              <button class="ease-apply-btn-sb ease-shimmer-tooltip-ec-sb" data-tooltip="Apply Code">
                Apply
              </button>
            </div>
            
            <div class="totals">
              <div class="total-row">
                <span>Subtotal</span>
                <span>$397.00</span>
              </div>
              <div class="total-row">
                <span>Shipping</span>
                <span class="ease-shimmer-tooltip-ec-sb" data-tooltip="Free shipping on orders over $100">Free</span>
              </div>
              <div class="total-row total-final">
                <span>Total</span>
                <span>$397.00</span>
              </div>
            </div>
          </div>
          
          <div class="checkout-actions">
            <button class="ease-checkout-btn-sb ease-shimmer-tooltip-ec-sb" data-tooltip="Secure checkout">
              <span>Proceed to Checkout</span>
              <span class="arrow-icon"></span>
            </button>
            
            <div class="secure-badges">
              <span class="ease-shimmer-tooltip-ec-sb" data-tooltip="256-bit SSL encryption">
                <span class="badge-icon shield"></span>
              </span>
              <span class="ease-shimmer-tooltip-ec-sb" data-tooltip="Money-back guarantee">
                <span class="badge-icon guarantee"></span>
              </span>
              <span class="ease-shimmer-tooltip-ec-sb" data-tooltip="24/7 Customer support">
                <span class="badge-icon support"></span>
              </span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
