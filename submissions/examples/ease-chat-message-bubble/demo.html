<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Chat Message Bubble</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-box">

    <div class="message incoming">
        <p>Hello! Are we meeting today?</p>
        <span>10:15 AM</span>
    </div>

    <div class="message outgoing">
        <p>Yes! I'll be there in 20 minutes.</p>
        <span>10:16 AM</span>
    </div>

    <div class="message incoming">
        <p>Great! See you soon 😊</p>
        <span>10:17 AM</span>
    </div>

</div>

</body>
</html>
