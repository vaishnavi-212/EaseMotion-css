<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferris Wheel – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🎡 Ferris Wheel</h1>
    <p class="subtitle">Ferris wheel with animated cabins</p>

    <div class="fw-container">
      <div class="fw-scene">
        <!-- Sky -->
        <div class="sky"></div>

        <!-- Clouds -->
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>

        <!-- Ferris Wheel -->
        <div class="ferris-wheel">
          <!-- Support structure -->
          <div class="support support-left"></div>
          <div class="support support-right"></div>
          <div class="support-base"></div>

          <!-- Main wheel -->
          <div class="wheel">
            <!-- Outer rim -->
            <div class="rim rim-outer"></div>
            <div class="rim rim-inner"></div>

            <!-- Spokes -->
            <div class="spoke s1"></div>
            <div class="spoke s2"></div>
            <div class="spoke s3"></div>
            <div class="spoke s4"></div>
            <div class="spoke s5"></div>
            <div class="spoke s6"></div>
            <div class="spoke s7"></div>
            <div class="spoke s8"></div>
            <div class="spoke s9"></div>
            <div class="spoke s10"></div>
            <div class="spoke s11"></div>
            <div class="spoke s12"></div>

            <!-- Hub -->
            <div class="hub">
              <div class="hub-center"></div>
              <div class="hub-glow"></div>
            </div>

            <!-- Cabins -->
            <div class="cabin cabin-1">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-2">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-3">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-4">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-5">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-6">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-7">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-8">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-9">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-10">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-11">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
            <div class="cabin cabin-12">
              <div class="cabin-body">
                <div class="cabin-window"></div>
                <div class="cabin-roof"></div>
              </div>
              <div class="cabin-glow"></div>
            </div>
          </div>

          <!-- Wheel glow -->
          <div class="wheel-glow"></div>
        </div>

        <!-- Ground -->
        <div class="ground"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Rotation Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const wheel = document.querySelector('.wheel');
      const cabins = document.querySelectorAll('.cabin');
      const hubGlow = document.querySelector('.hub-glow');
      const wheelGlow = document.querySelector('.wheel-glow');

      const speedInput = document.getElementById('speedControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Wheel rotation
        wheel.style.setProperty('--wheel-duration', (8 / speedMultiplier) + 's');

        // Cabin swing
        cabins.forEach((cabin, i) => {
          const duration = (2 + i * 0.05) / speedMultiplier;
          cabin.style.setProperty('--cabin-duration', duration + 's');
          cabin.style.setProperty('--cabin-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Hub glow
        hubGlow.style.setProperty('--hub-duration', (2 / speedMultiplier) + 's');

        // Wheel glow
        wheelGlow.style.setProperty('--glow-duration', (3 / speedMultiplier) + 's');
      }

      // ----- Update wheel -----
      function updateWheel(timestamp) {
        if (isPaused) return;

        // Subtle cabin glow pulse
        cabins.forEach((cabin, i) => {
          const pulse = Math.sin(timestamp / 1500 + i * 0.5) * 0.3 + 0.7;
          const glow = cabin.querySelector('.cabin-glow');
          if (glow) {
            glow.style.opacity = 0.1 + pulse * 0.2;
          }
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateWheel(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetWheel() {
        // Reset wheel position by removing and re-adding animation
        wheel.style.animation = 'none';
        void wheel.offsetWidth;
        wheel.style.animation = '';

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetWheel);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
