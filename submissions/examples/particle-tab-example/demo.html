<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Tab Component</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="tabs">

        <button class="tab active">Home</button>
        <button class="tab">Projects</button>
        <button class="tab">About</button>

        <div class="indicator"></div>

    </div>

    <div class="content">

        <div class="panel active">
            <h2>Home</h2>
            <p>Welcome to the home page. This content changes when another tab is selected.</p>
        </div>

        <div class="panel">
            <h2>Projects</h2>
            <p>Explore recent projects, experiments, and open-source contributions.</p>
        </div>

        <div class="panel">
            <h2>About</h2>
            <p>This section contains information about the developer, skills, and experience.</p>
        </div>

    </div>

</div>

<script>
const tabs = document.querySelectorAll(".tab");
const panels = document.querySelectorAll(".panel");
const indicator = document.querySelector(".indicator");
const content = document.querySelector(".content");

function moveIndicator(tab){

    indicator.style.width = tab.offsetWidth + "px";
    indicator.style.left = tab.offsetLeft + "px";

}

moveIndicator(document.querySelector(".tab.active"));

tabs.forEach((tab,index)=>{

    tab.addEventListener("click",()=>{

        document.querySelector(".tab.active").classList.remove("active");
        document.querySelector(".panel.active").classList.remove("active");

        tab.classList.add("active");
        panels[index].classList.add("active");

        moveIndicator(tab);

        /* ---------- Particle Effect ---------- */

        const rect = tab.getBoundingClientRect();
        const parentRect = content.getBoundingClientRect();

        for(let i=0;i<18;i++){

            const particle = document.createElement("span");
            particle.className = "particle";

            particle.style.left =
                (rect.left - parentRect.left + rect.width/2) + "px";

            particle.style.top = "0px";

            particle.style.setProperty(
                "--x",
                (Math.random()*120 - 60) + "px"
            );

            particle.style.setProperty(
                "--y",
                (Math.random()*80 + 20) + "px"
            );

            particle.style.animationDelay =
                (Math.random()*0.1) + "s";

            content.appendChild(particle);

            particle.addEventListener("animationend",()=>{

                particle.remove();

            });

        }

    });

});
</script>

</body>
</html>
