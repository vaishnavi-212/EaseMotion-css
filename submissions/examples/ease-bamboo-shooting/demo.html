<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bamboo Shooting – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🎋 Bamboo Shooting</h1>
    <p class="subtitle">Bamboo growing rapidly with segmented animation</p>

    <div class="bamboo-container">
      <div class="bamboo-scene">
        <!-- Sky background -->
        <div class="sky"></div>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Bamboo plant -->
        <div class="bamboo-plant">
          <!-- Culm (main stem) segments -->
          <div class="segment seg-1">
            <div class="segment-inner"></div>
            <div class="node node-1"></div>
          </div>
          <div class="segment seg-2">
            <div class="segment-inner"></div>
            <div class="node node-2"></div>
          </div>
          <div class="segment seg-3">
            <div class="segment-inner"></div>
            <div class="node node-3"></div>
          </div>
          <div class="segment seg-4">
            <div class="segment-inner"></div>
            <div class="node node-4"></div>
          </div>
          <div class="segment seg-5">
            <div class="segment-inner"></div>
            <div class="node node-5"></div>
          </div>
          <div class="segment seg-6">
            <div class="segment-inner"></div>
            <div class="node node-6"></div>
          </div>
          <div class="segment seg-7">
            <div class="segment-inner"></div>
            <div class="node node-7"></div>
          </div>
          <div class="segment seg-8">
            <div class="segment-inner"></div>
            <div class="node node-8"></div>
          </div>
          <div class="segment seg-9">
            <div class="segment-inner"></div>
            <div class="node node-9"></div>
          </div>
          <div class="segment seg-10">
            <div class="segment-inner"></div>
            <div class="node node-10"></div>
          </div>

          <!-- Leaves -->
          <div class="leaf-group leaf-group-1">
            <div class="leaf leaf-1"></div>
            <div class="leaf leaf-2"></div>
            <div class="leaf leaf-3"></div>
          </div>
          <div class="leaf-group leaf-group-2">
            <div class="leaf leaf-4"></div>
            <div class="leaf leaf-5"></div>
            <div class="leaf leaf-6"></div>
          </div>
          <div class="leaf-group leaf-group-3">
            <div class="leaf leaf-7"></div>
            <div class="leaf leaf-8"></div>
            <div class="leaf leaf-9"></div>
          </div>

          <!-- Bamboo shoots (new growth) -->
          <div class="shoot shoot-1"></div>
          <div class="shoot shoot-2"></div>

          <!-- Growth glow -->
          <div class="growth-glow"></div>
        </div>

        <!-- Floating particles (pollen/dust) -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Growth Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Height
        <input type="range" id="heightControl" min="0.2" max="1.5" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset Growth</button>
    </div>
  </div>

  <script>
    (function() {
      const bambooPlant = document.querySelector('.bamboo-plant');
      const segments = document.querySelectorAll('.segment');
      const nodes = document.querySelectorAll('.node');
      const leafGroups = document.querySelectorAll('.leaf-group');
      const shoots = document.querySelectorAll('.shoot');
      const growthGlow = document.querySelector('.growth-glow');
      const particles = document.querySelectorAll('.particle');

      const speedInput = document.getElementById('speedControl');
      const heightInput = document.getElementById('heightControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let heightMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let progress = 0;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        // Segments grow with staggered timing
        segments.forEach((seg, i) => {
          const baseDelay = i * 0.15;
          const duration = 0.6 / speedMultiplier;
          seg.style.setProperty('--seg-duration', duration + 's');
          seg.style.setProperty('--seg-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Nodes appear with segments
        nodes.forEach((node, i) => {
          const baseDelay = i * 0.15 + 0.1;
          const duration = 0.3 / speedMultiplier;
          node.style.setProperty('--node-duration', duration + 's');
          node.style.setProperty('--node-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Leaves unfurl
        leafGroups.forEach((group, i) => {
          const baseDelay = 1.5 + i * 0.3;
          const duration = 0.8 / speedMultiplier;
          group.style.setProperty('--leaf-duration', duration + 's');
          group.style.setProperty('--leaf-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Shoots emerge
        shoots.forEach((shoot, i) => {
          const baseDelay = 0.3 + i * 0.5;
          const duration = 0.5 / speedMultiplier;
          shoot.style.setProperty('--shoot-duration', duration + 's');
          shoot.style.setProperty('--shoot-delay', (baseDelay / speedMultiplier) + 's');
        });

        // Particles
        particles.forEach((p, i) => {
          const duration = (4 + i * 0.8) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
        });

        // Growth glow
        growthGlow.style.setProperty('--glow-duration', (2 / speedMultiplier) + 's');
      }

      // ----- Apply height -----
      function applyHeight() {
        // Scale the entire bamboo plant
        bambooPlant.style.setProperty('--bamboo-height', heightMultiplier);

        // Adjust segment heights
        segments.forEach((seg, i) => {
          const baseHeight = 8 + (i % 3) * 2;
          const height = baseHeight * heightMultiplier;
          seg.style.setProperty('--seg-height', height + '%');
        });

        // Adjust leaf positions
        leafGroups.forEach((group, i) => {
          const basePos = 20 + i * 25;
          const pos = basePos * heightMultiplier;
          group.style.setProperty('--leaf-pos', pos + '%');
        });
      }

      // ----- Update growth progress -----
      function updateGrowth(deltaTime) {
        if (isPaused) return;

        const speed = 0.02 * speedMultiplier;
        progress += deltaTime * speed * 0.5;

        if (progress > 1) {
          progress = 1;
        }

        // Apply growth to each segment via transform scaleY
        segments.forEach((seg, i) => {
          const segProgress = Math.max(0, Math.min(1, (progress - i * 0.12) * 3));
          const scale = segProgress;
          seg.style.setProperty('--seg-scale', scale);
          seg.style.transform = `scaleY(${scale})`;
          seg.style.opacity = scale > 0.05 ? 1 : 0;
        });

        // Nodes visibility
        nodes.forEach((node, i) => {
          const nodeProgress = Math.max(0, Math.min(1, (progress - i * 0.12 - 0.05) * 3));
          node.style.opacity = nodeProgress > 0.3 ? 1 : 0;
          node.style.transform = `scale(${nodeProgress})`;
        });

        // Leaves
        leafGroups.forEach((group, i) => {
          const leafProgress = Math.max(0, Math.min(1, (progress - 0.4 - i * 0.08) * 2.5));
          group.style.opacity = leafProgress;
          group.style.transform = `scale(${0.2 + leafProgress * 0.8})`;
        });

        // Shoots
        shoots.forEach((shoot, i) => {
          const shootProgress = Math.max(0, Math.min(1, (progress - 0.1 - i * 0.15) * 4));
          shoot.style.opacity = shootProgress;
          shoot.style.transform = `scaleY(${shootProgress})`;
        });

        // Growth glow intensity
        const glowIntensity = 0.2 + progress * 0.4;
        growthGlow.style.opacity = glowIntensity;

        // Particles appear as growth progresses
        particles.forEach((p, i) => {
          const pProgress = Math.max(0, Math.min(1, (progress - 0.2) * 1.5));
          p.style.opacity = pProgress * 0.3;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGrowth(deltaTime);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetGrowth() {
        progress = 0;
        segments.forEach(seg => {
          seg.style.transform = 'scaleY(0)';
          seg.style.opacity = '0';
        });
        nodes.forEach(node => {
          node.style.opacity = '0';
          node.style.transform = 'scale(0)';
        });
        leafGroups.forEach(group => {
          group.style.opacity = '0';
          group.style.transform = 'scale(0)';
        });
        shoots.forEach(shoot => {
          shoot.style.opacity = '0';
          shoot.style.transform = 'scaleY(0)';
        });
        growthGlow.style.opacity = '0.1';
        particles.forEach(p => p.style.opacity = '0');

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        // Start growing again after a moment
        setTimeout(() => {
          progress = 0.01;
        }, 300);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update height -----
      function updateHeight(value) {
        heightMultiplier = parseFloat(value);
        applyHeight();
      }

      // ----- Init -----
      function init() {
        // Set initial state (fully grown)
        progress = 0;

        // Hide everything initially
        segments.forEach(seg => {
          seg.style.transform = 'scaleY(0)';
          seg.style.opacity = '0';
        });
        nodes.forEach(node => {
          node.style.opacity = '0';
          node.style.transform = 'scale(0)';
        });
        leafGroups.forEach(group => {
          group.style.opacity = '0';
          group.style.transform = 'scale(0)';
        });
        shoots.forEach(shoot => {
          shoot.style.opacity = '0';
          shoot.style.transform = 'scaleY(0)';
        });
        particles.forEach(p => p.style.opacity = '0');
        growthGlow.style.opacity = '0.1';

        applySpeed();
        applyHeight();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start growth after a short delay
        setTimeout(() => {
          progress = 0.01;
        }, 500);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      heightInput.addEventListener('input', function() {
        updateHeight(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetGrowth);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
