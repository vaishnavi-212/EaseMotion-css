<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-Out Popover - Creative Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Meet the Designer
        </button>

        <div class="popover" tabindex="0">

            <div class="profile">

                <img src="https://picsum.photos/100" alt="Designer">

                <div>
                    <h2>Olivia Carter</h2>
                    <p>Creative UI/UX Designer</p>
                </div>

            </div>

            <div class="projects">

                <div class="project">
                    <h3>Branding</h3>
                    <span>20 Projects</span>
                </div>

                <div class="project">
                    <h3>Illustration</h3>
                    <span>15 Projects</span>
                </div>

                <div class="project">
                    <h3>Web Design</h3>
                    <span>30 Projects</span>
                </div>

            </div>

            <button class="action">
                View Portfolio
            </button>

        </div>

    </div>

</div>

</body>
</html>
