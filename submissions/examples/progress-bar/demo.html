<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Progress Bar</h1>
    <p class="subtitle">Animated progress bars with multiple variants</p>

    <!-- Default Progress Bar -->
    <div class="variant">
      <h3>Default</h3>
      <div class="progress-bar" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 75%;"></div>
      </div>
    </div>

    <!-- With Label -->
    <div class="variant">
      <h3>With Label</h3>
      <div class="progress-bar progress-bar--labeled" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 60%;">
          <span class="progress-bar__label">60%</span>
        </div>
      </div>
    </div>

    <!-- Striped -->
    <div class="variant">
      <h3>Striped</h3>
      <div class="progress-bar progress-bar--striped" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 45%;"></div>
      </div>
    </div>

    <!-- Animated Striped -->
    <div class="variant">
      <h3>Animated Striped</h3>
      <div class="progress-bar progress-bar--striped progress-bar--animated" role="progressbar" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 80%;"></div>
      </div>
    </div>

    <!-- Gradient -->
    <div class="variant">
      <h3>Gradient</h3>
      <div class="progress-bar progress-bar--gradient" role="progressbar" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 65%;"></div>
      </div>
    </div>

    <!-- Success / Warning / Error -->
    <div class="variant">
      <h3>Contextual Colors</h3>
      <div class="progress-bar progress-bar--success" role="progressbar" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 90%;"></div>
      </div>
      <div class="progress-bar progress-bar--warning" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 50%;"></div>
      </div>
      <div class="progress-bar progress-bar--error" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 25%;"></div>
      </div>
    </div>

    <!-- Thin -->
    <div class="variant">
      <h3>Thin</h3>
      <div class="progress-bar progress-bar--thin" role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 70%;"></div>
      </div>
    </div>

    <!-- Thick -->
    <div class="variant">
      <h3>Thick</h3>
      <div class="progress-bar progress-bar--thick" role="progressbar" aria-valuenow="55" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 55%;">
          <span class="progress-bar__label">55%</span>
        </div>
      </div>
    </div>

    <!-- Circular / Radial -->
    <div class="variant">
      <h3>Circular</h3>
      <div class="progress-circle" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="--progress: 75;">
        <svg class="progress-circle__svg" viewBox="0 0 120 120">
          <circle class="progress-circle__bg" cx="60" cy="60" r="54"></circle>
          <circle class="progress-circle__fill" cx="60" cy="60" r="54"></circle>
        </svg>
        <span class="progress-circle__label">75%</span>
      </div>
    </div>

    <!-- Indeterminate -->
    <div class="variant">
      <h3>Indeterminate</h3>
      <div class="progress-bar progress-bar--indeterminate" role="progressbar">
        <div class="progress-bar__fill"></div>
      </div>
    </div>

    <!-- Multi-step -->
    <div class="variant">
      <h3>Multi-step</h3>
      <div class="progress-steps">
        <div class="progress-step progress-step--complete">
          <div class="progress-step__indicator">1</div>
          <span class="progress-step__label">Cart</span>
        </div>
        <div class="progress-step__line progress-step__line--complete"></div>
        <div class="progress-step progress-step--complete">
          <div class="progress-step__indicator">2</div>
          <span class="progress-step__label">Shipping</span>
        </div>
        <div class="progress-step__line"></div>
        <div class="progress-step progress-step--active">
          <div class="progress-step__indicator">3</div>
          <span class="progress-step__label">Payment</span>
        </div>
        <div class="progress-step__line"></div>
        <div class="progress-step">
          <div class="progress-step__indicator">4</div>
          <span class="progress-step__label">Review</span>
        </div>
      </div>
    </div>

    <!-- Dark Theme -->
    <div class="variant variant--dark">
      <h3>Dark Theme</h3>
      <div class="progress-bar progress-bar--dark" role="progressbar" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 85%;"></div>
      </div>
      <div class="progress-bar progress-bar--dark progress-bar--striped progress-bar--animated" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" style="--progress: 40%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
