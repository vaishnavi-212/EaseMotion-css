<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            View Product Details
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    📦
                </div>

                <div>
                    <h2>Premium Headphones</h2>
                    <p>Wireless • Noise Cancelling</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Price</h3>
                    <span>$199</span>
                </div>

                <div class="card">
                    <h3>Rating</h3>
                    <span>4.9 ★</span>
                </div>

                <div class="card">
                    <h3>Stock</h3>
                    <span>Available</span>
                </div>

            </div>

            <button class="action">
                Add to Cart
            </button>

        </div>

    </div>

</div>

</body>
</html>
