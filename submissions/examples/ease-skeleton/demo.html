<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 16px;
      font-family: Consolas, Monaco, monospace;
    }

    .label {
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .section {
      width: 100%;
      max-width: 480px;
    }

    /* Profile card skeleton */
    .profile-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Article skeleton */
    .article-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .article-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>
<body>

  <!-- Profile Card Skeleton -->
  <div class="section">
    <div class="label">Profile Card</div>
    <div class="profile-card">
      <div class="profile-top">
        <!-- Avatar -->
        <span class="ease-skeleton ease-skeleton--circle"></span>
        <div class="profile-info">
          <!-- Name -->
          <span class="ease-skeleton ease-skeleton--rounded"
                style="--ease-width: 60%; --ease-height: 14px;"></span>
          <!-- Handle -->
          <span class="ease-skeleton ease-skeleton--rounded"
                style="--ease-width: 40%; --ease-height: 11px;"></span>
        </div>
      </div>
      <!-- Bio lines -->
      <span class="ease-skeleton" style="--ease-height: 12px;"></span>
      <span class="ease-skeleton" style="--ease-width: 85%; --ease-height: 12px;"></span>
      <span class="ease-skeleton" style="--ease-width: 65%; --ease-height: 12px;"></span>
      <!-- Button -->
      <span class="ease-skeleton ease-skeleton--rounded"
            style="--ease-width: 120px; --ease-height: 34px;"></span>
    </div>
  </div>

  <!-- Article Card Skeleton -->
  <div class="section">
    <div class="label">Article Card</div>
    <div class="article-card">
      <!-- Thumbnail -->
      <span class="ease-skeleton ease-skeleton--rect"
            style="--ease-width: 100%; --ease-height: 160px;"></span>
      <div class="article-body">
        <!-- Tag -->
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 80px; --ease-height: 20px;"></span>
        <!-- Title -->
        <span class="ease-skeleton" style="--ease-height: 18px;"></span>
        <span class="ease-skeleton" style="--ease-width: 75%; --ease-height: 18px;"></span>
        <!-- Meta -->
        <span class="ease-skeleton" style="--ease-width: 50%; --ease-height: 11px;"></span>
      </div>
    </div>
  </div>

  <!-- Stats Skeleton -->
  <div class="section">
    <div class="label">Stats Row</div>
    <div class="stats-row">
      <div class="stat-card">
        <span class="ease-skeleton ease-skeleton--circle"
              style="--ease-width: 36px; --ease-height: 36px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 80%; --ease-height: 20px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 60%; --ease-height: 11px;"></span>
      </div>
      <div class="stat-card">
        <span class="ease-skeleton ease-skeleton--circle"
              style="--ease-width: 36px; --ease-height: 36px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 80%; --ease-height: 20px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 60%; --ease-height: 11px;"></span>
      </div>
      <div class="stat-card">
        <span class="ease-skeleton ease-skeleton--circle"
              style="--ease-width: 36px; --ease-height: 36px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 80%; --ease-height: 20px;"></span>
        <span class="ease-skeleton ease-skeleton--rounded"
              style="--ease-width: 60%; --ease-height: 11px;"></span>
      </div>
    </div>
  </div>

</body>
</html>
