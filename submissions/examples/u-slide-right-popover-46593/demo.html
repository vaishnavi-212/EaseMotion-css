<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Neumorphic Soft UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Workspace
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    ☁️
                </div>

                <div>
                    <h2>Soft Workspace</h2>
                    <p>Minimal Neumorphic Interface</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Notes</h3>
                    <span>32</span>
                </div>

                <div class="card">
                    <h3>Projects</h3>
                    <span>18</span>
                </div>

                <div class="card">
                    <h3>Tasks</h3>
                    <span>94</span>
                </div>

            </div>

            <button class="action">
                Continue
            </button>

        </div>

    </div>

</div>

</body>
</html>
