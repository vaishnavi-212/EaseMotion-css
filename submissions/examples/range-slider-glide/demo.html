<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Range Slider Glide</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="slider-stage" aria-label="Range slider glide animation demo">
      <section class="slider-card">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="100" value="68" />
        <p>Hover or focus the control to lift the thumb.</p>
      </section>
    </main>
  </body>
</html>
