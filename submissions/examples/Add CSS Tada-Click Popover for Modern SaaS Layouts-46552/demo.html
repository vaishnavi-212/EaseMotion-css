<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Popover for Modern SaaS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="saas-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="tada-popover-content">
        New Integration
      </button>
      
      <div id="tada-popover-content" class="ease-tada-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <h3 id="popover-title">
            <div class="icon-wrapper">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            </div>
            Success
          </h3>
          <p>Your Slack integration has been successfully connected to your workspace.</p>
          <div class="popover-actions">
            <button class="btn-secondary">Dismiss</button>
            <button class="btn-primary">View Settings</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
