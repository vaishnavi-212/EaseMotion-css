<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phoenix Feather – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🪶 Phoenix Feather</h1>
    <p class="subtitle">Glowing feather floating down</p>

    <div class="pf-container">
      <div class="pf-scene">
        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>

        <!-- Phoenix Feather -->
        <div class="feather-container">
          <div class="feather">
            <!-- Feather shaft (rachis) -->
            <div class="shaft"></div>

            <!-- Feather barbs (left side) -->
            <div class="barb barb-l1"></div>
            <div class="barb barb-l2"></div>
            <div class="barb barb-l3"></div>
            <div class="barb barb-l4"></div>
            <div class="barb barb-l5"></div>
            <div class="barb barb-l6"></div>
            <div class="barb barb-l7"></div>
            <div class="barb barb-l8"></div>
            <div class="barb barb-l9"></div>
            <div class="barb barb-l10"></div>
            <div class="barb barb-l11"></div>
            <div class="barb barb-l12"></div>

            <!-- Feather barbs (right side) -->
            <div class="barb barb-r1"></div>
            <div class="barb barb-r2"></div>
            <div class="barb barb-r3"></div>
            <div class="barb barb-r4"></div>
            <div class="barb barb-r5"></div>
            <div class="barb barb-r6"></div>
            <div class="barb barb-r7"></div>
            <div class="barb barb-r8"></div>
            <div class="barb barb-r9"></div>
            <div class="barb barb-r10"></div>
            <div class="barb barb-r11"></div>
            <div class="barb barb-r12"></div>

            <!-- Feather tip glow -->
            <div class="tip-glow"></div>

            <!-- Feather aura -->
            <div class="feather-aura"></div>

            <!-- Ember particles -->
            <div class="ember ember-1"></div>
            <div class="ember ember-2"></div>
            <div class="ember ember-3"></div>
            <div class="ember ember-4"></div>
            <div class="ember ember-5"></div>
            <div class="ember ember-6"></div>
            <div class="ember ember-7"></div>
            <div class="ember ember-8"></div>
            <div class="ember ember-9"></div>
            <div class="ember ember-10"></div>
            <div class="ember ember-11"></div>
            <div class="ember ember-12"></div>
            <div class="ember ember-13"></div>
            <div class="ember ember-14"></div>
            <div class="ember ember-15"></div>
            <div class="ember ember-16"></div>
            <div class="ember ember-17"></div>
            <div class="ember ember-18"></div>
            <div class="ember ember-19"></div>
            <div class="ember ember-20"></div>
          </div>
        </div>

        <!-- Glow overlay -->
        <div class="glow-overlay"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Float Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const feather = document.querySelector('.feather');
      const shaft = document.querySelector('.shaft');
      const barbs = document.querySelectorAll('.barb');
      const tipGlow = document.querySelector('.tip-glow');
      const featherAura = document.querySelector('.feather-aura');
      const embers = document.querySelectorAll('.ember');
      const glowOverlay = document.querySelector('.glow-overlay');
      const featherContainer = document.querySelector('.feather-container');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;
      let floatPhase = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Feather float
        feather.style.setProperty('--float-duration', (6 / speedMultiplier) + 's');

        // Feather sway
        feather.style.setProperty('--sway-duration', (4 / speedMultiplier) + 's');

        // Shaft glow pulse
        shaft.style.setProperty('--shaft-duration', (1.5 / speedMultiplier) + 's');

        // Barbs
        barbs.forEach((barb, i) => {
          const duration = (1.2 + (i % 5) * 0.1) / speedMultiplier;
          barb.style.setProperty('--barb-duration', duration + 's');
          barb.style.setProperty('--barb-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Tip glow
        tipGlow.style.setProperty('--tip-duration', (1.8 / speedMultiplier) + 's');

        // Feather aura
        featherAura.style.setProperty('--aura-duration', (3 / speedMultiplier) + 's');

        // Embers
        embers.forEach((ember, i) => {
          const duration = (2.5 + (i % 4) * 0.3) / speedMultiplier;
          ember.style.setProperty('--ember-duration', duration + 's');
          ember.style.setProperty('--ember-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Glow overlay
        glowOverlay.style.setProperty('--overlay-duration', (4 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Feather aura
        const auraOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        featherAura.style.setProperty('--aura-opacity', auraOpacity);
        const auraSize = 200 * intensityMultiplier;
        featherAura.style.setProperty('--aura-size', auraSize + 'px');

        // Tip glow
        const tipOpacity = Math.min(0.4 * intensityMultiplier, 0.8);
        tipGlow.style.setProperty('--tip-opacity', tipOpacity);
        const tipSize = 60 * intensityMultiplier;
        tipGlow.style.setProperty('--tip-size', tipSize + 'px');

        // Shaft glow
        shaft.style.setProperty('--shaft-glow', Math.min(0.3 * intensityMultiplier, 0.6));

        // Embers
        embers.forEach((ember) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          ember.style.setProperty('--ember-opacity', opacity);
          const size = 2 * intensityMultiplier;
          ember.style.setProperty('--ember-size', size + 'px');
        });

        // Glow overlay
        const overlayOpacity = Math.min(0.05 * intensityMultiplier, 0.1);
        glowOverlay.style.setProperty('--overlay-opacity', overlayOpacity);
      }

      // ----- Update feather -----
      function updateFeather(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        const speed = 0.005 * speedMultiplier;
        floatPhase += speed;

        if (floatPhase > 1) {
          floatPhase = 0;
        }

        // Subtle feather rotation
        const rotation = Math.sin(floatPhase * Math.PI * 2) * 3;
        feather.style.setProperty('--float-rotation', rotation + 'deg');

        // Ember positions
        embers.forEach((ember, i) => {
          const offset = i * 0.05;
          const x = Math.sin((floatPhase + offset) * Math.PI * 2 + i) * 30;
          const y = Math.cos((floatPhase + offset) * Math.PI * 2 * 0.7 + i * 0.5) * 20 - 20;
          ember.style.setProperty('--ember-x', x + 'px');
          ember.style.setProperty('--ember-y', y + 'px');
        });

        // Tip glow pulse
        const pulse = Math.sin(timestamp / 1500) * 0.15 + 0.85;
        tipGlow.style.transform = `translate(-50%, -50%) scale(${pulse})`;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateFeather(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Reset -----
      function resetFeather() {
        floatPhase = 0;
        feather.style.setProperty('--float-rotation', '0deg');
        embers.forEach(ember => {
          ember.style.setProperty('--ember-x', '0px');
          ember.style.setProperty('--ember-y', '0px');
        });
        tipGlow.style.transform = 'translate(-50%, -50%) scale(1)';
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetFeather);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
