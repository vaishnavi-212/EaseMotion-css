<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-Out Popover - Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Dashboard Summary
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">📈</div>

                <div>
                    <h2>Analytics Overview</h2>
                    <p>Updated just now</p>
                </div>

            </div>

            <div class="metrics">

                <div class="metric">
                    <h3>Revenue</h3>
                    <span>$84.2K</span>
                </div>

                <div class="metric">
                    <h3>Visitors</h3>
                    <span>42.8K</span>
                </div>

                <div class="metric">
                    <h3>Conversion</h3>
                    <span>7.4%</span>
                </div>

            </div>

            <button class="action">
                Open Dashboard
            </button>

        </div>

    </div>

</div>

</body>
</html>
