<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rating Star Spark</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="rating-stage" aria-label="Rating star spark animation demo">
      <section class="rating-card">
        <h1>Rate the update</h1>
        <div class="stars" aria-label="Five star rating">
          <button type="button">★</button>
          <button type="button">★</button>
          <button type="button" class="active">★</button>
          <button type="button">★</button>
          <button type="button">★</button>
        </div>
        <p>Hover or focus a star to see the spark motion.</p>
      </section>
    </main>
  </body>
</html>
