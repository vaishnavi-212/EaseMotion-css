<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Progress Indicator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Progress indicator demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Animated Progress Indicator</h1>
        <p>Smooth animated progress bars for loading states and task completion.</p>
        
        <div class="demo-section">
          <h3>Basic Progress Bars</h3>
          <div class="progress-demo">
            <div class="ease-progress-sb">
              <div class="ease-progress-bar-sb" style="width: 25%"></div>
            </div>
            <div class="ease-progress-sb">
              <div class="ease-progress-bar-sb" style="width: 50%"></div>
            </div>
            <div class="ease-progress-sb">
              <div class="ease-progress-bar-sb" style="width: 75%"></div>
            </div>
            <div class="ease-progress-sb">
              <div class="ease-progress-bar-sb" style="width: 100%"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Animated Striped</h3>
          <div class="progress-demo">
            <div class="ease-progress-striped-sb">
              <div class="ease-progress-bar-sb" style="width: 60%"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Animated Gradient</h3>
          <div class="progress-demo">
            <div class="ease-progress-gradient-sb">
              <div class="ease-progress-bar-sb" style="width: 45%"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>With Labels</h3>
          <div class="progress-demo labeled">
            <div class="ease-progress-labeled-sb">
              <div class="progress-header">
                <span>Uploading Files</span>
                <span>75%</span>
              </div>
              <div class="ease-progress-sb">
                <div class="ease-progress-bar-sb" style="width: 75%"></div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Success State</h3>
          <div class="progress-demo">
            <div class="ease-progress-success-sb">
              <div class="ease-progress-bar-sb" style="width: 100%"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Multiple Colors</h3>
          <div class="progress-demo">
            <div class="ease-progress-primary-sb">
              <div class="ease-progress-bar-sb" style="width: 30%"></div>
            </div>
            <div class="ease-progress-warning-sb">
              <div class="ease-progress-bar-sb" style="width: 50%"></div>
            </div>
            <div class="ease-progress-danger-sb">
              <div class="ease-progress-bar-sb" style="width: 70%"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
