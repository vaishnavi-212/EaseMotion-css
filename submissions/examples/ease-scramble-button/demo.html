<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramble Button · Text Scramble Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔀 Scramble Button</h2>
        <p class="sub">text scrambles and unscrambles on hover</p>

        <!-- === SCRAMBLE BUTTON === -->
        <button class="scramble-btn" id="scrambleButton">
            <span class="scramble-text" data-text="Scramble">Scramble</span>
            <span class="scramble-icon"><i class="fas fa-random"></i></span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the text scramble and reveal itself
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('scrambleButton');
            const textElement = button.querySelector('.scramble-text');
            const originalText = textElement.dataset.text || 'Scramble';

            // Character sets for scrambling
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/';

            function getRandomChar() {
                return chars[Math.floor(Math.random() * chars.length)];
            }

            function scrambleText(target, duration = 800) {
                const original = target.dataset.text || target.textContent;
                const length = original.length;
                let startTime = Date.now();
                let frameId = null;

                // Store original for unscramble
                target.dataset.original = original;

                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    // Ease out
                    const ease = 1 - Math.pow(1 - progress, 3);

                    // Calculate how many characters to reveal
                    const revealCount = Math.floor(ease * length);
                    const scrambleCount = length - revealCount;

                    let result = '';

                    for (let i = 0; i < length; i++) {
                        if (i < revealCount) {
                            result += original[i];
                        } else {
                            result += getRandomChar();
                        }
                    }

                    target.textContent = result;

                    if (progress < 1) {
                        frameId = requestAnimationFrame(animate);
                    } else {
                        target.textContent = original;
                        target.classList.add('unscrambled');
                        setTimeout(() => {
                            target.classList.remove('unscrambled');
                        }, 500);
                    }
                }

                // Cancel any existing animation
                if (frameId) cancelAnimationFrame(frameId);

                animate();
            }

            function unscrambleText(target, duration = 600) {
                const original = target.dataset.original || target.dataset.text || target.textContent;
                const currentText = target.textContent;
                const length = original.length;
                let startTime = Date.now();
                let frameId = null;

                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    // Ease in-out
                    const ease = progress < 0.5 
                        ? 2 * progress * progress 
                        : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                    const revealCount = Math.floor(ease * length);

                    let result = '';
                    for (let i = 0; i < length; i++) {
                        if (i < revealCount) {
                            result += original[i];
                        } else {
                            result += getRandomChar();
                        }
                    }

                    target.textContent = result;

                    if (progress < 1) {
                        frameId = requestAnimationFrame(animate);
                    } else {
                        target.textContent = original;
                        target.classList.add('unscrambled');
                        setTimeout(() => {
                            target.classList.remove('unscrambled');
                        }, 300);
                    }
                }

                if (frameId) cancelAnimationFrame(frameId);
                animate();
            }

            // --- Event Listeners ---
            let isScrambled = false;

            button.addEventListener('mouseenter', function() {
                if (!isScrambled) {
                    scrambleText(textElement, 800);
                    isScrambled = true;
                    this.classList.add('scrambling');
                }
            });

            button.addEventListener('mouseleave', function() {
                if (isScrambled) {
                    unscrambleText(textElement, 600);
                    isScrambled = false;
                    this.classList.remove('scrambling');
                }
            });

            // Click feedback
            button.addEventListener('click', function(e) {
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);

                // Quick scramble on click
                if (!isScrambled) {
                    scrambleText(textElement, 400);
                    isScrambled = true;
                    this.classList.add('scrambling');
                    
                    setTimeout(() => {
                        unscrambleText(textElement, 400);
                        isScrambled = false;
                        this.classList.remove('scrambling');
                    }, 600);
                }

                console.log('🔀 Scramble triggered!');
            });

            // Trigger initial scramble on load for demo
            setTimeout(() => {
                scrambleText(textElement, 1000);
                isScrambled = true;
                button.classList.add('scrambling');
                
                setTimeout(() => {
                    unscrambleText(textElement, 800);
                    isScrambled = false;
                    button.classList.remove('scrambling');
                }, 1200);
            }, 500);

        })();
    </script>

</body>
</html>
