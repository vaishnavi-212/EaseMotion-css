<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St Elmo's Fire – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>⚡ St Elmo's Fire</h1>
    <p class="subtitle">Electrical discharge on ship masts</p>

    <div class="storm-container">
      <div class="storm-scene">
        <!-- Ship mast -->
        <div class="mast">
          <!-- Mast pole -->
          <div class="mast-pole"></div>

          <!-- Cross spar -->
          <div class="cross-spar"></div>

          <!-- St Elmo's Fire electrical discharges -->
          <div class="discharge discharge-1"></div>
          <div class="discharge discharge-2"></div>
          <div class="discharge discharge-3"></div>
          <div class="discharge discharge-4"></div>
          <div class="discharge discharge-5"></div>
          <div class="discharge discharge-6"></div>
          <div class="discharge discharge-7"></div>
          <div class="discharge discharge-8"></div>

          <!-- Glow corona -->
          <div class="corona corona-1"></div>
          <div class="corona corona-2"></div>
          <div class="corona corona-3"></div>
          <div class="corona corona-4"></div>

          <!-- Main glow halo -->
          <div class="halo"></div>

          <!-- Spark particles -->
          <div class="spark spark-1"></div>
          <div class="spark spark-2"></div>
          <div class="spark spark-3"></div>
          <div class="spark spark-4"></div>
          <div class="spark spark-5"></div>
          <div class="spark spark-6"></div>
          <div class="spark spark-7"></div>
          <div class="spark spark-8"></div>
          <div class="spark spark-9"></div>
          <div class="spark spark-10"></div>
          <div class="spark spark-11"></div>
          <div class="spark spark-12"></div>
        </div>

        <!-- Storm clouds background -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>

        <!-- Rain streaks -->
        <div class="rain rain-1"></div>
        <div class="rain rain-2"></div>
        <div class="rain rain-3"></div>
        <div class="rain rain-4"></div>
        <div class="rain rain-5"></div>
        <div class="rain rain-6"></div>
        <div class="rain rain-7"></div>
        <div class="rain rain-8"></div>

        <!-- Lightning flash overlay -->
        <div class="lightning-flash"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Discharge Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset Storm</button>
    </div>
  </div>

  <script>
    (function() {
      const mast = document.querySelector('.mast');
      const discharges = document.querySelectorAll('.discharge');
      const coronas = document.querySelectorAll('.corona');
      const halo = document.querySelector('.halo');
      const sparks = document.querySelectorAll('.spark');
      const clouds = document.querySelectorAll('.cloud');
      const rain = document.querySelectorAll('.rain');
      const flash = document.querySelector('.lightning-flash');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;
      let flashTimeout = null;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        const baseFlicker = 0.3 / speedMultiplier;
        const baseSway = 1.5 / speedMultiplier;
        const baseSpark = 1.2 / speedMultiplier;
        const baseCorona = 0.8 / speedMultiplier;
        const baseRain = 0.6 / speedMultiplier;
        const baseCloud = 15 / speedMultiplier;

        // Discharges - each with different timing
        discharges.forEach((d, i) => {
          const duration = (0.15 + i * 0.04) / speedMultiplier;
          d.style.setProperty('--discharge-duration', Math.max(duration, 0.05) + 's');
        });

        // Coronas
        coronas.forEach((c, i) => {
          const duration = (baseCorona + i * 0.15) / speedMultiplier;
          c.style.setProperty('--corona-duration', duration + 's');
        });

        // Halo
        halo.style.setProperty('--halo-duration', (1.2 / speedMultiplier) + 's');

        // Sparks
        sparks.forEach((s, i) => {
          const duration = (baseSpark + i * 0.12) / speedMultiplier;
          s.style.setProperty('--spark-duration', duration + 's');
        });

        // Rain
        rain.forEach((r, i) => {
          const duration = (baseRain + i * 0.05) / speedMultiplier;
          r.style.setProperty('--rain-duration', duration + 's');
        });

        // Clouds
        clouds.forEach((c, i) => {
          const duration = (baseCloud + i * 3) / speedMultiplier;
          c.style.setProperty('--cloud-duration', duration + 's');
        });

        // Mast sway
        mast.style.setProperty('--mast-sway-duration', (2.5 / speedMultiplier) + 's');

        // Lightning flash interval
        const flashInterval = (3 + Math.random() * 2) / speedMultiplier;
        mast.style.setProperty('--flash-interval', flashInterval + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        const glowIntensity = Math.min(0.7 * intensityMultiplier, 1.8);

        // Halo glow
        halo.style.opacity = glowIntensity;
        halo.style.setProperty('--halo-intensity', intensityMultiplier);

        // Coronas
        coronas.forEach((c) => {
          c.style.opacity = Math.min(0.5 * intensityMultiplier, 1);
          c.style.transform = `scale(${0.7 + intensityMultiplier * 0.3})`;
        });

        // Discharge brightness
        discharges.forEach((d) => {
          const bright = Math.min(80 * intensityMultiplier, 180);
          d.style.setProperty('--discharge-brightness', bright + '%');
          d.style.opacity = Math.min(0.6 * intensityMultiplier, 1.2);
        });

        // Sparks
        sparks.forEach((s) => {
          const scale = 0.5 + intensityMultiplier * 0.5;
          s.style.transform = `scale(${scale})`;
          s.style.opacity = Math.min(0.3 * intensityMultiplier, 0.9);
        });

        // Flash intensity
        flash.style.setProperty('--flash-intensity', intensityMultiplier);

        // Rain opacity
        rain.forEach((r) => {
          r.style.opacity = Math.min(0.15 * intensityMultiplier, 0.4);
        });
      }

      // ----- Random lightning flash -----
      function triggerLightning() {
        if (flash) {
          flash.classList.remove('flash');
          void flash.offsetWidth;
          flash.classList.add('flash');

          // Random duration for this flash
          const duration = 0.05 + Math.random() * 0.1;
          flash.style.animationDuration = duration + 's';
        }

        // Schedule next flash with random interval
        const minInterval = 2 / speedMultiplier;
        const maxInterval = 6 / speedMultiplier;
        const nextInterval = minInterval + Math.random() * (maxInterval - minInterval);

        if (flashTimeout) clearTimeout(flashTimeout);
        flashTimeout = setTimeout(triggerLightning, nextInterval * 1000);
      }

      // ----- Additional glow pulse via JS -----
      function animateGlow(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle halo pulse
        const pulse = Math.sin(timestamp / 900) * 0.08 + 0.92;
        const baseOpacity = parseFloat(halo.style.opacity) || 0.7;
        const targetOpacity = Math.min(0.6 * intensityMultiplier * pulse * 1.1, 1.8);
        halo.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;

        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Update functions -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
        // Reschedule lightning with new timing
        if (flashTimeout) {
          clearTimeout(flashTimeout);
          const minInterval = 2 / speedMultiplier;
          const maxInterval = 6 / speedMultiplier;
          const nextInterval = minInterval + Math.random() * (maxInterval - minInterval);
          flashTimeout = setTimeout(triggerLightning, nextInterval * 1000);
        }
      }

      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Reset animation -----
      function resetStorm() {
        const animElements = [
          mast,
          ...discharges,
          ...coronas,
          halo,
          ...sparks,
          ...clouds,
          ...rain,
          flash
        ];

        animElements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });

        // Reset lightning
        if (flashTimeout) clearTimeout(flashTimeout);
        flash.classList.remove('flash');
        void flash.offsetWidth;
        const minInterval = 2 / speedMultiplier;
        const maxInterval = 6 / speedMultiplier;
        const nextInterval = minInterval + Math.random() * (maxInterval - minInterval);
        flashTimeout = setTimeout(triggerLightning, nextInterval * 1000);
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        mast.classList.add('animate');
        discharges.forEach(d => d.classList.add('animate'));
        coronas.forEach(c => c.classList.add('animate'));
        halo.classList.add('animate');
        sparks.forEach(s => s.classList.add('animate'));
        clouds.forEach(c => c.classList.add('animate'));
        rain.forEach(r => r.classList.add('animate'));
        flash.classList.add('animate');

        // Apply initial values
        updateSpeed(speedInput.value);
        updateIntensity(intensityInput.value);

        // Start glow loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlow);

        // Start lightning
        const minInterval = 2 / speedMultiplier;
        const maxInterval = 6 / speedMultiplier;
        const firstInterval = minInterval + Math.random() * (maxInterval - minInterval);
        flashTimeout = setTimeout(triggerLightning, firstInterval * 1000);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetStorm);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (flashTimeout) clearTimeout(flashTimeout);
      });

      init();
    })();
  </script>

</body>
</html>
