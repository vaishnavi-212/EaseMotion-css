<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gradient Tooltip</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="page">

    <h1>Gradient Tooltip</h1>

    <p class="subtitle">
        Glassmorphism-inspired tooltips with animated gradients built using only HTML and CSS.
    </p>

    <section class="tooltip-grid">

        <!-- Top -->

        <div class="tooltip-wrapper">

            <button class="btn">
                Hover Me
            </button>

            <span class="tooltip tooltip-top">
                Premium Feature
            </span>

        </div>

        <!-- Bottom -->

        <div class="tooltip-wrapper">

            <button class="btn">
                Hover Me
            </button>

            <span class="tooltip tooltip-bottom">
                Secure Checkout
            </span>

        </div>

        <!-- Left -->

        <div class="tooltip-wrapper">

            <button class="btn">
                Hover Me
            </button>

            <span class="tooltip tooltip-left">
                Analytics Dashboard
            </span>

        </div>

        <!-- Right -->

        <div class="tooltip-wrapper">

            <button class="btn">
                Hover Me
            </button>

            <span class="tooltip tooltip-right">
                AI Powered
            </span>

        </div>

    </section>

</main>

</body>
</html>
