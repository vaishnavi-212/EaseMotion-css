<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Temporary File Cleaner</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="cleaner-card">
    <div class="icon">🗑️</div>

    <h2>Temporary File Cleaner</h2>

    <p>
      Remove unused temporary files and free up storage space.
    </p>

    <div class="storage">
      <span>Temporary Files</span>
      <strong>2.4 GB</strong>
    </div>

    <button class="clean-btn">
      Clean Now
    </button>

    <div class="progress">
      <span></span>
    </div>

    <p class="status">
      Ready to clean
    </p>
  </div>

</body>
</html>
