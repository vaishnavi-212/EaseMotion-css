<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Component</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="badges-demo" aria-label="Badges">
      <h1 class="demo-title">Badge Component</h1>
      
      <div class="badge-section">
        <h3>Solid Badges</h3>
        <div class="badge-row">
          <span class="badge badge-primary">Primary</span>
          <span class="badge badge-success">Success</span>
          <span class="badge badge-warning">Warning</span>
          <span class="badge badge-danger">Danger</span>
          <span class="badge badge-info">Info</span>
        </div>
      </div>

      <div class="badge-section">
        <h3>Outline Badges</h3>
        <div class="badge-row">
          <span class="badge badge-outline-primary">Primary</span>
          <span class="badge badge-outline-success">Success</span>
          <span class="badge badge-outline-warning">Warning</span>
          <span class="badge badge-outline-danger">Danger</span>
        </div>
      </div>

      <div class="badge-section">
        <h3>Pill Badges</h3>
        <div class="badge-row">
          <span class="badge badge-pill badge-primary">New</span>
          <span class="badge badge-pill badge-success">Free</span>
          <span class="badge badge-pill badge-warning">Beta</span>
          <span class="badge badge-pill badge-danger">Hot</span>
        </div>
      </div>

      <div class="badge-section">
        <h3>With Count</h3>
        <div class="badge-row">
          <span class="badge badge-with-count badge-primary">Notifications <span class="count">5</span></span>
          <span class="badge badge-with-count badge-success">Messages <span class="count">12</span></span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
