<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge Swing – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌉 Bridge Swing</h1>
    <p class="subtitle">Suspension bridge swaying in wind</p>

    <div class="bridge-container">
      <div class="bridge-scene">
        <!-- Sky -->
        <div class="sky"></div>

        <!-- Clouds -->
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="cloud c4"></div>

        <!-- Water -->
        <div class="water"></div>

        <!-- Bridge -->
        <div class="bridge">
          <!-- Left tower -->
          <div class="tower tower-left">
            <div class="tower-base"></div>
            <div class="tower-column tc1"></div>
            <div class="tower-column tc2"></div>
            <div class="tower-top"></div>
            <div class="tower-detail td1"></div>
            <div class="tower-detail td2"></div>
            <div class="tower-detail td3"></div>
            <div class="tower-detail td4"></div>
          </div>

          <!-- Right tower -->
          <div class="tower tower-right">
            <div class="tower-base"></div>
            <div class="tower-column tc3"></div>
            <div class="tower-column tc4"></div>
            <div class="tower-top"></div>
            <div class="tower-detail td5"></div>
            <div class="tower-detail td6"></div>
            <div class="tower-detail td7"></div>
            <div class="tower-detail td8"></div>
          </div>

          <!-- Main cables -->
          <div class="cable cable-left"></div>
          <div class="cable cable-right"></div>

          <!-- Road deck -->
          <div class="road-deck"></div>

          <!-- Vertical suspenders -->
          <div class="suspender s1"></div>
          <div class="suspender s2"></div>
          <div class="suspender s3"></div>
          <div class="suspender s4"></div>
          <div class="suspender s5"></div>
          <div class="suspender s6"></div>
          <div class="suspender s7"></div>
          <div class="suspender s8"></div>
          <div class="suspender s9"></div>
          <div class="suspender s10"></div>
          <div class="suspender s11"></div>
          <div class="suspender s12"></div>
          <div class="suspender s13"></div>
          <div class="suspender s14"></div>
          <div class="suspender s15"></div>
          <div class="suspender s16"></div>
          <div class="suspender s17"></div>
          <div class="suspender s18"></div>
          <div class="suspender s19"></div>
          <div class="suspender s20"></div>
          <div class="suspender s21"></div>

          <!-- Road markings -->
          <div class="road-line rl1"></div>
          <div class="road-line rl2"></div>
          <div class="road-line rl3"></div>
          <div class="road-line rl4"></div>
          <div class="road-line rl5"></div>
          <div class="road-line rl6"></div>
          <div class="road-line rl7"></div>
          <div class="road-line rl8"></div>
          <div class="road-line rl9"></div>
          <div class="road-line rl10"></div>
          <div class="road-line rl11"></div>
          <div class="road-line rl12"></div>
          <div class="road-line rl13"></div>
          <div class="road-line rl14"></div>
          <div class="road-line rl15"></div>

          <!-- Lamp posts -->
          <div class="lamp lp1"></div>
          <div class="lamp lp2"></div>
          <div class="lamp lp3"></div>
          <div class="lamp lp4"></div>
          <div class="lamp lp5"></div>
          <div class="lamp lp6"></div>
          <div class="lamp lp7"></div>
          <div class="lamp lp8"></div>
          <div class="lamp lp9"></div>
          <div class="lamp lp10"></div>
          <div class="lamp lp11"></div>
          <div class="lamp lp12"></div>
          <div class="lamp lp13"></div>
          <div class="lamp lp14"></div>
          <div class="lamp lp15"></div>

          <!-- Wind particles -->
          <div class="wind-particle wp1"></div>
          <div class="wind-particle wp2"></div>
          <div class="wind-particle wp3"></div>
          <div class="wind-particle wp4"></div>
          <div class="wind-particle wp5"></div>
          <div class="wind-particle wp6"></div>
          <div class="wind-particle wp7"></div>
          <div class="wind-particle wp8"></div>
          <div class="wind-particle wp9"></div>
          <div class="wind-particle wp10"></div>
          <div class="wind-particle wp11"></div>
          <div class="wind-particle wp12"></div>
          <div class="wind-particle wp13"></div>
          <div class="wind-particle wp14"></div>
          <div class="wind-particle wp15"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Wind Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Sway Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const bridge = document.querySelector('.bridge');
      const towers = document.querySelectorAll('.tower');
      const cables = document.querySelectorAll('.cable');
      const roadDeck = document.querySelector('.road-deck');
      const suspenders = document.querySelectorAll('.suspender');
      const lamps = document.querySelectorAll('.lamp');
      const roadLines = document.querySelectorAll('.road-line');
      const clouds = document.querySelectorAll('.cloud');
      const windParticles = document.querySelectorAll('.wind-particle');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let swayPhase = 0;

      // ----- Apply speed -----
      function applySpeed() {
        bridge.style.setProperty('--bridge-duration', (3 / speedMultiplier) + 's');

        towers.forEach((tower, i) => {
          const duration = (2.5 + i * 0.2) / speedMultiplier;
          tower.style.setProperty('--tower-duration', duration + 's');
          tower.style.setProperty('--tower-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        cables.forEach((cable, i) => {
          const duration = (2.8 + i * 0.3) / speedMultiplier;
          cable.style.setProperty('--cable-duration', duration + 's');
          cable.style.setProperty('--cable-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        roadDeck.style.setProperty('--road-duration', (2.5 / speedMultiplier) + 's');

        suspenders.forEach((s, i) => {
          const duration = (1.5 + (i % 5) * 0.1) / speedMultiplier;
          s.style.setProperty('--suspend-duration', duration + 's');
          s.style.setProperty('--suspend-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        lamps.forEach((lamp, i) => {
          const duration = (2 + (i % 3) * 0.15) / speedMultiplier;
          lamp.style.setProperty('--lamp-duration', duration + 's');
          lamp.style.setProperty('--lamp-delay', ((i * 0.04) / speedMultiplier) + 's');
        });

        clouds.forEach((cloud, i) => {
          const duration = (20 + i * 3) / speedMultiplier;
          cloud.style.setProperty('--cloud-duration', duration + 's');
          cloud.style.setProperty('--cloud-delay', ((i * 2) / speedMultiplier) + 's');
        });

        windParticles.forEach((p, i) => {
          const duration = (2 + (i % 5) * 0.3) / speedMultiplier;
          p.style.setProperty('--wind-duration', duration + 's');
          p.style.setProperty('--wind-delay', ((i * 0.1) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        bridge.style.setProperty('--sway-amount', 1.5 * intensityMultiplier + 'deg');

        towers.forEach((tower) => {
          const amplitude = 0.8 * intensityMultiplier;
          tower.style.setProperty('--tower-sway', amplitude + 'deg');
        });

        cables.forEach((cable) => {
          const amplitude = 2 * intensityMultiplier;
          cable.style.setProperty('--cable-sway', amplitude + 'px');
        });

        roadDeck.style.setProperty('--road-sway', 2 * intensityMultiplier + 'px');

        suspenders.forEach((s) => {
          const amplitude = 3 * intensityMultiplier;
          s.style.setProperty('--suspend-sway', amplitude + 'px');
        });

        windParticles.forEach((p) => {
          const opacity = 0.1 * intensityMultiplier;
          p.style.setProperty('--wind-opacity', Math.min(opacity, 0.3));
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--wind-size', size + 'px');
        });
      }

      // ----- Update sway -----
      function updateSway(timestamp) {
        if (isPaused) return;

        const speed = 0.005 * speedMultiplier;
        swayPhase += speed;

        if (swayPhase > 1) {
          swayPhase = 0;
        }

        suspenders.forEach((s, i) => {
          const offset = i * 0.05;
          const sway = Math.sin((swayPhase + offset) * Math.PI * 2) * 2 * intensityMultiplier;
          s.style.setProperty('--suspend-extra', sway + 'px');
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateSway(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetBridge() {
        swayPhase = 0;
        suspenders.forEach(s => {
          s.style.setProperty('--suspend-extra', '0px');
        });

        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetBridge);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
