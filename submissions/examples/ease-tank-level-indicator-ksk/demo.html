<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tank Level Indicator — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background: #060813;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(14, 165, 233, 0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(16, 185, 129, 0.08) 0%, transparent 55%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.4rem;
      letter-spacing: -0.015em;
    }
    .page-header p {
      color: #334155;
      font-size: 0.88rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Ease Tank Level Indicator</h1>
    <p>Select different level presets in the control panel to see the sloshing liquid rise and change color.</p>
  </div>

  <!-- ── Pure CSS Radio Switches (must precede the card) ── -->
  <input type="radio" name="level-group" id="level-25" class="tank-radio">
  <input type="radio" name="level-group" id="level-50" class="tank-radio">
  <input type="radio" name="level-group" id="level-75" class="tank-radio" checked>
  <input type="radio" name="level-group" id="level-100" class="tank-radio">

  <!-- Tank Card Container -->
  <div class="tank-card">

    <!-- Digital Readout Percentage -->
    <div class="tank-readout">
      <span class="readout-label lbl-25">25%</span>
      <span class="readout-label lbl-50">50%</span>
      <span class="readout-label lbl-75">75%</span>
      <span class="readout-label lbl-100">100%</span>
    </div>

    <!-- Title and Status indicators -->
    <div style="text-align: center;">
      <span style="font-size:0.78rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.08em;">Fluid Dynamics</span>
      <div class="tank-status">
        <span class="status-label st-25">Critical Low</span>
        <span class="status-label st-50">Warning level</span>
        <span class="status-label st-75">Optimal level</span>
        <span class="status-label st-100">Tank Full</span>
      </div>
    </div>

    <!-- The 3D-like cylindrical tank -->
    <div class="tank-outer">
      <div class="tank-glass-shine"></div>

      <!-- Liquid fill containing wave animations -->
      <div class="tank-liquid-fill">
        <div class="tank-wave tank-wave-1"></div>
        <div class="tank-wave tank-wave-2"></div>
      </div>
    </div>

    <!-- Control panel selectors -->
    <div class="tank-controls">
      <label for="level-25" class="tank-btn btn-25" role="button" tabindex="0">25%</label>
      <label for="level-50" class="tank-btn btn-50" role="button" tabindex="0">50%</label>
      <label for="level-75" class="tank-btn btn-75" role="button" tabindex="0">75%</label>
      <label for="level-100" class="tank-btn btn-100" role="button" tabindex="0">100%</label>
    </div>

  </div>

</body>
</html>
