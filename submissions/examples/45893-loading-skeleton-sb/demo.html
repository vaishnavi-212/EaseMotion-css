<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Skeleton Components</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Loading skeleton components demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Loading Skeleton Components</h1>
        <p>Skeleton loading components for better perceived performance.</p>
        
        <div class="demo-section">
          <h3>Card Skeleton</h3>
          <div class="skeleton-card-sb ease-skeleton-pulse-sb">
            <div class="skeleton-image-sb"></div>
            <div class="skeleton-content-sb">
              <div class="skeleton-title-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-text-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-text-sb short ease-skeleton-shimmer-sb"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>User Profile Skeleton</h3>
          <div class="skeleton-profile-sb ease-skeleton-pulse-sb">
            <div class="skeleton-avatar-sb ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-info-sb">
              <div class="skeleton-name-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-role-sb ease-skeleton-shimmer-sb"></div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Article Skeleton</h3>
          <div class="skeleton-article-sb ease-skeleton-pulse-sb">
            <div class="skeleton-header-sb ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-meta-sb ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-line-sb ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-line-sb ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-line-sb medium ease-skeleton-shimmer-sb"></div>
            <div class="skeleton-line-sb short ease-skeleton-shimmer-sb"></div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Button Skeletons</h3>
          <div class="button-skeletons">
            <div class="skeleton-btn-sb ease-skeleton-pulse-sb"></div>
            <div class="skeleton-btn-sb secondary ease-skeleton-pulse-sb"></div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>List Skeleton</h3>
          <div class="skeleton-list-sb ease-skeleton-pulse-sb">
            <div class="skeleton-list-item-sb">
              <div class="skeleton-list-avatar-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-list-content-sb">
                <div class="skeleton-list-title-sb ease-skeleton-shimmer-sb"></div>
                <div class="skeleton-list-subtitle-sb ease-skeleton-shimmer-sb"></div>
              </div>
            </div>
            <div class="skeleton-list-item-sb">
              <div class="skeleton-list-avatar-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-list-content-sb">
                <div class="skeleton-list-title-sb ease-skeleton-shimmer-sb"></div>
                <div class="skeleton-list-subtitle-sb ease-skeleton-shimmer-sb"></div>
              </div>
            </div>
            <div class="skeleton-list-item-sb">
              <div class="skeleton-list-avatar-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-list-content-sb">
                <div class="skeleton-list-title-sb ease-skeleton-shimmer-sb"></div>
                <div class="skeleton-list-subtitle-sb ease-skeleton-shimmer-sb"></div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Grid Skeleton</h3>
          <div class="skeleton-grid-sb ease-skeleton-pulse-sb">
            <div class="skeleton-grid-item-sb">
              <div class="skeleton-grid-image-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-grid-title-sb ease-skeleton-shimmer-sb"></div>
            </div>
            <div class="skeleton-grid-item-sb">
              <div class="skeleton-grid-image-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-grid-title-sb ease-skeleton-shimmer-sb"></div>
            </div>
            <div class="skeleton-grid-item-sb">
              <div class="skeleton-grid-image-sb ease-skeleton-shimmer-sb"></div>
              <div class="skeleton-grid-title-sb ease-skeleton-shimmer-sb"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
