<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">

        <section class="interface-card">

            <span class="eyebrow">INTERACTIVE INTERFACE</span>

            <h1>Ideas that move with you.</h1>

            <p class="description">
                Explore a CSS-only floating orbit tooltip designed to add
                playful motion to modern interactive interfaces.
            </p>

            <div class="tooltip-wrapper">

                <button
                    class="orbit-trigger"
                    aria-label="Show interactive feature information"
                >
                    <span class="trigger-icon">✦</span>
                    Explore Feature
                </button>

                <div class="tooltip" role="tooltip">

                    <div class="orbit-system">

                        <span class="orbit-ring orbit-ring-one"></span>
                        <span class="orbit-ring orbit-ring-two"></span>

                        <span class="orbit-dot orbit-dot-one"></span>
                        <span class="orbit-dot orbit-dot-two"></span>
                        <span class="orbit-dot orbit-dot-three"></span>

                        <span class="orbit-center">✦</span>

                    </div>

                    <div class="tooltip-content">

                        <span class="tooltip-label">ORBIT MODE</span>

                        <h2>Keep ideas in motion</h2>

                        <p>
                            A lightweight floating interaction powered entirely
                            by CSS animations.
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

</body>
</html>
