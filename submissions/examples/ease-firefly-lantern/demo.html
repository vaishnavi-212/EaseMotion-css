<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firefly Lantern – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🏮 Firefly Lantern</h1>
    <p class="subtitle">Paper lantern with flickering firefly inside</p>

    <div class="lantern-container">
      <div class="lantern-scene">
        <!-- Hanging string -->
        <div class="string"></div>

        <!-- Main lantern -->
        <div class="lantern">
          <!-- Paper shell layers -->
          <div class="shell shell-outer"></div>
          <div class="shell shell-middle"></div>
          <div class="shell shell-inner"></div>

          <!-- Bamboo frame ribs -->
          <div class="rib rib-1"></div>
          <div class="rib rib-2"></div>
          <div class="rib rib-3"></div>
          <div class="rib rib-4"></div>
          <div class="rib rib-5"></div>

          <!-- Top and bottom caps -->
          <div class="cap top-cap"></div>
          <div class="cap bottom-cap"></div>

          <!-- The firefly inside -->
          <div class="firefly">
            <div class="firefly-body"></div>
            <div class="firefly-glow"></div>
            <div class="firefly-wing wing-left"></div>
            <div class="firefly-wing wing-right"></div>
          </div>

          <!-- Internal glow -->
          <div class="internal-glow"></div>

          <!-- Ambient light cast by lantern -->
          <div class="lantern-light"></div>
        </div>

        <!-- Background particles (floating dust) -->
        <div class="dust-particle p1"></div>
        <div class="dust-particle p2"></div>
        <div class="dust-particle p3"></div>
        <div class="dust-particle p4"></div>
        <div class="dust-particle p5"></div>
        <div class="dust-particle p6"></div>
      </div>
    </div>

    <div class="controls">
      <label>
        Firefly Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset Lantern</button>
    </div>
  </div>

  <script>
    (function() {
      const lantern = document.querySelector('.lantern');
      const shellOuter = document.querySelector('.shell-outer');
      const shellMiddle = document.querySelector('.shell-middle');
      const shellInner = document.querySelector('.shell-inner');
      const firefly = document.querySelector('.firefly');
      const fireflyGlow = document.querySelector('.firefly-glow');
      const internalGlow = document.querySelector('.internal-glow');
      const lanternLight = document.querySelector('.lantern-light');
      const wings = document.querySelectorAll('.firefly-wing');
      const dustParticles = document.querySelectorAll('.dust-particle');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed to all animations -----
      function applySpeed() {
        const swingDuration = 4 / speedMultiplier;
        const fireflyDuration = 5 / speedMultiplier;
        const blinkDuration = 0.6 / speedMultiplier;
        const wingDuration = 0.15 / speedMultiplier;
        const dustDuration = 8 / speedMultiplier;

        // Lantern swing
        lantern.style.setProperty('--swing-duration', swingDuration + 's');

        // Shell animations
        shellOuter.style.setProperty('--shell-outer-duration', (2 / speedMultiplier) + 's');
        shellMiddle.style.setProperty('--shell-middle-duration', (2.6 / speedMultiplier) + 's');
        shellInner.style.setProperty('--shell-inner-duration', (3.2 / speedMultiplier) + 's');

        // Firefly
        firefly.style.setProperty('--firefly-duration', fireflyDuration + 's');
        fireflyGlow.style.setProperty('--blink-duration', blinkDuration + 's');

        // Wings
        wings.forEach(wing => {
          wing.style.setProperty('--wing-duration', wingDuration + 's');
        });

        // Dust particles
        dustParticles.forEach((p, i) => {
          const baseDuration = 8 + i * 1.5;
          p.style.setProperty('--dust-duration', (baseDuration / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Internal glow
        const glowIntensity = Math.min(0.6 * intensityMultiplier, 1.5);
        internalGlow.style.opacity = glowIntensity;
        internalGlow.style.setProperty('--glow-scale', 0.8 + intensityMultiplier * 0.2);

        // Firefly glow
        fireflyGlow.style.opacity = Math.min(0.8 * intensityMultiplier, 2);

        // Lantern ambient light
        lanternLight.style.opacity = Math.min(0.4 * intensityMultiplier, 1);

        // Shell brightness
        const bright = Math.min(60 + 30 * intensityMultiplier, 120);
        shellOuter.style.setProperty('--shell-brightness', bright + '%');
        shellMiddle.style.setProperty('--shell-brightness', (bright + 10) + '%');
        shellInner.style.setProperty('--shell-brightness', (bright + 20) + '%');
      }

      // ----- Extra glow pulse via JS -----
      function animateGlow(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;

        // Subtle internal glow pulse
        const pulse = Math.sin(timestamp / 800) * 0.08 + 0.92;
        const baseOpacity = parseFloat(internalGlow.style.opacity) || 0.6;
        const targetOpacity = Math.min(0.5 * intensityMultiplier * pulse * 1.2, 1.5);
        internalGlow.style.opacity = baseOpacity * 0.9 + targetOpacity * 0.1;

        // Firefly glow blink
        const blink = Math.sin(timestamp / 400) * 0.3 + 0.7;
        const glowBase = parseFloat(fireflyGlow.style.opacity) || 0.8;
        const glowTarget = Math.min(0.7 * intensityMultiplier * blink * 1.1, 2);
        fireflyGlow.style.opacity = glowBase * 0.85 + glowTarget * 0.15;

        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Update functions -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Reset animation -----
      function resetLantern() {
        const animElements = [
          lantern,
          shellOuter,
          shellMiddle,
          shellInner,
          firefly,
          fireflyGlow,
          ...wings,
          ...dustParticles,
          internalGlow,
          lanternLight
        ];

        animElements.forEach(el => {
          el.classList.remove('animate');
          void el.offsetWidth;
          el.classList.add('animate');
        });
      }

      // ----- Init -----
      function init() {
        // Add animation classes
        lantern.classList.add('animate');
        shellOuter.classList.add('animate');
        shellMiddle.classList.add('animate');
        shellInner.classList.add('animate');
        firefly.classList.add('animate');
        fireflyGlow.classList.add('animate');
        wings.forEach(w => w.classList.add('animate'));
        dustParticles.forEach(p => p.classList.add('animate'));
        internalGlow.classList.add('animate');
        lanternLight.classList.add('animate');

        // Apply initial values
        updateSpeed(speedInput.value);
        updateIntensity(intensityInput.value);

        // Start glow loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlow);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetLantern);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
