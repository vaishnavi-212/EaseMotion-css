<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Teacher Grade Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grade-card">

  <div class="teacher-info">
    <div class="avatar">👩‍🏫</div>
    <div>
      <h2>Mathematics</h2>
      <p>Teacher: Sarah Johnson</p>
    </div>
  </div>

  <div class="grade">
    <span>Grade</span>
    <strong>A+</strong>
  </div>

  <div class="details">
    <div>
      <p>Students</p>
      <h3>45</h3>
    </div>

    <div>
      <p>Average</p>
      <h3>92%</h3>
    </div>

    <div>
      <p>Performance</p>
      <h3>Excellent</h3>
    </div>
  </div>

</div>

</body>
</html>
