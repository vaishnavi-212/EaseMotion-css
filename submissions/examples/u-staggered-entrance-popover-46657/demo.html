<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staggered Entrance Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="popover-wrapper">

        <button class="trigger">
            Open Menu
        </button>

        <div class="popover" tabindex="0">

            <h2>Quick Actions</h2>

            <p>Minimalist Tech Dashboard</p>

            <ul class="menu">

                <li>Dashboard</li>

                <li>Projects</li>

                <li>Analytics</li>

                <li>Settings</li>

            </ul>

            <button class="action">
                Continue
            </button>

        </div>

    </div>

</div>

</body>
</html>
