<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Fade-in Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="content">
        <h1>Fade-in Tooltip Example</h1>
        <p>Hover over or focus the elements below to see the tooltip animation.</p>

        <div class="demo-grid">
            <!-- Tooltip on a Button -->
            <button class="tooltip-trigger" aria-describedby="tooltip-1">
                Hover Me
                <span class="tooltip ease-fade-in-up" id="tooltip-1" role="tooltip">This is a helpful tip!</span>
            </button>

            <!-- Tooltip on an Icon/Text -->
            <span class="tooltip-trigger text-trigger" tabindex="0" aria-describedby="tooltip-2">
                Focus Me ⓘ
                <span class="tooltip ease-fade-in-up" id="tooltip-2" role="tooltip">Additional context provided here.</span>
            </span>
        </div>
    </main>

</body>
</html>
