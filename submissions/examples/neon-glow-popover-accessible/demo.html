<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Neon Glow Popover - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="showcase-container">
    <div class="card-panel">
      <h1 class="panel-title">System Console</h1>
      <p class="panel-subtitle">Hover or press **Tab** to focus the trigger action below.</p>

      <!-- ─── ACCESSIBLE PURE CSS POPOVER INTERACTION BLOCK ─── -->
      <div class="popover-wrapper">
        
        <!-- Trigger Button (Accessible via Keyboard Tab/Enter) -->
        <button class="popover-trigger" aria-haspopup="true" aria-expanded="false">
          View Documentation
        </button>

        <!-- Popover Body (Targets focus-within/hover states natively) -->
        <div class="popover-content" role="tooltip">
          <div class="popover-arrow"></div>
          <h3 class="popover-heading">Secure Connection Established</h3>
          <p class="popover-body-text">
            All API calls are routing through the hardware-accelerated neon network layer. Custom variables control core timing bounds.
          </p>
          <a href="#learn-more" class="popover-link">View Audit Logs &rarr;</a>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
