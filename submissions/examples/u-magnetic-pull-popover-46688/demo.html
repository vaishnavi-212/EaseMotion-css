<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Pull Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="popover-box">

        <button class="trigger">
            Notifications
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    💬
                </div>

                <div>

                    <h2>New Updates</h2>

                    <p>Neumorphic Interface</p>

                </div>

            </div>

            <div class="content">

                <div class="card">
                    <span class="value">18</span>
                    <span class="label">Messages</span>
                </div>

                <div class="card">
                    <span class="value">5</span>
                    <span class="label">Tasks</span>
                </div>

                <div class="card">
                    <span class="value">12</span>
                    <span class="label">Alerts</span>
                </div>

            </div>

            <button class="action">
                Open Inbox
            </button>

        </div>

    </div>

</div>

</body>
</html>
