<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Step Slide</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="checkout-stage" aria-label="Checkout step slide animation demo">
      <section class="checkout-card">
        <h1>Checkout progress</h1>
        <ol>
          <li class="done" style="--delay: 0ms">Cart</li>
          <li class="active" style="--delay: 120ms">Shipping</li>
          <li style="--delay: 240ms">Payment</li>
        </ol>
      </section>
    </main>
  </body>
</html>
