<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Expand-on-Hover Search Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">BrandLogo</div>
        
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
        </nav>

        <!-- Search Bar Component -->
        <form class="search-bar" role="search" onsubmit="event.preventDefault();">
            <button type="submit" aria-label="Submit Search" class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <input 
                type="search" 
                placeholder="Search..." 
                aria-label="Search site content"
                class="ease-expand-input">
        </form>
    </header>

    <main class="content">
        <h1>Expand-on-Hover Search Bar</h1>
        <p>Hover over or click on the search icon in the navigation bar to see the smooth expansion animation.</p>
    </main>

</body>
</html>
