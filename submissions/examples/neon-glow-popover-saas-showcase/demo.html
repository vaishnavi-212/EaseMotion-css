<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Glow Popover - SaaS Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <h1>Boost Your SaaS Workflow</h1>
    <p>Hover or focus on the button to reveal the animated Neon Glow Popover.</p>

    <div class="popover-container">
      <button class="popover-btn" aria-describedby="popover">
        Learn More
      </button>

      <div id="popover" class="popover" role="tooltip">
        <h3>✨ Premium Features</h3>
        <p>
          Automate tasks, collaborate faster, and scale your business with our
          all-in-one SaaS platform.
        </p>
      </div>
    </div>
  </section>

</body>
</html>
