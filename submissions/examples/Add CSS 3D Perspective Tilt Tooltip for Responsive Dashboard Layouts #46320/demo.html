<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Perspective Tilt Tooltip - Responsive Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    
    <!-- Collapsed Sidebar Navigation -->
    <nav class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      
      <div class="nav-links">
        
        <!-- Tooltip Container 1 -->
        <div class="tooltip-container">
          <button class="nav-btn active" aria-label="Overview" aria-describedby="tooltip-overview">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <div id="tooltip-overview" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Overview</strong>
              <span>Main metrics dashboard</span>
            </div>
          </div>
        </div>

        <!-- Tooltip Container 2 -->
        <div class="tooltip-container">
          <button class="nav-btn" aria-label="Analytics" aria-describedby="tooltip-analytics">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </button>
          <div id="tooltip-analytics" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Analytics</strong>
              <span>Real-time traffic & conversions</span>
            </div>
          </div>
        </div>

        <!-- Tooltip Container 3 -->
        <div class="tooltip-container">
          <button class="nav-btn" aria-label="Users" aria-describedby="tooltip-users">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </button>
          <div id="tooltip-users" class="tooltip" role="tooltip">
            <div class="tooltip-content">
              <strong>Users</strong>
              <span>Manage roles and permissions</span>
            </div>
          </div>
        </div>
        
      </div>
    </nav>

    <!-- Main Content Area Placeholder -->
    <main class="main-content">
      <header class="topbar">
        <div class="search-bar">Search...</div>
        <div class="profile-circle"></div>
      </header>
      <div class="content-grid">
        <div class="card card-wide"></div>
        <div class="card"></div>
        <div class="card"></div>
      </div>
    </main>
    
  </div>
</body>
</html>
