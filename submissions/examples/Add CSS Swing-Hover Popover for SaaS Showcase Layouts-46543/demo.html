<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Swing-Hover Popover for SaaS Showcase</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="saas-container">
    <div class="popover-wrapper" tabindex="0">
      <button class="trigger-btn" aria-describedby="popover-content">
        Explore Features
      </button>
      
      <div id="popover-content" class="ease-swing-popover" role="tooltip">
        <div class="popover-content">
          <h3>Advanced Analytics</h3>
          <p>Gain deep insights into user behavior with our new real-time metrics dashboard. Discover trends instantly.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
