<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Savings Goal Progress</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">

  <div class="ease-demo-wrapper">

    <h1 class="ease-demo-title">Savings Goal Progress</h1>
    <p class="ease-demo-subtitle">An animated "jar-fill" component for tracking progress toward a savings goal.</p>

    <div class="ease-demo-grid">

      <!-- Example 1: In progress -->
      <div class="ease-savings-goal-progress"
           data-current="3200"
           data-target="8000"
           data-currency="$"
           data-label="New Laptop Fund">
        <div class="ease-savings-goal-progress__jar">
          <div class="ease-savings-goal-progress__milestones">
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 25%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 50%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 75%"></span>
          </div>
          <div class="ease-savings-goal-progress__fill">
            <div class="ease-savings-goal-progress__wave"></div>
          </div>
          <span class="ease-savings-goal-progress__coin" aria-hidden="true">🪙</span>
        </div>
        <div class="ease-savings-goal-progress__info">
          <p class="ease-savings-goal-progress__label">New Laptop Fund</p>
          <p class="ease-savings-goal-progress__amounts">
            <span class="ease-savings-goal-progress__current">$3,200</span>
            <span class="ease-savings-goal-progress__of">of</span>
            <span class="ease-savings-goal-progress__target">$8,000</span>
          </p>
          <p class="ease-savings-goal-progress__percent" data-percent="40">0%</p>
        </div>
      </div>

      <!-- Example 2: Nearly complete -->
      <div class="ease-savings-goal-progress"
           data-current="9100"
           data-target="10000"
           data-currency="$"
           data-label="Emergency Fund">
        <div class="ease-savings-goal-progress__jar">
          <div class="ease-savings-goal-progress__milestones">
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 25%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 50%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 75%"></span>
          </div>
          <div class="ease-savings-goal-progress__fill">
            <div class="ease-savings-goal-progress__wave"></div>
          </div>
          <span class="ease-savings-goal-progress__coin" aria-hidden="true">🪙</span>
        </div>
        <div class="ease-savings-goal-progress__info">
          <p class="ease-savings-goal-progress__label">Emergency Fund</p>
          <p class="ease-savings-goal-progress__amounts">
            <span class="ease-savings-goal-progress__current">$9,100</span>
            <span class="ease-savings-goal-progress__of">of</span>
            <span class="ease-savings-goal-progress__target">$10,000</span>
          </p>
          <p class="ease-savings-goal-progress__percent" data-percent="91">0%</p>
        </div>
      </div>

      <!-- Example 3: Goal reached -->
      <div class="ease-savings-goal-progress ease-savings-goal-progress--complete"
           data-current="5000"
           data-target="5000"
           data-currency="$"
           data-label="Vacation Fund">
        <div class="ease-savings-goal-progress__jar">
          <div class="ease-savings-goal-progress__milestones">
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 25%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 50%"></span>
            <span class="ease-savings-goal-progress__tick" style="--tick-pos: 75%"></span>
          </div>
          <div class="ease-savings-goal-progress__fill">
            <div class="ease-savings-goal-progress__wave"></div>
          </div>
          <span class="ease-savings-goal-progress__coin" aria-hidden="true">🪙</span>
        </div>
        <div class="ease-savings-goal-progress__info">
          <p class="ease-savings-goal-progress__label">Vacation Fund <span class="ease-savings-goal-progress__badge">Goal reached! 🎉</span></p>
          <p class="ease-savings-goal-progress__amounts">
            <span class="ease-savings-goal-progress__current">$5,000</span>
            <span class="ease-savings-goal-progress__of">of</span>
            <span class="ease-savings-goal-progress__target">$5,000</span>
          </p>
          <p class="ease-savings-goal-progress__percent" data-percent="100">0%</p>
        </div>
      </div>

    </div>

    <button class="ease-demo-theme-toggle" id="themeToggle" type="button">Toggle Light / Dark</button>
  </div>

  <script>
    // Fill height + animated percent count-up, driven by data-percent
    document.querySelectorAll('.ease-savings-goal-progress').forEach((card) => {
      const percentEl = card.querySelector('.ease-savings-goal-progress__percent');
      const fillEl = card.querySelector('.ease-savings-goal-progress__fill');
      const target = parseInt(percentEl.getAttribute('data-percent'), 10) || 0;

      // Set the CSS custom property that drives the fill height animation
      requestAnimationFrame(() => {
        fillEl.style.setProperty('--fill-percent', target + '%');
      });

      // Animate the percentage counter text
      let current = 0;
      const duration = 1200;
      const start = performance.now();

      function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        current = Math.round(progress * target);
        percentEl.textContent = current + '%';
        if (progress < 1) {
          requestAnimationFrame(step);
        }
      }
      requestAnimationFrame(step);
    });

    // Theme toggle for demo purposes
    document.getElementById('themeToggle').addEventListener('click', () => {
      const body = document.body;
      body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    });
  </script>

</body>
</html>
