<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Reading – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🟣 Aura Reading</h1>
    <p class="subtitle">Colorful aura around silhouette</p>

    <div class="ar-container">
      <div class="ar-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Aura layers -->
        <div class="aura">
          <!-- Outer aura layer - violet/indigo -->
          <div class="aura-layer al-1">
            <div class="aura-glow ag-1"></div>
          </div>

          <!-- Middle aura layer - blue/teal -->
          <div class="aura-layer al-2">
            <div class="aura-glow ag-2"></div>
          </div>

          <!-- Inner aura layer - green/yellow -->
          <div class="aura-layer al-3">
            <div class="aura-glow ag-3"></div>
          </div>

          <!-- Core aura layer - pink/purple -->
          <div class="aura-layer al-4">
            <div class="aura-glow ag-4"></div>
          </div>

          <!-- Silhouette -->
          <div class="silhouette">
            <svg viewBox="0 0 200 300" class="silhouette-svg">
              <!-- Head -->
              <ellipse class="silhouette-head" cx="100" cy="60" rx="40" ry="45" />
              <!-- Neck -->
              <rect class="silhouette-neck" x="82" y="100" width="36" height="25" rx="5" />
              <!-- Shoulders -->
              <path class="silhouette-shoulders" d="
                M 30 120
                C 25 125, 20 140, 25 155
                L 175 155
                C 180 140, 175 125, 170 120
                Z
              " />
              <!-- Body -->
              <path class="silhouette-body" d="
                M 35 155
                L 165 155
                L 165 230
                C 165 245, 155 260, 140 265
                L 60 265
                C 45 260, 35 245, 35 230
                Z
              " />
            </svg>
          </div>

          <!-- Chakra points -->
          <div class="chakra chakra-1"></div>
          <div class="chakra chakra-2"></div>
          <div class="chakra chakra-3"></div>
          <div class="chakra chakra-4"></div>
          <div class="chakra chakra-5"></div>
          <div class="chakra chakra-6"></div>
          <div class="chakra chakra-7"></div>

          <!-- Energy particles -->
          <div class="aura-particle ap1"></div>
          <div class="aura-particle ap2"></div>
          <div class="aura-particle ap3"></div>
          <div class="aura-particle ap4"></div>
          <div class="aura-particle ap5"></div>
          <div class="aura-particle ap6"></div>
          <div class="aura-particle ap7"></div>
          <div class="aura-particle ap8"></div>
          <div class="aura-particle ap9"></div>
          <div class="aura-particle ap10"></div>
          <div class="aura-particle ap11"></div>
          <div class="aura-particle ap12"></div>
          <div class="aura-particle ap13"></div>
          <div class="aura-particle ap14"></div>
          <div class="aura-particle ap15"></div>
          <div class="aura-particle ap16"></div>
          <div class="aura-particle ap17"></div>
          <div class="aura-particle ap18"></div>
          <div class="aura-particle ap19"></div>
          <div class="aura-particle ap20"></div>

          <!-- Aura labels -->
          <div class="aura-label label-1">Spiritual</div>
          <div class="aura-label label-2">Emotional</div>
          <div class="aura-label label-3">Physical</div>
          <div class="aura-label label-4">Core</div>

          <!-- Energy flow lines -->
          <div class="flow-line fl-1"></div>
          <div class="flow-line fl-2"></div>
          <div class="flow-line fl-3"></div>
          <div class="flow-line fl-4"></div>
          <div class="flow-line fl-5"></div>
          <div class="flow-line fl-6"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Aura Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <label>
        Pulse Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="pauseBtn">⏸️ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const auraLayers = document.querySelectorAll('.aura-layer');
      const auraGlows = document.querySelectorAll('.aura-glow');
      const chakras = document.querySelectorAll('.chakra');
      const auraParticles = document.querySelectorAll('.aura-particle');
      const flowLines = document.querySelectorAll('.flow-line');
      const silhouette = document.querySelector('.silhouette');

      const intensityInput = document.getElementById('intensityControl');
      const speedInput = document.getElementById('speedControl');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      let intensityMultiplier = 1;
      let speedMultiplier = 1;
      let isPaused = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Aura layers pulse
        auraLayers.forEach((layer, i) => {
          const duration = (2 + i * 0.3) / speedMultiplier;
          layer.style.setProperty('--aura-duration', duration + 's');
          layer.style.setProperty('--aura-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Aura glows
        auraGlows.forEach((glow, i) => {
          const duration = (2.5 + i * 0.2) / speedMultiplier;
          glow.style.setProperty('--glow-duration', duration + 's');
          glow.style.setProperty('--glow-delay', ((i * 0.08) / speedMultiplier) + 's');
        });

        // Chakras
        chakras.forEach((chakra, i) => {
          const duration = (1.5 + i * 0.15) / speedMultiplier;
          chakra.style.setProperty('--chakra-duration', duration + 's');
          chakra.style.setProperty('--chakra-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Particles
        auraParticles.forEach((p, i) => {
          const duration = (4 + (i % 4) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Flow lines
        flowLines.forEach((line, i) => {
          const duration = (3 + i * 0.3) / speedMultiplier;
          line.style.setProperty('--flow-duration', duration + 's');
          line.style.setProperty('--flow-delay', ((i * 0.1) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Aura layers
        auraLayers.forEach((layer, i) => {
          const opacity = 0.15 + i * 0.05;
          const finalOpacity = Math.min(opacity * intensityMultiplier, 0.5);
          layer.style.setProperty('--aura-opacity', finalOpacity);
          const scale = 1 + (i * 0.04) * intensityMultiplier;
          layer.style.setProperty('--aura-scale', scale);
        });

        // Aura glows
        auraGlows.forEach((glow, i) => {
          const opacity = 0.15 + i * 0.04;
          const finalOpacity = Math.min(opacity * intensityMultiplier, 0.4);
          glow.style.setProperty('--glow-opacity', finalOpacity);
        });

        // Chakras
        chakras.forEach((chakra) => {
          const size = 6 * intensityMultiplier;
          chakra.style.setProperty('--chakra-size', size + 'px');
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          chakra.style.setProperty('--chakra-opacity', opacity);
        });

        // Particles
        auraParticles.forEach((p) => {
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          p.style.setProperty('--particle-opacity', opacity);
        });

        // Flow lines
        flowLines.forEach((line) => {
          const opacity = Math.min(0.1 * intensityMultiplier, 0.2);
          line.style.setProperty('--flow-opacity', opacity);
        });
      }

      // ----- Update aura -----
      function updateAura(timestamp) {
        if (isPaused) return;

        // Subtle color shift for chakras
        chakras.forEach((chakra, i) => {
          const hue = (timestamp / 5000 + i * 51) % 360;
          const saturation = 70 + Math.sin(timestamp / 3000 + i) * 10;
          const lightness = 50 + Math.sin(timestamp / 2000 + i * 0.5) * 15;
          chakra.style.background = `radial-gradient(circle at 50% 40%, 
            hsl(${hue}, ${saturation}%, ${lightness + 20}%), 
            hsl(${hue}, ${saturation}%, ${lightness}%))`;
          chakra.style.boxShadow = `0 0 ${20 * intensityMultiplier}px hsla(${hue}, ${saturation}%, ${lightness}%, 0.15)`;
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateAura(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Toggle pause -----
      function togglePause() {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶️ Play' : '⏸️ Pause';
        if (!isPaused) {
          lastTimestamp = 0;
        }
      }

      // ----- Reset -----
      function resetAura() {
        if (isPaused) {
          togglePause();
        }
        lastTimestamp = 0;

        // Reset chakra colors
        chakras.forEach((chakra, i) => {
          const hues = [330, 280, 230, 180, 120, 60, 0];
          const hue = hues[i % hues.length];
          chakra.style.background = `radial-gradient(circle at 50% 40%, 
            hsl(${hue}, 80%, 70%), 
            hsl(${hue}, 80%, 50%))`;
          chakra.style.boxShadow = `0 0 20px hsla(${hue}, 80%, 60%, 0.15)`;
        });
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        // Set initial chakra colors
        chakras.forEach((chakra, i) => {
          const hues = [330, 280, 230, 180, 120, 60, 0];
          const hue = hues[i % hues.length];
          chakra.style.background = `radial-gradient(circle at 50% 40%, 
            hsl(${hue}, 80%, 70%), 
            hsl(${hue}, 80%, 50%))`;
          chakra.style.boxShadow = `0 0 20px hsla(${hue}, 80%, 60%, 0.15)`;
        });

        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      pauseBtn.addEventListener('click', togglePause);
      resetBtn.addEventListener('click', resetAura);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
