<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Color Picker</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../dist/easemotion.css">

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page">

        <section class="picker-card ease-fade-up">

            <div class="neon-line"></div>

            <h1 class="title ease-slide-up">
                Ripple Color Picker
            </h1>

            <div class="color-picker">

                <label class="swatch">
                    <input type="radio" name="theme" checked aria-label="Red">
                    <span class="circle red ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Orange">
                    <span class="circle orange ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Yellow">
                    <span class="circle yellow ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Green">
                    <span class="circle green ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Cyan">
                    <span class="circle cyan ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Blue">
                    <span class="circle blue ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Purple">
                    <span class="circle purple ease-scale"></span>
                </label>

                <label class="swatch">
                    <input type="radio" name="theme" aria-label="Pink">
                    <span class="circle pink ease-scale"></span>
                </label>

            </div>

        </section>

    </main>

</body>

</html>
