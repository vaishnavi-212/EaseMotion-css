<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Shake Popover - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="catalog-demo">
    <article class="product-card">
      <h2 class="product-title">Wireless Studio Headphones</h2>
      <p class="product-price">$299.00</p>

      <div class="popover-wrapper">
        <button type="button" class="popover-trigger" aria-describedby="shipping-popover">
          <span>Shipping Specs</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        </button>

        <div id="shipping-popover" class="popover-panel" role="tooltip">
          <div class="popover-header">
            Free Express Shipping
          </div>
          <p class="popover-body">
            Delivered in 2-3 business days with full package tracking and carbon-neutral transit.
          </p>
          <div class="popover-meta">
            <span>In Stock</span>
            <span>Ships Worldwide</span>
          </div>
        </div>
      </div>
    </article>
  </main>
</body>

</html>
