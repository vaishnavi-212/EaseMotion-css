<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Popover - Accessible Web Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="content-wrapper">
    <header>
      <h1>Account Settings</h1>
      <p>Manage your personal information and preferences.</p>
    </header>

    <div class="actions">
      <!-- High contrast button with clear text and icon -->
      <button class="trigger-btn" popovertarget="privacy-popover">
        Privacy Options
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-left: 12px;"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      <!-- Accessible Popover -->
      <div id="privacy-popover" class="popover" popover>
        <div class="popover-header">
          <h2>Data Sharing Preferences</h2>
          <!-- Clear text + icon for close button to maximize accessibility -->
          <button class="close-btn" popovertarget="privacy-popover" popovertargetaction="hide">
            Close
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-left: 8px;"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="popover-body">
          <fieldset class="accessible-fieldset">
            <legend>Select data you wish to share:</legend>
            <label class="accessible-checkbox">
              <input type="checkbox" name="data" value="analytics" checked>
              <span class="custom-checkbox"></span>
              <span class="label-text">Usage Analytics (Anonymous)</span>
            </label>
            <label class="accessible-checkbox">
              <input type="checkbox" name="data" value="marketing">
              <span class="custom-checkbox"></span>
              <span class="label-text">Marketing Communications</span>
            </label>
            <label class="accessible-checkbox">
              <input type="checkbox" name="data" value="third-party">
              <span class="custom-checkbox"></span>
              <span class="label-text">Third-Party Partners</span>
            </label>
          </fieldset>
        </div>
        <div class="popover-footer">
          <button class="primary-btn" popovertarget="privacy-popover" popovertargetaction="hide">Save Preferences</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
