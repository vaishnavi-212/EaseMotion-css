<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Border Line Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">
        <section class="glass-card">

            <p class="eyebrow">GLASSMOTION / ANALYTICS</p>

            <h1>Build better experiences.</h1>

            <p class="description">
                Hover or focus the information button to reveal additional
                details with a smooth border-drawing animation.
            </p>

            <div class="tooltip-wrapper">

                <button
                    class="info-button"
                    aria-label="Show additional information"
                >
                    i
                </button>

                <div class="tooltip" role="tooltip">

                    <span class="tooltip-label">INSIGHT</span>

                    <h2>Designed with motion</h2>

                    <p>
                        A lightweight tooltip interaction using only CSS
                        animations and custom properties.
                    </p>

                    <div class="tooltip-line"></div>

                </div>

            </div>

        </section>
    </main>

</body>
</html>
