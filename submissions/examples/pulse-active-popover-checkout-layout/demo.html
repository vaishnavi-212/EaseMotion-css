<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Popover Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="checkout-container">
        <h1 class="page-title">Pulse Active popover for e-commerce checkout layouts</h1>
        <section class="checkout-card">
            <h1>Checkout</h1>
            <div class="product">
                <h2>Premium Sneakers</h2>
                <p>₹2,999</p>
            </div> 
            <hr>
            <div class="coupon-section">
                <button class="coupon-btn">
                    Apply Coupon
                </button>
                <div class="popover">
                    <h3>Save More!</h3>
                    <p>Enter your coupon code below.</p>
                    <label for="coupon">
                        Coupon Code
                    </label>
                    <input
                        type="text"
                        id="coupon"
                        placeholder="SAVE20">
                    <button>
                        Apply Discount
                    </button>
                </div>
            </div>
            <hr>
            <div class="total">
                <span>Total</span>
                <strong>₹2,999</strong>
            </div>
            <button class="checkout-btn">
                Proceed to Payment
            </button>
        </section>
    </main>
</body>
</html>
