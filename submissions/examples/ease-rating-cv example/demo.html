<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Star Rating</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="rating-card">

    <h2>Rate Your Experience</h2>

    <p class="subtitle">
        Click a star to leave your rating.
    </p>

    <div class="stars" id="stars">

        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>

    </div>

    <div class="rating-value" id="value">
        0 / 5
    </div>

    <div class="rating-text" id="text">
        No rating selected
    </div>

</div>

<script>
const stars = document.querySelectorAll(".star");
const value = document.getElementById("value");
const text = document.getElementById("text");

const labels = [
    "",
    "Poor 😕",
    "Fair 🙂",
    "Good 😊",
    "Very Good 🤩",
    "Excellent ⭐"
];

stars.forEach((star,index)=>{

    star.addEventListener("click",()=>{

        const rating = index + 1;

        stars.forEach((item,i)=>{

            item.classList.toggle("active",i < rating);

        });

        value.textContent = rating + " / 5";
        text.textContent = labels[rating];

        createRipple(star);

    });

});

function createRipple(star){

    const ripple = document.createElement("span");

    ripple.className = "ripple";

    const rect = star.getBoundingClientRect();

    ripple.style.left = rect.left + rect.width/2 + "px";
    ripple.style.top = rect.top + rect.height/2 + "px";

    document.body.appendChild(ripple);

    ripple.addEventListener("animationend",()=>{

        ripple.remove();

    });

}
</script>

</body>
</html>
