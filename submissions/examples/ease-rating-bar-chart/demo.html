<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rating Bar Chart Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Rating Bar Chart</h1>
  <p>A star-rating breakdown chart with horizontal bars that animate in on load.</p>

  <div class="demo-row">

    <div class="rating-bar-chart">
      <div class="rbc-row" style="--percent: 72;">
        <span class="rbc-star-label">5 ★</span>
        <div class="rbc-track"><div class="rbc-fill"></div></div>
        <span class="rbc-count">720</span>
      </div>
      <div class="rbc-row" style="--percent: 18;">
        <span class="rbc-star-label">4 ★</span>
        <div class="rbc-track"><div class="rbc-fill"></div></div>
        <span class="rbc-count">180</span>
      </div>
      <div class="rbc-row" style="--percent: 6;">
        <span class="rbc-star-label">3 ★</span>
        <div class="rbc-track"><div class="rbc-fill"></div></div>
        <span class="rbc-count">60</span>
      </div>
      <div class="rbc-row" style="--percent: 3;">
        <span class="rbc-star-label">2 ★</span>
        <div class="rbc-track"><div class="rbc-fill"></div></div>
        <span class="rbc-count">30</span>
      </div>
      <div class="rbc-row" style="--percent: 1;">
        <span class="rbc-star-label">1 ★</span>
        <div class="rbc-track"><div class="rbc-fill"></div></div>
        <span class="rbc-count">10</span>
      </div>
    </div>

  </div>

</body>
</html>
