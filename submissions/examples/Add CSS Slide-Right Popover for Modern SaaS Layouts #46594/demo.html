<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Slide-Right Popover - EaseMotion</title>
  
  <!-- Load EaseMotion core CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Component specific styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="popover-container">
    <button class="popover-trigger" aria-haspopup="true">
      Hover or Focus Me
    </button>
    <div class="popover-content" role="tooltip">
      <div class="popover-header">Pro Feature Unlocked</div>
      <div class="popover-body">
        This is a pure CSS slide-right popover designed for modern SaaS interfaces. It seamlessly supports keyboard navigation and uses EaseMotion variables for a cohesive look.
      </div>
    </div>
  </div>

</body>
</html>
