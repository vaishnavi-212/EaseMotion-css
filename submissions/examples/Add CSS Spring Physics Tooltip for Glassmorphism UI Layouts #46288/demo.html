<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Spring Physics Tooltip - Glassmorphism UI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-layout">
    
    <!-- Decorative background elements to show off the glass effect -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="glass-widget">
      <div class="widget-header">
        <h2>Weather Overview</h2>
        <span class="location">San Francisco, CA</span>
      </div>
      
      <div class="forecast-row">
        
        <!-- Tooltip Container 1 -->
        <div class="tooltip-container">
          <button class="forecast-day" aria-label="Forecast for Monday" aria-describedby="tooltip-mon">
            <span class="day">Mon</span>
            <span class="icon">☀️</span>
            <span class="temp">72°</span>
          </button>
          
          <div id="tooltip-mon" class="tooltip glass-panel" role="tooltip">
            <div class="tooltip-content">
              <strong>Monday Details</strong>
              <div class="stats">
                <span>Humidity: 45%</span>
                <span>Wind: 12 mph</span>
                <span>UV Index: High</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Tooltip Container 2 -->
        <div class="tooltip-container">
          <button class="forecast-day" aria-label="Forecast for Tuesday" aria-describedby="tooltip-tue">
            <span class="day">Tue</span>
            <span class="icon">⛅</span>
            <span class="temp">68°</span>
          </button>
          
          <div id="tooltip-tue" class="tooltip glass-panel" role="tooltip">
            <div class="tooltip-content">
              <strong>Tuesday Details</strong>
              <div class="stats">
                <span>Humidity: 55%</span>
                <span>Wind: 8 mph</span>
                <span>Precipitation: 10%</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Tooltip Container 3 -->
        <div class="tooltip-container">
          <button class="forecast-day" aria-label="Forecast for Wednesday" aria-describedby="tooltip-wed">
            <span class="day">Wed</span>
            <span class="icon">🌧️</span>
            <span class="temp">61°</span>
          </button>
          
          <div id="tooltip-wed" class="tooltip glass-panel" role="tooltip">
            <div class="tooltip-content">
              <strong>Wednesday Details</strong>
              <div class="stats">
                <span>Humidity: 85%</span>
                <span>Wind: 18 mph</span>
                <span>Precipitation: 90%</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
