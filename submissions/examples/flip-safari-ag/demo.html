<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Animation Safari Glitch Reproduction</title>
    <link rel="stylesheet" href="../../../core/animations.css">
    <link rel="stylesheet" href="../../../core/base.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Flip Animation Safari Reproduction</h1>
        <p>This demo reproduces the reported Safari flip animation stuttering.</p>
        
        <div class="demo-section">
            <h3>Standard Flip (Glitchy on Safari)</h3>
            <div class="card-container">
                <div class="card em-anim-flip-in">
                    <h2>Front Side</h2>
                    <p>Unoptimized Card</p>
                </div>
            </div>
        </div>

        <div class="demo-section">
            <h3>Optimized Flip (Smooth)</h3>
            <div class="card-container">
                <div class="card em-anim-flip-in optimized">
                    <h2>Optimized Card</h2>
                    <p>GPU Accelerated</p>
                </div>
            </div>
        </div>

        <button id="replay-btn">Replay Animation</button>
    </main>

    <script>
        const replayBtn = document.getElementById('replay-btn');
        const cards = document.querySelectorAll('.card');

        replayBtn.addEventListener('click', () => {
            cards.forEach(card => {
                // To replay the animation, we remove and re-add the classes
                card.classList.remove('em-anim-flip-in');
                void card.offsetWidth; // trigger reflow
                card.classList.add('em-anim-flip-in');
            });
        });
    </script>
</body>
</html>
