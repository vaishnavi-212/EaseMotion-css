<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotate-Click Cyberpunk Popover Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Rotate-Click Popover</h1>
  <p>A pure CSS popover that rotates into view on click, styled with cyberpunk neon accents. Uses the native HTML Popover API.</p>

  <div class="demo-row">

    <div class="cyber-wrap">
      <button class="cyber-trigger" popovertarget="cyber-pop-1">
        SYSTEM.INFO
      </button>
      <div class="cyber-popover" id="cyber-pop-1" popover>
        <h3 class="cyber-popover-title">Node Status</h3>
        <p class="cyber-popover-body">Uptime: 47d 12h · Latency: 8ms · Sync: stable across all shards.</p>
      </div>
    </div>

    <div class="cyber-wrap">
      <button class="cyber-trigger" popovertarget="cyber-pop-2">
        ACCESS.LOG
      </button>
      <div class="cyber-popover" id="cyber-pop-2" popover style="--cyber-rotate: -12deg; --cyber-timing: 0.5s;">
        <h3 class="cyber-popover-title">Recent Access</h3>
        <p class="cyber-popover-body">3 sessions in the last hour, all from verified terminals.</p>
      </div>
    </div>

  </div>

</body>
</html>
