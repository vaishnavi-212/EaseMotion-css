<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Station Terminal - Glitch Dark Mode Toggle Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="space-viewport">
        <!-- Main Premium Space Command Elevation Container Hub Card -->
        <div class="terminal-container-card">
            <header class="terminal-header">
                <div class="neon-matrix-badge">ORBITAL NODE: ECLIPSE</div>
                <h2 class="terminal-title">System Luminance</h2>
                <p class="terminal-subtitle">Engage the interactive cyber-switch below to toggle cosmic lighting channels and fire pure-CSS multi-layered digital glitch distortions.</p>
            </header>

            <!-- Advanced Pure-CSS Toggle Presentation Stage Area Canvas -->
            <div class="toggle-stage-workspace">
                <div class="glitch-toggle-wrapper">
                    
                    <!-- Sibling HTML Checkbox Gate Configuration Key Node Trigger -->
                    <input type="checkbox" id="cosmic-gate-input" class="glitch-checkbox-input">
                    
                    <!-- Tactile Visual Label Target Trigger Framework Base -->
                    <label for="cosmic-gate-input" class="glitch-toggle-track">
                        <div class="glitch-handle ease-switch-snap">
                            <!-- Dual Specular Light Variant Emblems -->
                            <span class="handle-icon sun-vector">☀️</span>
                            <span class="handle-icon moon-vector">🌙</span>
                        </div>
                        
                        <!-- Layered Glitch Hologram Label Overlays -->
                        <span class="glitch-hologram-text text-light" data-text="LIGHT_ON">LIGHT_ON</span>
                        <span class="glitch-hologram-text text-dark" data-text="DARK_CORE">DARK_CORE</span>
                    </label>

                </div>
            </div>

            <footer class="terminal-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Cosmic Lighting Bus Matrix Synced</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
