<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Row Highlight</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="invoice-stage" aria-label="Invoice row highlight animation demo">
      <section class="invoice-card">
        <h1>Invoices</h1>
        <div class="row" tabindex="0">
          <span>INV-2048</span>
          <strong>$840</strong>
          <em>Paid</em>
        </div>
        <div class="row active" tabindex="0">
          <span>INV-2049</span>
          <strong>$1,250</strong>
          <em>Due</em>
        </div>
      </section>
    </main>
  </body>
</html>
