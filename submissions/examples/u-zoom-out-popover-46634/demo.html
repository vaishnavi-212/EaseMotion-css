<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-Out Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            View Portfolio
        </button>

        <div class="popover" tabindex="0">

            <div class="profile">

                <img src="https://picsum.photos/100" alt="Designer">

                <div>
                    <h2>Emma Wilson</h2>
                    <p>Creative Designer</p>
                </div>

            </div>

            <div class="projects">

                <div class="project">
                    <h3>Brand Identity</h3>
                    <span>12 Projects</span>
                </div>

                <div class="project">
                    <h3>UI/UX Design</h3>
                    <span>18 Projects</span>
                </div>

                <div class="project">
                    <h3>Illustrations</h3>
                    <span>9 Projects</span>
                </div>

            </div>

            <button class="action">
                Explore Portfolio
            </button>

        </div>

    </div>

</div>

</body>
</html>
