<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Sort Arrow Flip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion table</p>
    <h1 id="demo-title">Table sort arrow flip</h1>
    <p class="intro">A sortable table header with an arrow that flips to show the active sort direction.</p>

    <button class="sort-button" type="button" aria-label="Sort by updated date descending">
      Updated
      <span class="arrow" aria-hidden="true"></span>
    </button>
  </main>
</body>
</html>
