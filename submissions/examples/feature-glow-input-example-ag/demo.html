<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Input Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-ag">
        <h2>Subscribe to Newsletter</h2>
        
        <div class="input-group-ag">
            <label for="email-ag" class="input-label-ag">Email Address</label>
            <input 
                type="email" 
                id="email-ag" 
                class="ease-glow-input-ag" 
                placeholder="you@example.com" 
                required
            >
        </div>
        
    </div>
</body>
</html>
