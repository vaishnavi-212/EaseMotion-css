<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Temple Run Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <h1>Temple Run Animation</h1>

    <div class="game-area">
      <div class="road"></div>

      <div class="player">
        🏃
      </div>

      <div class="coin coin1">🟡</div>
      <div class="coin coin2">🟡</div>

      <div class="obstacle">
        🌲
      </div>
    </div>

    <button class="start-btn">Start Run</button>
  </div>

</body>
