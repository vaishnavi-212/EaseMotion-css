<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Zoom Onboarding Tooltip</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="demo-layout">

    <section class="portfolio-card ease-fade-in">

        <span class="portfolio-badge">
            Portfolio
        </span>

        <h1 class="ease-slide-up">
            Hi, I'm Alex 👋
        </h1>

        <p>
            Frontend developer passionate about building accessible,
            responsive, and delightful web experiences.
        </p>

        <div class="tooltip-container">

            <button class="portfolio-btn">
                View Projects
            </button>

            <div
                class="onboarding-tooltip"
                role="tooltip"
            >
                <strong>Start Here</strong>
                <span>
                    Explore my featured projects and recent work.
                </span>

                <div class="tooltip-arrow"></div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
