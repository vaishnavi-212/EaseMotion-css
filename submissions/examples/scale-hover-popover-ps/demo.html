<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Scale-Hover Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="interface-dark-theme">
    <main class="app-container">
        <section class="control-panel">
            <header class="panel-header">
                <span class="panel-badge">Analytics Stack</span>
                <h1 class="panel-title">Server Metrics</h1>
                <p class="panel-text">Hover or focus the triggers below to inspect live core thread scaling allocations.</p>
            </header>

            <!-- Interactive Trigger Items with Built-In Popovers -->
            <div class="interactive-triggers-row">
                
                <!-- Node 01 Group -->
                <div class="popover-wrapper">
                    <button class="trigger-node" aria-haspopup="true" aria-expanded="false">
                        Core 01
                    </button>
                    <!-- Pure CSS Hover/Focus Scale Card Overlay -->
                    <div class="scale-popover" role="tooltip">
                        <div class="popover-arrow"></div>
                        <h3 class="popover-heading">Core Thread 01</h3>
                        <p class="popover-detail">Allocation: <strong>42%</strong></p>
                        <span class="status-tag status-green">Stable</span>
                    </div>
                </div>

                <!-- Node 02 Group -->
                <div class="popover-wrapper">
                    <button class="trigger-node" aria-haspopup="true" aria-expanded="false">
                        Core 02
                    </button>
                    <div class="scale-popover" role="tooltip">
                        <div class="popover-arrow"></div>
                        <h3 class="popover-heading">Core Thread 02</h3>
                        <p class="popover-detail">Allocation: <strong>89%</strong></p>
                        <span class="status-tag status-amber">High Load</span>
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
