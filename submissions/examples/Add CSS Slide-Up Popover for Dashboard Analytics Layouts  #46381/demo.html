<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Slide-Up Popover - Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <div class="metric-card">
      <div class="card-header">
        <div class="title-group">
          <h2>Total Revenue</h2>
          <span class="trend positive">↑ 14.2%</span>
        </div>
        
        <!-- Popover Trigger -->
        <button popovertarget="filter-popover" style="anchor-name: --filter-anchor;" class="icon-btn" aria-label="Open filters">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
      
      <div class="metric-value">$124,592.00</div>
      <div class="chart-placeholder">
        <!-- Abstract sparkline using CSS borders/gradients -->
        <div class="sparkline"></div>
      </div>
    </div>

    <!-- The Popover -->
    <div id="filter-popover" popover class="popover-menu" style="position-anchor: --filter-anchor;">
      <div class="popover-header">
        <h3>Metric Options</h3>
      </div>
      <div class="popover-body">
        <button class="menu-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Change Date Range
        </button>
        <button class="menu-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV Data
        </button>
        <div class="divider"></div>
        <button class="menu-item danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Remove Widget
        </button>
      </div>
    </div>
  </div>
</body>
</html>
