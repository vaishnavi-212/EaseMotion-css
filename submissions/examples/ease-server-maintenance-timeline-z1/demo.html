<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Maintenance Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="timeline-card">
<h2>Maintenance Timeline</h2>

<div class="timeline-item complete">
<div class="dot"></div>
<div class="content">
<h4>Backup Started</h4>
<p>02:00 AM</p>
</div>
</div>

<div class="timeline-item active">
<div class="dot"></div>
<div class="content">
<h4>Security Updates</h4>
<p>02:30 AM</p>
</div>
</div>

<div class="timeline-item">
<div class="dot"></div>
<div class="content">
<h4>Restart Services</h4>
<p>03:00 AM</p>
</div>
</div>

<div class="timeline-item">
<div class="dot"></div>
<div class="content">
<h4>Maintenance Complete</h4>
<p>03:30 AM</p>
</div>
</div>

</section>
</body>
</html>
