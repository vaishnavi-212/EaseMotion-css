<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Eye Glow – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🐉 Dragon Eye Glow</h1>
    <p class="subtitle">Dragon eye with slitted pupil glowing</p>

    <div class="de-container">
      <div class="de-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Scales texture -->
        <div class="scales-texture"></div>

        <!-- Dragon Eye -->
        <div class="dragon-eye">
          <!-- Eye socket -->
          <div class="eye-socket">
            <!-- Eye lid scales -->
            <div class="scale scale-1"></div>
            <div class="scale scale-2"></div>
            <div class="scale scale-3"></div>
            <div class="scale scale-4"></div>
            <div class="scale scale-5"></div>
            <div class="scale scale-6"></div>
            <div class="scale scale-7"></div>
            <div class="scale scale-8"></div>
            <div class="scale scale-9"></div>
            <div class="scale scale-10"></div>
            <div class="scale scale-11"></div>
            <div class="scale scale-12"></div>

            <!-- Upper eyelid -->
            <div class="eyelid upper-lid"></div>

            <!-- Lower eyelid -->
            <div class="eyelid lower-lid"></div>

            <!-- Eye white (sclera) -->
            <div class="sclera">
              <!-- Blood vessels -->
              <div class="vessel v1"></div>
              <div class="vessel v2"></div>
              <div class="vessel v3"></div>
              <div class="vessel v4"></div>
              <div class="vessel v5"></div>
              <div class="vessel v6"></div>
            </div>

            <!-- Iris -->
            <div class="iris">
              <!-- Iris pattern -->
              <div class="iris-ring ir1"></div>
              <div class="iris-ring ir2"></div>
              <div class="iris-ring ir3"></div>
              <div class="iris-ring ir4"></div>
              <div class="iris-ring ir5"></div>
              <div class="iris-ring ir6"></div>
              <div class="iris-ring ir7"></div>
              <div class="iris-ring ir8"></div>

              <!-- Slitted pupil -->
              <div class="pupil">
                <div class="pupil-slit"></div>
                <div class="pupil-glow"></div>
              </div>

              <!-- Iris glow -->
              <div class="iris-glow"></div>
            </div>

            <!-- Eye glow -->
            <div class="eye-glow"></div>

            <!-- Ambient glow -->
            <div class="ambient-glow"></div>

            <!-- Light rays -->
            <div class="light-ray lr1"></div>
            <div class="light-ray lr2"></div>
            <div class="light-ray lr3"></div>
            <div class="light-ray lr4"></div>
            <div class="light-ray lr5"></div>
            <div class="light-ray lr6"></div>
            <div class="light-ray lr7"></div>
            <div class="light-ray lr8"></div>

            <!-- Energy particles -->
            <div class="energy-particle ep1"></div>
            <div class="energy-particle ep2"></div>
            <div class="energy-particle ep3"></div>
            <div class="energy-particle ep4"></div>
            <div class="energy-particle ep5"></div>
            <div class="energy-particle ep6"></div>
            <div class="energy-particle ep7"></div>
            <div class="energy-particle ep8"></div>
            <div class="energy-particle ep9"></div>
            <div class="energy-particle ep10"></div>
            <div class="energy-particle ep11"></div>
            <div class="energy-particle ep12"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <label>
        Pulse Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const iris = document.querySelector('.iris');
      const pupil = document.querySelector('.pupil');
      const pupilSlit = document.querySelector('.pupil-slit');
      const pupilGlow = document.querySelector('.pupil-glow');
      const irisGlow = document.querySelector('.iris-glow');
      const eyeGlow = document.querySelector('.eye-glow');
      const ambientGlow = document.querySelector('.ambient-glow');
      const lightRays = document.querySelectorAll('.light-ray');
      const energyParticles = document.querySelectorAll('.energy-particle');
      const vessels = document.querySelectorAll('.vessel');
      const irisRings = document.querySelectorAll('.iris-ring');

      const intensityInput = document.getElementById('intensityControl');
      const speedInput = document.getElementById('speedControl');
      const resetBtn = document.getElementById('resetBtn');

      let intensityMultiplier = 1;
      let speedMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Iris pulse
        iris.style.setProperty('--iris-duration', (2 / speedMultiplier) + 's');

        // Pupil glow
        pupilGlow.style.setProperty('--pupil-duration', (0.8 / speedMultiplier) + 's');

        // Iris glow
        irisGlow.style.setProperty('--iris-glow-duration', (1.5 / speedMultiplier) + 's');

        // Eye glow
        eyeGlow.style.setProperty('--eye-glow-duration', (2.5 / speedMultiplier) + 's');

        // Ambient glow
        ambientGlow.style.setProperty('--ambient-duration', (3 / speedMultiplier) + 's');

        // Light rays
        lightRays.forEach((ray, i) => {
          const duration = (2 + i * 0.15) / speedMultiplier;
          ray.style.setProperty('--ray-duration', duration + 's');
          ray.style.setProperty('--ray-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Energy particles
        energyParticles.forEach((p, i) => {
          const duration = (2.5 + (i % 4) * 0.3) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Vessels
        vessels.forEach((v, i) => {
          const duration = (3 + i * 0.2) / speedMultiplier;
          v.style.setProperty('--vessel-duration', duration + 's');
          v.style.setProperty('--vessel-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Iris rings
        irisRings.forEach((ring, i) => {
          const duration = (2.5 + i * 0.1) / speedMultiplier;
          ring.style.setProperty('--ring-duration', duration + 's');
          ring.style.setProperty('--ring-delay', ((i * 0.02) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Pupil glow
        const pupilOpacity = Math.min(0.5 * intensityMultiplier, 1);
        pupilGlow.style.setProperty('--pupil-intensity', pupilOpacity);
        const pupilSize = 60 * intensityMultiplier;
        pupilGlow.style.setProperty('--pupil-size', pupilSize + 'px');

        // Iris glow
        const irisOpacity = Math.min(0.4 * intensityMultiplier, 0.8);
        irisGlow.style.setProperty('--iris-intensity', irisOpacity);
        const irisSize = 120 * intensityMultiplier;
        irisGlow.style.setProperty('--iris-glow-size', irisSize + 'px');

        // Eye glow
        const eyeOpacity = Math.min(0.2 * intensityMultiplier, 0.4);
        eyeGlow.style.setProperty('--eye-intensity', eyeOpacity);
        const eyeSize = 200 * intensityMultiplier;
        eyeGlow.style.setProperty('--eye-glow-size', eyeSize + 'px');

        // Ambient glow
        const ambientOpacity = Math.min(0.1 * intensityMultiplier, 0.2);
        ambientGlow.style.setProperty('--ambient-intensity', ambientOpacity);
        const ambientSize = 300 * intensityMultiplier;
        ambientGlow.style.setProperty('--ambient-size', ambientSize + 'px');

        // Light rays
        lightRays.forEach((ray) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          ray.style.setProperty('--ray-intensity', opacity);
        });

        // Energy particles
        energyParticles.forEach((p) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          p.style.setProperty('--particle-intensity', opacity);
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
        });

        // Iris rings
        irisRings.forEach((ring) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          ring.style.setProperty('--ring-intensity', opacity);
        });

        // Pupil slit
        const slitWidth = 4 * intensityMultiplier;
        pupilSlit.style.setProperty('--slit-width', slitWidth + 'px');
      }

      // ----- Update eye -----
      function updateEye(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle pupil dilation animation
        const dilation = Math.sin(timestamp / 3000) * 0.1 + 0.9;
        pupilSlit.style.transform = `translate(-50%, -50%) scaleY(${dilation})`;

        // Iris ring rotation
        irisRings.forEach((ring, i) => {
          const rotation = timestamp / (5000 + i * 500);
          ring.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
        });

        // Energy particle positions
        energyParticles.forEach((p, i) => {
          const angle = timestamp / (3000 + i * 200) + i * 1.2;
          const radius = 30 + i * 8;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle * 0.7 + i) * radius * 0.6;
          p.style.setProperty('--p-x', x + 'px');
          p.style.setProperty('--p-y', y + 'px');
        });
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateEye(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Reset -----
      function resetEye() {
        lastTimestamp = 0;

        // Reset pupil
        pupilSlit.style.transform = 'translate(-50%, -50%) scaleY(1)';

        // Reset iris rings
        irisRings.forEach((ring) => {
          ring.style.transform = 'translate(-50%, -50%) rotate(0deg)';
        });

        // Reset particles
        energyParticles.forEach((p) => {
          p.style.setProperty('--p-x', '0px');
          p.style.setProperty('--p-y', '0px');
        });
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      resetBtn.addEventListener('click', resetEye);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
