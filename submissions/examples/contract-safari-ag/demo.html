<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contract Animation Safari Stutter Reproduction</title>
  <link rel="stylesheet" href="../../../easemotion/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Contract Animation on Safari</h1>
    <p>This demo reproduces the stuttering effect of the Contract animation on Safari and compares it against an optimized version using GPU acceleration.</p>
    
    <div class="demo-section">
      <div class="box-container">
        <h3>Standard Contract</h3>
        <p>May stutter on Safari</p>
        <div class="box standard" id="box1">Hover Me</div>
      </div>
      
      <div class="box-container">
        <h3>Optimized Contract</h3>
        <p>Uses GPU Compositing</p>
        <div class="box optimized" id="box2">Hover Me</div>
      </div>
    </div>
  </div>
</body>
</html>
