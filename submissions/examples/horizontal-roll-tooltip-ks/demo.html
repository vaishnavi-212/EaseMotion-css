<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Roll Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-card" aria-labelledby="hero-title">
      <p class="brand-kicker">EaseMotion CSS</p>

      <h1 id="hero-title">
        Create Modern Interfaces with Pure CSS Motion
      </h1>

      <p class="hero-copy">
        Build responsive UI components with elegant animations and zero
        JavaScript. Perfect for landing pages.
      </p>

      <div class="tooltip tooltip--top">
        <a
          class="cta-button"
          href="#features"
          aria-describedby="explore-tooltip">
          Explore Components
        </a>

        <span class="tooltip__bubble" id="explore-tooltip" role="tooltip">
          Browse animated components built with accessible CSS patterns.
        </span>
      </div>

      <div class="feature-line" id="features" aria-label="Component qualities">
        <span>Pure CSS</span>
        <span>Responsive</span>
        <span>Accessible</span>
      </div>
    </section>
  </main>
</body>
</html>
