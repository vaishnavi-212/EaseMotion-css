<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fade-Out Popover for Accessible Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="accessible-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="fade-popover-content">
        Keyboard Shortcuts
      </button>
      
      <div id="fade-popover-content" class="ease-fade-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <h2 id="popover-title">Available Shortcuts</h2>
          <ul class="shortcut-list">
            <li><strong>Tab:</strong> Move focus forward</li>
            <li><strong>Shift + Tab:</strong> Move focus backward</li>
            <li><strong>Enter / Space:</strong> Activate button or link</li>
            <li><strong>Esc:</strong> Close menus (via JS, or click away for CSS)</li>
          </ul>
          <div class="popover-actions">
            <button class="btn-primary" aria-label="Acknowledge shortcuts">Got it</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
