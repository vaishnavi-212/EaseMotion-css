<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synesthesia Display – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🎵 Synesthesia Display</h1>
    <p class="subtitle">Sound visualized as colors and shapes</p>

    <div class="syn-container">
      <div class="syn-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Audio visualizer - circular -->
        <div class="visualizer">
          <!-- Frequency bars (outer ring) -->
          <div class="freq-bar bar-1"></div>
          <div class="freq-bar bar-2"></div>
          <div class="freq-bar bar-3"></div>
          <div class="freq-bar bar-4"></div>
          <div class="freq-bar bar-5"></div>
          <div class="freq-bar bar-6"></div>
          <div class="freq-bar bar-7"></div>
          <div class="freq-bar bar-8"></div>
          <div class="freq-bar bar-9"></div>
          <div class="freq-bar bar-10"></div>
          <div class="freq-bar bar-11"></div>
          <div class="freq-bar bar-12"></div>
          <div class="freq-bar bar-13"></div>
          <div class="freq-bar bar-14"></div>
          <div class="freq-bar bar-15"></div>
          <div class="freq-bar bar-16"></div>

          <!-- Inner visualizer shapes -->
          <div class="shape-circle"></div>
          <div class="shape-triangle"></div>
          <div class="shape-square"></div>
          <div class="shape-diamond"></div>

          <!-- Color waves -->
          <div class="color-wave cw1"></div>
          <div class="color-wave cw2"></div>
          <div class="color-wave cw3"></div>
          <div class="color-wave cw4"></div>

          <!-- Center glow -->
          <div class="center-glow"></div>

          <!-- Floating particles -->
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
          <div class="particle p5"></div>
          <div class="particle p6"></div>
          <div class="particle p7"></div>
          <div class="particle p8"></div>
          <div class="particle p9"></div>
          <div class="particle p10"></div>
          <div class="particle p11"></div>
          <div class="particle p12"></div>
        </div>

        <!-- Audio controls -->
        <div class="audio-controls">
          <button id="playBtn">▶️ Play</button>
          <button id="pauseAudioBtn">⏸️ Pause</button>
          <label>
            Volume
            <input type="range" id="volumeControl" min="0" max="100" value="70" />
          </label>
          <button id="resetSynBtn">⟳ Reset</button>
        </div>

        <!-- Color legend -->
        <div class="legend">
          <span class="legend-item" style="color: #ff6b6b;">●</span> Bass
          <span class="legend-item" style="color: #ffd93d;">●</span> Mid
          <span class="legend-item" style="color: #6bcbff;">●</span> Treble
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const freqBars = document.querySelectorAll('.freq-bar');
      const shapeCircle = document.querySelector('.shape-circle');
      const shapeTriangle = document.querySelector('.shape-triangle');
      const shapeSquare = document.querySelector('.shape-square');
      const shapeDiamond = document.querySelector('.shape-diamond');
      const colorWaves = document.querySelectorAll('.color-wave');
      const centerGlow = document.querySelector('.center-glow');
      const particles = document.querySelectorAll('.particle');
      const visualizer = document.querySelector('.visualizer');

      const playBtn = document.getElementById('playBtn');
      const pauseAudioBtn = document.getElementById('pauseAudioBtn');
      const volumeControl = document.getElementById('volumeControl');
      const resetSynBtn = document.getElementById('resetSynBtn');

      let isPlaying = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let audioContext = null;
      let analyser = null;
      let dataArray = null;
      let audioBuffer = null;
      let source = null;
      let volume = 0.7;

      // ----- Create audio context -----
      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;
          dataArray = new Uint8Array(analyser.frequencyBinCount);

          // Create synthetic audio (oscillator + noise)
          const bufferSize = audioContext.sampleRate * 2;
          const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const data = buffer.getChannelData(0);

          // Generate complex waveform with varied frequencies
          for (let i = 0; i < bufferSize; i++) {
            const t = i / audioContext.sampleRate;
            // Mix of frequencies for rich audio spectrum
            data[i] = Math.sin(t * 200 * Math.PI * 2) * 0.3 +
                      Math.sin(t * 400 * Math.PI * 2) * 0.2 +
                      Math.sin(t * 800 * Math.PI * 2) * 0.15 +
                      Math.sin(t * 1200 * Math.PI * 2) * 0.1 +
                      Math.sin(t * 2400 * Math.PI * 2) * 0.05 +
                      (Math.random() - 0.5) * 0.05;
          }

          audioBuffer = buffer;
        }
      }

      // ----- Play audio -----
      function playAudio() {
        initAudio();

        if (isPlaying) return;

        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }

        source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = true;
        source.connect(analyser);
        analyser.connect(audioContext.destination);

        const gainNode = audioContext.createGain();
        gainNode.gain.value = volume;
        analyser.connect(gainNode);
        gainNode.connect(audioContext.destination);

        source.start(0);
        isPlaying = true;
        playBtn.textContent = '▶️ Playing...';
        setTimeout(() => {
          playBtn.textContent = '▶️ Play';
        }, 1000);

        // Start visualization
        if (!animationFrame) {
          animateVisuals();
        }
      }

      // ----- Pause audio -----
      function pauseAudio() {
        if (source) {
          source.stop();
          source.disconnect();
          source = null;
        }
        isPlaying = false;
        pauseAudioBtn.textContent = '⏸️ Paused...';
        setTimeout(() => {
          pauseAudioBtn.textContent = '⏸️ Pause';
        }, 500);
      }

      // ----- Update volume -----
      function updateVolume(value) {
        volume = parseFloat(value) / 100;
      }

      // ----- Animate visuals -----
      function animateVisuals(timestamp) {
        if (!isPlaying) {
          // Still animate idle when paused
          idleAnimation(timestamp);
          animationFrame = requestAnimationFrame(animateVisuals);
          return;
        }

        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Get frequency data
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);

          // Update frequency bars
          const barCount = Math.min(freqBars.length, dataArray.length);
          for (let i = 0; i < barCount; i++) {
            const value = dataArray[i] / 255;
            const height = 10 + value * 60;
            const bar = freqBars[i];
            bar.style.height = height + 'px';
            bar.style.opacity = 0.3 + value * 0.7;

            // Color based on frequency
            const hue = (i / barCount) * 360;
            const lightness = 40 + value * 40;
            bar.style.background = `hsl(${hue}, 80%, ${lightness}%)`;
          }

          // Update shapes based on frequency data
          const bassAvg = getAverageFreq(0, 10);
          const midAvg = getAverageFreq(10, 30);
          const trebleAvg = getAverageFreq(30, 50);

          // Circle - bass
          const circleScale = 0.5 + bassAvg * 0.8;
          shapeCircle.style.transform = `translate(-50%, -50%) scale(${circleScale})`;
          shapeCircle.style.opacity = 0.3 + bassAvg * 0.5;
          shapeCircle.style.background = `radial-gradient(circle at 50% 40%, 
            rgba(255, 100, 100, ${0.2 + bassAvg * 0.4}), 
            rgba(200, 50, 50, ${0.1 + bassAvg * 0.2}))`;

          // Triangle - mid
          const triangleScale = 0.5 + midAvg * 0.8;
          shapeTriangle.style.transform = `translate(-50%, -50%) scale(${triangleScale}) rotate(${timestamp / 2000}deg)`;
          shapeTriangle.style.opacity = 0.3 + midAvg * 0.5;
          shapeTriangle.style.background = `radial-gradient(circle at 50% 40%, 
            rgba(255, 200, 50, ${0.2 + midAvg * 0.4}), 
            rgba(200, 150, 30, ${0.1 + midAvg * 0.2}))`;

          // Square - treble
          const squareScale = 0.5 + trebleAvg * 0.8;
          shapeSquare.style.transform = `translate(-50%, -50%) scale(${squareScale}) rotate(${-timestamp / 2500}deg)`;
          shapeSquare.style.opacity = 0.3 + trebleAvg * 0.5;
          shapeSquare.style.background = `radial-gradient(circle at 50% 40%, 
            rgba(80, 200, 255, ${0.2 + trebleAvg * 0.4}), 
            rgba(40, 150, 200, ${0.1 + trebleAvg * 0.2}))`;

          // Diamond - overall
          const overallAvg = (bassAvg + midAvg + trebleAvg) / 3;
          const diamondScale = 0.5 + overallAvg * 0.8;
          shapeDiamond.style.transform = `translate(-50%, -50%) scale(${diamondScale}) rotate(${timestamp / 3000}deg)`;
          shapeDiamond.style.opacity = 0.2 + overallAvg * 0.4;
          const hue = (bassAvg * 60 + midAvg * 180 + trebleAvg * 300) / 3;
          shapeDiamond.style.borderColor = `hsla(${hue}, 80%, 60%, ${0.3 + overallAvg * 0.4})`;

          // Color waves
          colorWaves.forEach((wave, i) => {
            const offset = i * 0.25;
            const waveHeight = 20 + 30 * Math.sin(timestamp / 1000 + offset) * overallAvg;
            wave.style.height = waveHeight + 'px';
            wave.style.opacity = 0.1 + overallAvg * 0.3;
            const waveHue = (hue + i * 60) % 360;
            wave.style.background = `linear-gradient(180deg, 
              hsla(${waveHue}, 80%, 60%, 0.15), 
              hsla(${waveHue + 30}, 80%, 40%, 0.05))`;
          });

          // Center glow
          const glowIntensity = 0.1 + overallAvg * 0.5;
          centerGlow.style.opacity = glowIntensity;
          centerGlow.style.transform = `translate(-50%, -50%) scale(${0.8 + overallAvg * 0.4})`;
          centerGlow.style.background = `radial-gradient(circle at center,
            rgba(255, 255, 255, ${0.1 + overallAvg * 0.2}),
            rgba(200, 150, 255, ${0.05 + overallAvg * 0.1}))`;

          // Particles
          particles.forEach((p, i) => {
            const particleIntensity = overallAvg * (0.5 + Math.sin(timestamp / 2000 + i * 0.5) * 0.3);
            const scale = 0.5 + particleIntensity * 1.5;
            p.style.transform = `translate(${Math.sin(timestamp / 3000 + i * 2) * 30 * particleIntensity}px, 
              ${Math.cos(timestamp / 2500 + i * 1.7) * 30 * particleIntensity}px) 
              scale(${scale})`;
            p.style.opacity = 0.1 + particleIntensity * 0.5;
            const particleHue = (hue + i * 30) % 360;
            p.style.background = `radial-gradient(circle at center,
              hsla(${particleHue}, 90%, 70%, 0.4),
              hsla(${particleHue}, 90%, 50%, 0.1))`;
          });
        }

        animationFrame = requestAnimationFrame(animateVisuals);
      }

      // ----- Get average frequency -----
      function getAverageFreq(start, end) {
        if (!dataArray) return 0;
        let sum = 0;
        const count = Math.min(end, dataArray.length) - start;
        if (count <= 0) return 0;
        for (let i = start; i < Math.min(end, dataArray.length); i++) {
          sum += dataArray[i] / 255;
        }
        return sum / count;
      }

      // ----- Idle animation -----
      function idleAnimation(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const time = timestamp / 1000;

        // Gentle idle movement for visual elements
        freqBars.forEach((bar, i) => {
          const value = 0.3 + 0.2 * Math.sin(time * 0.5 + i * 0.3);
          const height = 15 + value * 30;
          bar.style.height = height + 'px';
          bar.style.opacity = 0.2 + value * 0.3;
        });

        const idleScale = 0.6 + 0.1 * Math.sin(time * 0.3);
        shapeCircle.style.transform = `translate(-50%, -50%) scale(${idleScale})`;
        shapeCircle.style.opacity = 0.3;

        shapeTriangle.style.transform = `translate(-50%, -50%) scale(${idleScale * 0.9}) rotate(${time * 10}deg)`;
        shapeTriangle.style.opacity = 0.2;

        shapeSquare.style.transform = `translate(-50%, -50%) scale(${idleScale * 0.8}) rotate(${-time * 8}deg)`;
        shapeSquare.style.opacity = 0.2;

        shapeDiamond.style.transform = `translate(-50%, -50%) scale(${idleScale * 0.7}) rotate(${time * 12}deg)`;
        shapeDiamond.style.opacity = 0.15;

        centerGlow.style.opacity = 0.1 + 0.05 * Math.sin(time * 0.5);
        centerGlow.style.transform = `translate(-50%, -50%) scale(${0.8 + 0.05 * Math.sin(time * 0.4)})`;

        particles.forEach((p, i) => {
          const offset = Math.sin(time * 0.2 + i * 0.7) * 15;
          p.style.transform = `translate(${Math.sin(time * 0.3 + i * 1.5) * 20}px, 
            ${Math.cos(time * 0.25 + i * 1.3) * 20}px) scale(${0.5 + 0.2 * Math.sin(time * 0.3 + i)})`;
          p.style.opacity = 0.1 + 0.1 * Math.sin(time * 0.3 + i);
        });
      }

      // ----- Reset -----
      function resetSynesthesia() {
        if (isPlaying) {
          pauseAudio();
        }
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        lastTimestamp = 0;
        isPlaying = false;
        playBtn.textContent = '▶️ Play';

        // Reset visuals
        freqBars.forEach(bar => {
          bar.style.height = '20px';
          bar.style.opacity = '0.2';
        });
        shapeCircle.style.transform = 'translate(-50%, -50%) scale(0.5)';
        shapeCircle.style.opacity = '0.2';
        shapeTriangle.style.transform = 'translate(-50%, -50%) scale(0.5)';
        shapeTriangle.style.opacity = '0.15';
        shapeSquare.style.transform = 'translate(-50%, -50%) scale(0.5)';
        shapeSquare.style.opacity = '0.15';
        shapeDiamond.style.transform = 'translate(-50%, -50%) scale(0.4)';
        shapeDiamond.style.opacity = '0.1';
        centerGlow.style.opacity = '0.05';
        centerGlow.style.transform = 'translate(-50%, -50%) scale(0.8)';
        colorWaves.forEach(wave => {
          wave.style.height = '20px';
          wave.style.opacity = '0.05';
        });
        particles.forEach(p => {
          p.style.transform = 'translate(0, 0) scale(0.5)';
          p.style.opacity = '0.05';
        });

        // Start idle animation
        if (!animationFrame) {
          animationFrame = requestAnimationFrame(animateVisuals);
        }
      }

      // ----- Init -----
      function init() {
        // Set initial state
        resetSynesthesia();

        // Start idle animation
        if (!animationFrame) {
          animationFrame = requestAnimationFrame(animateVisuals);
        }

        // Auto-play after 1 second
        setTimeout(() => {
          playAudio();
        }, 1000);
      }

      // ----- Event listeners -----
      playBtn.addEventListener('click', playAudio);
      pauseAudioBtn.addEventListener('click', pauseAudio);
      volumeControl.addEventListener('input', function() {
        updateVolume(this.value);
        if (isPlaying) {
          // Update gain
          const gainNode = audioContext ? audioContext.createGain() : null;
          if (gainNode) {
            gainNode.gain.value = volume;
          }
        }
      });
      resetSynBtn.addEventListener('click', resetSynesthesia);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (isPlaying) pauseAudio();
      });

      init();
    })();
  </script>

</body>
</html>
