<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Expand - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>FAQ</h1>
    <div class="aex-section">
      <div class="aex-item">
        <div class="aex-header" tabindex="0">What is EaseMotion?<span class="aex-chevron"></span></div>
        <div class="aex-body"><p>A CSS animation library for UI animations.</p></div>
      </div>
      <div class="aex-item">
        <div class="aex-header" tabindex="0">How to install?<span class="aex-chevron"></span></div>
        <div class="aex-body"><p>Download the CSS file and link it in your project.</p></div>
      </div>
      <div class="aex-item">
        <div class="aex-header" tabindex="0">Is it free?<span class="aex-chevron"></span></div>
        <div class="aex-body"><p>Yes, MIT licensed.</p></div>
      </div>
    </div>
  </section>
  <script>
    document.querySelectorAll('.aex-header').forEach(function(h) {
      h.addEventListener('click', function() {
        this.parentElement.classList.toggle('aex-open');
      });
    });
  </script>
</body>
</html>
