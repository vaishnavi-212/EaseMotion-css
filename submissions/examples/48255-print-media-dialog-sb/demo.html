<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print-Optimized Dialog Component</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Print-optimized dialog demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Print-Optimized Dialog</h1>
        <p>Demonstrates dialog/modal component with print media query optimization.</p>
        
        <div class="ease-dialog">
          <div class="ease-dialog-header">
            <h3>Confirm Action</h3>
            <button class="ease-dialog-close" aria-label="Close">×</button>
          </div>
          <div class="ease-dialog-body">
            <p>Are you sure you want to proceed with this action? This cannot be undone.</p>
          </div>
          <div class="ease-dialog-footer">
            <button class="ease-btn ease-btn-secondary">Cancel</button>
            <button class="ease-btn ease-btn-primary">Confirm</button>
          </div>
        </div>
        
        <p class="print-hint">Press Ctrl+P (Cmd+P) to see dialog hidden in print mode.</p>
      </section>
    </main>
  </body>
</html>
