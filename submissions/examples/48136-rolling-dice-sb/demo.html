<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolling Dice Animation</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="dice-container" aria-label="Animated Dice">
      <header class="dice-header">
        <h1 class="dice-title">Dice Roller</h1>
        <p class="dice-subtitle">Click to roll the dice!</p>
      </header>

      <div class="dice-board">
        <div class="dice dice-1" aria-label="Dice showing 1">
          <div class="dot center"></div>
        </div>

        <div class="dice dice-2" aria-label="Dice showing 2">
          <div class="dot top-left"></div>
          <div class="dot bottom-right"></div>
        </div>

        <div class="dice dice-3" aria-label="Dice showing 3">
          <div class="dot top-left"></div>
          <div class="dot center"></div>
          <div class="dot bottom-right"></div>
        </div>

        <div class="dice dice-4" aria-label="Dice showing 4">
          <div class="dot top-left"></div>
          <div class="dot top-right"></div>
          <div class="dot bottom-left"></div>
          <div class="dot bottom-right"></div>
        </div>

        <div class="dice dice-5" aria-label="Dice showing 5">
          <div class="dot top-left"></div>
          <div class="dot top-right"></div>
          <div class="dot center"></div>
          <div class="dot bottom-left"></div>
          <div class="dot bottom-right"></div>
        </div>

        <div class="dice dice-6" aria-label="Dice showing 6">
          <div class="dot top-left"></div>
          <div class="dot top-right"></div>
          <div class="dot middle-left"></div>
          <div class="dot middle-right"></div>
          <div class="dot bottom-left"></div>
          <div class="dot bottom-right"></div>
        </div>
      </div>

      <div class="controls">
        <button class="roll-btn" type="button">
          <span class="btn-icon">🎲</span>
          <span class="btn-text">Roll Dice</span>
        </button>
      </div>

      <div class="result-panel">
        <div class="result-box">
          <span class="result-label">Last Roll</span>
          <span class="result-value" id="lastRoll">-</span>
        </div>
        <div class="result-box">
          <span class="result-label">Total</span>
          <span class="result-value" id="totalRoll">0</span>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-value">42</span>
          <span class="stat-label">Rolls</span>
        </div>
        <div class="stat">
          <span class="stat-value">6</span>
          <span class="stat-label">Max</span>
        </div>
        <div class="stat">
          <span class="stat-value">3.5</span>
          <span class="stat-label">Average</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
