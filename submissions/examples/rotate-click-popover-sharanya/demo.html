<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotate Click Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="wrapper">
  <button class="popover-btn">Analytics</button>

  <div class="popover">
    <div class="popover-header">
      <h3>Dashboard</h3>
      <span class="status">● Live</span>
    </div>

    <div class="popover-body">
      <div class="stat">
        <span>Visitors</span>
        <strong>12.5K</strong>
      </div>

      <div class="stat">
        <span>Sales</span>
        <strong>1.2K</strong>
      </div>

      <div class="stat">
        <span>Growth</span>
        <strong>+18%</strong>
      </div>
    </div>
  </div>
</div>
</body>
</html>
