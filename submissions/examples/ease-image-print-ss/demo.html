<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Image Print Optimization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ease Image Print Optimization</h1>

    <p>
        This example demonstrates how the <strong>ease-image</strong>
        component can be optimized for printing using
        <code>@media print</code>.
    </p>

    <div class="ease-image">

        <img
            src="https://picsum.photos/800/450"
            alt="Sample landscape">

        <div class="content">
            <h2>Beautiful Landscape</h2>

            <p>
                Decorative gradients, shadows, and colors look great
                on screen but should be removed when printing to save
                ink and improve readability.
            </p>

        </div>

    </div>

</div>

</body>
</html>
