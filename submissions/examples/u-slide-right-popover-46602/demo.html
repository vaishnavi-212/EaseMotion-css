<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Right Popover - Cyberpunk Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Open Control Panel
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    ⚡
                </div>

                <div>

                    <h2>Cyber Grid</h2>

                    <p>Neon System Active</p>

                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Power</h3>
                    <span>98%</span>
                </div>

                <div class="card">
                    <h3>Nodes</h3>
                    <span>256</span>
                </div>

                <div class="card">
                    <h3>Latency</h3>
                    <span>2 ms</span>
                </div>

            </div>

            <button class="action">
                Launch Console
            </button>

        </div>

    </div>

</div>

</body>
</html>
