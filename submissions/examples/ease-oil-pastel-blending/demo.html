<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil Pastel Blending – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🖍️ Oil Pastel Blending</h1>
    <p class="subtitle">Colors blending and smudging</p>

    <div class="op-container">
      <div class="op-scene">
        <!-- Canvas -->
        <div class="canvas">
          <!-- Background texture -->
          <div class="paper-texture"></div>
          
          <!-- Color strokes -->
          <div class="color-stroke stroke-1"></div>
          <div class="color-stroke stroke-2"></div>
          <div class="color-stroke stroke-3"></div>
          <div class="color-stroke stroke-4"></div>
          <div class="color-stroke stroke-5"></div>
          <div class="color-stroke stroke-6"></div>
          <div class="color-stroke stroke-7"></div>
          <div class="color-stroke stroke-8"></div>
          <div class="color-stroke stroke-9"></div>
          <div class="color-stroke stroke-10"></div>
          <div class="color-stroke stroke-11"></div>
          <div class="color-stroke stroke-12"></div>
          <div class="color-stroke stroke-13"></div>
          <div class="color-stroke stroke-14"></div>
          <div class="color-stroke stroke-15"></div>
          <div class="color-stroke stroke-16"></div>
          <div class="color-stroke stroke-17"></div>
          <div class="color-stroke stroke-18"></div>
          <div class="color-stroke stroke-19"></div>
          <div class="color-stroke stroke-20"></div>
          
          <!-- Blending overlay -->
          <div class="blending-overlay"></div>
          
          <!-- Smudge particles -->
          <div class="smudge-particle sp1"></div>
          <div class="smudge-particle sp2"></div>
          <div class="smudge-particle sp3"></div>
          <div class="smudge-particle sp4"></div>
          <div class="smudge-particle sp5"></div>
          <div class="smudge-particle sp6"></div>
          <div class="smudge-particle sp7"></div>
          <div class="smudge-particle sp8"></div>
          <div class="smudge-particle sp9"></div>
          <div class="smudge-particle sp10"></div>
          <div class="smudge-particle sp11"></div>
          <div class="smudge-particle sp12"></div>
          <div class="smudge-particle sp13"></div>
          <div class="smudge-particle sp14"></div>
          <div class="smudge-particle sp15"></div>
          <div class="smudge-particle sp16"></div>
          <div class="smudge-particle sp17"></div>
          <div class="smudge-particle sp18"></div>
          <div class="smudge-particle sp19"></div>
          <div class="smudge-particle sp20"></div>
          
          <!-- Oil pastel sticks -->
          <div class="pastel-stick pastel-1"></div>
          <div class="pastel-stick pastel-2"></div>
          <div class="pastel-stick pastel-3"></div>
          <div class="pastel-stick pastel-4"></div>
          <div class="pastel-stick pastel-5"></div>
          <div class="pastel-stick pastel-6"></div>
        </div>
        
        <!-- Color palette -->
        <div class="palette">
          <div class="palette-color pc1" data-color="#ff6b6b"></div>
          <div class="palette-color pc2" data-color="#ffd93d"></div>
          <div class="palette-color pc3" data-color="#6bcbff"></div>
          <div class="palette-color pc4" data-color="#6bff6b"></div>
          <div class="palette-color pc5" data-color="#b88aff"></div>
          <div class="palette-color pc6" data-color="#ff8a6a"></div>
          <div class="palette-color pc7" data-color="#ff6bff"></div>
          <div class="palette-color pc8" data-color="#6bffff"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="blendBtn">🎨 Blend Colors</button>
      <button id="smudgeBtn">🖐️ Smudge</button>
      <label>
        Blend Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const colorStrokes = document.querySelectorAll('.color-stroke');
      const blendingOverlay = document.querySelector('.blending-overlay');
      const smudgeParticles = document.querySelectorAll('.smudge-particle');
      const pastelSticks = document.querySelectorAll('.pastel-stick');
      const paletteColors = document.querySelectorAll('.palette-color');

      const blendBtn = document.getElementById('blendBtn');
      const smudgeBtn = document.getElementById('smudgeBtn');
      const speedInput = document.getElementById('speedControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let isBlending = false;
      let isSmudging = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let blendProgress = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Color strokes
        colorStrokes.forEach((stroke, i) => {
          const duration = (1.5 + i * 0.05) / speedMultiplier;
          stroke.style.setProperty('--stroke-duration', duration + 's');
          stroke.style.setProperty('--stroke-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Blending overlay
        blendingOverlay.style.setProperty('--blend-duration', (2 / speedMultiplier) + 's');

        // Smudge particles
        smudgeParticles.forEach((p, i) => {
          const duration = (0.8 + (i % 4) * 0.1) / speedMultiplier;
          p.style.setProperty('--smudge-duration', duration + 's');
          p.style.setProperty('--smudge-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Pastel sticks
        pastelSticks.forEach((stick, i) => {
          const duration = (1.2 + i * 0.1) / speedMultiplier;
          stick.style.setProperty('--pastel-duration', duration + 's');
          stick.style.setProperty('--pastel-delay', ((i * 0.05) / speedMultiplier) + 's');
        });
      }

      // ----- Blend colors -----
      function blendColors() {
        if (isBlending) return;
        isBlending = true;
        blendProgress = 0;

        // Reset blending overlay
        blendingOverlay.style.opacity = '0';
        blendingOverlay.style.animation = 'none';
        void blendingOverlay.offsetWidth;
        blendingOverlay.style.animation = '';

        // Animate strokes
        colorStrokes.forEach((stroke, i) => {
          stroke.style.animation = 'none';
          void stroke.offsetWidth;
          stroke.style.animation = '';
          const delay = i * 0.02 / speedMultiplier;
          stroke.style.animationDelay = delay + 's';
        });

        // Show blending overlay
        setTimeout(() => {
          blendingOverlay.classList.add('blending');
          blendingOverlay.style.opacity = '0.6';
        }, 500 / speedMultiplier);

        // Pastel sticks animate
        pastelSticks.forEach((stick, i) => {
          stick.classList.add('animate');
        });

        blendBtn.textContent = '🎨 Blending...';
        setTimeout(() => {
          blendBtn.textContent = '🎨 Blend Colors';
          isBlending = false;
        }, 2000 / speedMultiplier);
      }

      // ----- Smudge -----
      function smudge() {
        if (isSmudging) return;
        isSmudging = true;

        // Reset smudge particles
        smudgeParticles.forEach(p => {
          p.style.opacity = '0';
          p.style.transform = 'scale(0)';
          p.style.animation = 'none';
          void p.offsetWidth;
          p.style.animation = '';
          p.classList.remove('smudging');
        });

        // Trigger smudge particles
        setTimeout(() => {
          smudgeParticles.forEach((p, i) => {
            setTimeout(() => {
              p.classList.add('smudging');
              p.style.opacity = '0.6';
            }, i * 15 / speedMultiplier);
          });
        }, 100 / speedMultiplier);

        // Pastel sticks animate
        pastelSticks.forEach((stick, i) => {
          stick.classList.add('smudge-animate');
        });

        smudgeBtn.textContent = '🖐️ Smudging...';
        setTimeout(() => {
          smudgeBtn.textContent = '🖐️ Smudge';
          isSmudging = false;
        }, 1200 / speedMultiplier);
      }

      // ----- Reset -----
      function resetCanvas() {
        isBlending = false;
        isSmudging = false;
        blendProgress = 0;

        colorStrokes.forEach(stroke => {
          stroke.style.animation = '';
          stroke.style.opacity = '1';
        });

        blendingOverlay.classList.remove('blending');
        blendingOverlay.style.opacity = '0';

        smudgeParticles.forEach(p => {
          p.classList.remove('smudging');
          p.style.opacity = '0';
          p.style.transform = 'scale(0)';
        });

        pastelSticks.forEach(stick => {
          stick.classList.remove('animate', 'smudge-animate');
        });

        blendBtn.textContent = '🎨 Blend Colors';
        smudgeBtn.textContent = '🖐️ Smudge';

        if (isBlending || isSmudging) {
          isBlending = false;
          isSmudging = false;
        }
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        // Set initial stroke colors
        const colors = [
          '#ff6b6b', '#ff8a6a', '#ffd93d', '#6bcbff',
          '#6bff6b', '#b88aff', '#ff6bff', '#6bffff',
          '#ff6b6b', '#ff8a6a', '#ffd93d', '#6bcbff',
          '#6bff6b', '#b88aff', '#ff6bff', '#6bffff',
          '#ff6b6b', '#ff8a6a', '#ffd93d', '#6bcbff'
        ];

        colorStrokes.forEach((stroke, i) => {
          const color = colors[i % colors.length];
          stroke.style.setProperty('--stroke-color', color);
          stroke.style.background = `linear-gradient(135deg,
            ${color}cc 0%,
            ${color}88 40%,
            ${color}44 70%,
            transparent 100%
          )`;
        });

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-blend after 1.5 seconds
        setTimeout(() => {
          blendColors();
        }, 1500);

        // Auto-smudge after 4 seconds
        setTimeout(() => {
          smudge();
        }, 4000);
      }

      // ----- Event listeners -----
      blendBtn.addEventListener('click', blendColors);
      smudgeBtn.addEventListener('click', smudge);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      resetBtn.addEventListener('click', resetCanvas);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
