<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Popover for Accessible Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="accessible-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="accessible-popover-content">
        View Accessibility Features
      </button>
      
      <div id="accessible-popover-content" class="ease-tada-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <h2 id="popover-title">Accessibility Options Supported</h2>
          <p>This popover is fully operable via keyboard. It uses high contrast ratios to meet WCAG AAA standards and automatically disables animations for users who prefer <strong>reduced motion</strong>.</p>
          <div class="popover-actions">
            <button class="btn-primary" aria-label="Acknowledge and close dialog">Understood</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
