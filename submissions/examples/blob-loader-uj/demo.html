<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blob Morphing Loader Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.5rem;
      width: 100%;
      max-width: 640px;
    }

    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      text-align: center;
      position: relative;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .card-desc {
      color: var(--ease-color-muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* Custom variant: Gradient and glow shadow */
    .gradient-blob {
      --blob-bg: linear-gradient(135deg, #06b6d4, #10b981);
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.35);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Blob Morphing Loader</h1>
    <p>
      An organic fluid loader that transitions smoothly between different border radii as it rotates.
    </p>
  </header>

  <main class="showcase-grid">

    <!-- Card 1: Primary Purple Loader -->
    <div class="showcase-card">
      <div class="blob-loader-uj" style="--blob-size: 64px;"></div>
      <div>
        <div class="card-title">Default Primary</div>
        <div class="card-desc">Standard SaaS and dashboard content loader theme.</div>
      </div>
    </div>

    <!-- Card 2: Glowing Cyan/Emerald Loader -->
    <div class="showcase-card">
      <div class="blob-loader-uj gradient-blob" style="--blob-size: 64px; --blob-duration: 3s;"></div>
      <div>
        <div class="card-title">Gradient Glow</div>
        <div class="card-desc">Customizable colors and speeds with ambient box-shadow depth.</div>
      </div>
    </div>

  </main>

</body>
</html>
