<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech Hub - Staggered Entrance Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tech-viewport">
        <!-- Main Premium Minimalist Tech Card Elevation Container Hub Shell -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="minimal-matrix-badge">STAGGER_SYS // v7</div>
                <h2 class="control-title">System Hardware Logs</h2>
                <p class="control-subtitle">Hover over or interact with the sleek action link below to witness the pure-CSS cascading sequential row visibility delay filters.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">▫️</span>
                        <span class="btn-text">Inspect CPU Topology</span>
                    </button>

                    <!-- Floating Tooltip Translucent Staggered Overlay Menu Shell Box -->
                    <div class="staggered-entrance-tooltip ease-stagger-fly">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-heading">Hardware Metrics</span>
                            <div class="staggered-data-rows">
                                <span class="data-row row-stagger-1">Core 01 // 4.2 GHz</span>
                                <span class="data-row row-stagger-2">Thread Allocation // 84%</span>
                                <span class="data-row row-stagger-3 data-status-pass">Status // Operational</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Monochrome Layout Parameters Synced</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
