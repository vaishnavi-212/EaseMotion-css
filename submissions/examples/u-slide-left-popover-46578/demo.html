<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-Left Popover - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-container">

        <button class="trigger">
            Quick Preview
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="icon">
                    🛍️
                </div>

                <div>
                    <h2>Smart Watch Pro</h2>
                    <p>Fitness • GPS • AMOLED</p>
                </div>

            </div>

            <div class="stats">

                <div class="card">
                    <h3>Price</h3>
                    <span>$249</span>
                </div>

                <div class="card">
                    <h3>Rating</h3>
                    <span>4.8 ★</span>
                </div>

                <div class="card">
                    <h3>Stock</h3>
                    <span>In Stock</span>
                </div>

            </div>

            <button class="action">
                Buy Now
            </button>

        </div>

    </div>

</div>

</body>
</html>
