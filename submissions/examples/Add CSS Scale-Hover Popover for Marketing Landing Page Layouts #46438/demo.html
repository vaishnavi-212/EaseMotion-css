<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scale-Hover Popover - Marketing Landing Page</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="hero-section">
    <div class="hero-content">
      <div class="badge">New Release V2.0</div>
      <h1>Master the Art of<br><span class="text-gradient">Pure CSS Animations</span></h1>
      <p>Elevate your web projects without writing a single line of JavaScript. Discover the power of modern CSS APIs.</p>
      
      <!-- Trigger Button -->
      <button class="trigger-btn" popovertarget="download-popover">
        Get the Free eBook
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- Scale-Hover Popover -->
  <div id="download-popover" class="popover glass-panel" popover>
    <div class="popover-header">
      <h3>Ready to level up?</h3>
      <button class="close-btn" popovertarget="download-popover" popovertargetaction="hide" aria-label="Close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    
    <div class="popover-body">
      <p>Enter your email below to receive the 50-page PDF guide instantly.</p>
      <form class="subscribe-form" onsubmit="event.preventDefault();">
        <input type="email" placeholder="hello@example.com" required>
        <button type="submit" class="submit-btn" popovertarget="download-popover" popovertargetaction="hide">Send it to me!</button>
      </form>
    </div>
  </div>
</body>
</html>
