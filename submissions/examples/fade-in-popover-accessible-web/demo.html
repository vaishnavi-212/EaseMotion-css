<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-In Popover</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <button class="popover-btn">
            Learn More
        </button>

        <div class="popover">

            <div class="arrow"></div>

            <h2>Accessible Popover</h2>

            <p>
                This popover is built using only HTML and CSS.
                It supports keyboard navigation,
                responsive layouts and smooth fade animations.
            </p>

        </div>

    </div>

</body>

</html>
