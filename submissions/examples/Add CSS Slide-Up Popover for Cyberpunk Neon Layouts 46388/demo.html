<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Up Popover - Cyberpunk Neon</title>
    <!-- Import EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="demo-layout">
    <div class="demo-container">
        
        <header class="demo-header">
            <h1 class="demo-title glitched">WEAPON_SYS_V.3</h1>
            <div class="status-bar">
                <span class="status-indicator">ARMED</span>
                <span class="status-time">2077.10.31 // 23:59:00</span>
            </div>
        </header>
        
        <div class="cyber-panel">
            <div class="panel-header">
                <h3>// INVENTORY_UPLINK</h3>
            </div>
            
            <div class="inventory-grid">
                
                <!-- Item 1 -->
                <div class="inventory-card">
                    <div class="item-name">THERMAL_KATANA</div>
                    
                    <!-- Slide-Up Popover Component -->
                    <div class="ease-popover-wrapper">
                        <!-- Native focusable button acts as trigger -->
                        <button type="button" class="ease-popover-trigger" aria-haspopup="dialog" aria-label="Weapon Stats Info">
                            <span class="trigger-icon">[STATS]</span>
                        </button>
                        
                        <!-- Popover Content (triggers on focus or hover) -->
                        <div class="ease-popover-content" role="dialog">
                            <div class="ease-popover-header">
                                <h4>KATANA // MK.IV</h4>
                            </div>
                            <div class="ease-popover-body">
                                <div class="stat-row">
                                    <span>DMG</span>
                                    <span class="stat-bar"><span class="fill" style="width: 85%;"></span></span>
                                </div>
                                <div class="stat-row">
                                    <span>SPD</span>
                                    <span class="stat-bar"><span class="fill" style="width: 95%;"></span></span>
                                </div>
                                <p class="lore-text">Heats blade to 3000C. Can slice through standard vehicular armor.</p>
                            </div>
                        </div>
                    </div>
                    <!-- End Popover Component -->
                </div>
                
                <!-- Item 2 -->
                <div class="inventory-card">
                    <div class="item-name">SMART_PISTOL</div>
                    
                    <div class="ease-popover-wrapper">
                        <button type="button" class="ease-popover-trigger" aria-haspopup="dialog" aria-label="Weapon Stats Info">
                            <span class="trigger-icon">[STATS]</span>
                        </button>
                        
                        <div class="ease-popover-content alt-neon" role="dialog">
                            <div class="ease-popover-header">
                                <h4>AUTO-TARGET // V.2</h4>
                            </div>
                            <div class="ease-popover-body">
                                <div class="stat-row">
                                    <span>DMG</span>
                                    <span class="stat-bar"><span class="fill" style="width: 45%;"></span></span>
                                </div>
                                <div class="stat-row">
                                    <span>ACC</span>
                                    <span class="stat-bar"><span class="fill" style="width: 100%;"></span></span>
                                </div>
                                <p class="lore-text">Micro-missile rounds track targets via neural link.</p>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
            
            <div class="panel-footer">
                <button type="button" class="cyber-btn">EQUIP_LOADOUT</button>
            </div>
        </div>

    </div>
</body>
</html>
