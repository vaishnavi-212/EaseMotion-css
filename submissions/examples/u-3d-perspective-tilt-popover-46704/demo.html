<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Perspective Tilt Neumorphic Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="popover-wrapper">

        <button class="trigger">
            Open Panel
        </button>

        <div class="popover" tabindex="0">

            <div class="header">

                <div class="avatar">
                    ☁
                </div>

                <div>

                    <h2>Neumorphic UI</h2>

                    <p>Soft Dashboard Controls</p>

                </div>

            </div>

            <div class="cards">

                <div class="card">
                    <span class="value">98%</span>
                    <span class="text">Battery</span>
                </div>

                <div class="card">
                    <span class="value">42°</span>
                    <span class="text">Weather</span>
                </div>

                <div class="card">
                    <span class="value">128</span>
                    <span class="text">Messages</span>
                </div>

            </div>

            <button class="action">
                Explore
            </button>

        </div>

    </div>

</div>

</body>
</html>
