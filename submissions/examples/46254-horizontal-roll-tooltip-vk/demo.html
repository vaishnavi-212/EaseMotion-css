<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Roll Tooltip | EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-container">
    <h1>Horizontal Roll Tooltip</h1>
    <p class="subtitle">
        Hover or focus on the button to see the tooltip.
    </p>
    <div class="tooltip-wrapper">
        <button
            class="tooltip-button"
            aria-describedby="tooltip">
            Hover Me
        </button>

        <span
            id="tooltip"
            class="horizontal-roll-tooltip"
            role="tooltip">
            Modern SaaS Tooltip
        </span>
    </div>
</main>

</body>
</html>
