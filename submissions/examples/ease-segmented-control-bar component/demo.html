<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Segmented Control</title>
</head>
<body>

<div class="segmented-control" id="segControl">
  <div class="thumb" id="thumb"></div>
  <button class="active" data-index="0">Day</button>
  <button data-index="1">Week</button>
  <button data-index="2">Month</button>
  <button data-index="3">Year</button>
</div>

<script>
  const control = document.getElementById('segControl');
  const thumb = document.getElementById('thumb');
  const buttons = control.querySelectorAll('button');

  function moveThumb(btn) {
    thumb.style.width = btn.offsetWidth + 'px';
    thumb.style.transform = `translateX(${btn.offsetLeft - 4}px)`;
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      moveThumb(btn);
    });
  });

  // Initialize thumb position on load
  window.addEventListener('load', () => moveThumb(control.querySelector('.active')));
</script>

</body>
</html>
