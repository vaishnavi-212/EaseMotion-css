<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Popover - Responsive Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">Analytics</div>
      <nav class="sidebar-nav">
        <a href="#" class="active">Overview</a>
        <a href="#">Reports</a>
        <a href="#">Customers</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="top-header">
        <div class="search-bar">
          <input type="text" placeholder="Search...">
        </div>
        
        <div class="header-actions">
          <!-- Notification Trigger -->
          <button class="trigger-btn notification-btn" popovertarget="notifications-popover" aria-label="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <span class="badge">3</span>
          </button>
        </div>
      </header>

      <!-- Dashboard Content (Placeholder) -->
      <div class="dashboard-widgets">
        <div class="widget"></div>
        <div class="widget"></div>
        <div class="widget large-widget"></div>
      </div>
    </main>
  </div>

  <!-- Notifications Popover -->
  <div id="notifications-popover" class="popover" popover>
    <div class="popover-header">
      <h4>Notifications</h4>
      <button class="mark-read-btn" popovertarget="notifications-popover" popovertargetaction="hide">Mark all as read</button>
    </div>
    <div class="popover-body">
      <div class="notification-item unread">
        <div class="notif-icon primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="notif-content">
          <p><strong>System Update</strong> completed successfully.</p>
          <span class="notif-time">2m ago</span>
        </div>
      </div>
      <div class="notification-item unread">
        <div class="notif-icon warning">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="notif-content">
          <p>High CPU usage detected on server 04.</p>
          <span class="notif-time">1h ago</span>
        </div>
      </div>
      <div class="notification-item">
        <div class="notif-icon info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5c-1.1 0-2 .9-2 2v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <div class="notif-content">
          <p><strong>Jane Doe</strong> requested access to "Q3 Reports".</p>
          <span class="notif-time">3h ago</span>
        </div>
      </div>
    </div>
    <div class="popover-footer">
      <a href="#" class="view-all">View all notifications</a>
    </div>
  </div>
</body>
</html>
