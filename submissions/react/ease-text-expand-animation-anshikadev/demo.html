<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Expand Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <!-- Load React, ReactDOM, and Babel from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root" style="margin-top: 120px; display: flex; flex-direction: column; align-items: center; gap: 40px;"></div>

  <!-- Inline script written in Babel/JSX to render your component inside the browser -->
  <script type="text/babel">
    const { useState } = React;

    const TextExpandAnimation = ({ 
      text = 'CINEMATIC REVEAL', 
      trigger = 'hover' // 'hover' or 'click'
    }) => {
      const [isExpanded, setIsExpanded] = useState(false);

      const handleMouseEnter = () => {
        if (trigger === 'hover') setIsExpanded(true);
      };

      const handleMouseLeave = () => {
        if (trigger === 'hover') setIsExpanded(false);
      };

      const handleClick = () => {
        if (trigger === 'click') setIsExpanded(prev => !prev);
      };

      return (
        <div 
          className={`ease-text-expand-container ${isExpanded ? 'ease-is-expanded' : ''}`}
          onMouseEnter={handleMouseEnter}
          onMouseLeave={handleMouseLeave}
          onClick={handleClick}
          style={{ cursor: trigger === 'click' ? 'pointer' : 'default' }}
        >
          <h1 className="ease-expandable-text">
            {text}
          </h1>
          <span className="ease-expand-subtext">
            {trigger === 'hover' ? 'Hover to see tracking stretch' : 'Click to toggle tracking scale'}
          </span>
        </div>
      );
    };

    // Render the app container
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <React.Fragment>
        <TextExpandAnimation text="EASEMOTION CSS" trigger="hover" />
        <TextExpandAnimation text="MINIMALIST DESIGN" trigger="click" />
      </React.Fragment>
    );
  </script>

</body>
</html>
