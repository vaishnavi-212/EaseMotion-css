<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React View Transitions Demo</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="./style.css" />
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { flushSync } = ReactDOM;

    function useViewTransition() {
      const morph = (callback) => {
        if (!document.startViewTransition) {
          callback();
          return;
        }

        document.startViewTransition(() => {
          flushSync(() => {
            callback();
          });
        });
      };

      return morph;
    }

    const items = [
      { id: 1, title: 'Mountain Retreat', content: 'Experience the serenity of the high peaks.' },
      { id: 2, title: 'Ocean Breeze', content: 'Relax by the tranquil shores and listen to the waves.' },
      { id: 3, title: 'Urban Explorer', content: 'Dive into the vibrant heart of the bustling metropolis.' },
    ];

    function App() {
      const [activeItemId, setActiveItemId] = useState(null);
      const morph = useViewTransition();

      const handleCardClick = (id) => {
        morph(() => {
          setActiveItemId(id);
        });
      };

      const handleBack = () => {
        morph(() => {
          setActiveItemId(null);
        });
      };

      const activeItem = items.find(item => item.id === activeItemId);

      return (
        <div className="container">
          {activeItemId === null ? (
            <div className="list-view">
              {items.map(item => (
                <div 
                  key={item.id} 
                  className="card"
                  onClick={() => handleCardClick(item.id)}
                  style={{ viewTransitionName: `card-${item.id}-viidhii19` }}
                >
                  <h2>{item.title}</h2>
                  <p>Click to view details</p>
                </div>
              ))}
            </div>
          ) : (
            <div 
              className="detail-view"
              style={{ viewTransitionName: `card-${activeItem.id}-viidhii19` }}
            >
              <button className="back-button" onClick={handleBack}>
                &larr; Back to list
              </button>
              <h2>{activeItem.title}</h2>
              <p>{activeItem.content}</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
