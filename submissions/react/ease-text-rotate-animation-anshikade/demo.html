<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Rotate Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <!-- Load React, ReactDOM, and Babel from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root" style="margin-top: 100px; display: flex; justify-content: center;"></div>

  <!-- Inline script written in Babel/JSX to render your component inside the browser -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TextRotateAnimation = ({ 
      phrases = ['Faster', 'Smoother', 'Easier', 'Smarter'], 
      interval = 2500,
      prefix = 'Build things'
    }) => {
      const [index, setIndex] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => {
          setIndex((prevIndex) => (prevIndex + 1) % phrases.length);
        }, interval);
        return () => clearInterval(timer);
      }, [phrases, interval]);

      return (
        <div className="ease-text-rotate-container">
          <span className="ease-text-prefix">{prefix}</span>
          <span className="ease-text-rotate-wrapper">
            {phrases.map((phrase, i) => {
              let positionClass = 'ease-text-next';
              if (i === index) positionClass = 'ease-text-active';
              else if (i === (index - 1 + phrases.length) % phrases.length) positionClass = 'ease-text-prev';

              return (
                <span key={phrase} className={`ease-text-item ${positionClass}`}>
                  {phrase}
                </span>
              );
            })}
          </span>
        </div>
      );
    };

    // Render the app container
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <TextRotateAnimation 
        prefix="Design matches" 
        phrases={['Beautifully', 'Flawlessly', 'Dynamically', 'Natively']} 
        interval={2000} 
      />
    );
  </script>

</body>
</html>
