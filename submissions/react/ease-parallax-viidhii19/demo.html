<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-dependency 3D Parallax Hook</title>
  <!-- Link the EaseMotion CDN per initial request instructions -->
  <link rel="stylesheet" href="https://unpkg.com/easemotion-css/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useEffect, useRef } = React;

    function useEaseParallax(speed = 0.5) {
      const ref = useRef(null);
      const requestRef = useRef();

      useEffect(() => {
        const handleScroll = () => {
          if (!requestRef.current) {
            requestRef.current = requestAnimationFrame(() => {
              if (ref.current) {
                const rect = ref.current.getBoundingClientRect();
                const viewportCenter = window.innerHeight / 2;
                const elementCenter = rect.top + rect.height / 2;
                const offset = (elementCenter - viewportCenter) * speed;
                ref.current.style.setProperty('--parallax-y', `${offset}px`);
              }
              requestRef.current = null;
            });
          }
        };

        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();

        return () => {
          window.removeEventListener('scroll', handleScroll);
          if (requestRef.current) {
            cancelAnimationFrame(requestRef.current);
          }
        };
      }, [speed]);

      return ref;
    }

    function ParallaxLayer({ speed = 0.5, children, className = '' }) {
      const ref = useEaseParallax(speed);
      
      return (
        <div ref={ref} className={`ease-parallax-element-viidhii19 ease-fade-in ${className}`}>
          {children}
        </div>
      );
    }

    function App() {
      const textRef = useEaseParallax(-0.5);

      return (
        <div>
          <div className="hero-section">
            <ParallaxLayer speed={0.2} className="background-layer" />
            <h1 ref={textRef} className="middle-layer ease-parallax-element-viidhii19 ease-hover-lift">
              Parallax
            </h1>
            <ParallaxLayer speed={-0.15} className="foreground-layer" />
          </div>
          <div className="content-section ease-fade-in">
            <h2>Smooth 60FPS Scrolling</h2>
            <p>This implementation bypasses React's render cycle by using <code>requestAnimationFrame</code> and CSS variables. It updates the DOM directly to ensure highly optimized hardware-accelerated animations without layout thrashing.</p>
            <p>Scroll up and down to see the foreground, text, and background layers move at independent velocities!</p>
            <div style={{ height: '150vh' }}></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
