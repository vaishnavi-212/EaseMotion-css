<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Context-Aware Spotlight Component</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="./style.css" />
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 4rem;
      margin: 0;
      min-height: 100vh;
    }
    .demo-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 3rem;
      text-align: center;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .card-title {
      font-size: 1.25rem;
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .card-text {
      color: #a3a3a3;
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Spotlight Grid Demo</h1>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const { useRef, useState, useEffect, createContext, useContext } = React;

    const SpotlightContext = createContext({ x: 0, y: 0 });

    function SpotlightProvider({ children, className = '' }) {
      const [mousePosition, setMousePosition] = useState({ x: -1000, y: -1000 });
      const containerRef = useRef(null);
      
      useEffect(() => {
        const handleMouseMove = (e) => {
          setMousePosition({ x: e.clientX, y: e.clientY });
        };
        
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      return (
        <SpotlightContext.Provider value={mousePosition}>
          <div ref={containerRef} className={`ease-spotlight-provider ${className}`}>
            {children}
          </div>
        </SpotlightContext.Provider>
      );
    }

    function SpotlightCard({ children, className = '' }) {
      const cardRef = useRef(null);
      const mousePosition = useContext(SpotlightContext);
      const [cardPosition, setCardPosition] = useState({ x: -1000, y: -1000 });

      useEffect(() => {
        if (cardRef.current) {
          const rect = cardRef.current.getBoundingClientRect();
          setCardPosition({
            x: mousePosition.x - rect.left,
            y: mousePosition.y - rect.top,
          });
        }
      }, [mousePosition]);

      return (
        <div
          ref={cardRef}
          className={`ease-spotlight-card ease-fade-in ${className}`}
          style={{
            '--mouse-x': `${cardPosition.x}px`,
            '--mouse-y': `${cardPosition.y}px`,
          }}
        >
          <div className="ease-spotlight-card-content">
            {children}
          </div>
        </div>
      );
    }

    function App() {
      const cards = [
        { id: 1, title: 'Fluid Interfaces', text: 'Seamless interactions powered by physics-based animations.' },
        { id: 2, title: 'Context Aware', text: 'Components that understand their surroundings and react to user input.' },
        { id: 3, title: 'Performant', text: 'Hardware-accelerated CSS properties ensure buttery smooth 60fps.' },
        { id: 4, title: 'Modern Design', text: 'Premium visual aesthetics utilizing the latest CSS features.' },
        { id: 5, title: 'Zero Dependencies', text: 'Built entirely with vanilla CSS and native React Hooks.' },
        { id: 6, title: 'Highly Customizable', text: 'Easily adapt the styles to match your design system.' },
      ];

      return (
        <SpotlightProvider className="demo-grid">
          {cards.map(card => (
            <SpotlightCard key={card.id}>
              <h2 className="card-title">{card.title}</h2>
              <p className="card-text">{card.text}</p>
            </SpotlightCard>
          ))}
        </SpotlightProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
