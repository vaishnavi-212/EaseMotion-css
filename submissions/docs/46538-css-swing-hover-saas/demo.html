<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Swing-Hover Popover Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #1e293b;
    }
    .saas-preview-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    h2 { margin-top: 0; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em; }
    p { color: #64748b; font-size: 0.875rem; margin-bottom: 24px; }
  </style>
</head>
<body>

  <div class="saas-preview-card">
    <h2>Integrations &amp; API</h2>
    <p>Monitor third-party services and access tokens instantly.</p>

    <!-- Pure CSS SaaS Popover -->
    <div class="saas-popover-wrapper" tabindex="0">
      <button class="saas-trigger" aria-haspopup="true">
        View Connection Status
      </button>
      
      <div class="saas-popover-content" role="tooltip">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <span style="font-size: 0.75rem; font-weight: 600; color: #4f46e5; text-transform: uppercase;">Direct Connection</span>
          <span style="font-size: 0.75rem; background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 9999px;">Active</span>
        </div>
        <p style="margin: 0 0 12px 0; font-size: 0.8rem; color: #64748b; text-align: left;">API operations synced 2 minutes ago. Everything is healthy.</p>
        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 12px;">
        <div style="text-align: left;">
          <a href="#" style="font-size: 0.8rem; color: #4f46e5; text-decoration: none; font-weight: 500;">Manage Webhooks &rarr;</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
