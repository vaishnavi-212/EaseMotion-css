<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Popover Demonstration</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #0f172a;
    }
    .checkout-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      width: 420px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
    }
    .card-header {
      margin-bottom: 24px;
    }
    .card-title {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    .checkout-footer {
      border-top: 1px solid #f1f5f9;
      margin-top: 24px;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="checkout-card">
    <div class="card-header">
      <h2 class="card-title">Order Summary</h2>
      <p style="margin: 4px 0 0; font-size: 0.85rem; color: #64748b;">Review your cart items before paying</p>
    </div>

    <div class="item-row">
      <span>Minimalist Leather Wallet</span>
      <strong>$45.00</strong>
    </div>
    <div class="item-row">
      <span>Shipping &amp; Handling</span>
      <span style="color: #10b981;">Free</span>
    </div>

    <div class="checkout-footer">
      <div>
        <span style="font-size: 0.85rem; color: #64748b; display: block;">Total Due</span>
        <strong style="font-size: 1.25rem;">$45.00</strong>
      </div>

      <!-- Pure CSS Popover Component -->
      <div class="checkout-popover-container">
        <input type="checkbox" id="coupon-popover-trigger" class="popover-toggle">
        <label for="coupon-popover-trigger" class="popover-trigger" tabindex="0">
          Apply Promo Code
        </label>
        
        <div class="popover-content">
          <h4 style="margin: 0 0 8px; font-size: 1rem; font-weight: 600;">Promo Discount</h4>
          <p style="margin: 0 0 16px; font-size: 0.85rem; color: #64748b;">Enter your promo coupon below to update pricing totals.</p>
          
          <div style="display: flex; gap: 8px;">
            <input type="text" placeholder="EASEMOTION60" style="flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem;" />
            <button style="background: #0f172a; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; cursor: pointer;">Apply</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Enable basic keyboard accessibility (Space/Enter to toggle) for standard interactive labels
    const triggers = document.querySelectorAll('.popover-trigger');
    triggers.forEach(trigger => {
      trigger.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetCheckbox = document.getElementById(trigger.getAttribute('for'));
          targetCheckbox.checked = !targetCheckbox.checked;
        }
      });
    });
  </script>
</body>
</html>
