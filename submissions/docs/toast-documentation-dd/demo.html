<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Animations Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Toast Animations</h1>
    <p>Click the buttons below to trigger the different toast animations described in the documentation.</p>

    <div class="btn-group">
        <button onclick="showToast('slide')">Slide Up Toast</button>
        <button onclick="showToast('fade')">Fade In Toast</button>
        <button onclick="showToast('pop')">Pop Toast</button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'ease-toast';
            toast.setAttribute('role', 'alert');
            
            if (type === 'slide') {
                toast.classList.add('ease-toast-slide-up');
                toast.setAttribute('aria-live', 'assertive');
                toast.textContent = 'Your changes have been saved successfully!';
            } else if (type === 'fade') {
                toast.classList.add('ease-toast-fade');
                toast.setAttribute('aria-live', 'polite');
                toast.textContent = 'Draft saved automatically.';
            } else if (type === 'pop') {
                toast.classList.add('ease-toast-pop', 'ease-toast-error');
                toast.setAttribute('aria-live', 'assertive');
                toast.textContent = 'Error: Connection lost. Please try again.';
            }

            container.appendChild(toast);

            // Remove toast after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
