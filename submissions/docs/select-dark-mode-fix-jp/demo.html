<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Dropdown Dark Mode Fix Demo</title>
  
  <!-- Link to the core framework -->
  <link rel="stylesheet" href="../../easemotion.css">
  
  <!-- Our specific feature CSS fix -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      padding: 3rem;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      /* Set explicitly to dark theme to demo the fix */
      background: #111827; 
      color: #f8fafc;
      /* Force dark color scheme to trigger the media query */
      color-scheme: dark;
    }
    
    .demo-container {
      max-width: 400px;
      margin: 0 auto;
    }
    
    h2 {
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <h2>Select Dropdown in Dark Mode</h2>
    <p style="margin-bottom: 2rem; opacity: 0.8;">The dropdown arrow below should now be clearly visible in white.</p>
    
    <select class="ease-select">
      <option selected>Choose an option...</option>
      <option>Option 1</option>
      <option>Option 2</option>
      <option>Option 3</option>
    </select>
  </div>
  
</body>
</html>
