<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Bezier AST Parser Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="box" em="fade-in cubic(0.175, 0.885, 0.32, 1.275)">Bouncy Fade</div>
    </div>

    <script>
        // Mock AST Compiler for EaseMotion v1.2
        document.addEventListener("DOMContentLoaded", () => {
            const elements = document.querySelectorAll('[em]');
            
            elements.forEach(el => {
                const emValue = el.getAttribute('em');
                if (!emValue) return;

                // Regex to match cubic(a, b, c, d)
                const cubicRegex = /cubic\(([^)]+)\)/;
                const match = emValue.match(cubicRegex);

                if (match) {
                    // Extract the floats
                    const floats = match[1];
                    
                    // Inject into CSS variable
                    el.style.setProperty('--ease-custom-bezier', `cubic-bezier(${floats})`);
                    
                    // Apply base animation class
                    const remainingTokens = emValue.replace(cubicRegex, '').trim();
                    const animations = remainingTokens.split(/\s+/);
                    
                    animations.forEach(anim => {
                        if (anim) {
                            el.classList.add(`ease-kf-${anim}`);
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
