<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse-Active Interactive Popover Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #0f172a;
    }
    .preview-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    h2 { margin-top: 0; font-size: 1.5rem; font-weight: 700; }
    p { color: #64748b; font-size: 0.95rem; margin-bottom: 28px; }
  </style>
</head>
<body>

  <div class="preview-card">
    <h2>Interface Core Dashboard</h2>
    <p>Click the interactive trigger button below to launch your system statistics summary tray.</p>

    <!-- Pure CSS Pulse-Active Popover -->
    <div class="pulse-pop-container">
      <input type="checkbox" id="pulse-control-cb" class="pop-checkbox-toggle">
      <label for="pulse-control-cb" class="pop-btn-trigger" tabindex="0">
        Show Diagnostics
      </label>
      
      <div class="pop-overlay-content" role="dialog" aria-label="Diagnostic details">
        <h4 style="margin: 0 0 8px 0; font-size: 1rem; font-weight: 600; color: #4f46e5;">Memory Allocation</h4>
        <p style="margin: 0 0 16px 0; font-size: 0.85rem; color: #64748b; text-align: left;">All server nodes are healthy. Active latency limits are well within acceptable parameters.</p>
        
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
          <label for="pulse-control-cb" style="font-size: 0.8rem; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; background: #f8fafc;">
            Dismiss Info
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Enable seamless Space/Enter keyboard support on the interactive label trigger
    const triggerBtn = document.querySelector('.pop-btn-trigger');
    if (triggerBtn) {
      triggerBtn.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetCheckbox = document.getElementById(triggerBtn.getAttribute('for'));
          if (targetCheckbox) targetCheckbox.checked = !targetCheckbox.checked;
        }
      });
    }
  </script>
</body>
</html>
