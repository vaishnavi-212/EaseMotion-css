<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pulse-Active Popover Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #0f172a;
    }
    .panel-preview {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    h2 { margin-top: 0; font-size: 1.5rem; font-weight: 700; }
    p { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
  </style>
</head>
<body>

  <div class="panel-preview">
    <h2>Active Alerts</h2>
    <p>Activate the interactive alert configurations popover down below to preview current status controls.</p>

    <!-- Pure CSS Pulse-Active Popover Container -->
    <div class="pulse-popover-container">
      <input type="checkbox" id="pulse-toggle-input" class="popover-toggle">
      <label for="pulse-toggle-input" class="popover-trigger" tabindex="0">
        Review Status Details
      </label>
      
      <div class="popover-content">
        <h4 style="margin: 0 0 8px 0; font-size: 1rem; font-weight: 600;">Connection Stable</h4>
        <p style="margin: 0 0 16px 0; font-size: 0.85rem; color: #64748b;">All micro-services are operating smoothly with less than 25ms delay latency values.</p>
        
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
          <label for="pulse-toggle-input" style="font-size: 0.8rem; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500;">
            Close Status
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Accessibility hook: Let screen-readers use Enter/Space on label trigger elements safely
    const triggerLabel = document.querySelector('.popover-trigger');
    if (triggerLabel) {
      triggerLabel.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetCheckbox = document.getElementById(triggerLabel.getAttribute('for'));
          if (targetCheckbox) targetCheckbox.checked = !targetCheckbox.checked;
        }
      });
    }
  </script>
</body>
</html>
